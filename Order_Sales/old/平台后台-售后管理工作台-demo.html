<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应链售后平台后台 Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f3f5f9;
            --card: #ffffff;
            --line: #e6ebf2;
            --text: #1f2a37;
            --muted: #667085;
            --primary: #1677ff;
            --primary-soft: #edf5ff;
            --success: #16a34a;
            --success-soft: #edfdf3;
            --warning: #d97706;
            --warning-soft: #fff7ed;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
            --purple: #7c3aed;
            --purple-soft: #f5f3ff;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fb;
            color: var(--text);
            min-width: 1280px;
        }
        .page-shell {
            min-height: 100vh;
            padding: 16px;
        }
        .top-bar {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .page-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        .platform-switcher {
            display: inline-flex;
            gap: 6px;
            padding: 4px;
            background: #f3f6fb;
            border: 1px solid var(--line);
            border-radius: 10px;
        }
        .platform-tab {
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--muted);
            background: transparent;
            transition: 0.18s ease;
        }
        .platform-tab.active {
            background: var(--primary);
            color: #fff;
            font-weight: 700;
        }
        .module-shell {
            display: none;
        }
        .module-shell.active {
            display: block;
        }
        .placeholder-panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 22px 20px;
            box-shadow: var(--shadow);
        }
        .placeholder-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .placeholder-desc {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.8;
        }
        .workspace-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 12px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: var(--shadow);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.primary { background: var(--primary-soft); color: var(--primary); }
        .badge.success { background: var(--success-soft); color: var(--success); }
        .badge.warning { background: var(--warning-soft); color: var(--warning); }
        .badge.purple { background: var(--purple-soft); color: var(--purple); }
        .filter-card {
            padding: 14px 16px 14px;
        }
        .filter-grid {
            display: flex;
            align-items: flex-end;
            flex-wrap: nowrap;
            gap: 12px;
            overflow-x: auto;
        }
        .filter-grid::-webkit-scrollbar { display: none; }
        .field {
            flex: 1 1 0;
            min-width: 150px;
        }
        .field.search-field {
            min-width: 260px;
        }
        .field.action-field {
            flex: 0 0 auto;
            min-width: auto;
        }
        .field label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .field input,
        .field select {
            width: 100%;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: #fff;
            padding: 0 12px;
            font-size: 13px;
            color: var(--text);
            outline: none;
        }
        .field input:focus,
        .field select:focus {
            border-color: #8bb8ff;
            box-shadow: 0 0 0 3px rgba(22,119,255,0.08);
        }
        .field input:disabled,
        .field input[readonly],
        .field select:disabled,
        .field textarea:disabled,
        .field textarea[readonly] {
            border-color: #e5e7eb;
            background: #f5f7fa;
            color: #667085;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            white-space: nowrap;
        }
        .btn {
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--line);
            padding: 0 14px;
            font-size: 13px;
            cursor: pointer;
            background: #fff;
            color: var(--text);
        }
        .btn.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn.ghost {
            background: #f8fbff;
            color: var(--primary);
            border-color: #d7e7ff;
        }
        .status-tabs {
            display: flex;
            gap: 0;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 0 16px 10px;
            border-top: 1px solid #eef2f7;
        }
        .status-tabs::-webkit-scrollbar { display: none; }
        .status-tab {
            border: none;
            border-right: 1px solid #e8edf5;
            background: transparent;
            min-width: auto;
            padding: 12px 18px 10px 14px;
            cursor: pointer;
            transition: 0.18s ease;
            text-align: left;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .status-tab.active {
            background: transparent;
            box-shadow: none;
        }
        .status-tab .tab-name {
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
        }
        .status-tab .tab-count {
            min-width: 24px;
            height: 20px;
            padding: 0 7px;
            border-radius: 999px;
            background: #eef2f7;
            color: #6b7280;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .status-tab .tab-icon {
            font-size: 14px;
            color: #9aa4b2;
        }
        .status-tab.active .tab-name,
        .status-tab.active .tab-icon {
            color: var(--primary);
        }
        .status-tab.active .tab-count {
            background: var(--primary);
            color: #fff;
        }
        .status-tab.active::after {
            content: "";
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 999px;
        }
        .status-tab:last-child {
            border-right: none;
        }
        .table-card {
            overflow: hidden;
        }
        .table-shell {
            overflow-x: auto;
        }
        .table-shell::-webkit-scrollbar {
            height: 8px;
        }
        .table-shell::-webkit-scrollbar-thumb {
            background: #d7dfeb;
            border-radius: 999px;
        }
        .table-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-top: 1px solid var(--line);
            background: #fff;
        }
        .table-summary {
            font-size: 12px;
            color: var(--muted);
        }
        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pagination-info {
            font-size: 12px;
            color: var(--muted);
            margin-right: 4px;
        }
        .page-btn {
            min-width: 32px;
            height: 32px;
            border: 1px solid var(--line);
            background: #fff;
            color: #475467;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            padding: 0 10px;
        }
        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .page-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .data-table {
            min-width: 100%;
        }
        .table-header,
        .table-row {
            display: grid;
            grid-template-columns:
                minmax(185px, 1.2fr)
                minmax(110px, 0.78fr)
                minmax(210px, 1.5fr)
                minmax(150px, 0.95fr)
                minmax(130px, 0.9fr)
                minmax(150px, 1fr)
                minmax(170px, 1.08fr)
                minmax(150px, 1fr)
                minmax(165px, 1fr)
                minmax(90px, 0.68fr)
                minmax(170px, 1.05fr)
                minmax(110px, 0.8fr);
            gap: 14px;
            padding: 0 20px;
            min-width: 1730px;
        }
        .table-header {
            height: 50px;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
            color: #475467;
            border-bottom: 1px solid var(--line);
            background: #fbfcfe;
        }
        .table-body .table-row {
            padding-top: 16px;
            padding-bottom: 16px;
            align-items: start;
            font-size: 12px;
            border-bottom: 1px solid #eef2f7;
            cursor: pointer;
        }
        .table-body .table-row:hover {
            background: #fafcff;
        }
        .cell-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
            line-height: 1.45;
            word-break: break-word;
        }
        .cell-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 3px;
        }
        .order-sub-id {
            font-size: 12px;
            color: #667085;
            line-height: 1.6;
        }
        .cell-sub {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.7;
            word-break: break-word;
        }
        .cell-stack {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .product-info {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .product-thumb {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, #f5d2a6 0%, #c68a52 100%);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .product-meta {
            min-width: 0;
        }
        .product-price-line {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
        }
        .mini-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .mini-tag {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            background: #f4f6f8;
            color: #475467;
            font-weight: 600;
        }
        .mini-tag.primary { background: var(--primary-soft); color: var(--primary); }
        .mini-tag.warning { background: var(--warning-soft); color: var(--warning); }
        .mini-tag.success { background: var(--success-soft); color: var(--success); }
        .mini-tag.purple { background: var(--purple-soft); color: var(--purple); }
        .amount-highlight {
            font-size: 13px;
            font-weight: 700;
            color: var(--danger);
            margin-bottom: 4px;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }
        .status-pill.audit { background: var(--warning-soft); color: var(--warning); }
        .status-pill.progress { background: var(--primary-soft); color: var(--primary); }
        .status-pill.success { background: var(--success-soft); color: var(--success); }
        .status-pill.closed { background: #f3f4f6; color: #6b7280; }
        .status-pill.exception { background: var(--danger-soft); color: var(--danger); }
        .time-track {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .time-track-line {
            font-size: 11px;
            color: #667085;
            line-height: 1.5;
            white-space: nowrap;
        }
        .table-action {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
        }
        .action-btn {
            border: 1px solid #bfd5ff;
            color: var(--primary);
            background: #f8fbff;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .status-subtext {
            margin-top: 6px;
            font-size: 11px;
            color: #667085;
            line-height: 1.5;
        }
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.42);
            opacity: 0;
            pointer-events: none;
            transition: 0.2s ease;
            z-index: 50;
        }
        .drawer-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 720px;
            height: 100vh;
            background: #f8fbff;
            box-shadow: -24px 0 60px rgba(15, 23, 42, 0.22);
            transform: translateX(100%);
            transition: 0.24s ease;
            z-index: 60;
            display: flex;
            flex-direction: column;
        }
        .drawer.show {
            transform: translateX(0);
        }
        .drawer-header {
            padding: 0;
            border-bottom: 1px solid #e7edf6;
            background:
                radial-gradient(circle at top right, rgba(129, 178, 255, 0.14), transparent 24%),
                linear-gradient(180deg, #f8fbff 0%, #f2f6fb 100%);
        }
        .drawer-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 22px 14px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
        }
        .drawer-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 0;
            letter-spacing: 0.01em;
        }
        .drawer-title-main {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .case-pill {
            display: inline-flex;
            align-items: center;
            height: 34px;
            padding: 0 14px;
            border-radius: 10px;
            border: 1px solid #c7ddff;
            background: linear-gradient(180deg, #f6fbff 0%, #ebf4ff 100%);
            color: #4f96f6;
            font-size: 15px;
            font-weight: 700;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
        }
        .status-pill-large {
            display: inline-flex;
            align-items: center;
            height: 34px;
            padding: 0 14px;
            border-radius: 18px;
            background: linear-gradient(180deg, #fff8ec 0%, #fff1d8 100%);
            color: #ed9c1d;
            font-size: 15px;
            font-weight: 700;
            border: 1px solid rgba(244, 183, 71, 0.18);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(244, 183, 71, 0.12);
        }
        .status-pill-large.progress {
            background: linear-gradient(180deg, #f4f9ff 0%, #e7f1ff 100%);
            color: #4a97ff;
            border-color: rgba(90, 151, 255, 0.16);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(74, 151, 255, 0.12);
        }
        .status-pill-large.success {
            background: linear-gradient(180deg, #f2fcf6 0%, #e5f8ec 100%);
            color: #16a34a;
            border-color: rgba(22, 163, 74, 0.14);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(22, 163, 74, 0.12);
        }
        .status-pill-large.closed {
            background: linear-gradient(180deg, #f8f9fb 0%, #eef2f6 100%);
            color: #667085;
            border-color: rgba(102, 112, 133, 0.12);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(102, 112, 133, 0.08);
        }
        .status-pill-large.exception {
            background: linear-gradient(180deg, #fff6f6 0%, #feecec 100%);
            color: #dc2626;
            border-color: rgba(220, 38, 38, 0.14);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(220, 38, 38, 0.1);
        }
        .drawer-close {
            border: none;
            background: rgba(246, 248, 252, 0.92);
            color: #8f95a3;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
            transition: 0.18s ease;
        }
        .drawer-close:hover {
            background: #eef3f8;
            color: #5b6474;
        }
        .status-stage-card {
            margin: 10px 22px 16px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(252,253,255,0.98) 100%);
            border: 1px solid rgba(228, 235, 245, 0.96);
            border-radius: 18px;
            overflow: hidden;
            box-shadow:
                0 18px 44px rgba(31, 42, 55, 0.06),
                inset 0 1px 0 rgba(255,255,255,0.9);
        }
        .stepper {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 0;
            padding: 18px 28px 14px;
            position: relative;
        }
        .stepper::before {
            content: "";
            position: absolute;
            left: 11%;
            right: 11%;
            top: 34px;
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(90deg, #e9edf5 0%, #edf1f6 100%);
        }
        .step {
            position: relative;
            text-align: center;
            padding-top: 40px;
            font-size: 12px;
            font-weight: 700;
            color: #c0c6d2;
            z-index: 1;
        }
        .step::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 34px;
            height: 34px;
            margin-left: -17px;
            border-radius: 999px;
            background: linear-gradient(180deg, #f8f9fc 0%, #eef1f5 100%);
            border: 1px solid #edf1f5;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
            z-index: 2;
        }
        .step::after {
            display: none;
        }
        .step-index {
            position: absolute;
            top: 0;
            left: 50%;
            width: 34px;
            height: 34px;
            margin-left: -17px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            z-index: 3;
        }
        .step-label {
            font-size: 12px;
            line-height: 1.3;
            letter-spacing: 0.01em;
        }
        .step.completed::before,
        .step.active::before {
            background: linear-gradient(180deg, #5fa7ff 0%, #3d8dff 100%);
            border-color: rgba(63, 142, 255, 0.32);
            box-shadow:
                0 10px 20px rgba(63, 142, 255, 0.2),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .step.completed,
        .step.active {
            color: #4a97ff;
        }
        .step.idle .step-index {
            color: #d0d5dd;
        }
        .step.idle::before {
            background: #f3f4f6;
        }
        .step.idle .step-label {
            color: #c0c6d2;
        }
        .step.completed .step-index,
        .step.active .step-index {
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.12);
        }
        .step.active .step-label {
            font-weight: 800;
        }
        .hint-bar {
            padding: 12px 18px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.5;
            border-top: 1px solid #edf1f6;
        }
        .hint-bar.audit { background: linear-gradient(180deg, #fffaf0 0%, #fff4e0 100%); color: #e39a2d; }
        .hint-bar.progress { background: linear-gradient(180deg, #f4f9ff 0%, #edf5ff 100%); color: #4a97ff; }
        .hint-bar.success { background: linear-gradient(180deg, #f3fcf6 0%, #ecf8f0 100%); color: #1f8f4d; }
        .hint-bar.closed { background: linear-gradient(180deg, #f8f9fb 0%, #f2f4f7 100%); color: #667085; }
        .hint-bar.exception { background: linear-gradient(180deg, #fff7f7 0%, #fef0f0 100%); color: #d92d20; }
        .hint-icon {
            display: inline-flex;
            margin-right: 8px;
            font-size: 14px;
            vertical-align: -2px;
            filter: saturate(1.08);
        }
        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px 20px 140px;
            position: relative;
        }
        .drawer-body.dimmed::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(2px);
            z-index: 18;
            pointer-events: none;
        }
        .detail-card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 14px;
        }
        .detail-card h4 {
            font-size: 15px;
            margin-bottom: 14px;
        }
        .audit-hero-card {
            padding: 0;
            overflow: hidden;
            border-radius: 22px;
        }
        .audit-hero-layout {
            display: grid;
            grid-template-columns: 38% 62%;
            min-height: 224px;
        }
        .audit-hero-left,
        .audit-hero-right {
            padding: 26px 28px 24px;
            background: #fff;
        }
        .audit-hero-left {
            border-right: 1px solid #e6e6e6;
        }

            { owner: "平台责任", freight: "平台承担" },
            { owner: "仓库责任", freight: "云仓承担" },

        const state = {
            platform: "platform",

            pageSize: 5,

        function buildRecords() {
            const statusOrder = ["audit", "sendback", "returning", "received", "refunding", "refund_failed", "reship_pending", "buyer_receipt", "completed", "rejected", "cancelled"];
            const records = [];
            let serial = 1;
            statusOrder.forEach((statusKey, statusIndex) => {
                for (let i = 0; i < 5; i += 1) {
                    records.push(buildOneRecord(statusKey, statusIndex, i, serial));
                    serial += 1;
                }
            });
            return records;
        }

        function buildOneRecord(statusKey, statusIndex, index, serial) {
            const product = baseProducts[(serial - 1) % baseProducts.length];
            const customer = customerNames[(serial - 1) % customerNames.length];
            const store = stores[(serial - 1) % stores.length];
            const pair = responsibilityPairs[(serial - 1) % responsibilityPairs.length];
            const qty = (serial % 3) + 1;
            const secondQty = statusKey === "audit" && serial % 3 !== 0 ? 1 : (serial % 2 === 0 ? 1 : 0);
            const goodsAmount = Number((product.price * qty + secondQty * 36).toFixed(2));
            const freightRefund = chooseFreightRefund(statusKey, serial);
            const originalFreight = freightRefund > 0 ? freightRefund : (serial % 5 === 0 ? 12 : 0);
            const orderAmount = Number((goodsAmount + originalFreight).toFixed(2));
            const freightCompensation = chooseFreightCompensation(statusKey, serial);
            const appliedAmount = Number((goodsAmount + freightRefund).toFixed(2));
            const approvedAmount = chooseApprovedAmount(statusKey, appliedAmount, serial, freightRefund, freightCompensation);
            const actualAmount = ["completed", "refunding"].includes(statusKey) ? approvedAmount : 0;
            const reshipCost = statusKey === "reship_pending" || statusKey === "buyer_receipt" ? Number((36 + qty * 18).toFixed(2)) : 0;
            const afterSaleType = chooseAfterSaleType(statusKey, serial);
            const labels = buildLabels(afterSaleType, serial);
            const timestamps = buildTimestamps(serial);
            const orderNo = "SO20260528" + String(3600 + serial).padStart(6, "0");
            const afterSaleNo = "AS20260528" + String(9000 + serial).padStart(6, "0");
            const mainStatus = statusConfigs[statusKey].mainStatus;
            const finalResult = chooseFinalResult(statusKey, serial, afterSaleType);
            const reason = chooseReason(statusKey, serial, afterSaleType, freightRefund);
            const logistics = buildLogistics(statusKey, serial);
            const financeSummary = buildFinanceSummary(statusKey, serial);
            const qualityDecision = buildQualityDecision(statusKey, serial);
            const currentResponsibility = chooseCurrentResponsibility(statusKey, pair.owner, serial);
            const currentFreightBearer = chooseCurrentFreightBearer(statusKey, pair.freight, serial);
            const reshipForm = buildReshipForm(statusKey, reason, currentResponsibility, currentFreightBearer, productSummaryFrom(product, qty, secondQty, afterSaleType));
            const historyRefund = serial % 4 === 0 ? Number((product.price * 0.3).toFixed(2)) : 0;
            const residualScope = afterSaleType.includes("退款") ? (serial % 2 === 0 ? "部分件数仍可继续申请" : "当前范围已锁定，不可超额") : "补寄链路不占用后续退款范围";
            const adjusted = approvedAmount !== appliedAmount || freightRefund > 0;
            const rejectReason = chooseRejectReason(serial);
            const cancelReason = chooseCancelReason(serial);

            return {
                id: afterSaleNo,
                orderNo,
                childOrderNo: orderNo + "-01",
                statusKey,
                label: statusConfigs[statusKey].label,
                mainStatus,
                finalResult,
                afterSaleType,
                customer,
                phone: "138" + String(10000000 + serial * 17).slice(0, 8),
                store,
                reason,
                orderAmount,
                createdAt: timestamps.createdAt,
                auditAt: timestamps.auditAt,
                sendbackAt: timestamps.sendbackAt,
                receiveAt: timestamps.receiveAt,
                completeAt: timestamps.completeAt,
                countdown: chooseCountdown(statusKey, serial),
                labels,
                appliedRange: chooseRange(afterSaleType, serial),
                productSummary: secondQty ? `${product.name} x${qty}、赠品补件 x${secondQty}` : `${product.name} x${qty}`,
                items: buildItems(product, qty, secondQty, afterSaleType),
                note: buildScenarioNote(statusKey, afterSaleType, serial),
                auditRemark: chooseAuditRemark(statusKey, serial),
                auditOperator: chooseAuditOperator(serial),
                defaultResponsibility: pair.owner,
                currentResponsibility,
                defaultFreightBearer: pair.freight,
                currentFreightBearer,
                compensationBasis: freightCompensation > 0 ? "买家快递凭证 + 平台协商补偿" : "暂无赔付记录",
                proofImages: buildProofImages(serial, afterSaleType),
                qualityResult: qualityDecision.result,
                qualityNote: qualityDecision.note,
                qualityProofImages: qualityDecision.proofImages,
                rejectReason,
                cancelReason,
                completedSource: chooseCompletedSource(statusKey, afterSaleType),
                refundOperator: chooseRefundOperator(serial),
                reshipOrderCreated: statusKey === "buyer_receipt",
                reshipSubStatus: statusKey === "reship_pending" ? "待创建出库单" : (statusKey === "buyer_receipt" ? "待买家收货" : ""),
                reshipForm,
                amounts: {
                    applied: appliedAmount,
                    maxRefund: Number((appliedAmount + (serial % 5 === 0 ? 38 : 0)).toFixed(2)),
                    approved: approvedAmount,
                    actual: actualAmount,
                    breakdown: buildRefundBreakdown(approvedAmount),
                    goods: Number((approvedAmount - freightRefund - freightCompensation).toFixed(2)),
                    originalFreight,
                    freightRefund,
                    freightCompensation,
                    historyRefund,
                    couponResult: serial % 6 === 0 ? "已退回 1 张 20 元优惠券" : "本次未退回优惠券"

                specialSection: buildSpecialSection(statusKey, serial, logistics, finalResult, reshipCost),
                availableActions: resolveAvailableActions(statusKey, qualityDecision.result)
            };

            const count = type === "退款退货" ? 3 : 2;
            return Array.from({ length: count }, (_, index) => {
                const bg = ["#e8f1ff", "#fff1d6", "#f3ecff", "#eafaf1"][index % 4];
                const accent = ["#2f75ff", "#d97706", "#7c3aed", "#16a34a"][index % 4];
                const title = type === "退款退货" ? "退货凭证" : "退款凭证";
                const note = type === "退款退货"
                    ? (index === 0 ? "商品外包装" : index === 1 ? "商品细节" : "物流/问题补充")
                    : (index === 0 ? "订单截图" : "沟通记录");
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
                        <rect width="240" height="240" rx="24" fill="${bg}"/>
                        <rect x="24" y="24" width="192" height="120" rx="18" fill="${accent}" opacity="0.18"/>

                        `买家寄回状态：已填写物流单号，当前等待仓库签收。`,
                        `轨迹摘要：${logistics.backTrack}`
                    ]
                };
            }
            if (statusKey === "received") {
                return {
                    title: "验收结果与退款复核",
                    lines: [
                        serial % 4 === 0 ? "验收结果：发现少量外包装破损，当前进入待退款执行前确认。" : "验收结果：商品完好，附件齐全，可直接进入退款执行。",
                        "退款执行说明：当前已完成验收，待平台执行退款。",
                        `财务前置摘要：分账回退 ${serial % 2 === 0 ? "待触发" : "无需服务费冲正"}，保证金 ${serial % 2 === 0 ? "待回充" : "无需回充"}。`
                    ]
                };
            }
            if (statusKey === "refunding") {
                return {
                    title: "退款执行进度",
                    lines: [
                        `退款渠道状态：${serial % 2 === 0 ? "原路退款处理中" : "财务系统处理中"}，预计回执时间 ${1 + serial % 3} 小时内。`,
                        "当前详情页仅支持查看，不允许再次调额、关闭或重复触发退款。"
                    ]
                };
            }
            if (statusKey === "refund_failed") {
                return {
                    title: "退款失败信息",
                    lines: [
                        `失败原因：${serial % 2 === 0 ? "原路退款渠道超时，未拿到支付网关成功回执。" : "财务回退校验失败，需重新触发退款并重试回退。"} `,
                        "支持动作：重新退款；其余动作保持只读，避免并发重复处理。"
                    ]
                };
            }
            if (statusKey === "reship_pending") {
                return {
                    title: "补寄处理信息",
                    lines: [
                        "转补寄结论：审核阶段已完成改判，当前待创建补寄出库单。",
                        `补寄成本摘要：建议补寄成本 ${money(reshipCost)}，运费承担方以当前责任判定为准。`,
                        "补寄状态：待创建补寄出库单并发送仓库发货。"
                    ]
                };
            }
            if (statusKey === "buyer_receipt") {
                return {
                    title: "补寄物流与收货进度",
                    lines: [
                        `补寄物流：${logistics.reshipCompany} ${logistics.reshipNo}`,
                        `当前收货进度：${logistics.buyerState}`
                    ]
                };
            }
            if (statusKey === "completed") {
                return {
                    title: "最终结果摘要",
                    lines: [
                        `当前终态：${finalResult}，该页仅保留结果摘要与财务结果摘要。`,
                        "消费者端只展示最终退款/补寄结果，不展示平台内部责任与调额日志。"
                    ]
                };
            }
            if (statusKey === "rejected") {
                return {
                    title: "关闭结果说明",
                    lines: [
                        "关闭类型：平台审核拒绝。",
                        "消费者可见说明：凭证不足，建议补充图片后再次申请。"
                    ]
                };
            }
            if (statusKey === "cancelled") {
                return {
                    title: "关闭结果说明",
                    lines: [
                        serial % 2 === 0 ? "关闭类型：买家主动撤回协商完成。" : "关闭类型：超时未寄回自动关闭。",
                        "消费者可见说明：本次售后已关闭，如仍需处理请联系在线客服。"
                    ]
                };
            }
            return {
                title: "异常摘要",
                lines: [
                    serial % 2 === 0 ? "当前卡点：退款渠道超时，消费者退款未成功写回。" : "当前卡点：补寄物流超时，买家反馈仍未收到补寄商品。",
                    "建议动作：重试当前动作 / 转人工处理 / 记录异常结论。"
                ]
            };
        }

        function money(value) {
            return `¥${Number(value).toFixed(2)}`;
        }

        function getFilteredRecords() {
            return mockRecords.filter((record) => {
                if (state.currentTab !== "all") {
                    if (state.currentTab === "rejected") {
                        if (!["rejected", "cancelled"].includes(record.statusKey)) return false;
                    } else if (record.statusKey !== state.currentTab) {
                        return false;
                    }
                }
                const keyword = state.filters.keyword.trim();
                if (keyword) {
                    const haystack = [
                        record.id,
                        record.orderNo,
                        record.phone,
                        record.customer,
                        record.logistics.backNo,
                        record.logistics.reshipNo
                    ].join(" ");
                    if (!haystack.includes(keyword)) return false;
                }
                if (state.filters.type && record.afterSaleType !== state.filters.type) return false;
                if (state.filters.responsibility && record.currentResponsibility !== state.filters.responsibility) return false;
                if (state.filters.freight && record.currentFreightBearer !== state.filters.freight) return false;
                return true;
            });
        }

        function renderStatusTabs() {
            const counts = getTabCounts();
            const order = ["audit", "sendback", "returning", "received", "refunding", "refund_failed", "reship_pending", "buyer_receipt", "completed", "rejected", "all"];
            const html = order.map((key) => {
                const config = statusConfigs[key];
                return `
                    <button class="status-tab ${state.currentTab === key ? "active" : ""}" data-status-tab="${key}">
                        <span class="tab-icon">${config.icon || "•"}</span>
                        <div class="tab-name">${config.label}</div>
                        <div class="tab-count">${counts[key]}</div>
                    </button>
                `;
            }).join("");
            document.getElementById("status-tabs").innerHTML = html;
        }

        function getTabCounts() {
            const counts = {};
            Object.keys(statusConfigs).forEach((key) => {
                if (key === "all") {
                    counts[key] = mockRecords.length;
                } else if (key === "rejected") {
                    counts[key] = mockRecords.filter(item => item.statusKey === "rejected" || item.statusKey === "cancelled").length;
                } else {
                    counts[key] = mockRecords.filter(item => item.statusKey === key).length;
                }
            });
            return counts;
        }

        function renderTable() {
            const tableBody = document.getElementById("table-body");
            const records = getFilteredRecords();
            const total = records.length;
            const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
            if (state.currentPage > totalPages) state.currentPage = totalPages;
            const startIndex = (state.currentPage - 1) * state.pageSize;
            const pagedRecords = records.slice(startIndex, startIndex + state.pageSize);
            document.getElementById("table-summary").textContent = `共 ${total} 条`;
            renderPagination(total, totalPages);
            if (!pagedRecords.length) {
                tableBody.innerHTML = `<div class="empty-list">当前筛选条件下没有案例，可清空筛选后继续演示。</div>`;
                return;
            }

            tableBody.innerHTML = pagedRecords.map((record) => {
                const statusTone = mapTone(record.statusKey);
                const logisticsText = getListLogisticsText(record);
                const isAudit = record.statusKey === "audit";
                const displayType = getDisplayType(record.afterSaleType);
                const mainItem = record.items[0];
                const extraCount = Math.max(0, record.items.length - 1);
                const timeTrack = buildTimeTrack(record);
                const productSubs = ``;
                const userSubs = `<div class="cell-sub">${record.phone}</div>`;
                const storeSubs = ``;
                const reasonSubs = ``;
                const responsibilitySubs = ``;
                const isCompleted = record.statusKey === "completed";
                const amountMain = isCompleted
                    ? `申 ${money(record.amounts.applied)} / 审 ${money(record.amounts.approved)}`
                    : `申 ${money(record.amounts.applied)}`;
                const amountSubs = isCompleted
                    ? `<div class="cell-sub">实退 ${money(record.amounts.actual)} · 运费退款 ${money(record.amounts.freightRefund)}</div>`
                    : ``;
                const logisticsEmpty = logisticsText.title === "-" && !logisticsText.detail;
                return `
                    <div class="table-row" data-open-id="${record.id}">
                        <div class="cell-stack">
                            <div class="cell-title">${record.id}</div>
                            <div class="order-sub-id">订单: ${record.childOrderNo}</div>
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${displayType}</div>
                        </div>
                        <div class="cell-stack">
                            <div class="product-info">
                                <div class="product-thumb">${getProductEmoji(mainItem.name)}</div>
                                <div class="product-meta">
                                    <div class="cell-title">${mainItem.name}</div>
                                    <div class="product-price-line">${money(mainItem.unitPrice)} × ${mainItem.qty}</div>
                                    ${extraCount > 0 ? `<div class="cell-sub">等 ${record.items.length} 件商品</div>` : ``}
                                    ${productSubs}
                                </div>
                            </div>
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${record.customer}</div>
                            ${userSubs}
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${record.store}</div>
                            ${storeSubs}
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${record.reason}</div>
                            ${reasonSubs}
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${record.currentResponsibility}</div>
                            ${responsibilitySubs}
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${logisticsText.title}</div>
                            ${logisticsEmpty ? `` : `<div class="cell-sub">${logisticsText.detail}</div>`}
                        </div>
                        <div class="cell-stack">
                            <div class="amount-highlight">${amountMain}</div>
                            ${amountSubs}
                        </div>
                        <div class="cell-stack">
                            <div><span class="status-pill ${statusTone}">${record.label}</span></div>
                            ${record.statusKey === "reship_pending" && record.reshipSubStatus ? `<div class="status-subtext">${record.reshipSubStatus}</div>` : ""}
                        </div>
                        <div class="time-track">
                            ${timeTrack.map((item) => `<div class="time-track-line">${item}</div>`).join("")}
                        </div>
                        <div class="table-action">
                            <button class="action-btn" data-open-id="${record.id}">${getPrimaryActionLabel(record)}</button>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function buildTimeTrack(record) {
            const lines = [`申请: ${record.createdAt}`];
            switch (record.statusKey) {
                case "audit":
                    break;
                case "sendback":
                    lines.push(`审核: ${record.auditAt}`);
                    break;
                case "returning":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`寄回: ${record.sendbackAt}`);
                    break;
                case "received":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`寄回: ${record.sendbackAt}`);
                    lines.push(`签收: ${record.receiveAt}`);
                    break;
                case "refunding":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`退款中: ${record.completeAt}`);
                    break;
                case "refund_failed":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`失败: ${record.completeAt}`);
                    break;
                case "reship_pending":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`转补寄: ${record.auditAt}`);
                    break;
                case "buyer_receipt":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`补寄发货: ${record.sendbackAt}`);
                    break;
                case "completed":
                    if (record.afterSaleType === "补寄") {
                        lines.push(`审核: ${record.auditAt}`);
                        lines.push(`完成: ${record.completeAt}`);
                    } else if (record.receiveAt) {
                        lines.push(`审核: ${record.auditAt}`);
                        lines.push(`完成: ${record.completeAt}`);
                    } else {
                        lines.push(`审核: ${record.auditAt}`);
                        lines.push(`完成: ${record.completeAt}`);
                    }
                    break;
                case "rejected":
                    lines.push(`拒绝: ${record.completeAt}`);
                    break;
                case "cancelled":
                    if (record.auditAt) lines.push(`审核: ${record.auditAt}`);
                    lines.push(`撤销: ${record.completeAt}`);
                    break;
                default:
                    if (record.auditAt) lines.push(`审核: ${record.auditAt}`);
                    break;
            }
            return lines.slice(0, 3);
        }

        function renderPagination(total, totalPages) {
            const pagination = document.getElementById("pagination");
            if (!total) {
                pagination.innerHTML = "";
                return;
            }
            const buttons = [];
            buttons.push(`<span class="pagination-info">第 ${state.currentPage} / ${totalPages} 页</span>`);
            buttons.push(`<button class="page-btn" data-page-action="prev" ${state.currentPage === 1 ? "disabled" : ""}>上一页</button>`);
            for (let page = 1; page <= totalPages; page += 1) {
                buttons.push(`<button class="page-btn ${page === state.currentPage ? "active" : ""}" data-page="${page}">${page}</button>`);
            }
            buttons.push(`<button class="page-btn" data-page-action="next" ${state.currentPage === totalPages ? "disabled" : ""}>下一页</button>`);
            pagination.innerHTML = buttons.join("");
        }

        function getListLogisticsText(record) {
            if (record.statusKey === "returning" || record.statusKey === "received" || record.statusKey === "refunding" || record.statusKey === "refund_failed") {
                return { title: record.logistics.backCompany, detail: `单号：${record.logistics.backNo}` };
            }
            if (record.statusKey === "buyer_receipt") {
                return { title: record.logistics.reshipCompany, detail: `单号：${record.logistics.reshipNo}` };
            }
            if (record.statusKey === "completed") {
                if (record.afterSaleType === "补寄") {
                    return { title: record.logistics.reshipCompany, detail: `单号：${record.logistics.reshipNo}` };
                }
                if (record.afterSaleType === "退款退货") {
                    return { title: record.logistics.backCompany, detail: `单号：${record.logistics.backNo}` };
                }
            }
            return { title: "-", detail: "" };
        }

        function getPrimaryActionLabel(record) {
            if (record.statusKey === "returning") return "签收质检";
            if (record.statusKey === "reship_pending") return record.reshipOrderCreated ? "编辑补寄出库单" : "创建补寄出库单";
            if (record.statusKey === "received") return "操作退款";
            return statusConfigs[record.statusKey].primaryAction;
        }

        function mapTone(statusKey) {
            if (statusKey === "audit") return "audit";
            if (["completed"].includes(statusKey)) return "success";
            if (["rejected", "cancelled"].includes(statusKey)) return "closed";
            if (["refund_failed"].includes(statusKey)) return "exception";
            return "progress";
        }

        function renderDrawer(record) {
            state.activeRecord = record;
            state.activeAction = "";
            drawerOverlay.classList.add("show");
            drawer.classList.add("show");
            renderDrawerHeader(record);
            renderDrawerBody(record);
            renderDrawerFooter(record);
        }

        function getHeaderTone(record) {
            if (record.statusKey === "audit") return "audit";
            if (["completed"].includes(record.statusKey)) return "success";
            if (["rejected", "cancelled"].includes(record.statusKey)) return "closed";
            if (["refund_failed"].includes(record.statusKey)) return "exception";
            return "progress";
        }

        function getHeaderFlow(record) {
            const isReshipFlow = ["reship_pending", "buyer_receipt"].includes(record.statusKey)
                || record.afterSaleType === "补寄"
                || record.finalResult === "补寄完成";

            if (isReshipFlow) {
                return {
                    steps: ["买家申请", "平台审核", "待补寄出库", "待买家收货", "补寄完成"],
                    activeIndex: {
                        audit: 0,
                        reship_pending: 2,
                        buyer_receipt: 3,
                        completed: record.finalResult === "补寄完成" ? 4 : 0,
                        rejected: 1,
                        cancelled: 1
                    }[record.statusKey] ?? 0
                };
            }

            return {
                steps: ["买家申请", "审核/寄回", "退货中", "已收货", "售后完成"],
                    activeIndex: {
                        audit: 0,
                        sendback: 1,
                        returning: 2,
                        received: 3,
                        refunding: 3,
                        refund_failed: 3,
                        completed: 4,
                        rejected: 1,
                        cancelled: 1
                }[record.statusKey] ?? 0
            };
        }

        function getHeaderHint(record) {
            const hints = {
                audit: getAuditHeaderHint(record),
                sendback: `当前已审核通过，请重点关注买家是否按时寄回商品；审批信息和收货地址已下发给买家，剩余处理时间 ${record.countdown.replace("后超时关闭", "")}，超时将自动关闭本次售后。`,
                returning: `当前处于退货途中，请重点关注退回物流进展和仓库签收情况；仓库签收后会进入质检处理。`,
                received: `当前已收货待退款，请重点核实质检结果和最终退款金额；确认无误后即可操作退款。`,
                refunding: `当前退款处理中，请重点关注渠道回执和退款结果；如渠道返回异常，再进入后续人工处理。`,
                refund_failed: `当前退款未成功，请先核实失败原因和本次退款明细，再判断是否重新操作退款。`,
                reship_pending: record.reshipOrderCreated
                    ? `当前待补寄出库，请重点关注仓库是否已完成发货；待仓库回传发货结果后，这单才会进入待买家收货。`
                    : `当前已转补寄处理，请先核实补寄原因、责任方和补寄商品，并尽快创建补寄出库单发往仓库。`,
                buyer_receipt: `当前待买家收货，请重点关注补寄物流和签收进度；详情中可直接查看物流单号和轨迹。`,
                completed: getCompletedHeaderHint(record),
                rejected: `当前售后已关闭，结果已确定；请直接查看关闭子状态、关闭原因及同步说明。`,
                cancelled: `当前售后已关闭，结果已确定；请直接查看关闭子状态、关闭原因及同步说明。`
            };
            return hints[record.statusKey] || "";
        }

        function getAuditHeaderHint(record) {
            const refundMode = getAuditRefundMode(record);
            const countdownText = getAuditCountdownText(record.countdown);
            if (record.countdown === "已超时") {
                return `当前待审核，请优先处理这单${refundMode}申请；这单已超出平台处理时效，如继续未处理，系统将自动按默认规则流转。`;
            }
            if (record.afterSaleType === "仅退款") {
                return `当前待审核，请重点核实退款原因、退款金额是否合理，再判断是否同意退款；剩余处理时间 ${countdownText}，超时系统将自动同意。`;
            }
            if (record.afterSaleType === "补寄") {
                return `当前待审核，请重点确认补寄原因、责任归属及补寄商品，确认无误后进入补寄处理；剩余处理时间 ${countdownText}，超时系统将自动按默认规则流转。`;
            }
            return `当前待审核，请先核实售后原因、退款金额及责任归属，再判断同意退款、拒绝申请，或转补寄处理；剩余处理时间 ${countdownText}，超时系统将自动同意。`;
        }

        function getAuditCountdownText(countdown) {
            return countdown.replace("后自动同意", "");
        }

        function getCompletedHeaderHint(record) {
            if (record.completedSource === "reship_only") {
                return "当前售后已完成，请直接查看补寄结果和签收结果；这单补寄流程已经闭环。";
            }
            if (record.completedSource === "refund_only") {
                return "当前售后已完成，请直接查看退款金额、退款明细和退款操作人；这单仅退款流程已结束。";
            }
            if (record.completedSource === "refund_return") {
                return "当前售后已完成，请直接查看质检结果、退款明细和退款操作人；这单退货退款流程已全部结束。";
            }
            return "当前售后已完成，请直接查看补寄结果和退款结果；本次售后处理已经全部结束。";
        }

        function getHintIcon(record) {
            const icons = {
                audit: "⚠",
                sendback: "⏳",
                returning: "🚚",
                received: "✅",
                refunding: "💸",
                refund_failed: "⚠",
                reship_pending: "📦",
                buyer_receipt: "📮",
                completed: "✅",
                rejected: "ℹ",
                cancelled: "ℹ"
            };
            return icons[record.statusKey] || "ℹ";
        }

        function renderDrawerHeader(record) {
            const tone = getHeaderTone(record);
            const flow = getHeaderFlow(record);
            document.getElementById("drawer-header").innerHTML = `
                <div class="drawer-title-row">
                    <div class="drawer-title-main">
                        <div class="drawer-title">售后服务单</div>
                        <span class="case-pill">${record.id}</span>
                        <span class="status-pill-large ${tone}">${statusConfigs[record.statusKey].label}</span>
                    </div>
                    <button class="drawer-close" id="drawer-close-btn">×</button>
                </div>
                <div class="status-stage-card">
                    <div class="stepper">
                        ${flow.steps.map((step, index) => {
                            const stepState = index < flow.activeIndex ? "completed" : index === flow.activeIndex ? "active" : "idle";
                            return `
                                <div class="step ${stepState}">
                                    <span class="step-index">${index + 1}</span>
                                    <div class="step-label">(${index + 1})${step}</div>
                                </div>
                            `;
                        }).join("")}
                    </div>
                    <div class="hint-bar ${tone}">
                        <span class="hint-icon">${getHintIcon(record)}</span>${getHeaderHint(record)}
                    </div>
                </div>
            `;
            document.getElementById("drawer-close-btn").addEventListener("click", closeDrawer);
        }

        function renderDrawerBody(record) {
            if (record.statusKey === "audit") {
                document.getElementById("drawer-body").innerHTML = renderAuditDetailBody(record);
                return;
            }

        function renderDrawerFooter(record) {
            const actions = record.availableActions;
            const footer = document.getElementById("drawer-footer");
            const drawerBody = document.getElementById("drawer-body");
            if (!actions.length) {
                footer.classList.add("hidden");
                footer.innerHTML = "";
                drawerBody.classList.remove("dimmed");
                return;
            }

            footer.classList.remove("hidden");
            if (record.statusKey === "audit") {
                footer.innerHTML = renderAuditFooter(record);
                drawerBody.classList.remove("dimmed");
                bindDrawerFooterEvents(record);
                return;
            }
            footer.innerHTML = `
                <div class="action-switcher">
                    ${actions.map((actionKey) => `
                        <button data-action-switch="${actionKey}">${actionLabel(actionKey, record)}</button>
                    `).join("")}
                </div>
            `;

            drawerBody.classList.remove("dimmed");
            bindDrawerFooterEvents(record);
        }

        function bindDrawerFooterEvents(record) {
            document.querySelectorAll("[data-action-switch]").forEach((button) => {
                button.addEventListener("click", () => {
                    const actionKey = button.dataset.actionSwitch;
                    openCenterModal(actionKey, record);
                });
            });
            document.querySelectorAll("[data-proof-src]").forEach((button) => {
                button.addEventListener("click", () => openImagePreview(button.dataset.proofSrc));
            });
            document.querySelectorAll("[data-toggle-back-timeline]").forEach((button) => {
                button.addEventListener("click", () => {
                    const id = button.dataset.toggleBackTimeline;
                    state.expandedLogistics[id] = !state.expandedLogistics[id];
                    if (state.activeRecord && state.activeRecord.id === id) {
                        renderDrawerBody(state.activeRecord);
                        renderDrawerFooter(state.activeRecord);
                    }
                });
            });
            document.querySelectorAll("[data-adjust-toggle]").forEach((toggle) => {
                const panel = document.querySelector("[data-adjust-panel]");
                const syncPanel = () => panel && panel.classList.toggle("show", toggle.checked);
                toggle.addEventListener("change", syncPanel);
                syncPanel();
            });
            document.querySelectorAll("[data-subsidy-toggle]").forEach((toggle) => {
                const panel = document.querySelector("[data-subsidy-panel]");
                const syncPanel = () => panel && panel.classList.toggle("show", toggle.checked);
                toggle.addEventListener("change", syncPanel);
                syncPanel();
            });
        }

        function bindQualityModalEvents(record) {
            qualityModalOverlay.querySelectorAll("[data-close-quality-modal]").forEach((button) => {
                button.addEventListener("click", closeQualityCheckModal);
            });
            qualityModalOverlay.querySelectorAll("input[name='quality-result']").forEach((input) => {
                input.addEventListener("change", () => {
                    state.qualityModalDraft.mode = input.value;
                    renderQualityCheckModal(record);
                });
            });
            const noteInput = qualityModalOverlay.querySelector("[data-quality-note]");
            if (noteInput) {
                noteInput.addEventListener("input", () => {
                    state.qualityModalDraft.note = noteInput.value;
                    const count = qualityModalOverlay.querySelector("[data-quality-note-count]");
                    if (count) count.textContent = String(noteInput.value.length);
                });
            }
            const addProofButton = qualityModalOverlay.querySelector("[data-add-quality-proof]");
            if (addProofButton) {
                addProofButton.addEventListener("click", () => {
                    if (state.qualityModalDraft.images.length >= 3) return;
                    state.qualityModalDraft.images.push(createQualityProofItem(state.qualityModalDraft.images.length + 1));
                    renderQualityCheckModal(record);
                });
            }
            const confirmButton = qualityModalOverlay.querySelector("[data-confirm-quality-submit]");
            if (confirmButton) {
                confirmButton.addEventListener("click", () => applyQualityCheck(record));
            }
        }

        function createQualityProofItem(index) {
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">

                    <rect x="20" y="20" width="160" height="90" rx="16" fill="#e11d48" opacity="0.18"/>
                    <circle cx="52" cy="58" r="14" fill="#e11d48" opacity="0.72"/>

                    <text x="20" y="168" font-size="15" font-family="Arial, sans-serif" fill="#475467">示例凭证 ${index}</text>
                </svg>
            `;
            return {
                id: `quality-proof-${Date.now()}-${index}`,
                src: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`,

        function applyQualityCheck(record) {
            const draft = state.qualityModalDraft || { mode: "good", note: "", images: [] };
            if (draft.mode === "issue") {
                if (!draft.note.trim()) {

                    return;
                }
                if (!draft.images.length) {
                    showToast("请上传异常图片凭证");
                    return;
                }
            }
            record.statusKey = "received";
            record.label = statusConfigs.received.label;
            record.mainStatus = statusConfigs.received.mainStatus;
            record.finalResult = statusConfigs.received.mainStatus;
            record.countdown = chooseCountdown("received", 1);
            record.qualityResult = draft.mode === "good" ? "商品完好" : "有破损/短缺/使用痕迹";
            record.qualityNote = draft.mode === "good" ? "" : draft.note.trim();
            record.qualityProofImages = draft.mode === "good" ? [] : draft.images.slice(0, 3);
            record.availableActions = resolveAvailableActions("received", record.qualityResult);
            record.logs.unshift({
                time: "2026-05-29 14:36",
                text: draft.mode === "good" ? "仓库已完成签收质检，商品完好，售后单流转至已收货待退款。" : "仓库已完成签收质检，并记录异常说明与图片凭证，售后单流转至已收货待处理。"

        function closeDrawer() {
            drawerOverlay.classList.remove("show");
            drawer.classList.remove("show");

            state.activeAction = "";
        }

            imagePreviewImg.src = src;
            imagePreviewOverlay.classList.add("show");
        }

        function closeImagePreview() {
            imagePreviewOverlay.classList.remove("show");
            imagePreviewImg.src = "";
        }

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 1800);
        }

        function bindEvents() {
            document.querySelectorAll("[data-platform-target]").forEach((button) => {
                button.addEventListener("click", () => {
                    const target = button.dataset.platformTarget;
                    if (target === "supply-chain") return;
                    if (target === "merchant") {
                        window.location.href = "./商家自营-售后管理-demo.html";
                        return;
                    }
                    showToast("C端演示入口当前未单独提供，可切换到项目版查看");
                });
            });

            document.getElementById("status-tabs").addEventListener("click", (event) => {
                const button = event.target.closest("[data-status-tab]");
                if (!button) return;
                state.currentTab = button.dataset.statusTab;
                state.currentPage = 1;
                renderStatusTabs();
                renderTable();
            });

            document.getElementById("table-body").addEventListener("click", (event) => {
                const target = event.target.closest("[data-open-id]");
                if (!target) return;
                const record = mockRecords.find(item => item.id === target.dataset.openId);
                if (record) renderDrawer(record);
            });

            drawerOverlay.addEventListener("click", closeDrawer);
            reshipModalOverlay.addEventListener("click", (event) => {
                if (event.target === reshipModalOverlay) closeReshipModal();
            });
            qualityModalOverlay.addEventListener("click", (event) => {
                if (event.target === qualityModalOverlay) closeQualityCheckModal();
            });
            refundModalOverlay.addEventListener("click", (event) => {
                if (event.target === refundModalOverlay) closeRefundModal();
            });
            actionModalOverlay.addEventListener("click", (event) => {
                if (event.target === actionModalOverlay) closeActionModal();
            });
            imagePreviewOverlay.addEventListener("click", (event) => {
                if (event.target === imagePreviewOverlay || event.target.id === "image-preview-close") {
                    closeImagePreview();
                }
            });

            document.getElementById("search-btn").addEventListener("click", applyFilters);
            document.getElementById("reset-btn").addEventListener("click", resetFilters);
            ["search-input", "type-filter", "responsibility-filter", "freight-filter"].forEach((id) => {
                document.getElementById(id).addEventListener(id === "search-input" ? "input" : "change", applyFilters);
            });
            document.getElementById("pagination").addEventListener("click", (event) => {
                const pageButton = event.target.closest("[data-page]");
                const actionButton = event.target.closest("[data-page-action]");
                if (pageButton) {
                    state.currentPage = Number(pageButton.dataset.page);
                    renderTable();
                    return;
                }
                if (actionButton) {
                    if (actionButton.dataset.pageAction === "prev" && state.currentPage > 1) state.currentPage -= 1;
                    if (actionButton.dataset.pageAction === "next") state.currentPage += 1;
                    renderTable();
                }
            });
        }

        function applyFilters() {
            state.filters.keyword = document.getElementById("search-input").value;
            state.filters.type = document.getElementById("type-filter").value;
            state.filters.responsibility = document.getElementById("responsibility-filter").value;
            state.filters.freight = document.getElementById("freight-filter").value;
            state.currentPage = 1;
            renderTable();
        }

        function resetFilters() {
            state.filters = {
                keyword: "",
                type: "",
                responsibility: "",
                freight: ""
            };
            document.getElementById("search-input").value = "";
            document.getElementById("type-filter").value = "";
            document.getElementById("responsibility-filter").value = "";
            document.getElementById("freight-filter").value = "";
            state.currentPage = 1;
            renderTable();
        }

        function init() {
            renderStatusTabs();
            renderTable();
            bindEvents();
        }

        init();
    </script>
</body>
</html>
