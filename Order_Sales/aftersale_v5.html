
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'PingFang SC',sans-serif;}
.wrap{padding:16px;background:#f4f2ec;min-height:100vh;}
.demo-shell{width:100%;max-width:1120px;margin:0 auto;}
.demo-header{display:flex;align-items:center;justify-content:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.demo-tabs{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.page-tab{height:38px;padding:0 18px;border-radius:20px;border:1px solid #D2D0CA;background:#fff;color:#4A4A4A;font-size:14px;font-weight:600;cursor:pointer;}
.page-tab.on{border-color:#FF5722;background:#FFF8F6;color:#FF5722;}
.client-switch{display:inline-flex;align-items:center;gap:4px;padding:4px;border:1px solid #D2D0CA;border-radius:22px;background:#fff;box-shadow:0 8px 20px rgba(39,36,28,.04);flex-shrink:0;}
.client-switch-tab{height:30px;min-width:58px;padding:0 14px;border:0;border-radius:16px;background:transparent;color:#666;font-size:13px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
.client-switch-tab.on{background:#FF5722;color:#fff;}
.demo-layout{display:grid;grid-template-columns:210px minmax(0,1fr);gap:22px;align-items:start;}
.demo-layout.no-sidebar{grid-template-columns:minmax(0,1fr);}
.scenario-panel{position:sticky;top:16px;background:#fff;border:1px solid #E2E0DA;border-radius:14px;padding:12px;box-shadow:0 12px 28px rgba(39,36,28,.05);}
.scenario-title{font-size:13px;font-weight:700;color:#111;margin-bottom:10px;}
.detail-type-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.detail-type-tab{width:100%;min-height:32px;text-align:center;padding:7px 4px;border-radius:9px;border:1px solid #E0DED8;background:#fff;color:#565656;font-size:12px;font-weight:700;cursor:pointer;line-height:1.2;white-space:nowrap;}
.detail-type-tab.on{border-color:#FF5722;background:#FFF8F6;color:#FF5722;}
.scenario-list{display:flex;flex-direction:column;gap:8px;}
.scenario-tab{width:100%;min-height:42px;text-align:left;padding:10px 12px;border-radius:10px;border:1px solid #E0DED8;background:#FAFAF8;color:#424242;font-size:13px;font-weight:600;cursor:pointer;line-height:1.35;}
.scenario-tab.on{border-color:#FF5722;background:#FFF8F6;color:#FF5722;}
.scenario-tab-title{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.scenario-empty{padding:14px 12px;border-radius:10px;background:#FAFAF8;color:#8A8A8A;font-size:13px;line-height:1.6;}
.preview-panel{display:flex;justify-content:flex-start;min-width:0;}
.phone-stage{width:100%;display:flex;justify-content:flex-start;align-items:flex-start;gap:18px;}
.demo-layout.no-sidebar .preview-panel,.demo-layout.no-sidebar .phone-stage{justify-content:center;}
.phone-stage.compare-stage{justify-content:center;flex-wrap:wrap;}
.phone-variant{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:0;}
.phone-variant-label{height:34px;display:inline-flex;align-items:center;justify-content:center;padding:0 16px;border:1px solid #DEDAD2;border-radius:17px;background:#fff;color:#4A4A4A;font-size:13px;font-weight:800;box-shadow:0 8px 18px rgba(39,36,28,.04);}
.phone-variant-label.service{border-color:#FFB39A;background:#FFF8F6;color:#D9480F;}
.phone-shell{width:390px;max-width:100%;background:#f8f7f3;border:1px solid #B8B8B8;border-bottom:none;border-radius:30px 30px 0 0;overflow:hidden;position:relative;box-shadow:0 18px 40px rgba(31,31,31,.08),0 0 0 1px rgba(255,255,255,.75) inset;}
.phone{background:#f8f7f3;width:720px;min-height:1400px;position:relative;zoom:.5417;}
.placeholder-phone{min-height:760px;background:#f8f7f3;display:flex;align-items:center;justify-content:center;padding:40px;}
.placeholder-card{width:100%;background:#fff;border:1px solid #DADADA;border-radius:18px;padding:48px 32px;text-align:center;color:#777;}
.placeholder-title{font-size:30px;font-weight:700;color:#111;margin-bottom:16px;}
.placeholder-desc{font-size:22px;line-height:1.5;}
.navbar{height:92px;display:flex;align-items:center;padding:0 32px;background:#fff;border-bottom:1px solid #DADADA;}
.navbar>.ti{font-size:32px!important;color:#3a3a3a!important;}
.nav-title{flex:1;text-align:center;font-size:30px;font-weight:700;color:#111;line-height:1;}
.status-tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:8px;font-size:20px;font-weight:700;margin-left:16px;vertical-align:middle;}
.tag-pre{background:#E8F5E9;color:#2E7D32;}
.tag-ship{background:#FFF3E0;color:#E65100;}
.sec{background:#fff;padding:32px;border:none;border-bottom:14px solid #f8f7f3;border-radius:0;margin:0;}
.sec-title{font-size:26px;font-weight:700;color:#111;margin-bottom:24px;}
.type-row{min-height:110px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:22px 24px;border:1px solid #C9C9C9;border-radius:16px;}
.type-left{display:flex;align-items:center;gap:16px;}
.type-ico{width:64px;height:64px;border-radius:50%;background:#FFE0D8;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.type-ico .ti{font-size:28px!important;color:#FF4E22!important;}
.type-main{font-size:26px;font-weight:700;color:#D93612;line-height:1.2;}
.type-sub{font-size:21px;color:#D93612;margin-top:8px;line-height:1.25;}
.type-arrow{width:44px;height:44px;border-radius:50%;background:#F4F4F2;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.type-arrow .ti{font-size:26px;color:#999;}
.sku-item{display:flex;align-items:flex-start;gap:20px;padding:20px 0;border-bottom:1px solid #DEDEDE;}
.sku-item:last-child{border-bottom:none;}
.sku-check-wrap{padding-top:42px;flex-shrink:0;}
.cb{width:36px;height:36px;border-radius:50%;border:3px solid #BDBDBD;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;}
.cb.on{background:#FF5722;border-color:#FF5722;}
.cb.on::after{content:'';width:10px;height:6px;border-left:3px solid #fff;border-bottom:3px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block;}
.sku-img{width:104px;height:104px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:none;}
.sku-img span{font-size:17px!important;line-height:1.3!important;}
.sku-info{flex:1;min-width:0;}
.sku-name{font-size:24px;color:#161616;line-height:1.35;}
.sku-spec{font-size:20px;color:#4e4e4e;margin-top:8px;}
.sku-price-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
.sku-price{font-size:25px;font-weight:700;color:#FF4E22;}
.sku-remain{font-size:20px;color:#696969;}
.qty-ctrl{display:flex;align-items:center;margin-top:16px;}
.qbtn{width:48px;height:48px;border-radius:50%;border:2px solid #C4C4C4;background:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#111;user-select:none;line-height:1;}
.qbtn.dim{opacity:.25;pointer-events:none;}
.qval{width:64px;text-align:center;font-size:26px;font-weight:700;color:#111;}
.sku-dimmed .sku-name,.sku-dimmed .sku-spec,.sku-dimmed .sku-remain{opacity:.35;}
.sku-dimmed .sku-price{opacity:.35;}
.sku-dimmed .qty-ctrl{opacity:.25;pointer-events:none;}
.amt-block{display:flex;flex-direction:column;gap:18px;}
.amt-row{display:flex;align-items:center;justify-content:space-between;}
.amt-label{font-size:23px;color:#303030;}
.amt-val{font-size:23px;color:#303030;}
.amt-val.red{color:#E53935;font-size:21px;}
.coupon-deduct-note{font-size:20px;color:#555;line-height:1.45;margin-top:-4px;}
.divider{height:1px;background:#DEDEDE;margin:2px 0;}
.refund-final-row{display:flex;align-items:center;justify-content:space-between;padding-top:4px;}
.refund-final-label{font-size:24px;font-weight:700;color:#111;}
.refund-final-val{font-size:32px;font-weight:700;color:#FF4E22;}
.refund-lock-note{font-size:18px;color:#888;margin-top:6px;display:flex;align-items:center;gap:6px;}
.refund-detail{border-top:1px solid #DEDEDE;margin-top:18px;padding-top:18px;}
.refund-detail-title{font-size:22px;font-weight:700;color:#111;margin-bottom:12px;}
.refund-detail-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 0;font-size:21px;color:#303030;}
.refund-detail-row.clickable{cursor:pointer;}
.refund-detail-name{display:flex;align-items:center;gap:8px;min-width:0;}
.refund-detail-name .ti{font-size:22px;color:#999;flex-shrink:0;}
.refund-detail-val{font-weight:600;color:#303030;white-space:nowrap;}
.refund-estimate-summary{margin-top:16px;border:none;border-top:1px dashed #DEDEDE;padding:14px 0 0;background:transparent;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;cursor:pointer;}
.refund-estimate-text{font-size:20px;color:#667085;line-height:1.45;flex:1;min-width:0;}
.refund-estimate-text b{color:#303030;font-weight:900;}
.refund-estimate-action{display:inline-flex;align-items:center;gap:4px;color:#1E73FF;font-size:20px;font-weight:900;white-space:nowrap;}
.refund-estimate-action .ti{font-size:21px;}
.refund-estimate-dialog{width:100%;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.18);}
.refund-estimate-body{padding:30px 32px 26px;}
.refund-estimate-title{font-size:28px;font-weight:900;color:#111;line-height:1.3;margin-bottom:18px;}
.asset-sublist{background:#FAFAF8;border-radius:12px;padding:8px 18px;margin:2px 0 8px;}
.asset-subrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;font-size:19px;color:#666;}
.asset-subrow+.asset-subrow{border-top:1px solid #ECEAE5;}
.coupon-note{font-size:19px;color:#777;line-height:1.45;padding:10px 0 2px;}
.coupon-return{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:12px 0;font-size:21px;color:#303030;}
.refund-detail-tip{font-size:18px;color:#888;line-height:1.45;margin-top:10px;}
.field-row{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid #DEDEDE;}
.field-row:last-child{border-bottom:none;}
.field-label{font-size:24px;color:#303030;}
.field-val{font-size:22px;color:#8a8a8a;display:flex;align-items:center;gap:6px;}
.field-val.filled{color:var(--color-text-primary);}
.textarea-box{border:1px solid #C9C9C9;border-radius:12px;padding:18px;font-size:22px;color:#999;min-height:120px;line-height:1.6;}
.upload-row{display:flex;gap:16px;margin-top:14px;}
.upload-add{width:104px;height:104px;border-radius:12px;border:1px dashed #C9C9C9;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fafafa;gap:4px;cursor:pointer;}
.review-note{font-size:20px;color:#555;line-height:1.7;padding:22px 32px;background:#fff;border:none;border-bottom:14px solid #f8f7f3;border-radius:0;margin:0;}
.submit-wrap{padding:24px 32px 32px;background:#f8f7f3;}
.submit-btn{width:100%;height:64px;border-radius:32px;background:#FF5722;border:none;color:#fff;font-size:24px;font-weight:700;cursor:pointer;}
.submit-btn:disabled{background:#ccc;}
.sheet-mask{position:absolute;left:0;top:0;right:0;bottom:0;background:rgba(0,0,0,0.42);display:flex;align-items:flex-end;z-index:10;}
.sheet{background:#fff;border-radius:28px 28px 0 0;width:100%;padding:0 0 24px;}
.sheet-handle{width:72px;height:8px;border-radius:4px;background:#D6D6D6;margin:20px auto 24px;}
.sheet-title{font-size:26px;font-weight:700;color:#111;padding:0 32px 22px;border-bottom:1px solid #E5E5E5;}
.sheet-opt{display:flex;align-items:flex-start;gap:18px;padding:28px 32px;border-bottom:1px solid #E5E5E5;cursor:pointer;}
.sheet-opt:last-child{border-bottom:none;}
.sheet-opt-radio{width:36px;height:36px;border-radius:50%;border:3px solid #BDBDBD;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;}
.sheet-opt-radio.on{border-color:#FF5722;}
.sheet-opt-radio.on::after{content:'';width:16px;height:16px;border-radius:50%;background:#FF5722;display:block;}
.sheet-opt-name{font-size:24px;font-weight:700;color:#111;}
.sheet-opt-desc{font-size:20px;color:#666;margin-top:8px;line-height:1.45;}
.detail-page{min-height:1400px;background:#f8f7f3;}
.detail-hero{background:linear-gradient(120deg,#F2FFF7 0%,#EAF2FF 43%,#FFEFF2 74%,#FFF8EF 100%);border-bottom:14px solid #f8f7f3;}
.detail-hero .navbar{background:transparent;border-bottom:none;}
.detail-status{padding:36px 32px 34px;}
.detail-status-title{font-size:32px;font-weight:800;color:#111;line-height:1.2;}
.detail-status-desc{font-size:22px;color:#8E8E93;line-height:1.45;margin-top:12px;}
.detail-card{background:#fff;padding:32px;border:none;border-bottom:14px solid #f8f7f3;border-radius:0;margin:0;}
.progress-card{overflow:hidden;}
.progress-steps{display:flex;align-items:center;justify-content:space-between;padding:0 0 24px;background:transparent;}
.progress-step{display:flex;align-items:center;gap:8px;font-size:22px;color:#8B8B8B;font-weight:600;white-space:nowrap;}
.progress-step.done{color:#8B8B8B;}
.progress-step.active{color:#111;font-weight:800;}
.progress-dot{width:26px;height:26px;border-radius:50%;border:3px solid #A9A9A9;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.progress-step.done .progress-dot::after{content:'';width:7px;height:4px;border-left:2px solid #A9A9A9;border-bottom:2px solid #A9A9A9;transform:rotate(-45deg) translateY(-1px);}
.progress-step.active .progress-dot{border-color:#111;}
.progress-step.active .progress-dot::after{content:'';width:5px;height:5px;border-radius:50%;background:#111;box-shadow:-7px 0 0 #111,7px 0 0 #111;}
.progress-arrow{font-size:24px;color:#B3B3B3;margin:0 4px;}
.progress-steps.five{display:grid;grid-template-columns:repeat(11,1fr);align-items:start;gap:0;padding-bottom:24px;}
.progress-steps.five .progress-step{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:8px;font-size:16px;line-height:1.25;text-align:center;white-space:normal;max-width:none;}
.progress-steps.five .progress-step span:last-child{display:block;min-height:40px;}
.progress-steps.five .progress-dot{width:22px;height:22px;border-width:2px;}
.progress-steps.five .progress-arrow{font-size:18px;margin-top:2px;text-align:center;color:#B3B3B3;}
.progress-result{border-top:1px solid #DEDEDE;padding:24px 0 0;font-size:26px;line-height:1.4;font-weight:800;color:#111;}
.status-message{font-size:26px;line-height:1.45;font-weight:800;color:#111;}
.status-message-sub{font-size:22px;color:#8a8a8a;line-height:1.5;margin-top:10px;}
.return-address-card{display:flex;align-items:flex-start;gap:16px;}
.return-address-tag{height:34px;line-height:34px;border-radius:6px;background:#FFE6E6;color:#FF3B30;font-size:20px;font-weight:700;padding:0 10px;white-space:nowrap;margin-top:2px;}
.return-address-main{font-size:26px;font-weight:700;color:#111;line-height:1.35;}
.return-address-sub{font-size:22px;color:#555;line-height:1.45;margin-top:8px;}
.return-address-copy{margin-left:auto;color:#1E73FF;font-size:22px;white-space:nowrap;padding-top:3px;}
.return-method-card{padding:32px;}
.return-method-list{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.return-method-list.single{grid-template-columns:1fr;}
.return-method-option{min-height:154px;border:2px solid #E2E2E2;border-radius:18px;background:#fff;padding:20px;cursor:pointer;display:flex;flex-direction:column;gap:10px;position:relative;}
.return-method-option.static{cursor:default;}
.return-method-option.on{border-color:#FF5722;background:#FFF7F4;}
.return-method-head{display:flex;align-items:center;gap:10px;font-size:25px;font-weight:800;color:#111;line-height:1.2;}
.return-method-icon{width:42px;height:42px;border-radius:50%;background:#F3F4F6;color:#555;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.return-method-option.on .return-method-icon{background:#FFE0D8;color:#FF5722;}
.return-method-desc{font-size:20px;color:#666;line-height:1.42;}
.return-method-tag{height:30px;display:inline-flex;align-items:center;align-self:flex-start;padding:0 10px;border-radius:15px;background:#FFE0D8;color:#D93612;font-size:18px;font-weight:800;}
.return-method-radio{position:absolute;right:18px;top:20px;width:30px;height:30px;border-radius:50%;border:2px solid #C9C9C9;background:#fff;}
.return-method-option.on .return-method-radio{border-color:#FF5722;background:#FF5722;}
.return-method-option.on .return-method-radio::after{content:'';position:absolute;left:8px;top:6px;width:9px;height:5px;border-left:3px solid #fff;border-bottom:3px solid #fff;transform:rotate(-45deg);}
.pickup-summary{margin-top:22px;border-top:1px solid #ECECEC;padding-top:22px;display:flex;flex-direction:column;gap:18px;}
.pickup-row{display:flex;align-items:flex-start;gap:16px;font-size:22px;line-height:1.42;color:#303030;}
.pickup-label{width:126px;color:#8a8a8a;white-space:nowrap;}
.pickup-value{flex:1;min-width:0;}
.pickup-action{color:#1E73FF;font-weight:800;white-space:nowrap;}
.pickup-note{display:flex;align-items:center;gap:10px;border-radius:14px;background:#F6F7F9;padding:14px 16px;font-size:20px;color:#666;line-height:1.42;}
.pickup-booked-card{padding:32px;}
.pickup-booked-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:22px;}
.pickup-booked-title{font-size:26px;font-weight:800;color:#111;line-height:1.3;}
.pickup-code{display:inline-flex;align-items:center;height:42px;padding:0 14px;border-radius:21px;background:#FFF1EF;color:#FF453A;font-size:24px;font-weight:900;letter-spacing:1px;white-space:nowrap;}
.pickup-info-list{display:flex;flex-direction:column;border-top:1px solid #ECECEC;}
.pickup-info-row{display:flex;align-items:flex-start;gap:16px;padding:18px 0;border-bottom:1px solid #ECECEC;font-size:22px;line-height:1.42;color:#303030;}
.pickup-info-label{width:128px;color:#8a8a8a;white-space:nowrap;}
.pickup-info-value{flex:1;min-width:0;}
.pickup-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px;}
.pickup-action-btn{height:56px;border-radius:28px;border:1px solid #D8D8D8;background:#fff;color:#303030;font-size:21px;font-weight:800;cursor:pointer;white-space:nowrap;}
.pickup-action-btn.primary{border:none;background:linear-gradient(90deg,#FF2E3A,#FF6738);color:#fff;}
.address-list{max-height:560px;overflow:auto;background:#fff;}
.address-item{display:flex;align-items:flex-start;gap:16px;padding:24px 32px;border-bottom:1px solid #F0F0F0;cursor:pointer;}
.address-radio{width:34px;height:34px;border-radius:50%;border:2px solid #C9C9C9;flex-shrink:0;margin-top:4px;background:#fff;position:relative;}
.address-item.on .address-radio{border-color:#FF5722;background:#FF5722;}
.address-item.on .address-radio::after{content:'';position:absolute;left:9px;top:7px;width:10px;height:6px;border-left:3px solid #fff;border-bottom:3px solid #fff;transform:rotate(-45deg);}
.address-name{font-size:24px;font-weight:800;color:#111;line-height:1.35;}
.address-detail{font-size:21px;color:#666;line-height:1.45;margin-top:8px;}
.time-picker{display:grid;grid-template-columns:188px 1fr;min-height:520px;background:#fff;}
.time-date-list{background:#F7F7F7;}
.time-date{height:88px;display:flex;align-items:center;padding:0 32px;font-size:23px;font-weight:800;color:#666;border-left:6px solid transparent;cursor:pointer;}
.time-date.on{background:#fff;color:#FF5722;border-left-color:#FF5722;}
.time-slot-list{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
.time-slot{height:70px;border-radius:14px;border:1px solid #D8D8D8;background:#fff;color:#303030;font-size:23px;font-weight:800;cursor:pointer;}
.time-slot.on{border-color:#FF5722;background:#FFF7F4;color:#FF5722;}
.time-slot.disabled{background:#F3F3F3;color:#B8B8B8;border-color:#ECECEC;cursor:not-allowed;}
.confirm-row{display:flex;align-items:flex-start;gap:16px;padding:18px 0;border-bottom:1px solid #F0F0F0;font-size:23px;line-height:1.42;text-align:left;}
.confirm-label{width:128px;color:#8a8a8a;white-space:nowrap;}
.confirm-value{flex:1;min-width:0;color:#303030;}
.confirm-value.empty{color:#FF4E22;font-weight:800;}
.detail-goods-card{padding:32px;}

function listStateClass(item){
  if(item.group==='mine')return 'todo';
  if(item.group==='done')return 'done';
  if(item.group==='closed')return 'closed';
  return 'processing';
}

function skuUnitPrice(good){
  if(good.title.includes('保温杯'))return 128;
  if(good.title.includes('礼品袋'))return 12;
  return 39;
}

function fmtMoney(value){
  return `¥${Number(value).toFixed(2)}`;
}

function parseMoney(value){
  return Number(String(value||'0').replace(/[^\d.-]/g,''))||0;
}

function isRefundDoneItem(item){
  return item.state==='售后完成'&&item.detailType!=='reship';
}

function isReshipItem(item){
  return item.detailType==='reship';
}

function itemTotalLabel(item){
  if(isReshipItem(item))return item.totalLabel||'补寄商品';
  return item.totalLabel||(isRefundDoneItem(item)?'实际总金额':'申请总金额');
}

function itemTotalAmount(item){
  if(item.totalAmount)return item.totalAmount;
  if(isReshipItem(item)){
    const count=(item.goods||[]).reduce((sum,good)=>sum+(good.reshipQty||good.qty||1),0);
    return `共${count}件`;
  }
  return item.amount;
}

function postageText(item){
  const postage=item.postageAmount;
  if(!postage||postage==='¥0.00'||postage==='¥ 0.00')return '';
  return `（含邮费 ${postage}）`;
}

function allocatedRefundAmount(item,good,index){
  if(good.refundAmount)return good.refundAmount;
  const goods=item.goods||[];
  const goodsTotal=parseMoney(item.amount);
  if(goodsTotal<=0)return fmtMoney(skuUnitPrice(good)*(good.qty||1));
  const weights=goods.map(sku=>skuUnitPrice(sku)*(sku.qty||1));
  const weightTotal=weights.reduce((sum,value)=>sum+value,0)||1;
  const allocated=index===goods.length-1
    ?goodsTotal-weights.slice(0,index).reduce((sum,value)=>sum+(Math.round(goodsTotal*(value/weightTotal)*100)/100),0)
    :Math.round(goodsTotal*(weights[index]/weightTotal)*100)/100;
  return fmtMoney(allocated);
}

function goodsLineText(item,good,index){
  if(isReshipItem(item))return `补寄数量 x${good.reshipQty||good.qty||1}`;
  const label=good.refundLabel||(isRefundDoneItem(item)?'实际退款':'申请退款');
  const amount=allocatedRefundAmount(item,good,index);
  return `${label} ${amount}`;
}

function isReturnClosedScene(){
  return detailType==='return'&&['canceled_by_customer','canceled_by_service','canceled_timeout','rejected','refund_rejected_by_finance'].includes(detailScene);
}

function isRefundOnlyClosedScene(){
  return detailType==='refund'&&['refund_canceled_by_customer','refund_rejected'].includes(detailScene);
}

function renderDetailGoodsAmount(model,options={}){
  const finalLabel=options.finalLabel||model.amountLabel;
  const finalAmount=options.finalAmount==null?model.refundDetail.finalRefundTotal:options.finalAmount;
  const isReturnRefund=model.selType&&model.selType.key==='return';
  const forceClosedView=isReturnClosedScene()||isRefundOnlyClosedScene();
  const showFinalAuditAmount=forceClosedView?false:options.showFinalAuditAmount!==false;
  const finalAuditAmount=options.finalAuditAmount==null
    ?(isReturnRefund&&showFinalAuditAmount?Math.max(model.refundDetail.finalRefundTotal-4,0):finalAmount)
    :options.finalAuditAmount;
  const estimateBaseAmount=showFinalAuditAmount?finalAuditAmount:finalAmount;
  const estimateRefundDetail=calcRefundDetail(estimateBaseAmount,model.refundSceneIndex);
  const showRefundEstimate=forceClosedView?false:options.showRefundEstimate!==false;
  const adjustmentHtml=options.adjustment
    ?`<div class="amt-row"><span class="amt-label">申请退款金额</span><span class="amt-val">${money(options.adjustment.applyAmount)}</span></div>`
    :'';
  const sourceKind=detailType==='refund'?'refund':'return';
  return `${renderServiceVariantCard(sourceKind)}<div class="detail-card detail-goods-card">
    <div class="sec-title">退款商品</div>
    ${model.goodsHtml}
    <div class="amt-block" style="padding-top:20px;">
      <div class="amt-row"><span class="amt-label">商品退款</span><span class="amt-val">${money(model.goods)}</span></div>
      <div class="amt-row"><span class="amt-label">邮费</span><span class="amt-val">${model.postage>0?money(model.postage):'¥ 0.00'}</span></div>
      ${model.postageNote?`<div class="coupon-deduct-note">${model.postageNote}</div>`:''}
      ${adjustmentHtml}
    </div>
    <div class="detail-amount-row">
      <span class="detail-amount-label">${finalLabel}</span>
      <span class="detail-amount-val">${money(finalAmount)}${options.hidePostageNote?'':model.amountPostage}</span>
    </div>
    ${showFinalAuditAmount?`<div class="detail-amount-row final-audit-row">
      <span class="detail-amount-label">协商后退款金额：</span>
      <span class="detail-amount-val">${money(finalAuditAmount)}</span>
    </div>`:''}
    ${showRefundEstimate?renderRefundEstimateSummary(model,estimateRefundDetail):''}
    ${options.showRefundDetail?model.detailRefundHtml:''}
  </div>
  ${showRefundEstimate&&sheetMode==='refundEstimateDetail'?renderRefundEstimateDialog(model,estimateRefundDetail):''}`;
}

function getRefundCashTarget(refundDetail){
  return refundDetail.refundDestination==='alipay'?'支付宝':'微信';
}

function renderRefundEstimateSummary(model,estimateRefundDetail){
  const refundDetail=estimateRefundDetail||model.refundDetail;
  const cashTarget=getRefundCashTarget(refundDetail);
  return `<button class="refund-estimate-summary" type="button" onclick="openRefundEstimateDetail()">
    <span class="refund-estimate-text">
      预计${cashTarget}退回 <b>${money(refundDetail.cashRefund)}</b>，资产退回 <b>${money(refundDetail.assetRefund)}</b>
    </span>
    <span class="refund-estimate-action">查看明细 <i class="ti ti-chevron-right" aria-hidden="true"></i></span>
  </button>`;
}

  const refundDetail=estimateRefundDetail||model.refundDetail;

  return `<div class="confirm-mask" onclick="closeRefundEstimateDetail()">

      <div class="refund-estimate-body">
        <div class="refund-estimate-title">预计退回明细</div>
        ${refundDetail.cashRefund>0?`<div class="refund-detail-row">

function getApproveAuditCopy(options={}){
  const applyAmount=Number(options.applyAmount||0);
  const approveAmount=Number(options.approveAmount||applyAmount);
  const hasApproveAdjustment=approveAmount!==applyAmount;
  const refundAmount=money(applyAmount);
  const approveRefundAmount=money(approveAmount);
  const approveAdjustReason=options.approveAdjustReason||'与您沟通后，扣减已使用权益金额 ¥4.00。';
  return {
    descHtml:hasApproveAdjustment
      ?`商家已同意退货退款。<span class="process-money-change"><span class="process-money-pill">客户申请 ${refundAmount}</span><span class="process-money-pill strong">协商后 ${approveRefundAmount}</span></span><span class="process-desc-line">调价原因：${approveAdjustReason}</span>${renderApproveProofThumb()}<span class="process-desc-line">审核说明：请按退货地址寄回商品。</span>`
      :`商家已同意退货退款，确认退款金额为 ${approveRefundAmount}。<span class="process-desc-line">审核说明：请按退货地址寄回商品。</span>`,
    tags:[]
  };
}

  if(['refund_pending_pre_full','refund_pending_pre_partial','refund_pending_shipped'].includes(sceneKey)){

    renderRefundOnlyCanceled();
  }else if(sceneKey==='refund_rejected'){
    renderRefundOnlyRejected();
  }else if(sceneKey==='refund_pending_refund'){

  }else if(sceneKey==='refund_success_full'){

}

  return {...model,refundDetail,detailRefundHtml};
}

function calc(){
  return calcFrom(checked,qtys);
}

function calcFrom(flags,amounts,sceneOverride){
  const sc=sceneOverride||SCENES[cur];
  const goods=SKUS.reduce((s,sk,i)=>flags[i]?s+sk.price*amounts[i]:s,0);
  const postage=(!sc.shipped&&sc.postage>0)?sc.postage:0;
  return{goods,postage,total:goods+postage};
}

function calcRefundDetail(total,sceneIndex=cur){
  const available=Math.max(total,0);
  const couponUsedAmount=sceneIndex===1?0:5;
  const couponReturnable=sceneIndex===0;
  const couponRefundValue=couponReturnable?Math.min(couponUsedAmount,available):0;
  const couponDeductedValue=couponReturnable?0:Math.min(couponUsedAmount,available);
  const refundableBase=Math.max(available-couponDeductedValue,0);
  const assetOnly=sceneIndex===3;
  const assetTarget=refundableBase>0?(assetOnly?refundableBase:Math.min(refundableBase,sceneIndex===1?6:sceneIndex===2?12:8)):0;
  const nonCouponAssetTarget=Math.max(assetTarget-couponRefundValue,0);
  const cardRefund=nonCouponAssetTarget>0?Math.min(nonCouponAssetTarget,sceneIndex===2?6:4):0;
  const giftRefund=nonCouponAssetTarget-cardRefund>0?Math.min(nonCouponAssetTarget-cardRefund,2):0;
  const pointsRefundValue=Math.max(nonCouponAssetTarget-cardRefund-giftRefund,0);
  const assetRefund=cardRefund+giftRefund+pointsRefundValue+couponRefundValue;
  const cashRefund=Math.max(refundableBase-assetRefund,0);
  return{
    refundDestination:assetOnly?'assetOnly':sceneIndex===2?'alipay':'wechat',
    cashRefund,
    assetRefund,
    cardRefund,
    giftRefund,
    pointsRefundValue,
    pointsRefundCount:Math.round(pointsRefundValue*100),
    couponUsedAmount,
    couponName:'满20减5',
    couponReturnable,
    couponRefundValue,
    couponDeductedValue,
    finalRefundTotal:cashRefund+assetRefund,
  };
}

function cloneRequirementDoc(doc){
  return {
    title:doc.title,
    business:[...doc.business],
    interaction:[...doc.interaction],
    fields:[...doc.fields],
    edge:[...doc.edge],
    testing:[...doc.testing]
  };
}

function getReturnDetailRequirementVariant(scene){
  if(['pending_return','pending_return_self_only','adjusted_pending_return','pending_receive','adjusted_pending_receive','pending_refund','adjusted_pending_refund'].includes(scene))return scene;
  if(['refund_success_full','refund_success_warehouse_adjusted','refund_success_adjusted','refund_success_full_preview','refund_success_single_adjusted','refund_success_double_adjusted'].includes(scene))return 'refund_success';
  if(['canceled_by_customer','canceled_by_service','canceled_timeout','rejected','refund_rejected_by_finance'].includes(scene))return 'closed';
  return 'pending_review';
}

function getRefundDetailRequirementVariant(scene){
  if(['refund_pending_pre_full','refund_pending_pre_partial','refund_pending_shipped'].includes(scene))return 'pending_review';
  if(scene==='refund_pending_refund'||scene==='manual_refund')return 'pending_refund';
  if(scene==='refund_processing_failed')return 'processing';
  if(['refund_success_full','refund_success_adjusted'].includes(scene))return 'success';
  if(['refund_canceled_by_customer','refund_rejected'].includes(scene))return 'closed';
  return 'pending_review';
}

function getReshipDetailRequirementVariant(scene){
  if(scene==='reship_receive')return 'receive';
  if(scene==='reship_done')return 'done';
  if(scene==='reship_canceled_by_service')return 'closed';
  return 'ship';
}

function buildDetailRequirementDoc(){
  const type=detailType;
  const variant=type==='refund'
    ?getRefundDetailRequirementVariant(detailScene)
    :type==='reship'
      ?getReshipDetailRequirementVariant(detailScene)
      :getReturnDetailRequirementVariant(detailScene);
  const sceneDoc=detailRequirementDocs[type]?.[variant]||detailRequirementDocs.return.pending_review;
  const doc=cloneRequirementDoc(requirementDocs.detail);
  doc.title=sceneDoc.title;
  doc.business=[
    sceneDoc.status,
    sceneDoc.next,
    type==='return'
      ?'本说明只对应当前退货退款状态；不同状态会展示不同字段和动作，不能复用同一套详情说明。'
      :type==='refund'
        ?'本说明只对应当前仅退款状态；仅退款不展示寄回地址、寄回物流或商家收货节点。'
        :'本说明只对应当前补寄状态；补寄以补寄商品和物流进度为主，不把退款金额作为主流程。'
  ];
  doc.interaction=[
    sceneDoc.actions,
    '顶部返回回到售后列表；状态区、进度条、处理轨迹都要跟当前状态同步。',
    '点击退款明细、凭证、物流、原订单等入口只打开查看面板或弹窗，不改变售后主状态。'
  ];
  doc.fields=[
    sceneDoc.fields,
    type==='return'
      ?'退货退款字段按阶段展示：审核前看申请快照，待寄回看退货地址/寄回方式，待退款和完成态看验收结果与实际退款。'
      :type==='refund'
        ?'仅退款字段按阶段展示：审核前看申请金额，待退款看审批金额和预计退回，完成态看实际退回结果。'
        :'补寄字段按阶段展示：未发货看补寄商品和处理说明，已发货看物流，完成态看签收/确认结果。',
    '处理轨迹来自售后操作日志；消费者可见说明和内部备注要区分。'
  ];
  doc.edge=[
    sceneDoc.edge,
    '如果当前状态没有对应操作，页面应明确告诉消费者无需操作，而不是保留上一状态按钮。',
    '状态已变化时，任何旧按钮提交都应刷新详情并提示最新状态。'
  ];
  doc.testing=[
    sceneDoc.test,
    `当前测试定位：detailType=${type}，detailScene=${detailScene}，说明内容必须和页面状态、按钮、字段一致。`,
    '从列表进入同一售后单时，列表状态、金额、类型和详情页必须一致。'
  ];
  return doc;
}

function getCurrentRequirementDocKey(source){if(source?.closest?.('.confirm-dialog'))return 'confirm';if(source?.closest?.('.sheet,.logistics-sheet,.refund-estimate-dialog,.proof-preview-mask'))return 'sheet';if(sheetMode)return ['cancelConfirm','pickupCancelConfirm','reshipReceiveConfirm'].includes(sheetMode)?'confirm':'sheet';if(activePage==='apply')return 'apply';if(activePage==='detail')return 'detail:auto';return 'list';}
function getRequirementDocByKey(key){if(key==='detail:auto')return buildDetailRequirementDoc();return requirementDocs[key]||requirementDocs.fallback;}
function renderRequirementDocItem(item){return String(item).replace(/；/g,'；\n').replace(/。/g,'。\n').split('\n').map(line=>line.trim()).filter(Boolean).map(line=>`<span class="req-doc-line">${line}</span>`).join('');}
function renderRequirementDocSection(title,items){return `<section class="req-doc-section"><h4>${title}</h4><ul>${(items||[]).map(item=>`<li>${renderRequirementDocItem(item)}</li>`).join('')}</ul></section>`;}
function openRequirementDoc(key,source){const doc=getRequirementDocByKey(key==='auto'?getCurrentRequirementDocKey(source):key);let overlay=document.getElementById('req-doc-overlay');if(!overlay){overlay=document.createElement('div');overlay.id='req-doc-overlay';overlay.className='req-doc-overlay';document.body.appendChild(overlay);}overlay.innerHTML=`<div class="req-doc-panel" role="dialog" aria-modal="true" aria-label="${doc.title}"><div class="req-doc-header" data-req-doc-drag><span aria-hidden="true">📖</span><div class="req-doc-title">${doc.title}</div><button class="req-doc-close" type="button" data-req-doc-close>×</button></div><div class="req-doc-body">${renderRequirementDocSection('业务逻辑',doc.business)}${renderRequirementDocSection('页面交互说明',doc.interaction)}${renderRequirementDocSection('细节字段说明',doc.fields)}${renderRequirementDocSection('异常/边界说明',doc.edge)}${renderRequirementDocSection('开发测试关注点',doc.testing)}</div></div>`;overlay.classList.add('show');bindRequirementDocDrag(overlay.querySelector('.req-doc-panel'));}
function closeRequirementDoc(){document.getElementById('req-doc-overlay')?.classList.remove('show');}
function createRequirementDocButton(key='auto'){const button=document.createElement('button');button.className='req-doc-btn';button.type='button';button.dataset.reqDoc=key;button.title='查看需求说明';button.setAttribute('aria-label','查看需求说明');button.textContent='📖';return button;}
function decorateRequirementDocEntrypoints(){const demoHeader=document.querySelector('.demo-header');if(demoHeader&&!demoHeader.querySelector(':scope > .req-doc-btn'))demoHeader.appendChild(createRequirementDocButton('auto'));document.querySelectorAll('.navbar').forEach(nav=>{if(!nav.querySelector('.req-doc-btn'))nav.appendChild(createRequirementDocButton('auto'));});document.querySelectorAll('.sheet-title').forEach(title=>{if(!title.querySelector('.req-doc-btn'))title.appendChild(createRequirementDocButton('sheet'));});document.querySelectorAll('.logistics-sheet-head').forEach(head=>{if(!head.querySelector('.req-doc-btn')){const close=head.querySelector('.logistics-close');head.insertBefore(createRequirementDocButton('sheet'),close||null);}});document.querySelectorAll('.confirm-dialog,.refund-estimate-dialog,.proof-preview-mask').forEach(dialog=>{if(!dialog.querySelector('.req-doc-btn'))dialog.appendChild(createRequirementDocButton(dialog.classList.contains('confirm-dialog')?'confirm':'sheet'));});}
function bindRequirementDocDrag(panel){const handle=panel?.querySelector('[data-req-doc-drag]');if(!panel||!handle)return;let dragging=false,offsetX=0,offsetY=0;handle.addEventListener('pointerdown',event=>{if(event.target.closest('[data-req-doc-close]'))return;dragging=true;const rect=panel.getBoundingClientRect();offsetX=event.clientX-rect.left;offsetY=event.clientY-rect.top;panel.style.transform='none';handle.setPointerCapture(event.pointerId);});handle.addEventListener('pointermove',event=>{if(!dragging)return;const maxLeft=window.innerWidth-panel.offsetWidth-12;const maxTop=window.innerHeight-panel.offsetHeight-12;panel.style.left=`${Math.max(12,Math.min(event.clientX-offsetX,maxLeft))}px`;panel.style.top=`${Math.max(12,Math.min(event.clientY-offsetY,maxTop))}px`;});handle.addEventListener('pointerup',event=>{dragging=false;handle.releasePointerCapture(event.pointerId);});}
function bindRequirementDocEvents(){document.addEventListener('click',event=>{const button=event.target.closest('[data-req-doc]');if(button){event.preventDefault();event.stopPropagation();openRequirementDoc(button.dataset.reqDoc||'auto',button);return;}if(event.target.closest('[data-req-doc-close]')||event.target.id==='req-doc-overlay')closeRequirementDoc();});document.addEventListener('keydown',event=>{if(event.key==='Escape')closeRequirementDoc();});new MutationObserver(()=>decorateRequirementDocEntrypoints()).observe(document.body,{childList:true,subtree:true});}
applyInitialParams();
bindRequirementDocEvents();
renderShell();
decorateRequirementDocEntrypoints();
</script>
