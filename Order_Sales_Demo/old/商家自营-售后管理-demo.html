                        `买家寄回状态：已填写物流单号，当前等待仓库收货。`,
                        `轨迹摘要：${logistics.backTrack}`
                    ]
                };
            }
            if (statusKey === "received") {
                return {
                    title: "验收结果与退款复核",
                    lines: [
                        serial % 4 === 0 ? "验收结果：发现少量外包装破损，当前进入待商家退款执行前确认。" : "验收结果：商品完好，附件齐全，可直接进入退款执行。",
                        "退款执行说明：当前已完成验收，待商家执行退款。",
                        `财务前置摘要：分账回退状态 ${serial % 2 === 0 ? "待触发" : "无需处理"}，回退处理状态 ${serial % 2 === 0 ? "待判断是否已提现" : "无需差额记账"}。`
                    ]
                };
            }
            if (statusKey === "refunding") {
                return {
                    title: "退款执行进度",
                    lines: [
                        `退款渠道状态：${serial % 2 === 0 ? "原路退款处理中" : "财务系统处理中"}，预计回执时间 ${1 + serial % 3} 小时内。`,
                        "当前详情页仅支持查看，不允许再次调额、关闭或重复触发退款。"
                    ]
                };
            }
            if (statusKey === "refund_failed") {
                return {
                    title: "退款失败信息",
                    lines: [
                        `失败原因：${serial % 2 === 0 ? "原路退款渠道超时，未拿到支付网关成功回执。" : "分账回退校验失败，需重新触发退款并重试回退处理。"} `,
                        "支持动作：重新退款；其余动作保持只读，避免并发重复处理。"
                    ]
                };
            }
            if (statusKey === "reship_pending") {
                return {
                    title: "补寄处理信息",
                    lines: [
                        "补寄结论：补寄售后单已创建，当前等待仓库发货。",
                        `补寄成本摘要：建议补寄成本 ${money(reshipCost)}，运费承担方以当前责任判定为准。`,
                        "补寄状态：待仓库发货；回传或填写物流后进入待客户收货。"
                    ]
                };
            }
            if (statusKey === "buyer_receipt") {
                return {
                    title: "补寄物流与收货进度",
                    lines: [
                        `补寄物流：${logistics.reshipCompany} ${logistics.reshipNo}`,
                        `当前收货进度：${logistics.buyerState}`
                    ]
                };
            }
            if (statusKey === "completed") {
                return {
                    title: "最终结果摘要",
                    lines: [
                        `当前终态：${finalResult}，该页按售后类型保留申请、物流、质检、补寄和财务结果摘要。`,
                        "退款完成展示退款清分结果；补寄完成展示补寄物流与客户签收结果。"
                    ]
                };
            }
            if (statusKey === "rejected") {
                const meta = getClosureMeta({ statusKey, afterSaleType: "仅退款" });
                return {
                    title: "关闭结果说明",
                    lines: [
                        `关闭类型：${meta.subStatus}。`,
                        `消费者可见说明：${meta.visibleNote}`
                    ]
                };
            }
            if (statusKey === "cancelled") {
                const meta = getClosureMeta({ statusKey, cancelSubStatus: serial % 2 === 0 ? "客户主动撤销" : "寄回超时关闭", cancelReason: serial % 2 === 0 ? "客户主动撤销" : "超时关闭" });
                return {
                    title: "关闭结果说明",
                    lines: [
                        `关闭类型：${meta.subStatus}。`,
                        `消费者可见说明：${meta.visibleNote}`
                    ]
                };
            }
            return {
                title: "异常摘要",
                lines: [
                    serial % 2 === 0 ? "当前卡点：退款渠道超时，消费者退款未成功写回。" : "当前卡点：补寄物流超时，买家反馈仍未收到补寄商品。",
                    "建议动作：重试当前动作 / 转人工处理 / 记录异常结论。"
                ]
            };
        }

        function money(value) {
            return `¥${Number(value).toFixed(2)}`;
        }

        function getRefundInputDefault(input) {
            return Math.max(0, Number(input?.dataset?.defaultRefund) || 0);
        }

        function getRefundInputMax(input) {
            return Math.max(0, Number(input?.dataset?.maxRefund) || getRefundInputDefault(input));
        }

        function getRefundInputAmount(input) {
            const maxRefund = getRefundInputMax(input);
            const currentRefund = Math.max(0, Number(input?.value) || 0);
            return Math.min(maxRefund, currentRefund);
        }

        function clampRefundInput(input) {
            if (!input || input.value === "") return;
            const currentRefund = Math.max(0, Number(input.value) || 0);
            const nextRefund = getRefundInputAmount(input);
            if (Math.abs(currentRefund - nextRefund) > 0.001) {
                input.value = nextRefund.toFixed(2);
            }
        }

        function getRecordsForCurrentScope({ includeTab = true } = {}) {
            return mockRecords.filter((record) => {
                if (includeTab && state.currentTab !== "all") {
                    if (state.currentTab === "rejected") {
                        if (!["rejected", "cancelled"].includes(record.statusKey)) return false;
                    } else if (record.statusKey !== state.currentTab) {
                        return false;
                    }
                }
                const scopeStore = state.filters.scope === "store" ? state.currentAccountStore : "";
                if (scopeStore && record.store !== scopeStore) return false;
                if (!scopeStore && state.filters.store && record.store !== state.filters.store) return false;
                const keyword = state.filters.keyword.trim();
                if (keyword) {
                    const haystack = [
                        record.id,
                        record.orderNo,
                        record.orderType,
                        record.phone,
                        record.customer,
                        record.store,
                        record.brand,
                        record.logistics.backNo,
                        record.logistics.reshipNo
                    ].join(" ");
                    if (!haystack.includes(keyword)) return false;
                }
                if (state.filters.type && record.afterSaleType !== state.filters.type) return false;
                if (state.filters.orderType && record.orderType !== state.filters.orderType) return false;
                if (state.filters.responsibility && record.currentResponsibility !== state.filters.responsibility) return false;
                if (state.filters.freight && record.currentFreightBearer !== state.filters.freight) return false;
                return true;
            });
        }

        function getFilteredRecords() {
            const records = getRecordsForCurrentScope({ includeTab: true });
            if (state.currentTab === "audit") {
                records.sort((a, b) => {
                    const aNonLogistics = !isShippingScene(a.orderScene);
                    const bNonLogistics = !isShippingScene(b.orderScene);
                    if (aNonLogistics !== bNonLogistics) return aNonLogistics ? -1 : 1;
                    return a.id.localeCompare(b.id);
                });
            }
            if (state.currentTab === "rejected") {
                const rejectedRecords = records.filter((record) => record.statusKey === "rejected");
                const cancelledRecords = records.filter((record) => record.statusKey === "cancelled");
                const mixedRecords = [];
                const maxLength = Math.max(rejectedRecords.length, cancelledRecords.length);
                for (let i = 0; i < maxLength; i += 1) {
                    if (rejectedRecords[i]) mixedRecords.push(rejectedRecords[i]);
                    if (cancelledRecords[i]) mixedRecords.push(cancelledRecords[i]);
                }
                return mixedRecords.sort((a, b) => {
                    const aNonLogistics = !isShippingScene(a.orderScene);
                    const bNonLogistics = !isShippingScene(b.orderScene);
                    if (aNonLogistics !== bNonLogistics) return aNonLogistics ? -1 : 1;
                    return a.id.localeCompare(b.id);
                });
            }
            return records;
        }

        function renderStatusTabs() {
            const counts = getTabCounts();
            const order = ["audit", "sendback", "returning", "received", "refunding", "refund_failed", "reship_pending", "buyer_receipt", "completed", "rejected", "all"];
            const html = order.map((key) => {
                const config = statusConfigs[key];
                return `
                    <button class="status-tab ${state.currentTab === key ? "active" : ""}" data-status-tab="${key}">
                        <span class="tab-icon">${config.icon || "•"}</span>
                        <div class="tab-name">${config.label}</div>
                        <div class="tab-count">${counts[key]}</div>
                    </button>
                `;
            }).join("");
            document.getElementById("status-tabs").innerHTML = html;
        }

        function getTabCounts() {
            const counts = {};
            const scopedRecords = getRecordsForCurrentScope({ includeTab: false });
            Object.keys(statusConfigs).forEach((key) => {
                if (key === "all") {
                    counts[key] = scopedRecords.length;
                } else if (key === "rejected") {
                    counts[key] = scopedRecords.filter(item => item.statusKey === "rejected" || item.statusKey === "cancelled").length;
                } else {
                    counts[key] = scopedRecords.filter(item => item.statusKey === key).length;
                }
            });
            return counts;
        }

        function renderTable() {
            const tableBodyLeft = document.getElementById("table-body-left");
            const tableBodyMiddle = document.getElementById("table-body-middle");
            const tableBodyRight = document.getElementById("table-body-right");
            const records = getFilteredRecords();
            const total = records.length;
            const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
            if (state.currentPage > totalPages) state.currentPage = totalPages;
            const startIndex = (state.currentPage - 1) * state.pageSize;
            const pagedRecords = records.slice(startIndex, startIndex + state.pageSize);
            document.getElementById("table-summary").textContent = `共 ${total} 条`;
            renderPagination(total, totalPages);
            if (!pagedRecords.length) {
                tableBodyLeft.innerHTML = `<div class="empty-list">无数据</div>`;
                tableBodyMiddle.innerHTML = `<div class="empty-list">当前筛选条件下没有案例，可清空筛选后继续演示。</div>`;
                tableBodyRight.innerHTML = ``;
                return;
            }

            const leftRows = [];
            const middleRows = [];
            const rightRows = [];

            pagedRecords.forEach((record) => {
                const statusTone = mapTone(record.statusKey);
                const logisticsText = getListLogisticsText(record);
                const displayType = getDisplayType(record.afterSaleType);
                const applyFulfillmentStatus = getApplyFulfillmentStatus(record);
                const listItems = record.items.filter(item => item.qty > 0 && item.applyStatus !== "未申请");
                const mainItem = listItems[0] || record.items[0];
                const extraCount = Math.max(0, listItems.length - 1);
                const productSubs = ``;
                const userSubs = `<div class="cell-sub">${record.phone}</div>`;
                const applicationSource = getApplicationSourceMeta(record);
                const closedSubStatus = ["rejected", "cancelled"].includes(record.statusKey)
                    ? getClosureMeta(record).subStatus
                    : "";
                const orderTypeSubs = `
                    <div class="mini-tags compact">
                        <span class="mini-tag ${getOrderSceneTagTone(record.orderScene)}">${getOrderSceneDisplay(record.orderScene)}</span>
                    </div>
                `;
                const freightSuffix = record.amounts.freightRefund > 0 ? `（含运费 ${money(record.amounts.freightRefund)}）` : "";
                const isCompleted = record.statusKey === "completed";
                const isAdjustedAmount = Math.abs(Number(record.amounts.approved || 0) - Number(record.amounts.applied || 0)) > 0.001 || Boolean(record.manualAdjustedReason);
                const amountMain = `申请 ${money(record.amounts.applied)}${freightSuffix}`;
                const amountSubs = isCompleted
                    ? `<div class="cell-sub">实退 ${money(record.amounts.actual)}${freightSuffix}</div>`
                    : (isAdjustedAmount ? `<div class="cell-sub">审批后实退 ${money(record.amounts.approved)} · 已调价</div>` : ``);
                const logisticsEmpty = logisticsText.title === "-" && !logisticsText.detail;

                leftRows.push(`
                    <div class="table-row" data-open-id="${record.id}">
                        <div class="cell-stack">
                            <div class="cell-title">${record.id}</div>
                            <div class="order-sub-id">订单: ${record.childOrderNo}</div>
                            <span class="application-source-pill ${applicationSource.tone}">${applicationSource.label}</span>
                        </div>
                    </div>
                `);

                middleRows.push(`
                    <div class="table-row" data-open-id="${record.id}">
                        <div class="cell-stack">
                            <div class="cell-title">${record.orderType}</div>
                            ${orderTypeSubs}
                        </div>
                        <div class="cell-stack">
                            <span class="fulfillment-text">${applyFulfillmentStatus}</span>
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${displayType}</div>
                        </div>
                        <div class="cell-stack">
                            <div class="product-info">
                                <div class="product-thumb">${getProductEmoji(mainItem.name)}</div>
                                <div class="product-meta">
                                    <div class="cell-title">${mainItem.name}</div>
                                    <div class="product-price-line">${money(mainItem.unitPrice)} × ${mainItem.qty}</div>
                                    ${extraCount > 0 ? `<div class="cell-sub">等 ${listItems.length} 件商品</div>` : ``}
                                    ${productSubs}
                                </div>
                            </div>
                        </div>
                        <div class="cell-stack">
                            <div class="amount-highlight">${amountMain}</div>
                            ${amountSubs}
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${record.customer}</div>
                            ${userSubs}
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${record.reason}</div>
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${logisticsText.title}</div>
                            ${logisticsEmpty ? `` : `<div class="cell-sub">${logisticsText.detail}</div>`}
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${record.store}</div>
                        </div>
                        <div class="time-track">
                            <div class="time-track-line">${record.createdAt}</div>
                        </div>
                    </div>
                `);

                rightRows.push(`
                    <div class="table-row" data-open-id="${record.id}">
                        <div class="cell-stack">
                            <div><span class="status-pill ${statusTone}">${record.label}</span></div>
                            ${closedSubStatus ? `<div class="status-subtext">${closedSubStatus}</div>` : ""}
                        </div>
                        <div class="table-action">
                            <button class="action-btn" data-open-id="${record.id}">${getPrimaryActionLabel(record)}</button>
                        </div>
                    </div>
                `);
            });

            tableBodyLeft.innerHTML = leftRows.join("");
            tableBodyMiddle.innerHTML = middleRows.join("");
            tableBodyRight.innerHTML = rightRows.join("");
            syncRowHeights();
        }

        function syncRowHeights() {
            const leftRows = document.querySelectorAll("#table-body-left .table-row");
            const middleRows = document.querySelectorAll("#table-body-middle .table-row");
            const rightRows = document.querySelectorAll("#table-body-right .table-row");
            const count = Math.max(leftRows.length, middleRows.length, rightRows.length);
            for (let i = 0; i < count; i++) {
                const heights = [];
                if (leftRows[i]) { leftRows[i].style.height = "auto"; heights.push(leftRows[i].offsetHeight); }
                if (middleRows[i]) { middleRows[i].style.height = "auto"; heights.push(middleRows[i].offsetHeight); }
                if (rightRows[i]) { rightRows[i].style.height = "auto"; heights.push(rightRows[i].offsetHeight); }
                const maxH = Math.max(...heights) + "px";
                if (leftRows[i]) leftRows[i].style.height = maxH;
                if (middleRows[i]) middleRows[i].style.height = maxH;
                if (rightRows[i]) rightRows[i].style.height = maxH;
            }
        }

        function buildTimeTrack(record) {
            const lines = [`申请: ${record.createdAt}`];
            switch (record.statusKey) {
                case "audit":
                    break;
                case "sendback":
                    lines.push(`审核: ${record.auditAt}`);
                    break;
                case "returning":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`寄回: ${record.sendbackAt}`);
                    break;
                case "received":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`寄回: ${record.sendbackAt}`);
                    lines.push(`签收: ${record.receiveAt}`);
                    break;
                case "refunding":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`退款中: ${record.completeAt}`);
                    break;
                case "refund_failed":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`失败: ${record.completeAt}`);
                    break;
                case "reship_pending":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`转补寄: ${record.auditAt}`);
                    break;
                case "buyer_receipt":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`补寄发货: ${record.sendbackAt}`);
                    break;
                case "completed":
                    if (record.afterSaleType === "补寄") {
                        lines.push(`审核: ${record.auditAt}`);
                        lines.push(`完成: ${record.completeAt}`);
                    } else if (record.receiveAt) {
                        lines.push(`审核: ${record.auditAt}`);
                        lines.push(`完成: ${record.completeAt}`);
                    } else {
                        lines.push(`审核: ${record.auditAt}`);
                        lines.push(`完成: ${record.completeAt}`);
                    }
                    break;
                case "rejected":
                    lines.push(`关闭: ${record.completeAt}`);
                    break;
                case "cancelled":
                    if (record.auditAt) lines.push(`审核: ${record.auditAt}`);
                    lines.push(`关闭: ${record.completeAt}`);
                    break;
                default:
                    if (record.auditAt) lines.push(`审核: ${record.auditAt}`);
                    break;
            }
            return lines.slice(0, 3);
        }

        function renderPagination(total, totalPages) {
            const pagination = document.getElementById("pagination");
            if (!total) {
                pagination.innerHTML = "";
                return;
            }
            const buttons = [];
            buttons.push(`<span class="pagination-info">第 ${state.currentPage} / ${totalPages} 页</span>`);
            buttons.push(`<button class="page-btn" data-page-action="prev" ${state.currentPage === 1 ? "disabled" : ""}>上一页</button>`);
            for (let page = 1; page <= totalPages; page += 1) {
                buttons.push(`<button class="page-btn ${page === state.currentPage ? "active" : ""}" data-page="${page}">${page}</button>`);
            }
            buttons.push(`<button class="page-btn" data-page-action="next" ${state.currentPage === totalPages ? "disabled" : ""}>下一页</button>`);
            pagination.innerHTML = buttons.join("");
        }

        function getListLogisticsText(record) {
            if (record.flowMode === "refund_only") {
                return { title: "-", detail: "" };
            }
            if (record.statusKey === "returning" || record.statusKey === "received" || record.statusKey === "refunding" || record.statusKey === "refund_failed") {
                if (record.flowMode === "refund_return") {
                    return { title: record.logistics.backCompany, detail: `单号：${record.logistics.backNo}` };
                }
            }
            if (record.statusKey === "buyer_receipt") {
                return { title: record.logistics.reshipCompany, detail: `单号：${record.logistics.reshipNo}` };
            }
            if (record.statusKey === "completed") {
                if (record.afterSaleType === "补寄") {
                    return { title: record.logistics.reshipCompany, detail: `单号：${record.logistics.reshipNo}` };
                }
                if (record.afterSaleType === "退款退货") {
                    return { title: record.logistics.backCompany, detail: `单号：${record.logistics.backNo}` };
                }
            }
            return { title: "-", detail: "" };
        }

        function getPrimaryActionLabel(record) {
            if (record.statusKey === "audit" && !isShippingScene(record.orderScene)) return "审批处理";
            if (record.statusKey === "returning") return "签收质检";
            if (record.statusKey === "reship_pending") return "待仓库发货";
            if (record.statusKey === "received") return "操作退款";
            return statusConfigs[record.statusKey].primaryAction;
        }

        function mapTone(statusKey) {
            if (statusKey === "audit") return "audit";
            if (["completed"].includes(statusKey)) return "success";
            if (["rejected", "cancelled"].includes(statusKey)) return "closed";
            if (["refund_failed"].includes(statusKey)) return "exception";
            return "progress";
        }

        function getClosedSubStatus(record) {
            if (!record || !["rejected", "cancelled"].includes(record.statusKey)) return "";
            if (record.closureSubStatus) return record.closureSubStatus;
            const reasonText = `${record.rejectReason || ""} ${record.cancelReason || ""}`;
            const logText = (record.logs || []).map(log => log.text || "").join(" ");
            if (record.statusKey === "rejected") {
                if (reasonText.includes("拒绝本次退款") || logText.includes("拒绝退款") || logText.includes("财务已拒绝")) {
                    return "商家拒绝退款";
                }
                return "商家拒绝申请";
            }
            if (reasonText.includes("主动撤销") || reasonText.includes("主动撤回") || reasonText.includes("买家主动")) {
                return "客户自主撤销";
            }
            return "超时自动撤销";
        }

        function renderDrawer(record) {
            state.activeRecord = record;
            state.activeAction = "";
            drawerOverlay.classList.add("show");
            drawer.classList.add("show");
            renderDrawerHeader(record);
            renderDrawerBody(record);
            renderDrawerFooter(record);
        }

        function getHeaderTone(record) {
            if (record.statusKey === "audit") return "audit";
            if (["completed"].includes(record.statusKey)) return "success";
            if (["rejected", "cancelled"].includes(record.statusKey)) return "closed";
            if (["refund_failed"].includes(record.statusKey)) return "exception";
            return "progress";
        }

        function getHeaderFlow(record) {
            const profile = getFlowProfile(record);
            if (["rejected", "cancelled"].includes(record.statusKey)) {
                return {
                    steps: profile.steps,
                    activeIndex: getClosedFlowActiveIndex(record, profile)
                };
            }
            return {
                steps: profile.steps,
                activeIndex: profile.activeMap[record.statusKey] ?? 0
            };
        }

        function getClosedFlowActiveIndex(record, profile) {
            const closureType = getClosureType(record);
            if (profile.kind === "closed_before_refund") return 2;
            if (profile.kind === "refund_return") {
                if (closureType === "review_rejected") return 1;
                if (closureType === "customer_cancelled") return record.flowMode === "refund_return" ? 2 : 1;
                if (closureType === "return_timeout") return profile.steps.length - 1;
                if (closureType === "finance_rejected") return profile.steps.length - 1;
                return 5;
            }
            if (profile.kind === "refund_only") {
                if (closureType === "review_rejected" || closureType === "customer_cancelled") return 1;
                if (closureType === "finance_rejected") return profile.steps.length - 1;
                return 3;
            }
            return 0;
        }


        function getHeaderHint(record) {
            const sendbackCountdown = formatSendbackCountdown(record);
            if (["rejected", "cancelled"].includes(record.statusKey)) {
                const meta = getClosureMeta(record);
                return `${meta.subStatus}：${meta.conclusion}。`;
            }
            const hints = {
                audit: "核对申请内容，确认同意或拒绝。",
                sendback: `等待客户寄回商品，剩余${sendbackCountdown}将自动撤销。`,
                returning: "跟进退货物流，等待仓库收货。",
                received: "核对退款金额，确认后操作退款。",
                refunding: "等待退款结果回写，请勿重复操作。",
                refund_failed: "查看失败原因，确认后重新退款。",
                reship_pending: "处理补寄出库，推送云仓或填写物流。",
                buyer_receipt: "跟进补寄物流，等待客户收货。",
                completed: "查看处理结果和金额明细。",
                rejected: "查看关闭原因和操作记录。",
                cancelled: "查看关闭原因和操作记录。"
            };
            return hints[record.statusKey] || "";
        }

        function formatSendbackCountdown(record) {
            const dayMatch = String(record.countdown || "").match(/(\d+)\s*天/);
            const days = dayMatch ? Number(dayMatch[1]) : 0;
            const seed = Number(String(record.id || "").replace(/\D/g, "").slice(-4)) || 0;
            const hours = String(seed % 24).padStart(2, "0");
            const seconds = String((seed * 7) % 60).padStart(2, "0");
            return `${days}天${hours}时${seconds}秒`;
        }

        function getAuditHeaderHint(record) {
            return "核对申请内容，确认同意或拒绝。";
        }

        function getAuditCountdownText(countdown) {
            return countdown.replace("后自动同意", "");
        }

        function getCompletedHeaderHint(record) {
            return "查看处理结果和金额明细。";
        }

        function getRefundQuantityColumnLabel(record) {
            return record.flowMode === "refund_return" || record.afterSaleType === "退款退货" ? "本次退货数量" : "本次退款数量";

        function getHintIcon(record) {
            const icons = {

                sendback: "⏳",
                returning: "🚚",
                received: "✅",
                refunding: "💸",
                refund_failed: "⚠",
                reship_pending: "📦",
                buyer_receipt: "📮",
                completed: "✅",
                rejected: "ℹ",
                cancelled: "ℹ"
            };
            return icons[record.statusKey] || "ℹ";
        }

        function getCompletedSubStatus(record) {
            if (record.statusKey !== "completed") return "";
            if (record.finalResult) return record.finalResult;
            if (record.completedSource === "reship_only" || record.completedSource === "reship_with_refund" || record.afterSaleType === "补寄" || record.flowMode === "reship") {
                return "补寄完成";

            return "退款成功";

            return isShippingScene(record.orderScene);

        function getAuditRefundPaymentParts(record) {
            if (Array.isArray(record.paymentParts) && record.paymentParts.length) {
                return record.paymentParts;
            }
            const applied = Number(record.amounts?.applied || 0);
            return [{ name: "微信", amount: applied, type: "cash" }];
        }

        function renderAuditRefundReturnDetail(record) {
            const parts = getAuditRefundPaymentParts(record);
            const cashParts = parts.filter(part => part.type !== "coupon");
            const couponParts = parts.filter(part => part.type === "coupon");
            const couponName = couponParts.map(part => part.name).join("、");
            const couponRefund = Number(record.amounts?.couponRefundValue || 0);
            const cashRefund = Number(Math.max((record.amounts?.applied || 0) - couponRefund, 0).toFixed(2));
            const primaryCashName = cashParts[0]?.name || "原支付渠道";
            const couponRow = couponRefund > 0 ? `
                <div class="manual-refund-subrow">
                    <span>优惠券退回${couponName ? `｜${couponName}` : ""}</span>
                    <strong>抵扣 ${money(couponRefund)}</strong>
                </div>
            ` : "";
            return `
                <div class="manual-refund-detail">
                    <div class="manual-refund-detail-title">预计退回明细</div>
                    <div class="manual-refund-row"><span>退到${primaryCashName}</span><strong>${money(cashRefund)}</strong></div>
                    ${couponRefund > 0 ? `<div class="manual-refund-row"><span>退回资产</span><strong>${money(couponRefund)}</strong></div>` : ""}
                    ${couponRow ? `<div class="manual-refund-sublist">${couponRow}</div>` : ""}
                    <div class="manual-refund-tip">原单支付构成：${record.paymentSummary || parts.map(part => `${part.name} ${money(part.amount)}`).join(" / ")}；商品退款金额已按优惠抵扣后的可退金额计算。</div>
                </div>
            `;
        }

        function getAuditSettlementNote(record) {
            if (record.orderScene !== "发货订单") {
                return "非物流订单默认按申请范围全额退款，不支持商家改价，也不涉及原单运费。";
            }
            if (record.applyFulfillmentStatus === "待发货" && Number(record.amounts?.freightRefund || 0) > 0) {
                return "待发货整单退款已包含原单运费。若调整商品或运费退款金额，系统要求补充调额原因、备注和凭证。";
            }
            if (Number(record.amounts?.freightRefund || 0) > 0) {
                return "本单满足退运费条件，退款明细已单独展示运费行。若调整金额，需补充调额原因、备注和凭证。";
            }
            return "已发货订单：运费默认不退。若调整商品退款金额，系统要求补充调额原因、备注和凭证。";

            return `

                    <td>退 x${item.qty}</td>

                            max: defaultRefund,
                            kind: "goods",
                            editable: canAdjustRefund

                    </td>

        function bindAuditMobileRefundInputs(record) {
            const drawerBody = document.getElementById("drawer-body");
            const inputs = Array.from(drawerBody.querySelectorAll("[data-audit-refund-line]"));
            const goodsAmountNode = drawerBody.querySelector("[data-audit-goods-refund-amount]");
            const totalAmountNode = drawerBody.querySelector("[data-audit-total-refund-amount]");
            const refundBreakdownNode = drawerBody.querySelector("[data-audit-refund-breakdown]");
            const adjustPanel = drawerBody.querySelector("[data-audit-adjust-panel]");
            const adjustTotalInput = drawerBody.querySelector("[data-audit-adjust-total]");
            if (!inputs.length) return;
            const update = () => {
                inputs.forEach(clampRefundInput);
                const goodsRefund = Number(inputs
                    .filter(input => input.dataset.refundKind !== "freight")
                    .reduce((sum, input) => sum + getRefundInputAmount(input), 0)
                    .toFixed(2));
                const freightRefund = Number(inputs
                    .filter(input => input.dataset.refundKind === "freight")
                    .reduce((sum, input) => sum + getRefundInputAmount(input), 0)
                    .toFixed(2));
                const totalRefund = Number((goodsRefund + freightRefund).toFixed(2));
                const adjusted = inputs.some(input => Math.abs(getRefundInputAmount(input) - getRefundInputDefault(input)) > 0.001);
                inputs.forEach(input => {
                    const isAdjusted = Math.abs(getRefundInputAmount(input) - getRefundInputDefault(input)) > 0.001;
                    input.classList.toggle("adjusted", isAdjusted);
                    const cell = input.closest(".audit-refund-amount-cell");
                    const view = cell?.querySelector("[data-audit-refund-view]");
                    if (view) view.textContent = money(getRefundInputAmount(input));
                });
                if (goodsAmountNode) goodsAmountNode.textContent = money(goodsRefund);
                if (totalAmountNode) totalAmountNode.textContent = money(totalRefund);
                if (refundBreakdownNode) refundBreakdownNode.textContent = `产品 ${money(goodsRefund)}，运费 ${money(freightRefund)}`;
                if (adjustTotalInput) adjustTotalInput.value = money(totalRefund);
                if (adjustPanel) adjustPanel.classList.toggle("hidden", !adjusted);
            };
            drawerBody.querySelectorAll("[data-audit-refund-edit]").forEach(button => {
                button.addEventListener("click", () => {
                    const cell = button.closest(".audit-refund-amount-cell");
                    const input = cell?.querySelector("[data-audit-refund-line]");
                    if (!cell || !input) return;
                    cell.classList.add("is-editing");
                    input.focus();
                    input.select();
                });
            });
            inputs.forEach(input => input.addEventListener("input", update));
            update();
        }

                                <div class="manual-info-item"><span class="manual-info-label">发货状态</span><span class="manual-info-value">${getApplyFulfillmentStatus(record)}</span></div>
                                ${renderOriginalOrderAmountFields(record)}

                    <section class="manual-section apply-theme">

        function renderApprovedProductAmountRow(item, options = {}) {
            const buyQty = item.buyQty ?? item.qty;
            const refundAmount = Number((item.refundAmount ?? item.unitPrice * item.qty).toFixed(2));
            const approvedAmount = options.adjusted
                ? Number((refundAmount * (Number(options.approvedGoodsAmount || 0) / Math.max(Number(options.appliedGoodsAmount || 0), 0.01))).toFixed(2))
                : refundAmount;
            return `
                <tr>
                    <td><strong>${item.name}</strong><br><span style="color:#667085;">${item.sku}</span></td>
                    <td>${money(item.unitPrice)}</td>
                    <td>${buyQty}</td>
                    <td>退 x${item.qty}</td>
                    <td><span class="audit-refund-amount-view">${money(refundAmount)}</span></td>
                    ${options.adjusted ? `<td><span class="audit-refund-amount-view changed">${money(approvedAmount)}</span></td>` : ""}
                </tr>
            `;
        }

        function renderPostAuditDetailBody(record) {
            if (record.statusKey === "sendback") {
                return renderSendbackDetailBody(record);
            }
            if (record.statusKey === "returning") {
                return `
                    ${renderApprovedApplicationInfoModule(record)}
                    ${renderBuyerReturnLogisticsCard(record)}
                `;
            }
            if (record.statusKey === "received") {
                return renderPendingMerchantRefundDetailBody(record);
            }
            if (record.statusKey === "refunding") {
                return `
                    ${renderPendingMerchantRefundDetailBody(record)}
                    ${renderSecondRefundAuditCard(record)}
                `;
            }
            if (record.statusKey === "refund_failed") {
                return `
                    ${renderPendingMerchantRefundDetailBody(record)}
                    ${renderSecondRefundAuditCard(record)}
                `;
            }
            if (record.statusKey === "completed") {
                return renderCompletedDetailBody(record);
            }
            if (record.statusKey === "reship_pending") {
                return renderReshipPendingDetailBody(record);
            }
            if (record.statusKey === "buyer_receipt") {
                return renderReshipReceiptDetailBody(record);
            }
            if (record.statusKey === "rejected" || record.statusKey === "cancelled") {
                return renderClosedDetailBody(record);
            }
            return `
                ${renderAuditHeroCard(record)}
                ${renderFlowBaseInfoCard(record)}
                ${renderFlowStatusCard(record)}
            `;
        }

        function renderClosedDetailBody(record) {
            const closureType = getClosureType(record);
            if (closureType === "finance_rejected") {
                return `
                    ${renderPendingMerchantRefundDetailBody(record)}
                    ${renderFinanceRejectReviewCard(record)}
                `;
            }
            if (closureType === "return_timeout") {
                return `
                    ${renderApprovedApplicationInfoModule(record)}
                    ${renderResultReasonCard(record)}
                `;
            }
            if (closureType === "customer_cancelled") {
                if (record.flowMode === "refund_return" && record.afterSaleType === "退款退货") {
                    return `
                        ${renderApprovedApplicationInfoModule(record)}
                        ${renderResultReasonCard(record)}
                    `;
                }
                return `
                    ${renderClosedApplicationInfoModule(record)}
                    ${renderResultReasonCard(record)}
                `;
            }
            return `
                ${renderClosedApplicationInfoModule(record)}
                ${renderReviewRejectResultCard(record)}
            `;
        }

            const appliedItems = record.items.filter((item) => item.qty > 0 && item.applyStatus !== "未申请");
            const orderSceneText = getOrderSceneDisplay(record.orderScene);
            const refundGoodsAmount = Math.max(0, (record.amounts?.applied || 0) - (record.amounts?.freightRefund || 0));

            return `

                                <div class="manual-info-item"><span class="manual-info-label">原订单号</span><a class="manual-order-link" href="javascript:void(0)">${record.orderNo}</a></div>
                                <div class="manual-info-item"><span class="manual-info-label">售后类型</span><span class="manual-status-badge">${getDisplayType(record.afterSaleType)}</span></div>
                                <div class="manual-info-item"><span class="manual-info-label">订单类型</span><span class="manual-info-value">${record.orderType}</span> <span class="mini-tag ${getOrderSceneTagTone(record.orderScene)}">${orderSceneText}</span></div>
                                <div class="manual-info-item"><span class="manual-info-label">发货状态</span><span class="manual-info-value">${getApplyFulfillmentStatus(record)}</span></div>
                                ${renderOriginalOrderAmountFields(record)}
                            </div>
                        </div>
                    </section>

                    <section class="manual-section apply-theme">
                        <div class="manual-section-title">
                            <div class="manual-section-heading">
                                <span class="manual-section-index">02</span>
                                <span class="manual-section-name">申请信息</span>
                            </div>
                            <span class="manual-section-subtitle">保留客户申请内容、退款范围和原始凭证</span>
                        </div>

                                <div class="manual-info-item full"><span class="manual-info-label">申请说明</span><span class="manual-info-value">${record.note || getAuditBuyerNote(record)}<div style="margin-top:10px;">${renderAuditProofGallery(record)}</div></span></div>
                            </div>

                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${appliedItems.map((item) => renderApprovedProductAmountRow(item, {
                                            adjusted: false,

                                            <div>${money(record.amounts.applied)}</div>

            const showWarehouse = isShippingScene(record.orderScene) && record.afterSaleType === "退款退货";
            return `
                <section class="detail-card audit-base-card">
                    <div class="audit-base-header">审批信息</div>
                    <div class="audit-base-body">
                        <div class="warehouse-info-list">

                            <div class="warehouse-info-row"><span class="warehouse-info-label">处理说明：</span><span class="warehouse-info-value">${record.reshipForm.warehouseNote}</span></div>

                    </div>

        function buildReshipTimeline(record) {
            const base = [
                { time: `${record.sendbackAt}`, text: "补寄订单物流已同步，等待买家签收。" },
                { time: `${record.auditAt}`, text: "仓库已接单并完成出库，物流已揽收。" },
                { time: `${record.createdAt}`, text: "补寄单创建完成，已发往仓库处理。" }
            ];
            if (record.statusKey === "completed") {
                return [
                    { time: `${record.completeAt}`, text: getReshipCompletedTimelineText(record) },
                    { time: `${record.sendbackAt}`, text: "补寄订单物流已同步，等待买家签收。" },
                    { time: `${record.auditAt}`, text: "仓库已接单并完成出库，物流已揽收。" },
                    { time: `${record.createdAt}`, text: "补寄单创建完成，已发往仓库处理。" }
                ];
            }
            return base;
        }

        function renderQualityDecisionCard(record) {
            const isNormal = record.qualityResult === "商品完好" || record.qualityResult === "全部完好";
            const hasDetailRows = record.qualityItemRows && record.qualityItemRows.length > 0;
            const summary = record.qualitySummary || {};
            const receiveOperator = record.receiveOperator || "仓库操作员";
            const receiveAt = record.receiveAt || "待记录";
            const abnormalRows = hasDetailRows
                ? record.qualityItemRows.filter(row => getQualityAbnormalQty(row) > 0)
                : [];
            const showQualityDetail = abnormalRows.length > 0;
            const appliedGoodsBase = showQualityDetail
                ? abnormalRows.reduce((sum, row) => sum + Number(row.applyQty || 0) * Number(row.unitPrice || 0), 0)
                : 0;
            const approvedGoodsTotal = Number(record.amounts?.goods ?? appliedGoodsBase);

            // Only show rows with warehouse exceptions. Normal acceptance stays in the summary.
            let suggestedRows = "";
            let suggestedTotal = 0;
            let suggestedAbnormalTotal = 0;
            let approvedTotal = 0;
            let totalApplyQty = 0;
            let totalReceivedQty = 0;
            let totalGoodQty = 0;
            if (showQualityDetail) {
                suggestedRows = abnormalRows.map(row => {
                    const lineAppliedAmount = Number(row.applyQty || 0) * Number(row.unitPrice || 0);
                    const approvedAmount = appliedGoodsBase > 0
                        ? Number((lineAppliedAmount * approvedGoodsTotal / appliedGoodsBase).toFixed(2))
                        : lineAppliedAmount;
                    const suggestedAmount = Number(row.goodQty || 0) * Number(row.unitPrice || 0);
                    const abnormalQty = getQualityAbnormalQty(row);
                    totalApplyQty += Number(row.applyQty || 0);
                    totalReceivedQty += Number(row.receivedQty || 0);
                    totalGoodQty += Number(row.goodQty || 0);
                    approvedTotal += approvedAmount;
                    suggestedTotal += suggestedAmount;
                    suggestedAbnormalTotal += abnormalQty;
                    return `
                        <tr>
                            <td style="text-align:left;">
                                <div style="font-size:12px;font-weight:600;">${row.name}</div>
                                <div style="font-size:11px;color:#667085;">${row.sku}</div>
                            </td>
                            <td>${row.applyQty}</td>
                            <td>${row.receivedQty}</td>
                            <td style="color:#16a34a;font-weight:700;">${row.goodQty}</td>
                            <td>
                                <div class="quality-abnormal-summary">
                                    <strong style="color:${abnormalQty > 0 ? '#dc2626' : '#667085'};">${abnormalQty}</strong>
                                </div>
                            </td>
                            <td style="font-weight:700;color:#1f2a37;">￥${approvedAmount.toFixed(2)}</td>
                        </tr>
                    `;
                }).join("");
            }

            return `
                <section class="manual-section logistics-theme">
                    <div class="manual-section-title">
                        <div class="manual-section-heading">
                            <span class="manual-section-index">06</span>
                            <span class="manual-section-name">仓库验收结果</span>
                        </div>
                        <span class="manual-section-subtitle">仓库签收后记录验收结果与退款建议</span>
                    </div>
                    <div class="manual-section-body">
                        <div class="quality-panel">
                            <div class="approval-record-panel">
                                <div class="approval-record-head">
                                    <div class="approval-record-title">签收质检记录</div>
                                    <div class="approval-record-time">${receiveAt}</div>
                                </div>
                                <div class="approval-record-grid">
                                    <div class="approval-record-item"><span class="approval-record-label">签收时间</span><span class="approval-record-value">${receiveAt}</span></div>
                                    <div class="approval-record-item"><span class="approval-record-label">签收操作人</span><span class="approval-record-value">${receiveOperator}</span></div>
                                    <div class="approval-record-item"><span class="approval-record-label">验收结果</span><span class="approval-record-value ${isNormal ? "" : "amount-danger"}">${record.qualityResult}</span></div>
                                    <div class="approval-record-item full"><span class="approval-record-label">验收说明</span><span class="approval-record-value">${record.qualityNote || "商品完好，附件齐全，可二次销售。"}</span></div>
                                </div>
                            </div>
                            ${showQualityDetail ? `
                                <div class="quality-detail-block">
                                    <div style="font-size:12px;font-weight:700;color:#1f2a37;margin-bottom:8px;">验收明细</div>
                                    <div style="overflow-x:auto;">
                                        <table class="quality-inspection-table">
                                            <thead>
                                                <tr>
                                                    <th style="min-width:120px;text-align:left;">商品/SKU</th>
                                                    <th>申请数</th>
                                                    <th>签收数</th>
                                                    <th>完好入库</th>
                                                    <th style="min-width:96px;">异常数量</th>
                                                    <th style="min-width:110px;">一审退款金额</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${suggestedRows}
                                            </tbody>
                                            <tfoot>
                                                <tr style="background:#f8fafc;font-weight:700;">
                                                    <td style="text-align:left;">合计</td>
                                                    <td>${totalApplyQty}</td>
                                                    <td>${totalReceivedQty}</td>
                                                    <td style="color:#16a34a;">${totalGoodQty}</td>
                                                    <td>
                                                        <div class="quality-abnormal-summary">
                                                            <strong style="color:${(summary.totalAbnormal ?? suggestedAbnormalTotal) > 0 ? '#dc2626' : '#667085'};">${summary.totalAbnormal ?? suggestedAbnormalTotal}</strong>
                                                        </div>
                                                    </td>
                                                    <td style="color:#1f2a37;font-size:13px;">￥${approvedTotal.toFixed(2)}</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                </div>
                            ` : ""}
                            ${isNormal ? "" : `
                                <div class="quality-exception-compact">
                                    <div class="quality-note-box">
                                        <div class="quality-note-text"><span class="warehouse-info-label">异常说明：</span>${record.qualityNote}</div>
                                        ${renderAuditImageGallery(record.qualityProofImages)}
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderCompletedDetailBody(record) {
            if (record.completedSource === "reship_only") {
                return renderUnifiedReshipDetailBody(record, { showShipment: true });
            }
            if (record.completedSource === "reship_with_refund") {
                return renderUnifiedReshipDetailBody(record, { showShipment: true, showSettlement: true });
            }
            if (!isShippingScene(record.orderScene) || record.completedSource === "refund_only") {
                return `
                    ${renderApprovedApplicationInfoModule(record)}
                    ${renderRefundSettlementCard(record)}
                `;
            }
            return `
                ${renderApprovedApplicationInfoModule(record)}
                ${renderBuyerReturnLogisticsCard(record)}
                ${renderQualityDecisionCard(record)}
                ${renderRefundSettlementCard(record)}
            `;
        }

        function renderResultReasonCard(record) {
            const meta = getClosureMeta(record);
            const content = meta.reason;
            const subStatus = meta.subStatus;
            const timeLabel = getClosureTimeLabel(record);
            const actorLabel = getClosureActorLabel(record);
            const actorValue = getClosureActorValue(record, meta);
            const showCloudCancelStatus = record.afterSaleType === "补寄"
                && record.reshipForm?.fulfillmentType === "cloud"
                && record.reshipForm?.cloudOrderStatus;
            return `
                <section class="manual-section adjust-theme">
                    <div class="manual-section-title">
                        <div class="manual-section-heading">
                            <span class="manual-section-index">${getClosureResultSectionIndex(record)}</span>
                            <span class="manual-section-name">处理结果</span>
                        </div>
                    </div>
                    <div class="manual-section-body">
                        <div class="approval-record-panel">
                            <div class="approval-record-head">
                                <div class="approval-record-title">${subStatus}</div>
                            </div>
                            <div class="approval-record-grid">
                                <div class="approval-record-item"><span class="approval-record-label">${timeLabel}</span><span class="approval-record-value">${meta.closeAt}</span></div>
                                <div class="approval-record-item"><span class="approval-record-label">${actorLabel}</span><span class="approval-record-value">${actorValue}</span></div>
                                ${showCloudCancelStatus ? `<div class="approval-record-item full"><span class="approval-record-label">云仓订单状态</span><span class="approval-record-value">${record.reshipForm.cloudOrderStatus}</span></div>` : ""}
                                <div class="approval-record-item full"><span class="approval-record-label">${meta.reasonLabel}</span><span class="approval-record-value">${content || "暂无说明"}</span></div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function getClosureActorLabel(record) {
            return getClosureType(record) === "customer_cancelled" ? "撤销人" : "操作人";
        }

        function getClosureActorValue(record, meta) {
            return getClosureType(record) === "customer_cancelled" ? "客户本人" : meta.operator;
        }

        function getClosureTimeLabel(record) {
            const closureType = getClosureType(record);
            if (closureType === "review_rejected") return "审批时间";
            if (closureType === "finance_rejected") return "复核时间";
            if (closureType === "customer_cancelled") return "撤销时间";
            return "关闭时间";
        }

        function getClosureResultSectionIndex(record) {
            const closureType = getClosureType(record);
            if (closureType === "finance_rejected") return "08";
            if (closureType === "return_timeout") return "05";
            if (closureType === "customer_cancelled" && record.flowMode === "refund_return" && record.afterSaleType === "退款退货") return "05";
            if (closureType === "review_rejected") return "04";
            return "03";
        }

        function renderRefundOnlyResultCard(record) {
            return `
                <section class="detail-card audit-base-card">
                    <div class="audit-base-header">退款结果说明</div>
                    <div class="audit-base-body">
                        <div class="warehouse-info-list">
                            <div class="warehouse-info-row"><span class="warehouse-info-label">退款结果：</span><span class="warehouse-info-value">退款成功</span></div>
                            <div class="warehouse-info-row"><span class="warehouse-info-label">处理说明：</span><span class="warehouse-info-value">本次仅退款申请已处理完成，系统已按最终审核金额原路退回。</span></div>
                            <div class="warehouse-info-row"><span class="warehouse-info-label">退款操作人：</span><span class="warehouse-info-value">${record.refundOperator}</span></div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderSecondRefundAuditCard(record) {
            const secondRefundAmount = record.secondRefundAmount ?? record.amounts?.approved ?? 0;
            const refundNote = record.refundNote || "确认退款后将按退款金额发起退款，请留意到账结果。";
            const refundOperator = record.refundOperator || "待财务处理";
            const refundOperateAt = record.refundOperateAt || record.completeAt || "处理中";
            return `
                <section class="manual-section adjust-theme">
                    <div class="manual-section-title">
                        <div class="manual-section-heading">
                            <span class="manual-section-index">04</span>
                            <span class="manual-section-name">退款记录</span>
                        </div>
                        <span class="manual-section-subtitle">记录商家发起退款的金额、操作人和说明</span>
                    </div>
                    <div class="manual-section-body">
                        <div class="approval-record-panel">
                            <div class="approval-record-head">
                                <div class="approval-record-title">退款记录</div>
                            </div>
                            <div class="approval-record-grid">
                                <div class="approval-record-item"><span class="approval-record-label">退款金额</span><span class="approval-record-value amount-danger">${money(secondRefundAmount)}</span></div>
                                <div class="approval-record-item"><span class="approval-record-label">操作时间</span><span class="approval-record-value">${refundOperateAt}</span></div>
                                <div class="approval-record-item"><span class="approval-record-label">操作人</span><span class="approval-record-value">${refundOperator}</span></div>
                                <div class="approval-record-item full"><span class="approval-record-label">退款说明</span><span class="approval-record-value">${refundNote}</span></div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderResultSummaryCard(record) {
            if (record.completedSource === "reship_only" || record.completedSource === "reship_with_refund") {
                return `
                    <section class="detail-card audit-base-card">
                        <div class="audit-base-header">结果摘要卡</div>
                        <div class="audit-base-body">
                            <div class="warehouse-info-list">
                                <div class="warehouse-info-row"><span class="warehouse-info-label">最终结果：</span><span class="warehouse-info-value">补寄完成</span></div>
                                <div class="warehouse-info-row"><span class="warehouse-info-label">补寄单号：</span><span class="warehouse-info-value">${record.logistics.reshipNo}</span></div>
                                <div class="warehouse-info-row"><span class="warehouse-info-label">发货时间：</span><span class="warehouse-info-value">${record.sendbackAt}</span></div>
                                <div class="warehouse-info-row"><span class="warehouse-info-label">签收结果：</span><span class="warehouse-info-value">${record.logistics.buyerState}</span></div>
                                <div class="warehouse-info-row"><span class="warehouse-info-label">补寄责任方：</span><span class="warehouse-info-value">${record.reshipForm.responsibility || record.currentResponsibility || "商家责任"}（含补寄运费责任）</span></div>
                                ${record.completedSource === "reship_with_refund" ? `<div class="warehouse-info-row"><span class="warehouse-info-label">补充退款金额：</span><span class="warehouse-info-value">${money(record.amounts.actual)}</span></div>` : ""}
                            </div>
                        </div>
                    </section>
                `;
            }
            return `
                <section class="detail-card audit-base-card">
                    <div class="audit-base-header">结果摘要卡</div>
                    <div class="audit-base-body">
                        <div class="warehouse-info-list">
                            <div class="warehouse-info-row"><span class="warehouse-info-label">最终结果：</span><span class="warehouse-info-value">${record.completedSource === "refund_only" ? "退款成功" : "售后完成"}</span></div>
                            <div class="warehouse-info-row"><span class="warehouse-info-label">最终实退金额：</span><span class="warehouse-info-value">${money(record.amounts.actual)}</span></div>
                            <div class="warehouse-info-row"><span class="warehouse-info-label">商品退款：</span><span class="warehouse-info-value">${money(record.amounts.goods)}</span></div>
                            <div class="warehouse-info-row"><span class="warehouse-info-label">运费退款：</span><span class="warehouse-info-value">${money(record.amounts.freightRefund)}</span></div>
                            <div class="warehouse-info-row"><span class="warehouse-info-label">退货运费赔付金额：</span><span class="warehouse-info-value">${money(record.amounts.freightCompensation)}</span></div>
                            <div class="warehouse-info-row"><span class="warehouse-info-label">退款操作人：</span><span class="warehouse-info-value">${record.refundOperator}</span></div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderRefundSettlementCard(record) {
            const sectionIndex = getRefundInfoSectionIndex(record);
            const refundNote = getRefundResultNote(record);
            const financeAdjustment = getFinanceRefundAdjustment(record);
            const refundRows = [
                { channel: "微信原路退回", amount: record.amounts.breakdown.wechat },
                { channel: "积分退回", amount: record.amounts.breakdown.points },
                { channel: "卡金退回", amount: record.amounts.breakdown.card }
            ];
            return `
                <section class="manual-section adjust-theme">
                    <div class="manual-section-title">
                        <div class="manual-section-heading">
                            <span class="manual-section-index">${sectionIndex}</span>
                            <span class="manual-section-name">处理结果</span>
                        </div>
                        <span class="manual-section-subtitle">记录本次处理结果、退款金额、完成时间、操作人和退回明细</span>
                    </div>
                    <div class="manual-section-body">
                        <div class="approval-record-panel">
                            <div class="approval-record-head">
                                <div class="approval-record-title">退款成功</div>
                            </div>
                            <div class="approval-record-grid">
                                <div class="approval-record-item"><span class="approval-record-label">申请退款金额</span><span class="approval-record-value">${money(record.amounts.applied)}</span></div>
                                <div class="approval-record-item"><span class="approval-record-label">一审确认退款金额</span><span class="approval-record-value">${money(record.amounts.approved)}</span></div>
                                <div class="approval-record-item"><span class="approval-record-label">最终实退金额</span><span class="approval-record-value amount-danger">${money(record.amounts.actual)}</span></div>
                                <div class="approval-record-item"><span class="approval-record-label">退款完成时间</span><span class="approval-record-value">${record.completeAt}</span></div>
                                <div class="approval-record-item"><span class="approval-record-label">退款操作人</span><span class="approval-record-value">${record.refundOperator}</span></div>
                                <div class="approval-record-item full"><span class="approval-record-label">退款说明</span><span class="approval-record-value">${refundNote}</span></div>
                                ${financeAdjustment ? `
                                    <div class="approval-record-item full"><span class="approval-record-label">二审退款调额记录</span><span class="approval-record-value">一审确认 ${money(financeAdjustment.before)}，最终实退 <span class="amount-danger">${money(financeAdjustment.after)}</span>，差额 ${money(financeAdjustment.delta)}</span></div>
                                ` : ""}
                            </div>
                            <div class="manual-inline-block" style="margin-top:14px;">
                                <div class="manual-inline-title">
                                    <span>退回明细</span>
                                </div>
                                <table class="manual-sku-table audit-refund-table">
                                    <thead>
                                        <tr>
                                            <th>退回渠道</th>
                                            <th>退回金额</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${refundRows.map((row) => `
                                            <tr>
                                                <td>${row.channel}</td>
                                                <td><span class="audit-refund-amount-view">${money(row.amount)}</span></td>
                                            </tr>
                                        `).join("")}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function getRefundInfoSectionIndex(record) {
            if (record.afterSaleType === "补寄" || record.flowMode === "reship") return "04";
            if (shouldShowReturnAndQualityModules(record)) return "07";
            return "04";
        }

        function getRefundResultNote(record) {
            const financeAdjustment = getFinanceRefundAdjustment(record);
            if (financeAdjustment) return financeAdjustment.reason;
            if (record.refundNote) return record.refundNote;
            if (record.manualAdjustedReason) return `按商家审批调额结果退款：${record.manualAdjustedReason}`;
            return "确认退款后已按最终退款金额发起原路退款，请留意到账结果。";
        }

        function getFinanceRefundAdjustment(record) {
            if (record.refundAdjustment) return record.refundAdjustment;
            const before = Number(record.amounts?.approved || record.amounts?.applied || 0);
            const after = Number(record.amounts?.actual || 0);
            if (before - after <= 0.001) return null;
            return {
                before,
                after,
                delta: Number((before - after).toFixed(2)),
                reason: record.financeAdjustedReason || record.refundNote || "财务退款时按质检/复核结果下调实退金额。"
            };
        }

        function renderFlowBaseInfoCard(record) {
            return `
                <section class="detail-card audit-base-card">
                    <div class="audit-base-header">售后申请基础信息</div>
                    <div class="audit-base-body">
                        <div class="audit-base-grid">
                            <div class="audit-base-item"><span class="label">退款方式:</span><span class="value">${getAuditRefundMode(record)}</span></div>

                            <div class="audit-base-item"><span class="label">订单形态:</span><span class="value">${getOrderSceneDisplay(record.orderScene)}</span></div>
                            <div class="audit-base-item"><span class="label">售后原因:</span><span class="value">${record.reason}</span></div>
                            <div class="audit-base-item full"><span class="label">申请说明:</span><span class="value">${record.note}<div style="margin-top:10px;">${renderAuditProofGallery(record)}</div></span></div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderFlowStatusCard(record) {
            const lines = record.specialSection.lines.map((line) => `
                <div class="warehouse-info-row">
                    <span class="warehouse-info-value">${line}</span>
                </div>
            `).join("");
            return `
                <section class="detail-card audit-base-card">
                    <div class="audit-base-header">${record.specialSection.title}</div>
                    <div class="audit-base-body">
                        <div class="warehouse-info-list">
                            ${lines}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderFlowAmountCard(record) {
            return `
                <section class="detail-card audit-base-card">
                    <div class="audit-base-header">金额信息</div>

        function renderDrawerFooter(record) {
            const actions = record.availableActions;
            const footer = document.getElementById("drawer-footer");
            const drawerBody = document.getElementById("drawer-body");
            if (record.statusKey === "buyer_receipt") {
                footer.classList.add("hidden");
                footer.innerHTML = "";
                drawerBody.classList.remove("dimmed");
                return;
            }
            if (!actions.length) {
                footer.classList.add("hidden");
                footer.innerHTML = "";
                drawerBody.classList.remove("dimmed");
                return;
            }

            footer.classList.remove("hidden");
            if (record.statusKey === "audit") {
                footer.innerHTML = renderAuditFooter(record);
                drawerBody.classList.remove("dimmed");
                bindDrawerFooterEvents(record);
                return;
            }
            footer.innerHTML = `
                <div class="action-switcher">
                    ${actions.map((actionKey, index) => `
                        <button class="btn ${resolveDrawerActionStyle(actionKey, index)} drawer-action-button" type="button" data-action-switch="${actionKey}">${actionLabel(actionKey, record)}</button>
                    `).join("")}
                </div>
            `;

            drawerBody.classList.remove("dimmed");
            bindDrawerFooterEvents(record);
        }

        function resolveDrawerActionStyle(actionKey, index) {
            const forcedPrimaryActions = ["execute_refund", "retry_refund", "fill_reship_logistics"];
            const forcedGhostActions = ["reject_refund", "revoke_reship"];
            if (forcedPrimaryActions.includes(actionKey)) return "primary";
            if (forcedGhostActions.includes(actionKey)) return "ghost";
            return index === 0 ? "primary" : "ghost";
        }

        function bindDrawerFooterEvents(record) {
            document.querySelectorAll("[data-action-switch]").forEach((button) => {
                button.addEventListener("click", () => {
                    const actionKey = button.dataset.actionSwitch;
                    openCenterModal(actionKey, record);
                });
            });
            document.querySelectorAll("[data-toggle-back-timeline]").forEach((button) => {
                button.addEventListener("click", () => {
                    const id = button.dataset.toggleBackTimeline;
                    state.expandedLogistics[id] = !state.expandedLogistics[id];
                    if (state.activeRecord && state.activeRecord.id === id) {
                        renderDrawerBody(state.activeRecord);
                        renderDrawerFooter(state.activeRecord);
                    }
                });
            });
            document.querySelectorAll("[data-quick-adjust-reason]").forEach((button) => {
                button.addEventListener("click", () => {
                    const input = document.querySelector("[data-approve-adjust-reason]");
                    if (!input) return;
                    input.value = button.dataset.quickAdjustReason || "";
                    input.focus();
                });
            });
            document.querySelectorAll("[data-adjust-toggle]").forEach((toggle) => {
                const panel = document.querySelector("[data-adjust-panel]");
                const section = document.querySelector("[data-adjust-section]");
                const chip = document.querySelector("[data-approve-adjust-chip]");
                const label = document.querySelector("[data-approve-adjust-state-label]");
                const approvalIndex = document.querySelector("[data-approve-approval-index]");
                const syncPanel = () => {
                    if (section) section.classList.toggle("hidden", !toggle.checked);
                    if (panel) panel.classList.toggle("show", toggle.checked);
                    if (chip) chip.classList.toggle("is-on", toggle.checked);
                    if (label) label.textContent = toggle.checked ? "已开启调额" : "开启调额";
                    if (approvalIndex) approvalIndex.textContent = toggle.checked ? "03" : "02";
                };
                toggle.addEventListener("change", syncPanel);
                syncPanel();
            });
            document.querySelectorAll("[data-subsidy-toggle]").forEach((toggle) => {
                const panel = document.querySelector("[data-subsidy-panel]");
                const syncPanel = () => panel && panel.classList.toggle("show", toggle.checked);
                toggle.addEventListener("change", syncPanel);
                syncPanel();
            });
        }

                openRefundModal(record, actionKey);

        function getAuditDetailAdjustmentDraft() {
            const drawerBody = document.getElementById("drawer-body");
            const inputs = Array.from(drawerBody.querySelectorAll("[data-audit-refund-line]"));
            const goodsRefund = Number(inputs
                .filter(input => input.dataset.refundKind !== "freight")
                .reduce((sum, input) => sum + getRefundInputAmount(input), 0)
                .toFixed(2));
            const freightRefund = Number(inputs
                .filter(input => input.dataset.refundKind === "freight")
                .reduce((sum, input) => sum + getRefundInputAmount(input), 0)
                .toFixed(2));
            const totalRefund = Number((goodsRefund + freightRefund).toFixed(2));
            const adjusted = inputs.some(input => Math.abs(getRefundInputAmount(input) - getRefundInputDefault(input)) > 0.001);
            const amountIncreased = inputs.some(input => (Number(input.value) || 0) - getRefundInputDefault(input) > 0.001);
            const reason = drawerBody.querySelector("[data-audit-adjust-reason]")?.value.trim() || "";
            const remark = drawerBody.querySelector("[data-audit-adjust-remark]")?.value.trim() || "";
            const proofInput = drawerBody.querySelector("[data-audit-adjust-proof]");
            const proofCount = proofInput?.files?.length || 0;
            return { adjusted, amountIncreased, goodsRefund, freightRefund, totalRefund, reason, remark, proofCount };
        }

        function validateAuditDetailAdjustment() {
            const draft = getAuditDetailAdjustmentDraft();
            if (draft.amountIncreased) {
                showToast("审核退款金额只能下调，不能高于默认退款金额");
                return false;
            }
            if (!draft.adjusted) return true;
            if (!draft.reason) {
                showToast("已调整退款金额，请填写调额原因");
                return false;
            }
            if (!draft.remark) {
                showToast("已调整退款金额，请填写调额备注");
                return false;
            }
            if (!draft.proofCount) {
                showToast("已调整退款金额，请上传调额凭证");
                return false;
            }
            return true;
        }

        function applyAuditDetailAdjustmentToRecord(record) {
            const draft = getAuditDetailAdjustmentDraft();
            if (!draft.adjusted) return;
            record.amounts.applied = draft.totalRefund;
            record.amounts.approved = draft.totalRefund;
            record.amounts.goods = draft.goodsRefund;
            record.amounts.freightRefund = draft.freightRefund;
            record.adjusted = true;
            record.manualAdjustedReason = `${draft.reason}：${draft.remark}；凭证 ${draft.proofCount} 张。`;
            record.adjustProofImages = buildAdjustProofImages(2);
            record.auditRemark = `调额审核：${record.manualAdjustedReason}`;
            record.logs.unshift({
                time: "2026-05-29 10:14",
                text: `商家客服调整退款金额为 ${money(draft.totalRefund)}，调额原因：${draft.reason}；备注：${draft.remark}；凭证 ${draft.proofCount} 张。`
            });
        }

                record.refundOperator = "系统自动退款";
                record.completedSource = "refund_only";

                record.secondRefundAmount = record.amounts.approved;
