        }

        function applyRefundProcessingTransition(record, amount, isRetry, refundNote = "") {
            const previousApprovedAmount = Number(record.amounts.approved || record.amounts.applied || 0);
            const maxRefundAmount = Math.min(Number(record.amounts.maxRefund || previousApprovedAmount), Number(record.amounts.applied || previousApprovedAmount));
            const safeAmount = Math.max(0, Math.min(Number(amount) || previousApprovedAmount, maxRefundAmount));
            record.amounts.approved = safeAmount;
            record.secondRefundAmount = safeAmount;
            record.refundNote = refundNote || (isRetry ? "本次为退款失败后的重新触发，请关注渠道回执。" : "确认退款后将按调整后金额发起退款，请留意到账结果。");
            if (previousApprovedAmount - safeAmount > 0.001) {
                record.refundAdjustment = {
                    before: previousApprovedAmount,
                    after: safeAmount,
                    delta: Number((previousApprovedAmount - safeAmount).toFixed(2)),
                    qualityResult: shouldShowReturnAndQualityModules(record) ? record.qualityResult : "",
                    reason: record.refundNote
                };
            }
            record.refundOperator = record.refundOperator || "商家客服王静";
            record.refundOperateAt = "2026-05-29 11:18";
            record.statusKey = "refunding";
            record.label = statusConfigs.refunding.label;
            record.mainStatus = statusConfigs.refunding.mainStatus;
            record.finalResult = statusConfigs.refunding.mainStatus;
            record.countdown = chooseCountdown("refunding", 1);
            record.availableActions = resolveAvailableActions(record);
            record.issueTag = isRetry ? "已重新发起退款" : record.issueTag;
            record.logs.unshift({
                time: record.refundOperateAt,
                text: `${isRetry ? "商家客服重新发起退款" : "商家客服确认操作退款"}，最终实退金额 ${money(safeAmount)}。`
            });
            renderStatusTabs();
            renderTable();
            renderDrawer(record);
            showToast(isRetry ? `已按 ${money(safeAmount)} 发起重新退款` : `已按 ${money(safeAmount)} 发起退款`);
        }

        function inferReshipCompanyByNo(expressNo = "") {
            const no = String(expressNo || "").trim().toUpperCase();
            if (!no) return "";
            if (no.startsWith("SF")) return "顺丰速运";
            if (no.startsWith("YT")) return "圆通速递";
            if (no.startsWith("JD") || no.startsWith("JDX")) return "京东物流";
            if (no.startsWith("STO")) return "申通快递";
            if (no.startsWith("YTO")) return "圆通速递";
            if (no.startsWith("YD")) return "韵达快递";
            if (no.startsWith("ZTO")) return "中通快递";
            return "待识别";
        }

                            row.missingQty = 0;
                            row.pollutedQty = 0;
                        });
                    } else {
                        draft.itemRows.forEach(row => {
                            row.receivedQty = null;
                            row.goodQty = null;
                            row.abnormalQty = null;
                            row.damagedQty = 0;
                            row.missingQty = 0;
                            row.pollutedQty = 0;
                        });
                    }
                    renderQualityCheckModal(record);
                });
            });

            const draft = state.qualityModalDraft;
            draft.itemRows.forEach((row, idx) => {
                const receivedInput = qualityModalOverlay.querySelector(`[data-qc-received="${idx}"]`);
                const goodInput = qualityModalOverlay.querySelector(`[data-qc-good="${idx}"]`);
                const abnormalInput = qualityModalOverlay.querySelector(`[data-qc-abnormal="${idx}"]`);

                [receivedInput, goodInput, abnormalInput].forEach(inp => {
                    if (inp) inp.addEventListener("input", () => {
                        row.receivedQty = receivedInput.value === "" ? null : Math.max(0, Math.min(row.applyQty, Number(receivedInput.value) || 0));
                        row.goodQty = goodInput.value === "" ? null : Math.max(0, Math.min(row.applyQty, Number(goodInput.value) || 0));
                        row.abnormalQty = abnormalInput.value === "" ? null : Math.max(0, Math.min(row.applyQty, Number(abnormalInput.value) || 0));
                        row.damagedQty = 0;
                        row.missingQty = 0;
                        row.pollutedQty = 0;
                    });
                });
            });

            const noteInput = qualityModalOverlay.querySelector("[data-quality-note]");
            if (noteInput) {
                noteInput.addEventListener("input", () => {
                    state.qualityModalDraft.note = noteInput.value;

        function applyQualityCheck(record) {
            const draft = state.qualityModalDraft || { mode: "good", note: "", images: [], itemRows: [] };

            // Validate item row quantities
            for (let i = 0; i < draft.itemRows.length; i++) {
                const row = draft.itemRows[i];
                const receivedQty = Number(row.receivedQty);
                const goodQty = Number(row.goodQty);
                const abnormalQty = Number(row.abnormalQty);
                if ([row.receivedQty, row.goodQty, row.abnormalQty].some(value => value === null || value === undefined || value === "")) {
                    showToast(`${row.name}：请填写本次签收、完好入库和异常数量`);
                    return;
                }
                if ([receivedQty, goodQty, abnormalQty].some(value => !Number.isFinite(value) || value < 0)) {
                    showToast(`${row.name}：本次签收、完好入库和异常数量必须大于等于0`);
                    return;
                }
                const totalAssigned = receivedQty + goodQty + abnormalQty;
                if (totalAssigned !== row.applyQty) {
                    showToast(`${row.name}：本次签收+完好入库+异常数量必须等于申请数${row.applyQty}`);
                    return;
                }
            }

            if (draft.mode === "issue") {
                if (!draft.note.trim()) {
                    showToast("请填写异常说明");
                    return;
                }
                if (!draft.images.length) {
                    showToast("请上传异常图片凭证");
                    return;
                }
            }

            // Calculate totals
            const totalGood = draft.itemRows.reduce((s, r) => s + Number(r.goodQty || 0), 0);
            const totalAbnormal = draft.itemRows.reduce((s, r) => s + Number(r.abnormalQty || 0), 0);

            record.statusKey = "received";
            record.label = statusConfigs.received.label;
            record.mainStatus = statusConfigs.received.mainStatus;
            record.finalResult = statusConfigs.received.mainStatus;
            record.countdown = chooseCountdown("received", 1);
            record.receiveAt = "2026-05-29 14:36";
            record.receiveOperator = record.receiveOperator || "仓库李娜";

            // Store detailed quality inspection results
            record.qualityResult = draft.mode === "good" ? "全部完好" : (totalGood > 0 ? "部分异常" : "全部异常");
            record.qualityNote = draft.mode === "good" ? "" : draft.note.trim();
            record.qualityProofImages = draft.mode === "good" ? [] : draft.images.slice(0, 3);
            record.qualityAbnormalType = "";
            record.qualityItemRows = draft.itemRows.map(r => ({
                ...r,
                receivedQty: Number(r.receivedQty || 0),
                goodQty: Number(r.goodQty || 0),
                abnormalQty: Number(r.abnormalQty || 0),
                damagedQty: 0,
                missingQty: 0,
                pollutedQty: 0
            }));
            record.qualitySummary = {
                totalGood,
                totalDamaged: 0,
                totalMissing: 0,
                totalPolluted: 0,
                totalAbnormal,
                result: draft.mode === "good" ? "退货入库" : (totalGood > 0 ? "部分退货入库" : "只记录异常不入库")
            };

            record.availableActions = resolveAvailableActions(record);

            // Build log text
            let logText = "";
            if (draft.mode === "good") {
                logText = `仓库已完成签收质检：全部完好(${totalGood}件)，已生成退货入库记录并回补可售库存，售后单流转至待商家退款。`;
            } else {
                logText = `仓库已完成签收质检：完好入库${totalGood}件、异常${totalAbnormal}件`;
                logText += `。${totalGood > 0 ? "完好部分已退货入库，" : ""}异常部分仅记录不入库，售后单流转至待商家退款。`;
            }

            record.logs.unshift({
                time: "2026-05-29 14:36",
                text: logText
            });
            closeQualityCheckModal();
            renderStatusTabs();
            renderTable();
            renderDrawer(record);
            showToast("已完成签收质检，售后单已流转到待商家退款");
        }

        function bindRefundModalEvents(record) {
            refundModalOverlay.querySelectorAll("[data-close-refund-modal]").forEach((button) => {
                button.addEventListener("click", closeRefundModal);
            });

            const items = record.items || [];
            const freightRefund = record.amounts.freightRefund || 0;
            const originalGoodsTotal = items.reduce((sum, item) => sum + item.qty * item.unitPrice, 0);
            const firstAuditGoodsTotal = Number(record.amounts?.goods ?? originalGoodsTotal);
            const fixedRefundTotal = Number((firstAuditGoodsTotal + freightRefund).toFixed(2));
            const breakdown = record.amounts.breakdown || { wechat: 0, card: 0, points: 0 };
            const breakdownTotal = breakdown.wechat + breakdown.card + breakdown.points;
            const totalDisplay = refundModalOverlay.querySelector("[data-refund-total-display]");
            const breakdownContent = refundModalOverlay.querySelector("[data-refund-breakdown-content]");
            const footerTotal = refundModalOverlay.querySelector("[data-refund-footer-total]");
            const footerSub = refundModalOverlay.querySelector("[data-refund-footer-sub]");

            function recalcTotal() {
                let goodsSum = 0;
                items.forEach((item, idx) => {
                    const inp = refundModalOverlay.querySelector(`[data-refund-item-amount="${idx}"]`);
                    if (inp) {
                        clampRefundInput(inp);
                        goodsSum += Math.max(0, Number(inp.value) || 0);
                    }
                });
                if (!refundModalOverlay.querySelector("[data-refund-item-amount]")) {
                    goodsSum = firstAuditGoodsTotal;
                }
                let freightSum = 0;
                if (freightRefund > 0) {
                    const freightInp = refundModalOverlay.querySelector("[data-refund-freight-amount]");
                    if (freightInp) {
                        clampRefundInput(freightInp);
                        freightSum += Math.max(0, Number(freightInp.value) || 0);
                    } else {
                        freightSum += freightRefund;
                    }
                }
                const sum = Number((goodsSum + freightSum).toFixed(2));
                if (totalDisplay) totalDisplay.textContent = `￥${sum.toFixed(2)}`;
                if (footerTotal) {
                    footerTotal.innerHTML = `从 <span class="refund-before">￥${fixedRefundTotal.toFixed(2)}</span> 调为 <span class="refund-after">￥${sum.toFixed(2)}</span>`;
                }
                if (footerSub) {
                    footerSub.textContent = freightRefund > 0
                        ? `含产品 ￥${goodsSum.toFixed(2)}，邮费 ￥${freightSum.toFixed(2)}`
                        : "";
                    footerSub.style.display = freightRefund > 0 ? "" : "none";
                }

                // Auto-distribute breakdown proportionally
                if (breakdownContent && breakdownTotal > 0) {
                    const ratio = sum / breakdownTotal;
                    const wechatPart = Math.min(breakdown.wechat, (breakdown.wechat * ratio)).toFixed(2);
                    const cardPart = Math.min(breakdown.card, (breakdown.card * ratio)).toFixed(2);
                    const pointsPart = Math.round(Math.min(breakdown.points, breakdown.points * ratio));
                    const parts = [];
                    if (breakdown.wechat > 0) parts.push(`微信退 <strong>￥${wechatPart}</strong>`);
                    if (breakdown.card > 0) parts.push(`卡金退 <strong>￥${cardPart}</strong>`);
                    if (breakdown.points > 0) parts.push(`积分退 <strong>${pointsPart}</strong>`);
                    breakdownContent.innerHTML = parts.join("　｜　");
                }

                return sum;
            }

            // Bind input events for live recalculation
            items.forEach((item, idx) => {
                const inp = refundModalOverlay.querySelector(`[data-refund-item-amount="${idx}"]`);
                if (inp) inp.addEventListener("input", recalcTotal);
            });
            if (freightRefund > 0) {
                const freightInp = refundModalOverlay.querySelector("[data-refund-freight-amount]");
                if (freightInp) freightInp.addEventListener("input", recalcTotal);
            }

            // Initial calculation
            recalcTotal();

            const confirmButton = refundModalOverlay.querySelector("[data-confirm-refund-modal]");
            if (confirmButton) {
                confirmButton.addEventListener("click", () => {
                    const amount = recalcTotal();
                    const increasedInput = Array.from(refundModalOverlay.querySelectorAll("[data-default-refund]")).find((input) => {
                        return (Number(input.value) || 0) - getRefundInputDefault(input) > 0.001;
                    });
                    if (increasedInput) {
                        showToast("二审确认退款金额只能下调，不能高于一审退款金额");
                        increasedInput.focus();
                        return;
                    }
                    if (amount > fixedRefundTotal) {
                        showToast(`二审确认退款金额 ${money(amount)} 不能高于一审退款金额 ${money(fixedRefundTotal)}`);
                        return;
                    }
                    const isRetry = confirmButton.dataset.confirmRefundModal === "retry_refund";
                    const noteInput = refundModalOverlay.querySelector("[data-refund-note]");
                    const refundNote = noteInput ? noteInput.value.trim() : "";
                    closeRefundModal();
                    applyRefundProcessingTransition(record, amount, isRetry, refundNote);
                });
            }
        }

        function getApproveScenario(record) {
            const isShipping = isShippingScene(record.orderScene);
            const fulfillmentStatus = getApplyFulfillmentStatus(record);
            const isRefundOnly = record.afterSaleType === "仅退款";
            const isReturn = isShipping && record.afterSaleType === "退款退货";
            const isShippedRefundOnly = isShipping && isRefundOnly && fulfillmentStatus === "已发货";
            const isPendingShipmentRefundOnly = isShipping && isRefundOnly && fulfillmentStatus !== "已发货";
            const canAdjust = isShipping && (isRefundOnly || isReturn);
            const showResponsibility = isReturn || isShippedRefundOnly;
            const showFreightBearer = isReturn;
            const showSubsidy = isReturn;
            const nextStatus = !isShipping
                ? "进入待退款"
                : (isReturn ? "等待买家寄回" : "进入退款处理");
            const sceneLabel = !isShipping
                ? "非物流全额仅退款"
                : `${fulfillmentStatus}${record.afterSaleType}`;
            const amountNote = !isShipping
                ? "非物流订单默认按申请金额审批通过，不展开商品明细。"
                : (isPendingShipmentRefundOnly
                    ? "不调额时默认按申请金额审批通过；如需调整，可按 SKU 和运费项处理。"
                    : "不调额时默认按申请金额审批通过；如需调整，请开启调额后处理。");
            return {
                isShipping,
                fulfillmentStatus,
                isRefundOnly,
                isReturn,
                isPendingShipmentRefundOnly,
                isShippedRefundOnly,
                canAdjust,
                showResponsibility,
                showFreightBearer,
                showSubsidy,
                nextStatus,
                sceneLabel,
                amountNote
            };
        }

        function renderApproveSceneStrip(record, scenario) {
            return `

            const canAdjust = !!options.canAdjust;
            const scenario = options.scenario || getApproveScenario(record);
            const toggleAttr = options.panelMode ? "data-adjust-toggle" : "data-approve-adjust-toggle";
            return `

        function renderApproveAdjustSection(record, options = {}) {
            const canAdjust = !!options.canAdjust;

            const panelAttr = options.panelMode ? "data-adjust-panel" : "data-approve-adjust-panel";
            const sectionAttr = options.panelMode ? "data-adjust-section" : "data-approve-adjust-section";

            return `
                <section class="manual-section adjust-theme approve-adjust-section hidden" ${sectionAttr}>

        function renderApproveSections(record, options = {}) {
            const scenario = getApproveScenario(record);
            return `

        function renderApproveActionNote(record) {
            const scenario = getApproveScenario(record);
            if (!scenario.canAdjust && !scenario.showResponsibility) {
                return "提交后将记录审批结果、最终审批退款金额和审批备注。";
            }
            const parts = ["审批结果", "最终审批退款金额"];
            if (scenario.showResponsibility) parts.push("责任方信息");
            if (scenario.canAdjust) parts.push("调额信息");
            return `提交后将记录${parts.join("、")}。`;
        }

        function getApproveModalDraft(record) {
            const adjusted = !!(actionModalOverlay.querySelector("[data-approve-adjust-toggle]") || actionModalOverlay.querySelector("[data-adjust-toggle]"))?.checked;
            const inputs = Array.from(actionModalOverlay.querySelectorAll("[data-approve-refund-line]"));
            const amountExceededMax = adjusted && inputs.some((input) => {
                const currentRefund = Number(input.value) || 0;
                return currentRefund - getRefundInputMax(input) > 0.001;
            });
            const amountChanged = adjusted && inputs.some((input) => {
                return Math.abs(getRefundInputAmount(input) - getRefundInputDefault(input)) > 0.001;
            });
            const maxTotalRefund = adjusted
                ? Number(inputs.reduce((sum, input) => sum + getRefundInputMax(input), 0).toFixed(2))
                : Number(record.amounts?.maxRefund || record.amounts?.applied || 0);
            const goodsRefund = adjusted
                ? Number(inputs.filter(input => input.dataset.refundKind !== "freight").reduce((sum, input) => sum + getRefundInputAmount(input), 0).toFixed(2))
                : Number(record.amounts?.goods || Math.max(0, (record.amounts?.applied || 0) - (record.amounts?.freightRefund || 0)));
            const freightRefund = adjusted
                ? Number(inputs.filter(input => input.dataset.refundKind === "freight").reduce((sum, input) => sum + getRefundInputAmount(input), 0).toFixed(2))
                : Number(record.amounts?.freightRefund || 0);
            const totalRefund = Number((goodsRefund + freightRefund).toFixed(2));
            const reason = actionModalOverlay.querySelector("[data-approve-adjust-reason]")?.value.trim() || "";
            const proofInput = actionModalOverlay.querySelector("[data-approve-adjust-proof]");
            const proofCount = proofInput?.files?.length || 0;
            const responsibility = actionModalOverlay.querySelector("[data-approve-responsibility]")?.value || record.currentResponsibility;
            const freightBearer = actionModalOverlay.querySelector("[data-approve-freight-bearer]")?.value || record.currentFreightBearer;
            const approvalRemark = actionModalOverlay.querySelector("[data-approve-remark]")?.value.trim() || "";
            const subsidyEnabled = !!actionModalOverlay.querySelector("[data-approve-subsidy-toggle]")?.checked;
            const subsidyAmount = subsidyEnabled ? Math.max(0, Number(actionModalOverlay.querySelector("[data-approve-subsidy-amount]")?.value) || 0) : 0;
            return { adjusted, amountChanged, amountExceededMax, maxTotalRefund, goodsRefund, freightRefund, totalRefund, reason, proofCount, responsibility, freightBearer, approvalRemark, subsidyEnabled, subsidyAmount };
        }

        function validateApproveModalDraft(record) {
            const draft = getApproveModalDraft(record);
            if (!draft.approvalRemark) {
                showToast("请填写审批备注");
                return false;
            }
            if (draft.totalRefund > Number(draft.maxTotalRefund || draft.totalRefund)) {
                showToast(`审批退款金额 ${money(draft.totalRefund)} 超过最大可退 ${money(draft.maxTotalRefund)}`);
                return false;
            }
            if (getApproveScenario(record).showSubsidy && draft.subsidyEnabled && draft.subsidyAmount <= 0) {
                showToast("已开启退回运费补贴记录，请填写补贴金额");
                return false;
            }
            if (!draft.adjusted) return true;
            if (draft.amountExceededMax) {
                showToast("审批退款金额不能超过单项最大可退金额");
                return false;
            }
            if (!draft.amountChanged) {
                showToast("已开启调额，请至少调整一项商品或运费金额");
                return false;
            }
            if (!draft.reason) {
                showToast("已开启调额，请填写调额原因");
                return false;
            }
            if (!draft.proofCount) {
                showToast("已开启调额，请上传调额凭证");
                return false;
            }
            return true;
        }

        function applyApproveModalDraftToRecord(record) {
            const draft = getApproveModalDraft(record);
            record.currentResponsibility = draft.responsibility;
            record.currentFreightBearer = draft.freightBearer;
            record.auditRemark = `审批备注：${draft.approvalRemark}`;
            record.approvalReason = draft.approvalRemark;
            if (record.afterSaleType === "退款退货") {
                record.amounts.freightCompensation = draft.subsidyEnabled ? draft.subsidyAmount : 0;
                record.compensationBasis = draft.subsidyEnabled ? "审批时记录退回运费补贴，仅作台账记录，不随单退回。" : "暂无赔付记录";
            }
            if (!draft.adjusted || !draft.amountChanged) return;
            const originalAmount = Number(record.amounts?.applied || 0);
            record.amounts.applied = draft.totalRefund;
            record.amounts.approved = draft.totalRefund;
            record.amounts.goods = draft.goodsRefund;
            record.amounts.freightRefund = draft.freightRefund;
            record.adjusted = true;
            record.manualAdjustedReason = `${draft.reason}；凭证 ${draft.proofCount} 张。`;
            record.adjustProofImages = buildAdjustProofImages(2);
            record.auditRemark = `审批备注：${draft.approvalRemark}；调额审核：${record.manualAdjustedReason}`;
            record.logs.unshift({
                time: "2026-05-29 10:14",
                text: `商家客服同意申请，审批退款金额由 ${money(originalAmount)} 调整为 ${money(draft.totalRefund)}，调额原因：${draft.reason}；凭证 ${draft.proofCount} 张。`
            });
        }

        function bindActionModalEvents(actionKey, record) {
            actionModalOverlay.querySelectorAll("[data-close-action-modal]").forEach((button) => {
                button.addEventListener("click", closeActionModal);
            });
            actionModalOverlay.querySelectorAll("[data-action-toast]").forEach((button) => {
                button.addEventListener("click", () => {
                    const message = button.dataset.actionToast;
                    closeActionModal();
                    showToast(message);
                });
            });
            const reshipButton = actionModalOverlay.querySelector("[data-confirm-action-reship]");
            if (reshipButton) {
                reshipButton.addEventListener("click", () => {
                    closeActionModal();
                    applyReshipTransition(record);
                });
            }
            const rejectButton = actionModalOverlay.querySelector("[data-confirm-action-reject]");
            if (rejectButton) {
                rejectButton.addEventListener("click", () => {
                    applyRejectApplicationTransition(record);
                    closeActionModal();
                });
            }
            const rejectRefundButton = actionModalOverlay.querySelector("[data-confirm-reject-refund]");
            if (rejectRefundButton) {
                rejectRefundButton.addEventListener("click", () => {
                    applyRejectRefundTransition(record);
                    closeActionModal();
                });
            }
            const approveButton = actionModalOverlay.querySelector("[data-confirm-action-approve]");
            if (approveButton) {
                approveButton.addEventListener("click", () => {
                    if (record.statusKey === "audit" && isShippingScene(record.orderScene)) {
                        if (!validateApproveModalDraft(record)) return;
                        applyApproveModalDraftToRecord(record);
                    } else if (record.statusKey === "audit") {
                        applyApproveModalDraftToRecord(record);
                    }
                    applyApproveApplicationTransition(record);
                    closeActionModal();
                });
            }
            const revokeReshipButton = actionModalOverlay.querySelector("[data-confirm-revoke-reship]");
            if (revokeReshipButton) {
                revokeReshipButton.addEventListener("click", () => {
                    applyRevokeReship(record);
                    closeActionModal();
                });
            }
            actionModalOverlay.querySelectorAll("[data-quick-adjust-reason]").forEach((button) => {
                button.addEventListener("click", () => {
                    const input = actionModalOverlay.querySelector("[data-approve-adjust-reason]");
                    if (!input) return;
                    input.value = button.dataset.quickAdjustReason || "";
                    input.focus();
                });
            });
            actionModalOverlay.querySelectorAll("[data-approve-adjust-toggle]").forEach((toggle) => {
                const panel = actionModalOverlay.querySelector("[data-approve-adjust-panel]");
                const section = actionModalOverlay.querySelector("[data-approve-adjust-section]");
                const inputs = Array.from(actionModalOverlay.querySelectorAll("[data-approve-refund-line]"));
                const goodsNode = actionModalOverlay.querySelector("[data-approve-goods-refund-amount]");
                const freightNode = actionModalOverlay.querySelector("[data-approve-freight-refund-amount]");
                const totalNode = actionModalOverlay.querySelector("[data-approve-total-refund-amount]");
                const totalView = actionModalOverlay.querySelector("[data-approve-total-refund-view]");
                const changeNote = actionModalOverlay.querySelector("[data-approve-adjust-change-note]");
                const chip = actionModalOverlay.querySelector("[data-approve-adjust-chip]");
                const label = actionModalOverlay.querySelector("[data-approve-adjust-state-label]");
                const approvalIndex = actionModalOverlay.querySelector("[data-approve-approval-index]");
                const recalc = () => {
                    inputs.forEach(clampRefundInput);
                    const draft = getApproveModalDraft(record);
                    const defaultTotal = Number(inputs.reduce((sum, input) => sum + getRefundInputDefault(input), 0).toFixed(2));
                    if (goodsNode) goodsNode.textContent = money(draft.goodsRefund);
                    if (freightNode) freightNode.textContent = money(draft.freightRefund);
                    if (totalNode) totalNode.textContent = money(draft.totalRefund);
                    if (totalView) {
                        if ("value" in totalView) totalView.value = money(draft.totalRefund);
                        else totalView.textContent = money(draft.totalRefund);
                    }
                    if (changeNote) {
                        changeNote.classList.toggle("hidden", !draft.amountChanged);
                        changeNote.innerHTML = draft.amountChanged
                            ? `审批退款金额由 <strong>${money(defaultTotal)}</strong> 调整为 <strong class="changed">${money(draft.totalRefund)}</strong>`
                            : "";
                    }
                };
                const syncPanel = () => {
                    if (section) section.classList.toggle("hidden", !toggle.checked);
                    if (panel) panel.classList.toggle("show", toggle.checked);
                    if (chip) chip.classList.toggle("is-on", toggle.checked);
                    if (label) label.textContent = toggle.checked ? "已开启调额" : "开启调额";
                    if (approvalIndex) approvalIndex.textContent = toggle.checked ? "03" : "02";
                    recalc();
                };
                toggle.addEventListener("change", syncPanel);
                inputs.forEach(input => input.addEventListener("input", recalc));
                syncPanel();
            });
            actionModalOverlay.querySelectorAll("[data-approve-subsidy-toggle]").forEach((toggle) => {
                const panel = actionModalOverlay.querySelector("[data-approve-subsidy-panel]");
                const syncPanel = () => panel && panel.classList.toggle("show", toggle.checked);
                toggle.addEventListener("change", syncPanel);
                syncPanel();
            });
        }

            actionModalOverlay.classList.remove("show");

            actionModalOverlay.innerHTML = "";

                            <div class="field full multiline"><label>重试说明</label><input value="本次为退款失败后的重新触发，请关注渠道回执与分账回退结果"></div>
                        </div>
                        <div class="action-note">默认调整后退款金额等于上一状态传入的退款金额；如需调额，只能下调，不能高于当前退款金额 ${money(record.amounts.approved)}。</div>
                        <div class="btn-group" style="margin-top:12px;"><button class="btn primary" data-confirm-retry-refund>确认重新退款</button></div>
                    </div>
                `,
                create_reship: `
                    <div class="action-panel">
                        <h5>补寄发货处理</h5>
                        <div class="action-form-grid">
                            <div class="field"><label>补寄原因</label><input value="${record.reason}"></div>
                            <div class="field"><label>补寄责任方</label><input value="${record.currentResponsibility}"></div>
                            <div class="field"><label>补寄商品</label><input value="${record.items.map(item => `${item.name} x${item.qty}`).join(" / ")}"></div>
                            <div class="field"><label>补寄货值成本</label><input value="${money(record.reshipCost)}"></div>
                            <div class="field"><label>出库仓</label><input value="${record.logistics.warehouseName}"></div>
                            <div class="field"><label>补发运费承担方</label><input value="${record.currentFreightBearer}"></div>
                            <div class="field full multiline"><label>给仓库处理说明</label><input value="请按补寄明细尽快发货，发货后同步物流信息"></div>
                        </div>
                        <div class="btn-group" style="margin-top:12px;"><button class="btn primary" data-demo-submit="已展示“补寄发货处理”抽屉">确认推送仓库</button></div>
                    </div>
                `,
                
            };
            const panel = actionPanels[actionKey] || "";
            return panel.replace('<div class="action-panel">', '<div class="action-panel"><button class="action-panel-close" data-close-action-panel>×</button>');
        }

        function closeDrawer() {
            drawerOverlay.classList.remove("show");
            drawer.classList.remove("show");
            state.activeRecord = null;
            state.activeAction = "";
        }

        function updateImagePreview() {
            const images = state.imagePreview.images;
            const total = images.length;
            const index = Math.max(0, Math.min(state.imagePreview.index, total - 1));
            state.imagePreview.index = index;
            imagePreviewImg.src = total ? images[index] : "";
            imagePreviewCount.textContent = total ? `${index + 1} / ${total}` : "0 / 0";
            imagePreviewPrev.disabled = total <= 1 || index === 0;
            imagePreviewNext.disabled = total <= 1 || index === total - 1;
        }

        function openImagePreview(images, index = 0) {
            const list = Array.isArray(images) ? images.filter(Boolean) : [images].filter(Boolean);
            state.imagePreview.images = list;
            state.imagePreview.index = index;
            updateImagePreview();
            imagePreviewOverlay.classList.add("show");
        }

        function closeImagePreview() {
            imagePreviewOverlay.classList.remove("show");
            imagePreviewImg.src = "";
            state.imagePreview.images = [];
            state.imagePreview.index = 0;
        }

        function shiftImagePreview(step) {
            const total = state.imagePreview.images.length;
            if (!total) return;
            state.imagePreview.index = Math.max(0, Math.min(state.imagePreview.index + step, total - 1));
            updateImagePreview();
        }

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 1800);
        }

        function renderStoreFilterOptions() {
            const select = document.getElementById("store-filter");
            const options = ['<option value="">全部门店</option>']
                .concat(storeCatalog.map(item => `<option value="${item.store}">${item.store}</option>`));
            select.innerHTML = options.join("");
        }

        function syncScopeFilterUI() {
            const scopeInput = document.getElementById("scope-filter");
            const storeFilter = document.getElementById("store-filter");
            const storeFilterField = document.getElementById("store-filter-field");
            scopeInput.value = state.filters.scope;
            document.querySelectorAll("[data-scope-tab]").forEach((button) => {
                const isActive = button.dataset.scopeTab === state.filters.scope;
                button.classList.toggle("active", isActive);
                button.setAttribute("aria-selected", isActive ? "true" : "false");
            });
            if (state.filters.scope === "store") {
                state.filters.store = state.currentAccountStore;
                storeFilter.value = state.currentAccountStore;
                storeFilter.disabled = true;
                storeFilterField.classList.add("hidden");
            } else {
                storeFilterField.classList.remove("hidden");
                storeFilter.disabled = false;
                storeFilter.value = state.filters.store;
            }
        }

        function bindEvents() {
            document.getElementById("status-tabs").addEventListener("click", (event) => {
                const button = event.target.closest("[data-status-tab]");
                if (!button) return;
                state.currentTab = button.dataset.statusTab;
                state.currentPage = 1;
                renderStatusTabs();
                renderTable();
            });
            imagePreviewPrev.addEventListener("click", () => shiftImagePreview(-1));
            imagePreviewNext.addEventListener("click", () => shiftImagePreview(1));
            document.addEventListener("keydown", (event) => {
                if (!imagePreviewOverlay.classList.contains("show")) return;
                if (event.key === "Escape") closeImagePreview();
                if (event.key === "ArrowLeft") shiftImagePreview(-1);
                if (event.key === "ArrowRight") shiftImagePreview(1);
            });

            const tableClickHandler = (event) => {
                const target = event.target.closest("[data-open-id]");
                if (!target) return;
                const record = mockRecords.find(item => item.id === target.dataset.openId);
                if (record) renderDrawer(record);
            };
            document.getElementById("table-body-left").addEventListener("click", tableClickHandler);
            document.getElementById("table-body-middle").addEventListener("click", tableClickHandler);
            document.getElementById("table-body-right").addEventListener("click", tableClickHandler);

            document.getElementById("drawer-body").addEventListener("click", (event) => {
                const button = event.target.closest("[data-proof-src]");
                if (!button) return;
                const gallery = button.closest(".audit-proof-gallery");
                const thumbs = Array.from(gallery?.querySelectorAll("[data-proof-src]") || [button]);
                const images = thumbs.map(item => item.dataset.proofSrc);
                const index = Math.max(0, thumbs.indexOf(button));
                openImagePreview(images, index);
            });

            drawerOverlay.addEventListener("click", closeDrawer);
            reshipModalOverlay.addEventListener("click", (event) => {
                if (event.target === reshipModalOverlay) closeReshipModal();
            });
            qualityModalOverlay.addEventListener("click", (event) => {
                if (event.target === qualityModalOverlay) closeQualityCheckModal();
            });
            refundModalOverlay.addEventListener("click", (event) => {
                if (event.target === refundModalOverlay) closeRefundModal();
            });
            actionModalOverlay.addEventListener("click", (event) => {
                if (event.target === actionModalOverlay) closeActionModal();
            });
            imagePreviewOverlay.addEventListener("click", (event) => {
                if (event.target === imagePreviewOverlay || event.target.id === "image-preview-close") {
                    closeImagePreview();
                }
            });

            document.getElementById("search-btn").addEventListener("click", applyFilters);
            document.getElementById("manual-create-btn").addEventListener("click", openManualCreateModal);
            document.querySelectorAll("[data-scope-tab]").forEach((button) => {
                button.addEventListener("click", () => {
                    state.filters.scope = button.dataset.scopeTab;
                    if (state.filters.scope === "hq") {
                        state.filters.store = "";
                        document.getElementById("store-filter").value = "";
                    }
                    document.getElementById("scope-filter").value = state.filters.scope;
                    applyFilters();
                });
            });
            ["store-filter", "search-input"].forEach((id) => {
                document.getElementById(id).addEventListener(id === "search-input" ? "input" : "change", applyFilters);
            });
            document.getElementById("pagination").addEventListener("click", (event) => {
                const pageButton = event.target.closest("[data-page]");
                const actionButton = event.target.closest("[data-page-action]");
                if (pageButton) {
                    state.currentPage = Number(pageButton.dataset.page);
                    renderTable();
                    return;
                }
                if (actionButton) {
                    if (actionButton.dataset.pageAction === "prev" && state.currentPage > 1) state.currentPage -= 1;
                    if (actionButton.dataset.pageAction === "next") state.currentPage += 1;
                    renderTable();
                }
            });
        }

        function applyFilters() {
            state.filters.scope = document.getElementById("scope-filter").value;
            state.filters.store = state.filters.scope === "store" ? state.currentAccountStore : document.getElementById("store-filter").value;
            state.filters.keyword = document.getElementById("search-input").value;
            state.filters.type = "";
            state.filters.orderType = "";
            state.filters.responsibility = "";
            state.filters.freight = "";
            syncScopeFilterUI();
            state.currentPage = 1;
            renderStatusTabs();
            renderTable();
        }

        function resetFilters() {
            state.filters = {
                scope: "hq",
                store: "",
                keyword: "",
                type: "",
                orderType: "",
                responsibility: "",
                freight: ""
            };
            document.getElementById("scope-filter").value = state.filters.scope;
            document.getElementById("store-filter").value = "";
            document.getElementById("search-input").value = "";
            syncScopeFilterUI();
            state.currentPage = 1;
            renderStatusTabs();
            renderTable();
        }

        function resetManualCreateState() {
            manualCreateState.type = "refund";
            manualCreateState.query = "";
            manualCreateState.hasSearched = false;
            manualCreateState.selectedOrderNo = "";
            manualCreateState.orderIndex = 0;
            manualCreateState.quantities = {};
            manualCreateState.adjustEnabled = false;
            manualCreateState.advanceFreightEnabled = false;
            manualCreateState.reshipFulfillment = "cloud";
            manualCreateState.itemRefunds = {};
            manualCreateState.goodsRefund = null;
            manualCreateState.freightRefund = null;
        }

        function openManualCreateModal() {
            resetManualCreateState();
            actionModalOverlay.classList.add("show");
            actionModalOverlay.classList.add("manual-side-overlay");
            renderManualCreateModal();
        }

        function renderManualCreateModal() {
            const matchedOrders = getManualMatchedOrders();
            const order = getManualOrder();
            const hasOrder = !!order;
            if (hasOrder) ensureManualTypeAllowed(order);
            const amountDraft = hasOrder ? getManualAmountDraft(order) : null;
            const isReship = manualCreateState.type === "reship";
            actionModalOverlay.innerHTML = `
                <div class="center-modal manual-side-drawer">
                    <div class="center-modal-header">
                        <div class="center-modal-title">创建售后单</div>
                        <button class="center-modal-close" type="button" data-close-action-modal>×</button>
                    </div>
                    <div class="center-modal-body">
                        ${hasOrder ? "" : `
                            <div class="manual-search-empty">
                                <div class="manual-search-empty-inner">
                                    ${manualCreateState.query ? "" : `
                                        <div class="manual-empty-illustration"></div>
                                        <div class="manual-search-title">先找到要代客处理的订单</div>
                                        <div class="manual-search-desc">输入订单号、客户手机号或姓名后，将自动展示可创建售后的订单。</div>
                                    `}
                                    <div class="manual-search-row">
                                        <input data-manual-search value="${manualCreateState.query}" placeholder="输入订单号、客户手机号或姓名">
                                    </div>
                                    <div class="manual-order-list manual-search-results">
                                        ${matchedOrders.map((item, index) => {
                                            const canCreate = canManualCreateAfterSale(item);
                                            return `
                                            <button class="manual-order-card ${canCreate ? "" : "ineligible"}" type="button" data-manual-order="${index}">
                                                <div class="manual-order-title">
                                                    <span>${item.orderNo}</span>
                                                    <span class="manual-order-title-right">
                                                        ${canCreate ? `<span class="manual-order-badge">可发起售后</span>` : `<span class="manual-order-badge danger">不可发起售后</span>`}
                                                        <span>${item.fulfillmentStatus}</span>
                                                    </span>
                                                </div>
                                                <div class="manual-order-meta">${item.customer} / ${item.phone} / ${item.store}<br>订单金额 ${money(getManualOrderAmount(item))}；运费 ${money(item.freight)}；支付构成：${item.paymentSummary}</div>
                                            </button>
                                        `}).join("") || (manualCreateState.hasSearched ? `<div class="empty-list">未搜索到订单，请换订单号、手机号或姓名。</div>` : "")}
                                    </div>
                                </div>
                            </div>
                        `}
                        ${hasOrder ? `
                            ${renderManualOrderModule(order)}
                            ${renderManualApplicationModule(isReship, order)}
                            ${renderManualGoodsModule(order, amountDraft, isReship)}
                        ` : ""}
                    </div>
                    ${hasOrder ? `
                        <div class="manual-side-footer">
                            <button class="btn" type="button" data-close-action-modal>取消</button>
                            <button class="btn primary" type="button" data-manual-submit>确认创建售后单</button>
                        </div>
                    ` : ""}
                </div>
            `;
            bindActionModalEvents(null, null);
            bindManualCreateModalEvents();
        }

        function bindManualCreateModalEvents() {
            const rerender = (options = {}) => {
                const { preserveScroll = true } = options;
                const body = actionModalOverlay.querySelector(".center-modal-body");
                const scrollTop = preserveScroll && body ? body.scrollTop : 0;
                renderManualCreateModal();
                if (preserveScroll) {
                    const restoreScroll = () => {
                        const nextBody = actionModalOverlay.querySelector(".center-modal-body");
                        if (nextBody) nextBody.scrollTop = scrollTop;
                    };
                    restoreScroll();
                    requestAnimationFrame(restoreScroll);
                    setTimeout(restoreScroll, 0);
                }
            };
            const resetManualAmounts = (hideAdjust = false) => {
                if (hideAdjust) manualCreateState.adjustEnabled = false;
                manualCreateState.itemRefunds = {};
                manualCreateState.goodsRefund = null;
                manualCreateState.freightRefund = null;
            };
            const initManualQuantities = (order) => {
                manualCreateState.quantities = {};
            };
            actionModalOverlay.querySelector("[data-manual-search]")?.addEventListener("input", (event) => {
                manualCreateState.query = event.target.value.trim();
                manualCreateState.hasSearched = !!manualCreateState.query;
                manualCreateState.selectedOrderNo = "";
                manualCreateState.quantities = {};
                resetManualAmounts(true);
                manualCreateState.advanceFreightEnabled = false;
                manualCreateState.reshipFulfillment = "cloud";
                rerender({ preserveScroll: false });
                const searchInput = actionModalOverlay.querySelector("[data-manual-search]");
                if (searchInput) {
                    searchInput.focus();
                    searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
                }
            });
            actionModalOverlay.querySelectorAll("[data-manual-order]").forEach(button => {
                button.addEventListener("click", () => {
                    const matchedOrders = getManualMatchedOrders();
                    const order = matchedOrders[Number(button.dataset.manualOrder)];
                    if (!order) return;
                    if (!canManualCreateAfterSale(order)) {
                        showToast(getManualOrderBlockReason(order));
                        return;
                    }
                    manualCreateState.selectedOrderNo = order.orderNo;
                    manualCreateState.orderIndex = manualOrderCandidates.findIndex(item => item.orderNo === order.orderNo);
                    initManualQuantities(order);
                    resetManualAmounts(true);
                    manualCreateState.advanceFreightEnabled = false;
                    manualCreateState.reshipFulfillment = "cloud";
                    rerender({ preserveScroll: false });
                });
            });
            actionModalOverlay.querySelector("[data-manual-reselect]")?.addEventListener("click", () => {
                manualCreateState.type = "refund";
                manualCreateState.query = "";
                manualCreateState.hasSearched = false;
                manualCreateState.selectedOrderNo = "";
                manualCreateState.quantities = {};
                resetManualAmounts(true);
                manualCreateState.advanceFreightEnabled = false;
                manualCreateState.reshipFulfillment = "cloud";
                rerender({ preserveScroll: false });
            });
            actionModalOverlay.querySelector("[data-manual-type-select]")?.addEventListener("change", event => {
                manualCreateState.type = event.target.value;
                resetManualAmounts(true);
                manualCreateState.advanceFreightEnabled = false;
                manualCreateState.reshipFulfillment = "cloud";
                rerender();
            });
            actionModalOverlay.querySelectorAll("[data-manual-check]").forEach(input => {
                input.addEventListener("change", () => {
                    const index = Number(input.dataset.manualCheck);
                    const order = getManualOrder();
                    manualCreateState.quantities[index] = input.checked ? Math.min(1, order.items[index].availableQty) : 0;
                    delete manualCreateState.itemRefunds[index];
                    resetManualAmounts();
                    rerender();
                });
            });
            actionModalOverlay.querySelectorAll("[data-manual-qty]").forEach(input => {
                input.addEventListener("change", () => {
                    const index = Number(input.dataset.manualQty);
                    const max = Number(input.max) || 0;
                    manualCreateState.quantities[index] = Math.max(0, Math.min(Number(input.value) || 0, max));
                    delete manualCreateState.itemRefunds[index];
                    manualCreateState.goodsRefund = null;
                    manualCreateState.freightRefund = null;
                    rerender();
                });
            });
            actionModalOverlay.querySelectorAll("[data-manual-qty-step]").forEach(button => {
                button.addEventListener("click", () => {
                    const index = Number(button.dataset.manualQtyStep);
                    const step = Number(button.dataset.step) || 0;
                    const order = getManualOrder();
                    const item = order?.items?.[index];
                    const max = item ? getManualItemMaxQty(item) : 0;
                    const current = Math.max(0, Math.min(Number(manualCreateState.quantities[index]) || 0, max));
                    manualCreateState.quantities[index] = Math.max(0, Math.min(current + step, max));
                    delete manualCreateState.itemRefunds[index];
                    manualCreateState.goodsRefund = null;
                    manualCreateState.freightRefund = null;
                    rerender();
                });
            });
            actionModalOverlay.querySelector("[data-manual-advance-freight-toggle]")?.addEventListener("change", event => {
                manualCreateState.advanceFreightEnabled = event.target.checked;
                rerender();
            });
            actionModalOverlay.querySelector("[data-manual-reship-fulfillment]")?.addEventListener("change", event => {
                manualCreateState.reshipFulfillment = event.target.value;
                rerender();
            });
            actionModalOverlay.querySelector("[data-manual-reset-refund]")?.addEventListener("click", () => {
                resetManualAmounts();
                rerender();
            });
            actionModalOverlay.querySelectorAll("[data-manual-item-refund]").forEach(input => {
                input.addEventListener("change", event => {
                    const index = Number(input.dataset.manualItemRefund);
                    const max = Number(input.max) || 0;
                    manualCreateState.itemRefunds[index] = Math.max(0, Math.min(Number(event.target.value) || 0, max));
                    manualCreateState.goodsRefund = null;
                    rerender();
                });
            });
            actionModalOverlay.querySelector("[data-manual-goods-refund]")?.addEventListener("change", event => {
                manualCreateState.goodsRefund = Number(event.target.value) || 0;
                rerender();
            });
            actionModalOverlay.querySelector("[data-manual-freight-refund]")?.addEventListener("change", event => {
                manualCreateState.freightRefund = Number(event.target.value) || 0;
                rerender();
            });
            actionModalOverlay.querySelector("[data-manual-submit]")?.addEventListener("click", submitManualCreate);
        }

        function submitManualCreate() {
            const order = getManualOrder();
            if (!order) {
                showToast("请先搜索并选择订单");
                return;
            }
            if (!getManualAllowedTypes(order).includes(manualCreateState.type)) {
                showToast("当前订单状态仅支持发起仅退款");
                return;
            }
            const amountDraft = getManualAmountDraft(order);
            if (!amountDraft.selected.length) {
                showToast("请至少选择一个售后商品 SKU 和数量");
                return;
            }
            const applyReason = actionModalOverlay.querySelector("[data-manual-apply-reason]")?.value.trim();
            const applyDesc = actionModalOverlay.querySelector("[data-manual-apply-desc]")?.value.trim();
            if (!applyReason || !applyDesc) {
                showToast("请填写售后原因和申请详细说明");
                return;
            }
            if (manualCreateState.type !== "reship") {
                if (amountDraft.invalidItemRefund) {
                    showToast("单个 SKU 退款金额不能超过该 SKU 默认可退金额");
                    return;
                }
                if (amountDraft.goodsRefund > amountDraft.maxGoodsRefund || amountDraft.freightRefund > amountDraft.maxFreightRefund || amountDraft.totalApply > amountDraft.totalDefault) {
                    showToast("退款金额不能超过本次所选 SKU 和原单运费可退上限");
                    return;
                }
                const reason = actionModalOverlay.querySelector("[data-manual-adjust-reason]")?.value.trim();
                if (amountDraft.adjusted && !reason) {
                    showToast("调整金额时必须填写调整原因");
                    return;
                }
            }
            const record = buildManualAfterSaleRecord();
            mockRecords.unshift(record);
            state.currentTab = record.statusKey;
            state.currentPage = 1;
            closeActionModal();
            renderStatusTabs();
            renderTable();
            renderDrawer(record);
            showToast("已创建客服代客售后单");
        }

        function init() {
            renderStoreFilterOptions();
            syncScopeFilterUI();
            renderStatusTabs();
            renderTable();
            bindEvents();
        }

        init();
    </script>
</body>
</html>
