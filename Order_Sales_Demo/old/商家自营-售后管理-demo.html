<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家自营售后管理工作台 Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f3f5f9;
            --card: #ffffff;
            --line: #e6ebf2;
            --text: #1f2a37;
            --muted: #667085;
            --primary: #1677ff;
            --primary-soft: #edf5ff;
            --success: #16a34a;
            --success-soft: #edfdf3;
            --warning: #d97706;
            --warning-soft: #fff7ed;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
            --purple: #7c3aed;
            --purple-soft: #f5f3ff;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f6f8;
            color: var(--text);
            margin: 0;
            min-width: 1300px;
        }
        .page-shell {
            min-height: auto;
            padding: 16px;
            min-width: auto;
        }
        .top-bar {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 0;
        }
        .page-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        .platform-switcher {
            display: inline-flex;
            gap: 6px;
            padding: 4px;
            background: #f3f6fb;
            border: 1px solid var(--line);
            border-radius: 10px;
        }
        .platform-tab {
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--muted);
            background: transparent;
            transition: 0.18s ease;
        }
        .platform-tab.active {
            background: var(--primary);
            color: #fff;
            font-weight: 700;
        }
        .module-shell {
            display: none;
        }
        .module-shell.active {
            display: block;
        }
        .placeholder-panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 22px 20px;
            box-shadow: var(--shadow);
        }
        .placeholder-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .placeholder-desc {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.8;
        }
        .workspace-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 12px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: var(--shadow);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.primary { background: var(--primary-soft); color: var(--primary); }
        .badge.success { background: var(--success-soft); color: var(--success); }
        .badge.warning { background: var(--warning-soft); color: var(--warning); }
        .badge.purple { background: var(--purple-soft); color: var(--purple); }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .account-switch-block {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 4px 4px 4px 10px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #f8fbff;
        }
        .account-switch-label {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
        }
        .account-switch-tabs {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            border-radius: 10px;
            background: #eef4ff;
        }
        .account-switch-tab {
            border: none;
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: #667085;
            background: transparent;
            white-space: nowrap;
            transition: 0.18s ease;
        }
        .account-switch-tab.active {
            background: var(--primary);
            color: #fff;
        }
        .filter-card {
            padding: 14px 16px;
            max-width: calc(100vw - 240px);
            overflow: hidden;
        }
        .filter-grid {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .filter-search-row {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1 1 390px;
        }
        .field {
            min-width: 0;
        }
        #store-filter-field {
            flex: 0 0 190px;
        }
        .field.search-field {
            flex: 1 1 200px;
            min-width: 0;
        }
        .field.action-field {
            flex: 0 0 auto;
            min-width: auto;
        }
        .filter-card .field {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-card .field label {
            flex: 0 0 auto;
            margin-bottom: 0;
            white-space: nowrap;
        }
        .filter-card #store-filter {
            width: 120px;
        }
        .filter-card #search-input {
            min-width: 0;
        }
        .filter-card .action-field {
            display: block;
        }
        .field label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .field input,
        .field select,
        .field textarea {
            width: 100%;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: #fff;
            padding: 0 12px;
            font-size: 13px;
            color: var(--text);
            outline: none;
        }
        .field textarea {
            min-height: 58px;
            padding: 9px 12px;
            line-height: 1.55;
            resize: none;
        }
        .field textarea.manual-two-line-textarea {
            height: 58px;
        }
        .field textarea.refund-note-textarea {
            height: 108px;
        }
        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: #8bb8ff;
            box-shadow: 0 0 0 3px rgba(22,119,255,0.08);
        }
        .field input:disabled,
        .field input[readonly],
        .field select:disabled,
        .field textarea:disabled,
        .field textarea[readonly] {
            border-color: #e5e7eb;
            background: #f5f7fa;
            color: #667085;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            white-space: nowrap;
        }
        .field.hidden {
            display: none;
        }
        .filter-grid:has(#store-filter-field.hidden) .filter-search-row {
            flex-basis: 100%;
        }
        .btn {
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--line);
            padding: 0 14px;
            font-size: 13px;
            cursor: pointer;
            background: #fff;
            color: var(--text);
        }
        .btn.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn.ghost {
            background: #f8fbff;
            color: var(--primary);
            border-color: #d7e7ff;
        }
        .status-tabs {
            display: flex;
            gap: 0;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 0 16px 10px;
            border-top: 1px solid #eef2f7;
        }
        .status-tabs::-webkit-scrollbar { display: none; }
        .status-tab {
            border: none;
            border-right: 1px solid #e8edf5;
            background: transparent;
            min-width: auto;
            padding: 12px 18px 10px 14px;
            cursor: pointer;
            transition: 0.18s ease;
            text-align: left;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .status-tab.active {
            background: transparent;
            box-shadow: none;
        }
        .status-tab .tab-name {
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
        }
        .status-tab .tab-count {
            min-width: 24px;
            height: 20px;
            padding: 0 7px;
            border-radius: 999px;
            background: #eef2f7;
            color: #6b7280;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .status-tab .tab-icon {
            font-size: 14px;
            color: #9aa4b2;
        }
        .status-tab.active .tab-name,
        .status-tab.active .tab-icon {
            color: var(--primary);
        }
        .status-tab.active .tab-count {
            background: var(--primary);
            color: #fff;
        }
        .status-tab.active::after {
            content: "";
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 999px;
        }
        .status-tab:last-child {
            border-right: none;
        }
        .table-card {
            overflow: hidden;
        }
        .table-shell {
            overflow-x: auto;
        }
        .table-shell::-webkit-scrollbar {
            height: 8px;
        }
        .table-shell::-webkit-scrollbar-thumb {
            background: #d7dfeb;
            border-radius: 999px;
        }
        .table-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-top: 1px solid var(--line);
            background: #fff;
        }
        .table-summary {
            font-size: 12px;
            color: var(--muted);
        }
        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pagination-info {
            font-size: 12px;
            color: var(--muted);
            margin-right: 4px;
        }
        .page-btn {
            min-width: 32px;
            height: 32px;
            border: 1px solid var(--line);
            background: #fff;
            color: #475467;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            padding: 0 10px;
        }
        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .page-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .data-table {
            min-width: 100%;
        }
        .table-header,
        .table-row {
            display: grid;
            gap: 12px;
            padding: 0 16px;
        }
        /* 固定左列 */
        .table-fixed-left .table-header,
        .table-fixed-left .table-row {
            grid-template-columns: minmax(180px, 1fr);
            min-width: 200px;
        }
        /* 中间滚动列 */
        .table-scroll-middle .table-header,
        .table-scroll-middle .table-row {
            grid-template-columns:
                minmax(108px, 0.66fr)
                minmax(96px, 0.56fr)
                minmax(100px, 0.62fr)
                minmax(220px, 1.42fr)
                minmax(140px, 0.88fr)
                minmax(120px, 0.76fr)
                minmax(140px, 0.88fr)
                minmax(155px, 0.94fr)
                minmax(118px, 0.78fr)
                minmax(160px, 0.96fr);
            min-width: 1368px;
        }
        /* 固定右列 */
        .table-fixed-right .table-header,
        .table-fixed-right .table-row {
            grid-template-columns: minmax(110px, 1fr) minmax(110px, 1fr);
            min-width: 240px;
        }
        /* 三段式容器 */
        .table-outer {
            display: flex;
            overflow: hidden;
        }
        .table-fixed-left {
            flex: 0 0 auto;
            overflow: hidden;
            border-right: 2px solid var(--line);
            z-index: 2;
            background: #fff;
        }
        .table-fixed-right {
            flex: 0 0 auto;
            overflow: hidden;
            border-left: 2px solid var(--line);
            z-index: 2;
            background: #fff;
        }
        .table-scroll-middle {
            flex: 1 1 auto;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
            scrollbar-color: #d7dfeb transparent;
        }
        .table-scroll-middle::-webkit-scrollbar {
            height: 8px;
        }
        .table-scroll-middle::-webkit-scrollbar-thumb {
            background: #d7dfeb;
            border-radius: 999px;
        }
        .table-header {
            height: 50px;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
            color: #475467;
            border-bottom: 1px solid var(--line);
            background: #fbfcfe;
        }
        .table-body .table-row {
            padding-top: 16px;
            padding-bottom: 16px;
            align-items: start;
            font-size: 12px;
            border-bottom: 1px solid #eef2f7;
            cursor: pointer;
        }
        .table-body .table-row:hover {
            background: #fafcff;
        }
        .cell-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
            line-height: 1.45;
            word-break: break-word;
        }
        .cell-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 3px;
        }
        .order-sub-id {
            font-size: 12px;
            color: #667085;
            line-height: 1.6;
        }
        .application-source-pill {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            margin-top: 6px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.4;
        }
        .application-source-pill.customer {
            background: #eef4ff;
            color: #2f75ff;
        }
        .application-source-pill.agent {
            background: #fff4e5;
            color: #b54708;
        }
        .application-source-pill.backend {
            background: #f3ecff;
            color: #7c3aed;
        }
        .cell-sub {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.7;
            word-break: break-word;
        }
        .cell-sub-line {
            display: block;
        }
        .cell-stack {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .fulfillment-text {
            color: var(--primary);
            font-size: 12px;
            line-height: 1.6;
            font-weight: 700;
        }
        .product-info {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .product-thumb {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, #f5d2a6 0%, #c68a52 100%);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .product-meta {
            min-width: 0;
        }
        .product-price-line {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
        }
        .mini-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .mini-tags.compact {
            margin-top: 2px;
        }
        .mini-tag {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            background: #f4f6f8;
            color: #475467;
            font-weight: 600;
        }
        .mini-tag.primary { background: var(--primary-soft); color: var(--primary); }
        .mini-tag.warning { background: var(--warning-soft); color: var(--warning); }
        .mini-tag.success { background: var(--success-soft); color: var(--success); }
        .mini-tag.purple { background: var(--purple-soft); color: var(--purple); }
        .mini-tag.muted { background: #f2f4f7; color: #667085; }
        .amount-highlight {
            font-size: 13px;
            font-weight: 700;
            color: var(--danger);
            margin-bottom: 4px;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }
        .status-pill.audit { background: var(--warning-soft); color: var(--warning); }
        .status-pill.progress { background: var(--primary-soft); color: var(--primary); }
        .status-pill.success { background: var(--success-soft); color: var(--success); }
        .status-pill.closed { background: #f3f4f6; color: #6b7280; }
        .status-pill.exception { background: var(--danger-soft); color: var(--danger); }
        .time-track {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .time-track-line {
            font-size: 11px;
            color: #667085;
            line-height: 1.5;
            white-space: nowrap;
        }
        .table-action {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
            min-width: 0;
        }
        .action-btn {
            border: 1px solid #bfd5ff;
            color: var(--primary);
            background: #f8fbff;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .status-subtext {
            margin-top: 6px;
            font-size: 11px;
            color: #667085;
            line-height: 1.5;
        }
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.42);
            opacity: 0;
            pointer-events: none;
            transition: 0.2s ease;
            z-index: 50;
        }
        .drawer-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 720px;
            height: 100vh;
            background: #f8fbff;
            box-shadow: -24px 0 60px rgba(15, 23, 42, 0.22);
            transform: translateX(100%);
            transition: 0.24s ease;
            z-index: 60;
            display: flex;
            flex-direction: column;
        }
        .drawer.show {
            transform: translateX(0);
        }
        .drawer-header {
            padding: 0;
            border-bottom: 1px solid #e7edf6;
            background:
                radial-gradient(circle at top right, rgba(129, 178, 255, 0.14), transparent 24%),
                linear-gradient(180deg, #f8fbff 0%, #f2f6fb 100%);
        }
        .drawer-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 22px 14px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
        }
        .drawer-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 0;
            letter-spacing: 0.01em;
        }
        .drawer-title-main {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .case-pill {
            display: inline-flex;
            align-items: center;
            height: 34px;
            padding: 0 14px;
            border-radius: 10px;
            border: 1px solid #c7ddff;
            background: linear-gradient(180deg, #f6fbff 0%, #ebf4ff 100%);
            color: #4f96f6;
            font-size: 15px;
            font-weight: 700;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
        }
        .status-pill-large {
            display: inline-flex;
            align-items: center;
            height: 34px;
            padding: 0 14px;
            border-radius: 18px;
            background: linear-gradient(180deg, #fff8ec 0%, #fff1d8 100%);
            color: #ed9c1d;
            font-size: 15px;
            font-weight: 700;
            border: 1px solid rgba(244, 183, 71, 0.18);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(244, 183, 71, 0.12);
        }
        .status-pill-large.progress {
            background: linear-gradient(180deg, #f4f9ff 0%, #e7f1ff 100%);
            color: #4a97ff;
            border-color: rgba(90, 151, 255, 0.16);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(74, 151, 255, 0.12);
        }
        .status-pill-large.success {
            background: linear-gradient(180deg, #f2fcf6 0%, #e5f8ec 100%);
            color: #16a34a;
            border-color: rgba(22, 163, 74, 0.14);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(22, 163, 74, 0.12);
        }
        .status-pill-large.completed-substatus {
            height: 30px;
            padding: 0 12px;
            border-radius: 16px;
            background: linear-gradient(180deg, #ecfdf3 0%, #dcfce7 100%);
            color: #15803d;
            border-color: rgba(22, 163, 74, 0.18);
            box-shadow: none;
            font-size: 14px;
        }
        .status-pill-large.closed {
            background: linear-gradient(180deg, #f8f9fb 0%, #eef2f6 100%);
            color: #667085;
            border-color: rgba(102, 112, 133, 0.12);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(102, 112, 133, 0.08);
        }
        .status-pill-large.closed-substatus {
            height: 30px;
            padding: 0 12px;
            border-radius: 16px;
            background: #fff7ed;
            color: #c2410c;
            border-color: rgba(234, 88, 12, 0.18);
            box-shadow: none;
            font-size: 14px;
        }
        .status-pill-large.closed-substatus {
            background: linear-gradient(180deg, #fffaf0 0%, #fff4e0 100%);
            color: #b45309;
            border-color: rgba(245, 158, 11, 0.22);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(245, 158, 11, 0.08);
        }
        .status-pill-large.exception {
            background: linear-gradient(180deg, #fff6f6 0%, #feecec 100%);

        /* ============ Shell 左侧菜单布局 ============ */
        .shell {
            display: grid;
            grid-template-columns: 76px 136px minmax(1080px, 1fr);
            grid-template-rows: 56px minmax(0, 1fr);
            min-height: 100vh;
        }
        .shell-primary-nav {
            grid-column: 1;
            grid-row: 1 / 3;
            border-right: 1px solid var(--line);
            padding: 18px 12px;
            background: #f5f6f8;
        }
        .shell-brand {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            margin: 0 auto 24px;
            border-radius: 12px;
            background: linear-gradient(160deg, #3f8cff 0%, #2256d8 100%);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        .shell-nav-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .shell-nav-icon {
            display: grid;
            place-items: center;
            width: 52px;
            height: 52px;
            margin: 0 auto;
            border-radius: 12px;
            color: #8b93a1;
            font-size: 12px;
            text-align: center;
            line-height: 1.2;
            cursor: pointer;
        }
        .shell-nav-icon.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 10px 24px rgba(47, 125, 255, 0.22);
        }
        .shell-topbar {
            grid-column: 2 / 4;
            grid-row: 1;
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid var(--line);
            background: #f5f6f8;
        }
        .shell-topbar-tabs {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 100%;
        }
        .shell-topbar-tab {
            position: relative;
            display: inline-flex;
            align-items: center;
            height: 100%;
            padding: 0 18px;
            color: #4b5563;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .shell-topbar-tab.active {
            color: var(--text);
            font-weight: 600;
        }
        .shell-topbar-tab.active::after {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 0;
            height: 3px;
            border-radius: 999px 999px 0 0;
            background: var(--primary);
        }
        .shell-secondary-nav {
            grid-column: 2;
            grid-row: 2;
            border-right: 1px solid var(--line);
            padding: 20px 0;
            background: #f5f6f8;
        }
        .shell-menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 4px 10px;
            padding: 10px;
            border-radius: 8px;
            color: #667085;
            font-size: 14px;
            cursor: pointer;
        }
        .shell-menu-item.active {
            background: #edf5ff;
            color: var(--primary);
            font-weight: 600;
        }
        .shell-content {
            grid-column: 3;
            grid-row: 2;
            overflow: auto;
        }
        /* page-shell 在 shell 内时去除多余间距 */
        .shell .page-shell {
            min-width: auto;
            padding: 12px;
        }
        .manual-search-row {
            display: block;
            margin-bottom: 12px;
        }
        .manual-search-row input {
            width: 100%;
            height: 46px;
            border: 1px solid #cfe0ff;
            border-radius: 12px;
            padding: 0 18px;
            font-size: 14px;
            text-align: center;
            box-shadow: 0 10px 24px rgba(22,119,255,0.08);
        }
        .manual-search-row input::placeholder {
            text-align: center;
        }
        .manual-search-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(22,119,255,0.12), 0 12px 28px rgba(22,119,255,0.12);
        }
        .manual-search-empty {
            min-height: calc(100vh - 180px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .manual-search-empty-inner {
            width: min(560px, 100%);
            text-align: center;
        }
        .manual-empty-illustration {
            width: 148px;
            height: 108px;
            margin: 0 auto 18px;
            border-radius: 18px;
            background:
                linear-gradient(135deg, rgba(22,119,255,.14), rgba(18,183,106,.12)),
                #f8fbff;
            border: 1px solid #dbe7ff;
            position: relative;
        }
        .manual-empty-illustration::before {
            content: "";
            position: absolute;
            left: 32px;
            top: 28px;
            width: 82px;
            height: 46px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #cfe0ff;
            box-shadow: 0 10px 22px rgba(22,119,255,.12);
        }
        .manual-empty-illustration::after {
            content: "";
            position: absolute;
            right: 28px;
            bottom: 24px;
            width: 24px;
            height: 24px;
            border: 5px solid var(--primary);
            border-radius: 50%;
            box-shadow: 14px 13px 0 -8px var(--primary);
        }
        .manual-search-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .manual-search-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .manual-search-results {
            padding-top: 4px;
        }
        .manual-order-list {
            display: grid;
            gap: 8px;
            margin-bottom: 14px;
        }
        .manual-order-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 10px 12px;
            text-align: left;
            cursor: pointer;
        }
        .manual-order-card.active {
            border-color: var(--primary);
            background: #f1f8ff;
            box-shadow: 0 0 0 2px rgba(43, 123, 255, .12);
        }
        .manual-order-card.ineligible {
            border-color: #fecaca;
            background: #fff7f7;
        }
        .manual-order-card.ineligible:hover {
            border-color: #fda4af;
            background: #fff1f2;
        }
        .manual-order-title {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);

        .manual-order-title-right {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }
        .manual-order-badge {
            display: inline-flex;

            height: 20px;
            padding: 0 7px;
            border-radius: 999px;
            background: #edf5ff;

        .manual-order-meta {

        .manual-section {

        function getManualMatchedOrders() {
            const query = manualCreateState.query.trim().toLowerCase();
            if (!query) return [];
            return manualOrderCandidates.filter(order =>
                order.orderNo.toLowerCase().includes(query)
                || order.customer.toLowerCase().includes(query)
                || order.phone.includes(query)
            );
        }

        function getManualOrder() {
            if (!manualCreateState.selectedOrderNo) return null;
            return manualOrderCandidates.find(order => order.orderNo === manualCreateState.selectedOrderNo) || null;
        }

        function isManualOrderShipping(order) {
            return !order.orderScene || order.orderScene === "发货订单";
        }

        function canManualCreateAfterSale(order) {
            return isManualOrderShipping(order);
        }

        function getManualOrderBlockReason(order) {
            return "非物流订单不可在后台发起售后";
        }

        function getManualAllowedTypes(order) {
            if (!order) return ["refund"];
            return order.fulfillmentStatus === "已发货" ? ["refund", "return", "reship"] : ["refund"];
        }

        function ensureManualTypeAllowed(order) {
            if (!getManualAllowedTypes(order).includes(manualCreateState.type)) {
                manualCreateState.type = "refund";
            }
            if (manualCreateState.type === "reship" && !order?.cloudWarehouseEnabled && manualCreateState.reshipFulfillment === "cloud") {
                manualCreateState.reshipFulfillment = "self";
            }
        }

        function getManualItemMaxQty(item) {
            return manualCreateState.type === "reship" ? item.buyQty : item.availableQty;
        }

        function getManualSelectedLines(order) {
            return order.items
                .map((item, index) => {
                    const maxQty = getManualItemMaxQty(item);
                    const qty = Math.max(0, Math.min(Number(manualCreateState.quantities[index]) || 0, maxQty));
                    const amount = Number((qty * item.unitPrice).toFixed(2));
                    const manualRefund = manualCreateState.itemRefunds[index];
                    const refund = qty > 0 && manualRefund != null ? Math.max(0, Number(manualRefund) || 0) : amount;
                    return { item, index, qty, amount, refund: Number(refund.toFixed(2)) };
                })
                .filter(line => line.qty > 0);
        }

        function getManualAmountDraft(order) {
            const selected = getManualSelectedLines(order);
            const goodsDefault = Number(selected.reduce((sum, line) => sum + line.amount, 0).toFixed(2));
            const goodsRefundFromItems = Number(selected.reduce((sum, line) => sum + line.refund, 0).toFixed(2));
            const allAvailableQty = order.items.reduce((sum, item) => sum + item.availableQty, 0);
            const selectedQty = selected.reduce((sum, line) => sum + line.qty, 0);
            const isFullGoodsRefund = selectedQty > 0 && selectedQty === allAvailableQty;
            const freightRefundAvailable = manualCreateState.type === "refund" && order.fulfillmentStatus === "待发货" && isFullGoodsRefund && order.freight > 0;
            const defaultFreightRefund = freightRefundAvailable ? order.freight : 0;
            const goodsRefund = goodsRefundFromItems;
            const freightRefund = manualCreateState.freightRefund == null ? defaultFreightRefund : Number(manualCreateState.freightRefund) || 0;
            const maxGoodsRefund = goodsDefault;
            const maxFreightRefund = freightRefundAvailable ? order.freight : 0;
            const invalidItemRefund = selected.some(line => line.refund - line.amount > 0.001);
            const adjusted = selected.some(line => Math.abs(line.refund - line.amount) > 0.001) || Math.abs(freightRefund - defaultFreightRefund) > 0.001;
            const totalBeforeCoupon = Number((goodsRefund + freightRefund).toFixed(2));
            const totalDefaultBeforeCoupon = Number((goodsDefault + defaultFreightRefund).toFixed(2));
            const couponPolicy = getManualCouponPolicy(order, totalBeforeCoupon);
            const defaultCouponPolicy = getManualCouponPolicy(order, totalDefaultBeforeCoupon);
            return {
                selected,
                goodsDefault,
                isFullGoodsRefund,
                freightRefundAvailable,
                defaultFreightRefund,
                goodsRefund: Number(goodsRefund.toFixed(2)),
                freightRefund: Number(freightRefund.toFixed(2)),
                maxGoodsRefund,
                maxFreightRefund,
                invalidItemRefund,
                totalBeforeCoupon,
                totalDefaultBeforeCoupon,
                couponDeductedValue: couponPolicy.couponDeductedValue,
                couponRefundValue: couponPolicy.couponRefundValue,
                couponName: couponPolicy.couponName,
                totalDefault: Number((totalDefaultBeforeCoupon - defaultCouponPolicy.couponDeductedValue).toFixed(2)),
                totalApply: Number((totalBeforeCoupon - couponPolicy.couponDeductedValue).toFixed(2)),
                adjusted
            };
        }

        function parseManualPaymentParts(order) {
            if (Array.isArray(order.paymentParts) && order.paymentParts.length) {
                return order.paymentParts.map(part => ({
                    name: part.name,
                    amount: Number(part.amount) || 0,
                    isCash: part.type === "cash",
                    isCoupon: part.type === "coupon"
                })).filter(part => part.amount > 0);
            }
            return order.paymentSummary.split("/").map(part => {
                const text = part.trim();
                const amountMatch = text.match(/¥\s*([\d.]+)/);
                const amount = amountMatch ? Number(amountMatch[1]) : 0;
                const name = text.replace(/¥\s*[\d.]+/, "").trim();
                const isCash = /微信|支付宝|银行卡|现金/.test(name);
                const isCoupon = /优惠券/.test(name);
                return { name, amount, isCash, isCoupon };
            }).filter(part => part.amount > 0);
        }

        function getManualOrderAmount(order) {
            return Number(parseManualPaymentParts(order).reduce((sum, part) => sum + part.amount, 0).toFixed(2));
        }

        function getManualCouponPolicy(order, total) {
            const available = Math.max(Number(total) || 0, 0);
            const parts = parseManualPaymentParts(order);
            const couponParts = parts.filter(part => part.isCoupon);
            const couponUsedAmount = Number(couponParts.reduce((sum, part) => sum + part.amount, 0).toFixed(2));
            if (couponUsedAmount <= 0) {
                return {
                    couponUsedAmount: 0,
                    couponReturnable: false,
                    couponRefundValue: 0,
                    couponDeductedValue: 0,
                    nonCouponRefundTotal: Number(available.toFixed(2)),
                    couponName: ""
                };
            }
            const orderAmount = getManualOrderAmount(order);
            const couponReturnable = available >= orderAmount - 0.001;
            const couponRefundValue = couponReturnable ? Math.min(couponUsedAmount, available) : 0;
            const couponDeductedValue = couponReturnable ? 0 : Math.min(couponUsedAmount, available);
            return {
                couponUsedAmount,
                couponReturnable,
                couponRefundValue: Number(couponRefundValue.toFixed(2)),
                couponDeductedValue: Number(couponDeductedValue.toFixed(2)),
                nonCouponRefundTotal: Number(Math.max(available - couponUsedAmount, 0).toFixed(2)),
                couponName: couponParts.map(part => part.name).join("、")
            };
        }

        function getManualRefundParts(order, total) {
            const couponPolicy = getManualCouponPolicy(order, total);
            let rest = couponPolicy.nonCouponRefundTotal;
            const parts = parseManualPaymentParts(order).filter(part => !part.isCoupon);
            const result = [];
            parts.forEach(part => {
                if (rest <= 0) return;
                const value = Number(Math.min(part.amount, rest).toFixed(2));
                if (value <= 0) return;
                rest = Number((rest - value).toFixed(2));
                result.push({ ...part, refund: value });
            });
            if (rest > 0) {
                const cashPart = parts.find(part => part.isCash) || { name: "微信", isCash: true, isCoupon: false };
                result.push({ ...cashPart, refund: rest });
            }
            return result;
        }

        function mergeManualRefundParts(parts) {
            const merged = [];
            parts.forEach(part => {
                const key = `${part.isCash ? "cash" : "asset"}-${part.name}`;
                const existed = merged.find(item => item.key === key);
                if (existed) {
                    existed.refund = Number((existed.refund + part.refund).toFixed(2));
                } else {
                    merged.push({ ...part, key });
                }
            });
            return merged.map(({ key, ...part }) => part);
        }

            if (!order || manualCreateState.type === "reship") return "";
            const couponPolicy = getManualCouponPolicy(order, total);
            const refundParts = mergeManualRefundParts(getManualRefundParts(order, total));
            const cashRows = refundParts
                .filter(part => part.isCash)
                .map(part => `<div class="manual-refund-row"><span>退到${part.name}</span><strong>${money(part.refund)}</strong></div>`)
                .join("");
            const assetParts = refundParts.filter(part => !part.isCash);
            const assetTotal = Number(assetParts.reduce((sum, part) => sum + part.refund, 0).toFixed(2));
            const assetRefundTotal = Number((assetTotal + couponPolicy.couponRefundValue).toFixed(2));
            const assetRows = assetParts.map(part => `
                <div class="manual-refund-subrow">
                    <span>${part.name}退回</span>

                </div>

            const couponRefundRow = couponPolicy.couponRefundValue > 0 ? `
                <div class="manual-refund-subrow">

            ` : "";
            return `

                residualScope: isReship ? "补寄链路不占用后续退款范围" : "本次所选商品已锁定，处理完成前不可重复申请。",
                adjusted: amountDraft.adjusted,
                issueTag: amountDraft.adjusted ? "客服创建时调额" : "客服代客创建",
                logs: [
                    { time: createdAt, text: `商家客服王静代客创建${afterSaleType}售后单。` },
                    { time: createdAt, text: `本次选择商品：${selectedItems.map(item => `${item.name}(${item.sku}) x${item.qty}`).join("；")}` },
                    { time: createdAt, text: isReship ? `${reshipWarehouseNote} 当前待仓库发货。` : `系统默认退款 ${money(amountDraft.totalDefault)}，本次申请退款 ${money(amountDraft.totalApply)}${amountDraft.adjusted ? "，调额原因：电话沟通后按协商金额处理，凭证已上传。" : "。"}` },
                    { time: createdAt, text: `消费者可见说明：${visibleNoteMap[type]}` }
                ],
                specialSection: {
                    title: "客服代客创建结果",
                    lines: [
                        "发起来源：客服代客发起",
                        isReship ? `补寄履约方式：${reshipFulfillmentText}` : "",
                        `系统默认退款：${isReship ? "不涉及" : money(amountDraft.totalDefault)}`,
                        `本次申请退款：${isReship ? "不涉及" : money(amountDraft.totalApply)}`,
                        `消费者可见说明：${visibleNoteMap[type]}`
                    ]
                },
                availableActions: [],
                manualCreated: true,
                manualSource: "客服代客发起",
                manualOperator: "商家客服王静",
                manualDefaultAmount: amountDraft.totalDefault,
                manualAdjustedReason: amountDraft.adjusted ? "电话沟通后按协商金额处理，已上传沟通截图和商品异常凭证。" : "",
                consumerVisibleNote: visibleNoteMap[type]
            };
            record.availableActions = resolveAvailableActions(record);
            return record;
        }

        function productSummaryFrom(product, qty, secondQty, type, orderScene) {
            return buildItems(product, qty, secondQty, type, orderScene).map(item => `${item.name} x${item.qty}`).join(" / ");
        }

        function buildProofImages(serial, type) {
            const count = type === "退款退货" ? 3 : 2;
            return Array.from({ length: count }, (_, index) => {
                const bg = ["#e8f1ff", "#fff1d6", "#f3ecff", "#eafaf1"][index % 4];
                const accent = ["#2f75ff", "#d97706", "#7c3aed", "#16a34a"][index % 4];
                const title = type === "退款退货" ? "退货凭证" : "退款凭证";
                const note = type === "退款退货"
                    ? (index === 0 ? "商品外包装" : index === 1 ? "商品细节" : "物流/问题补充")
                    : (index === 0 ? "订单截图" : "沟通记录");
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
                        <rect width="240" height="240" rx="24" fill="${bg}"/>
                        <rect x="24" y="24" width="192" height="120" rx="18" fill="${accent}" opacity="0.18"/>
                        <circle cx="62" cy="62" r="16" fill="${accent}" opacity="0.75"/>
                        <rect x="92" y="52" width="88" height="18" rx="9" fill="${accent}" opacity="0.55"/>
                        <rect x="92" y="82" width="66" height="12" rx="6" fill="${accent}" opacity="0.32"/>
                        <text x="24" y="164" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#1f2a37">${title}</text>
                        <text x="24" y="198" font-size="18" font-family="Arial, sans-serif" fill="#475467">${note} ${index + 1}</text>
                    </svg>
                `;
                return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
            });
        }

        function buildAdjustProofImages(serial) {
            return Array.from({ length: 2 }, (_, index) => {
                const bg = index === 0 ? "#fff7ed" : "#eef4ff";
                const accent = index === 0 ? "#ea580c" : "#2f75ff";
                const note = index === 0 ? "改价沟通截图" : "金额确认凭证";
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
                        <rect width="240" height="240" rx="24" fill="${bg}"/>
                        <rect x="26" y="30" width="188" height="42" rx="14" fill="${accent}" opacity="0.16"/>
                        <rect x="26" y="92" width="188" height="88" rx="18" fill="#fff" opacity="0.86"/>
                        <path d="M50 130h70M50 154h98M148 124l18 18 30-34" stroke="${accent}" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <text x="26" y="205" font-size="21" font-family="Arial, sans-serif" font-weight="700" fill="#1f2937">${note}</text>
                    </svg>
                `;
                return {
                    src: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`,
                    title: `${note}${index + 1}`
                };
            });
        }

        function buildQualityDecision(statusKey, serial) {
            if (!["received", "refunding", "refund_failed", "completed"].includes(statusKey)) {
                return {
                    result: "商品完好",
                    note: "",
                    proofImages: []
                };
            }
            const result = serial % 4 === 0
                ? "商品破损"
                : serial % 5 === 0
                    ? "商品短缺"
                    : serial % 6 === 0
                        ? "有使用痕迹"
                        : "商品完好";
            if (result === "商品完好") {
                return {
                    result,
                    note: "",
                    proofImages: []
                };
            }
            const noteMap = {
                "商品破损": "外包装与商品主体均有明显破损，已拍照留存，建议财务确认是否部分退款或拒绝退款。",
                "商品短缺": "退回包裹中缺少 1 件商品及配件，已登记短缺明细，请结合买家申请范围确认退款处理。",
                "有使用痕迹": "商品存在明显拆封与使用痕迹，影响二次销售，需补充异常说明后再决定退款方案。"
            };
            return {
                result,
                note: noteMap[result],
                proofImages: buildAbnormalProofImages(serial, result)
            };
        }

        function buildAbnormalProofImages(serial, result) {
            return Array.from({ length: 2 }, (_, index) => {
                const bg = index === 0 ? "#fff1f2" : "#fff7e6";
                const accent = index === 0 ? "#e11d48" : "#d97706";
                const note = index === 0 ? `${result}主图` : "补充异常细节";
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
                        <rect width="240" height="240" rx="24" fill="${bg}"/>
                        <rect x="24" y="24" width="192" height="120" rx="18" fill="${accent}" opacity="0.18"/>
                        <circle cx="60" cy="64" r="16" fill="${accent}" opacity="0.72"/>
                        <rect x="92" y="52" width="92" height="18" rx="9" fill="${accent}" opacity="0.5"/>
                        <rect x="92" y="82" width="70" height="12" rx="6" fill="${accent}" opacity="0.3"/>
                        <text x="24" y="164" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#1f2a37">${result}</text>
                        <text x="24" y="198" font-size="18" font-family="Arial, sans-serif" fill="#475467">${note}</text>
                    </svg>
                `;
                return {
                    id: `quality-${serial}-${index}`,
                    src: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`,
                    title: note
                };
            });
        }

        function chooseClosureSubStatus(statusKey, serial, cancelReason) {
            if (statusKey === "rejected") {
                return serial % 3 === 0 ? "商家拒绝退款" : "商家拒绝申请";
            }
            if (statusKey === "cancelled") {
                return cancelReason.includes("主动撤销") || cancelReason.includes("主动撤回")
                    ? "客户自主撤销"
                    : "超时自动撤销";
            }
            return "";
        }

        function chooseRejectReason(serial, closureSubStatus = "") {
            if (closureSubStatus === "商家拒绝退款") {
                return serial % 2 === 0
                    ? "财务复核后判断退回商品不满足退款条件，商家拒绝本次退款。"
                    : "退款复核未通过，最终退款金额为 ¥0.00，商家拒绝本次退款。";
            }
            return serial % 2 === 0
                ? "退回商品存在破损且不满足退款条件，商家已驳回本次退款申请。"
                : "买家提交的退款条件不满足商家售后规则，当前暂不支持退款。";
        }

        function chooseCancelReason(serial, statusKey, orderScene, flowMode) {
            const canTimeout = statusKey === "cancelled" && orderScene === "发货订单" && flowMode === "refund_return";
            if (canTimeout && serial % 2 !== 0) {
                return "买家在寄回时效内未填写退货物流单号，系统自动关闭本次售后。";
            }
            return "买家主动撤销售后，双方已线下协商完成。";
        }

        function getClosureType(record) {
            if (record.closureType) return record.closureType;
            if (record.rejectSubStatus === "商家拒绝退款") return "finance_rejected";
            if (record.statusKey === "rejected") return record.afterSaleType === "补寄" ? "manual_closed" : "review_rejected";
            if (record.cancelSubStatus === "超时关闭" || String(record.cancelReason || "").includes("超时") || String(record.cancelReason || "").includes("到期")) return "return_timeout";
            if (record.statusKey === "cancelled") return "customer_cancelled";
            return "manual_closed";
        }

        function getClosureMeta(record) {
            const type = getClosureType(record);
            const maps = {
                review_rejected: {
                    subStatus: "审核拒绝",
                    source: "商家审核",
                    conclusion: "商家拒绝本次售后申请",
                    reasonLabel: "拒绝原因",
                    visibleNote: "本次售后申请未通过审核，客户可查看拒绝原因并在符合售后期时重新申请。"
                },
                customer_cancelled: {
                    subStatus: "客户主动撤销",
                    source: "客户主动撤销",
                    conclusion: "客户撤销后售后关闭",
                    reasonLabel: "撤销原因",
                    visibleNote: "客户已主动撤销本次售后，商家不再继续处理。"
                },
                return_timeout: {
                    subStatus: "寄回超时关闭",
                    source: "系统自动关闭",
                    conclusion: "客户超时未寄回，系统关闭售后",
                    reasonLabel: "关闭原因",
                    visibleNote: "客户未在寄回截止时间内填写退货物流，本次售后已自动关闭。"
                },
                finance_rejected: {
                    subStatus: "财务拒绝退款",
                    source: "财务复核",
                    conclusion: "财务拒绝退款，售后关闭",
                    reasonLabel: "拒绝退款原因",
                    visibleNote: "财务复核后拒绝本次退款，客户可查看拒绝原因并联系商家处理。"
                },
                manual_closed: {
                    subStatus: "人工关闭",
                    source: "商家后台",
                    conclusion: "商家人工关闭售后",
                    reasonLabel: "关闭原因",
                    visibleNote: "商家已关闭本次售后，如仍需处理请联系商家。"
                }
            };
            const meta = maps[type] || maps.manual_closed;
            return {
                type,
                ...meta,
                closeAt: record.closeAt || record.completeAt || record.auditAt || record.createdAt,
                reason: type === "customer_cancelled" || type === "return_timeout"
                    ? (record.cancelReason || "暂无说明")
                    : (record.rejectReason || "暂无说明"),
                operator: type === "customer_cancelled"
                    ? record.customer
                    : (type === "return_timeout" ? "系统自动任务" : (type === "finance_rejected" ? (record.refundOperator || "财务人员") : (record.auditOperator || "商家客服"))),
                visibleNote: record.consumerVisibleCloseNote || meta.visibleNote
            };
        }

        function resolveClosureType(statusKey, scenario, flowMode) {
            if (scenario.closureType) return scenario.closureType;
            if (statusKey === "rejected") return scenario.rejectSubStatus === "商家拒绝退款" ? "finance_rejected" : "review_rejected";
            if (statusKey === "cancelled") return flowMode === "refund_return" ? "return_timeout" : "customer_cancelled";
            return "";
        }

        function resolveAvailableActions(record) {
            if (!record) return [];
            if (!isShippingScene(record.orderScene)) {
                if (record.statusKey === "audit") return ["reject", "approve"];
                if (record.statusKey === "received") return ["execute_refund"];
                if (record.statusKey === "refund_failed") return ["retry_refund"];
                return [];
            }
            if (record.statusKey === "audit") {
                return ["reject", "approve"];
            }
            if (record.statusKey === "received") {
                return ["reject_refund", "execute_refund"];
            }
            if (record.statusKey === "reship_pending") {
                const fulfillmentType = record.reshipForm && record.reshipForm.fulfillmentType === "self" ? "self" : "cloud";
                return fulfillmentType === "self" ? ["fill_reship_logistics", "revoke_reship"] : ["repush_cloud_reship", "revoke_reship"];
            }
            return statusConfigs[record.statusKey].actions;
        }

        function buildReshipForm(statusKey, reason, responsibility, freightBearer, itemsSummary) {
            const baseReason = ["少件漏发", "错发商品", "赠品缺失", "配件缺失", "产品破损", "产品质量问题", "其他说明"].includes(reason) ? reason : "少件漏发";
            const fulfillmentType = statusKey === "reship_pending" || statusKey === "buyer_receipt" ? "cloud" : "";
            return {
                reason: statusKey === "reship_pending" || statusKey === "buyer_receipt" ? baseReason : "少件漏发",
                responsibility,
                itemsSummary,
                freightBearer,
                fulfillmentType,
                fulfillmentText: fulfillmentType === "cloud" ? "对接云仓自动发货" : "",
                warehouseNote: fulfillmentType === "cloud" ? "补寄订单已推送云仓，等待云仓发货并回传物流。" : "请按补寄明细创建出库单并尽快发货，出库后同步物流信息",
                transferReason: "少件漏发，优先补寄处理，不回收原商品。"
            };
        }

        function buildRefundBreakdown(amount) {
            const wechat = Number((amount * 0.72).toFixed(2));
            const card = Number((amount * 0.18).toFixed(2));
            const points = Number((amount - wechat - card).toFixed(2));
            return {
                wechat,
                card,
                points
            };
        }

        function chooseAfterSaleType(flowMode) {
            if (flowMode === "reship") return "补寄";
            if (flowMode === "refund_return") return "退款退货";
            return "仅退款";
        }

        function chooseReason(statusKey, serial, type, freightRefund, orderType, orderScene) {
            if (orderScene !== "发货订单") {
                return "我不想要了";
            }
            if (orderScene === "自提订单") {
                return ["不想到店自提了", "门店预约时间不合适", "想改为线下购买"][serial % 3];
            }
            if (statusKey === "audit" && type === "仅退款" && freightRefund > 0) {
                return serial % 4 === 0 ? "物流时效过慢" : "7天无理由";
            }
            if (statusKey === "audit" && type === "仅退款") {
                return "7天无理由";
            }
            return reasons[(serial - 1) % reasons.length];
        }

        function buildLabels(type, serial, orderScene, flowMode) {
            const tags = [];
            if (type === "仅退款") tags.push("金额补偿");
            if (type === "退款退货") tags.push(serial % 2 === 0 ? "全量退货" : "部分件数");
            if (type === "补寄") tags.push("转补寄");
            if (orderScene !== "发货订单" && flowMode === "refund_only") tags.push("无需寄回");
            if (serial % 4 === 0) tags.push("商家已调额");
            if (serial % 7 === 0) tags.push("有运费赔付");
            return tags;
        }

        function buildItems(product, qty, secondQty, type, orderScene) {
            const items = [
                {
                    name: product.name,
                    sku: product.sku,
                    qty,
                    unitPrice: product.price
                }
            ];
            if (orderScene !== "发货订单") {
                return items;
            }
            if (secondQty) {
                items.push({
                    name: type.includes("补寄") ? "赠品补件" : "试用装补差商品",
                    sku: type.includes("补寄") ? "补件包" : "伴手礼 / 单件",
                    qty: secondQty,
                    unitPrice: 36
                });
            }
            return items;
        }

        function chooseResidualScope(orderScene, flowMode, serial) {
            if (flowMode === "reship") return "补寄链路不占用后续退款范围";
            if (orderScene === "自提订单") return "商品到店自提仅支持整单退款，不支持后续拆分申请";
            if (orderScene === "直接到资产") return "套餐次卡按未核销范围退款，已核销部分不可再申请";
            if (orderScene === "储值卡资产") return "会员储值卡资产已锁定本次退款范围，退款完成后同步回退卡资产";
            return serial % 2 === 0 ? "部分件数仍可继续申请" : "当前范围已锁定，不可超额";
        }

        function getDisplayType(type) {
            if (type === "仅退款") return "仅退款";
            if (type === "退款退货") return "退款退货";
            if (type === "补寄") return "补寄";
            return type;
        }

        function getRefundGoodsSectionTitle(record) {
            return record.afterSaleType === "退款退货" ? "退款退货商品明细" : "退款商品明细";
        }

        function getProductEmoji(name) {
            if (name.includes("卫生巾")) return "📦";
            if (name.includes("香水")) return "🌸";
            if (name.includes("精华")) return "✨";
            if (name.includes("饮品")) return "🥤";
            if (name.includes("精油")) return "🧴";
            if (name.includes("素颜霜")) return "🧡";
            if (name.includes("洗护")) return "🫧";
            if (name.includes("湿巾")) return "📦";
            if (name.includes("配件")) return "🧩";
            return "📦";
        }

        function buildTimestamps(serial) {
            const day = (serial % 9) + 1;
            return {
                createdAt: `2026-05-${String(day).padStart(2, "0")} ${String(9 + (serial % 8)).padStart(2, "0")}:${String(10 + (serial % 40)).padStart(2, "0")}`,
                auditAt: `2026-05-${String(day).padStart(2, "0")} ${String(11 + (serial % 7)).padStart(2, "0")}:${String(20 + (serial % 30)).padStart(2, "0")}`,
                sendbackAt: `2026-05-${String(day + 1).padStart(2, "0")} ${String(10 + (serial % 6)).padStart(2, "0")}:18`,
                receiveAt: `2026-05-${String(day + 2).padStart(2, "0")} ${String(12 + (serial % 5)).padStart(2, "0")}:26`,
                completeAt: `2026-05-${String(day + 3).padStart(2, "0")} ${String(15 + (serial % 4)).padStart(2, "0")}:40`
            };
        }

        function chooseFreightRefund(statusKey, serial, flowMode) {
            if (flowMode !== "refund_return") return 0;
            if (statusKey === "audit") return serial % 5 === 0 ? 10 : 0;
            if (["received", "completed"].includes(statusKey) && serial % 4 === 0) return 10;
            return 0;
        }

        function chooseFreightCompensation(statusKey, serial, flowMode) {
            if (flowMode !== "refund_return") return 0;
            if (["received", "completed"].includes(statusKey) && serial % 2 === 0) return 10 + (serial % 3) * 2;
            return 0;
        }

        function chooseApprovedAmount(statusKey, applied, serial, freightRefund, freightCompensation) {
            if (statusKey === "audit") return applied;
            if (statusKey === "sendback" || statusKey === "returning") return applied;
            if (statusKey === "received" || statusKey === "refunding" || statusKey === "refund_failed" || statusKey === "completed") {
                const delta = serial % 4 === 0 ? 18 : 0;
                return Number((applied - delta + freightCompensation).toFixed(2));
            }
            if (statusKey === "reship_pending" || statusKey === "buyer_receipt") {
                return serial % 5 === 0 ? Number((28 + freightCompensation).toFixed(2)) : 0;
            }
            return applied;
        }

        function chooseRange(type, serial, orderScene) {
            if (orderScene === "自提订单") return "整单仅退款";
            if (orderScene === "直接到资产") return "整单退款（未核销套餐次卡）";
            if (orderScene === "储值卡资产") return "整笔会员储值卡开卡/充值退款";
            if (type === "仅退款") return serial % 2 === 0 ? "部分退款 / 金额补偿" : "整单仅退款";
            if (type === "退款退货") return serial % 2 === 0 ? "全额退款退货" : "同一 SKU 部分件数";
            return "补寄处理";
        }

        function chooseCurrentResponsibility(statusKey, owner, serial) {
            if (statusKey === "received" && serial % 4 === 0) return "物流责任";
            return owner;
        }

        function chooseCurrentFreightBearer(statusKey, freight, serial, flowMode) {
            if (flowMode !== "refund_return") return "不涉及";
            if ((statusKey === "received" || statusKey === "completed") && serial % 3 === 0) return "商家承担";
            return freight;
        }

        function chooseFinalResult(statusKey, serial, type) {
            if (statusKey === "completed") {
                if (type === "补寄") return "补寄完成";
                return "退款成功";
            }
            if (statusKey === "refunding") return "退款处理中";
            if (statusKey === "refund_failed") return "退款失败待重试";
            if (statusKey === "rejected" || statusKey === "cancelled") return "售后关闭";
            return statusConfigs[statusKey].mainStatus;
        }

        function chooseCompletedSource(statusKey, type) {
            if (statusKey !== "completed") return "";
            if (type === "补寄") return "reship_only";
            if (type === "仅退款") return "refund_only";
