<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C端售后单页 Demo</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-soft: #fafafb;
      --text: #222222;
      --muted: #8f8f99;
      --subtle: #666666;
      --line: #eeeeee;
      --accent: #ff453a;
      --accent-2: #ff6d42;
      --accent-soft: #fff1ef;
      --link: #2f7dff;
      --success: #18a058;
      --warning: #f97316;
      --danger: #e5484d;
      --purple: #7c3aed;
      --info-soft: #eef5ff;
      --warn-soft: #fff7ed;
      --success-soft: #eaf8ee;
      --disabled: #b7bac4;
      --shadow: 0 14px 32px rgba(31, 35, 41, 0.08);
      --font: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255, 118, 74, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(47, 125, 255, 0.08), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: grid;
      place-items: start center;
      padding: 24px;
    }

    button, input, select, textarea { font: inherit; }

    .demo-shell {
      width: min(100%, 1200px);
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    .meta-panel {
      width: 100%;
      border: 1px solid rgba(228, 230, 236, 0.92);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 10px 30px rgba(31, 35, 41, 0.05);
      padding: 20px 22px;
    }

    .meta-panel p {
      margin: 0;
      color: var(--subtle);
      font-size: 14px;
      line-height: 1.7;
    }

    .meta-panel strong {
      color: var(--text);
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .phone {
      width: 390px;
      min-height: 844px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid #e3e5eb;
      box-shadow: 0 18px 48px rgba(31, 35, 41, 0.12);
      padding-bottom: 110px;
    }

    .status-bar {
      height: 44px;
      padding: 12px 18px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.92);
    }

    .island {
      width: 124px;
      height: 30px;
      border-radius: 20px;
      background: #111;
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav {
      height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(238, 238, 238, 0.8);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .nav-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .nav-side,
    .nav-right {
      width: 56px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #42424d;
      font-size: 18px;
    }

    .nav-side button,
    .nav-right button {
      border: 0;
      background: transparent;
      padding: 0;
      font-size: inherit;
      color: inherit;
      cursor: pointer;
    }

    .nav-right { justify-content: flex-end; }

    .capsule {
      width: 34px;
      height: 20px;
      border-radius: 999px;
      border: 1px solid #dadbe0;
      background: #fff;
    }

    .tabs-wrap {
      padding: 8px 0 0;
      background: rgba(255, 255, 255, 0.92);
      position: sticky;
      top: 52px;
      z-index: 4;
      border-bottom: 1px solid rgba(238, 238, 238, 0.86);
      backdrop-filter: blur(18px);
    }

    .tabs {
      display: flex;
      gap: 18px;
      padding: 0 16px 10px;
      overflow-x: auto;
      scrollbar-width: none;
      white-space: nowrap;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      position: relative;
      color: var(--muted);
      font-size: 14px;
      padding-bottom: 6px;
      border: 0;
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--text);
      font-weight: 600;
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .screen {
      padding: 14px 16px 112px;
    }

    .hero {
      margin-bottom: 12px;
      padding: 16px 18px;
      border-radius: 22px;
      color: #fff;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ff2f3a, #ff6238);
    }

    .hero.soft {
      background: linear-gradient(135deg, #fff7ef, #eef5ff);
      color: var(--text);
    }

    .hero.success {
      background: linear-gradient(135deg, #eaf8ee, #eef5ff);
      color: var(--text);
    }

    .hero.warn {
      background: linear-gradient(135deg, #fff7ed, #fff1ef);
      color: var(--text);
    }

    .hero h1 {
      margin: 8px 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.88);
      max-width: 260px;
    }

    .hero.soft p,
    .hero.success p,
    .hero.warn p {
      color: var(--muted);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
    }

    .hero::before {
      width: 96px;
      height: 96px;
      right: -16px;
      top: -24px;
    }

    .hero::after {
      width: 56px;
      height: 56px;
      right: 88px;
      bottom: -12px;
    }

    .card {
      margin-bottom: 12px;
      background: var(--surface);
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(238, 238, 238, 0.92);
      box-shadow: var(--shadow);
    }

    .sec-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
    }

    .order-card {
      background: var(--surface);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(238, 238, 238, 0.92);
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .status-text {
      font-size: 14px;
      font-weight: 600;
    }

    .status-pending { color: var(--accent); }
    .status-shipped { color: var(--warning); }
    .status-aftersale { color: var(--purple); }
    .status-done { color: var(--success); }
    .status-muted { color: #657085; }

    .item {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      background: var(--surface-soft);
    }

    .thumb {
      width: 88px;
      height: 88px;
      border-radius: 12px;
      background:
        linear-gradient(160deg, rgba(255, 110, 80, 0.28), rgba(255, 255, 255, 0.72)),
        linear-gradient(45deg, #f7d4cb, #eceef7);
      position: relative;
      overflow: hidden;
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 16px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.88);
      background: rgba(255, 255, 255, 0.42);
    }

    .item-title {
      margin: 0 0 6px;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 500;
    }

    .sku,
    .copy,
    .helper {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 8px;
    }

    .price {
      color: var(--accent);
      font-size: 16px;
      font-weight: 600;
    }

    .count {
      color: var(--subtle);
      font-size: 13px;
    }

    .hint {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f7f8fa;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .hint.warn {
      background: var(--warn-soft);
      color: #b45309;
    }

    .hint.info {
      background: var(--info-soft);
      color: #2458d3;
    }

    .hint.disabled {
      background: #f2f3f5;
      color: #8b93a1;
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding-top: 14px;
    }

    .summary {
      font-size: 13px;
      color: var(--subtle);
      line-height: 1.5;
    }

    .summary b {
      color: var(--text);
      font-weight: 600;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 0;
      min-width: 84px;
      height: 36px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.ghost {
      background: #fff;
      color: var(--subtle);
      box-shadow: inset 0 0 0 1px #d8d9df;
    }

    .btn.primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 24px rgba(255, 84, 63, 0.24);
    }

    .btn.disabled {
      background: #f1f2f5;
      color: #b2b6c0;
      box-shadow: inset 0 0 0 1px #e2e5eb;
      cursor: default;
    }

    .btn.text {
      min-width: 0;
      padding: 0 6px;
      height: auto;
      background: transparent;
      color: var(--link);
      box-shadow: none;
    }

    .list-grid,
    .info-list,
    .result-list,
    .form-grid {
      display: grid;
      gap: 10px;
    }

    .summary-list {
      display: grid;
      gap: 12px;
    }

    .summary-line,
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #53545f;
    }

    .summary-line strong,
    .info-row strong {
      color: var(--text);
      font-weight: 600;
    }

    .summary-line.total strong:last-child {
      color: var(--accent);
      font-size: 22px;
    }

    .address {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 10px;
      font-size: 14px;
      line-height: 1.6;
    }

    .type-option {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid #eeeeee;
      cursor: pointer;
    }

    .type-option strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
      line-height: 1.35;
    }

    .type-option span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .type-badge {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: var(--accent-soft);
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 18px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      color: #555a67;
    }

    .field select,
    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid #dfe2e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      padding: 12px 14px;
      outline: none;
    }

    .field textarea {
      min-height: 88px;
      resize: none;
    }

    .field-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .picker-item {
      display: grid;
      grid-template-columns: 20px 72px 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-radius: 16px;
      background: var(--surface-soft);
    }

    .picker-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 26px;
      accent-color: var(--accent);
    }

    .picker-thumb {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      background:
        linear-gradient(160deg, rgba(255, 110, 80, 0.28), rgba(255, 255, 255, 0.72)),
        linear-gradient(45deg, #f7d4cb, #eceef7);
      position: relative;
      overflow: hidden;
    }

    .picker-thumb::after {
      content: "";
      position: absolute;
      inset: 14px 12px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.42);
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .qty-btn {
      width: 26px;
      height: 26px;
      border: 1px solid #d8dbe2;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      color: #454a57;
    }

    .qty {
      min-width: 20px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
    }

    .upload-box {
      width: 72px;
      height: 72px;
      border: 1px dashed #d4d7df;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      background: #fff;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .progress-step {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .progress-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #eceef3;
      color: #97a0b0;
      font-size: 11px;
      font-weight: 700;
    }

    .progress-step.active .progress-dot {
      background: var(--accent);
      color: #fff;
    }

    .progress-step.done .progress-dot {
      background: #eaf8ee;
      color: var(--success);
    }

    .progress-arrow {
      color: #c6ccd8;
      font-size: 12px;
    }

    .timeline-card {
      padding: 12px;
      border-radius: 14px;
      background: #f7f8fa;
      border: 1px solid #eef0f4;
    }

    .timeline-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .timeline-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .footer {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 390px;
      padding: 12px 16px 28px;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(236, 236, 241, 0.9);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .footer.center {
      justify-content: center;
    }

    .home-indicator {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 8px;
      width: 138px;
      height: 5px;
      border-radius: 999px;
      background: rgba(17, 17, 17, 0.9);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 20;
    }

    .overlay.show { display: flex; }

    .dialog {
      width: 100%;
      max-width: 300px;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 22px 60px rgba(0,0,0,0.2);
    }

    .dialog-body {
      padding: 22px 18px 16px;
    }

    .dialog-body strong {
      display: block;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .dialog-body p {
      margin: 0;
      color: #555967;
      font-size: 14px;
      line-height: 1.6;
    }

    .dialog-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid #eee;
    }

    .dialog-actions button {
      height: 50px;
      border: 0;
      background: #fff;
      color: #999;
      font-size: 15px;
      cursor: pointer;
    }

    .dialog-actions button + button {
      border-left: 1px solid #eee;
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <section class="meta-panel">
      <strong>C端售后单页 Demo</strong>
      <p>业务入口、按钮、状态、金额、弹窗和跳转都按 PRD 与 ASCII 草图收口。第一版只做 C 端：订单列表、订单详情、售后类型、申请页、填写物流、售后详情全链路可演示。</p>
      <div class="chips">
        <span class="chip">待发货仅退款</span>
        <span class="chip">已发货仅退款</span>
        <span class="chip">退货退款</span>
        <span class="chip">非物流退款</span>
        <span class="chip">售后详情多状态</span>
      </div>
    </section>

    <div class="phone">
      <div class="island" aria-hidden="true"></div>
      <div class="status-bar">
        <span>9:41</span>
        <span>5G&nbsp;&nbsp;100%</span>
      </div>

      <header class="nav">
        <div class="nav-side" id="navLeft"></div>
        <div class="nav-title" id="navTitle"></div>
        <div class="nav-right"><div class="capsule" aria-hidden="true"></div></div>
      </header>

      <div id="app"></div>

      <div class="overlay" id="overlay"></div>
      <div class="home-indicator" aria-hidden="true"></div>
    </div>
  </main>

  <script>
    const reasonOptions = {
      pendingShip: [
        { value: "NO_WANT", label: "不想要了" },
        { value: "WRONG_ORDER", label: "拍错/多拍/买错了" },
        { value: "ADDRESS_ERROR", label: "地址/信息填写错误" },
        { value: "PLAN_CHANGED", label: "计划有变，暂时不需要" },
        { value: "NOT_SHIPPED_TIMEOUT", label: "商家迟迟未发货" },
        { value: "AGREED_REFUND", label: "已与商家协商一致" },
        { value: "OTHER", label: "其他原因" }
      ],
      shippedRefund: [
        { value: "NOT_RECEIVED", label: "一直未收到货" },
        { value: "LOGISTICS_STUCK", label: "物流长时间未更新" },
        { value: "PACKAGE_LOST", label: "包裹丢失/疑似丢件" },
        { value: "DELIVERED_NOT_RECEIVED", label: "显示签收但未收到" },
        { value: "REJECTED_PACKAGE", label: "包裹破损/异常，已拒收" },
        { value: "MISSING_ITEMS", label: "少件/漏发" },
        { value: "AGREED_REFUND", label: "已与商家协商一致" },
        { value: "OTHER", label: "其他原因" }
      ],
      returnRefund: [
        { value: "NO_WANT", label: "不想要了" },
        { value: "WRONG_ORDER", label: "拍错/多拍/买错了" },
        { value: "SPEC_NOT_FIT", label: "尺码/规格不合适" },
        { value: "STYLE_NOT_LIKE", label: "颜色/款式不喜欢" },
        { value: "QUALITY_ISSUE", label: "商品质量问题" },
        { value: "DAMAGED_DIRTY", label: "商品破损/污渍/影响使用" },
        { value: "WRONG_ITEM", label: "商家发错货" },
        { value: "MISSING_ITEMS", label: "少件/漏发" },
        { value: "NOT_AS_DESCRIBED", label: "商品与描述不符" },
        { value: "EXPIRED_OR_NEAR_EXPIRED", label: "商品临期/过期" },
        { value: "SUSPECT_FAKE", label: "假冒/疑似非正品" },
        { value: "AGREED_RETURN_REFUND", label: "已与商家协商一致" },
        { value: "OTHER", label: "其他原因" }

    function createForm(order, kind) {
      const eligibleItems = order.items
        .filter(item => item.eligibleForRefund || kind === "pendingShip")
        .map(item => ({
          id: item.id,
          checked: true,
          title: item.title,
          sku: item.sku,
          price: item.unitPrice,
          maxQty: item.refundableQty || item.orderQty,
          qty: item.refundableQty || item.orderQty,
          orderQty: item.orderQty
        }));
      const estimate = computeEstimate(order, eligibleItems, kind);
      return {
        orderId: order.id,
        kind,
        reason: reasonOptions[kind][0].value,
        note: "",
        contactPhone: "13512344321",
        items: eligibleItems,
        amount: estimate.maxRefundAmount.toFixed(2),
        estimate
      };
    }

    function computeSelectedSubtotal(items) {
      return items
        .filter(item => item.checked)
        .reduce((sum, item) => sum + item.price * item.qty, 0);
    }

    function allEligibleSelected(order, items) {
      const eligible = order.items.filter(item => item.eligibleForRefund || order.orderStatus === "待发货");
      return eligible.every(source => {
        const selected = items.find(item => item.id === source.id);
        if (!selected || !selected.checked) return false;
        return selected.qty === (source.refundableQty || source.orderQty);
      });
    }

    function proportionBreakdown(breakdown, ratio) {
      const round2 = (num) => Math.round(num * 100) / 100;
      return {
        cash: round2((breakdown.cash || 0) * ratio),
        card: round2((breakdown.card || 0) * ratio),
        gift: round2((breakdown.gift || 0) * ratio),
        points: Math.round((breakdown.points || 0) * ratio),
        coupon: breakdown.coupon || "无"
      };
    }

    function computeEstimate(order, items, kind) {
      const selectedSubtotal = computeSelectedSubtotal(items);
      const orderGoodsTotal = order.items.reduce((sum, item) => sum + item.unitPrice * item.orderQty, 0) || selectedSubtotal || 1;
      const ratio = Math.min(1, selectedSubtotal / orderGoodsTotal);
      const wholeSelected = allEligibleSelected(order, items);
      let shippingRefund = 0;
      let shippingHint = "默认不可退";

      if (kind === "pendingShip") {
        if (wholeSelected) {
          shippingRefund = order.paymentSummary.shipping;
          shippingHint = "当前选择覆盖剩余全部商品，原订单运费可退";
        } else {
          shippingHint = "部分退款后订单仍需发货，原订单运费默认不退";
        }
      }

      if (kind === "shippedRefund" || kind === "returnRefund") {
        shippingHint = "商品已发货，原订单运费默认不可退";
      }

      const maxRefundAmount = Math.round((selectedSubtotal + shippingRefund) * 100) / 100;
      const breakdown = proportionBreakdown(order.paymentBreakdown, maxRefundAmount / (order.paymentSummary.total || maxRefundAmount || 1));
      return { maxRefundAmount, shippingHint, breakdown };
    }

    function createAftersaleFromForm(order, form) {
      const estimate = computeEstimate(order, form.items, form.kind);
      const typeMap = {

    function renderOrderCard(order) {

          return `<button class="btn primary" data-action="open-aftersale" data-aftersale-id="${order.aftersaleId}">售后详情</button>`;

          return `<button class="btn ghost">查看物流</button><button class="btn primary" data-action="open-order" data-order-id="${order.id}">申请售后</button>`;

          return `<button class="btn ghost">再次购买</button>${order.orderBusinessType === "商品物流发货" ? `<button class="btn disabled">${order.notEligibleReason.includes("售后") ? "申请售后" : "申请退款"}</button>` : ""}`;
        }
        return `<button class="btn ghost">再次购买</button>`;

        ? `<div class="hint disabled">${order.notEligibleReason}</div>`

              </div>
              <div class="hint warn">请勿到付，寄回后保留物流单号。</div>
            </section>
          ` : ""}

          ${showReturnLogistics ? `
            <section class="card">
              <h2 class="sec-title">买家退货物流</h2>
              <div class="info-list">
                <div class="info-row"><span>快递公司</span><strong>${aftersale.returnLogistics.company}</strong></div>
                <div class="info-row"><span>快递单号</span><strong>${aftersale.returnLogistics.no}</strong></div>
                <div class="info-row"><span>寄出时间</span><strong>${aftersale.returnLogistics.time}</strong></div>
              </div>
            </section>
          ` : ""}

          ${showRefundBreakdown ? `
            <section class="card">
              <h2 class="sec-title">退款明细</h2>
              <div class="info-list">
                ${formatBreakdown(aftersale.breakdown)}
              </div>
            </section>
          ` : ""}

          ${showReship ? `
            <section class="card">
              <h2 class="sec-title">补寄信息</h2>
              <div class="info-list">
                <div class="info-row"><span>补寄原因</span><strong>${aftersale.reshipReason || "少件 / 漏发"}</strong></div>
                ${aftersale.reshipLogistics ? `
                  <div class="info-row"><span>快递公司</span><strong>${aftersale.reshipLogistics.company}</strong></div>
                  <div class="info-row"><span>快递单号</span><strong>${aftersale.reshipLogistics.no}</strong></div>
                  <div class="info-row"><span>发货时间</span><strong>${aftersale.reshipLogistics.time}</strong></div>
                ` : `<div class="info-row"><span>当前状态</span><strong>等待仓库出库</strong></div>`}
              </div>
            </section>
          ` : ""}

          ${showClose ? `
            <section class="card">
              <h2 class="sec-title">关闭信息</h2>
              <div class="info-list">
                <div class="info-row"><span>关闭类型</span><strong>${aftersale.closeInfo.type}</strong></div>
                <div class="info-row"><span>关闭时间</span><strong>${aftersale.closeInfo.time}</strong></div>
                <div class="info-row"><span>关闭原因</span><strong>${aftersale.closeInfo.reason}</strong></div>
                <div class="info-row"><span>关闭说明</span><strong>${aftersale.closeInfo.desc}</strong></div>
              </div>
            </section>
          ` : ""}

          <section class="card">
            <h2 class="sec-title">申请信息</h2>
            <div class="info-list">
              <div class="info-row"><span>订单编号</span><strong>${aftersale.orderNo}</strong></div>
              <div class="info-row"><span>售后编号</span><strong>${aftersale.id}</strong></div>
              <div class="info-row"><span>申请类型</span><strong>${aftersale.type}</strong></div>
              <div class="info-row"><span>申请原因</span><strong>${aftersale.reasonLabel}</strong></div>
              ${aftersale.note ? `<div class="info-row"><span>申请说明</span><strong>${aftersale.note}</strong></div>` : ""}
            </div>
          </section>

          <section class="card">
            <h2 class="sec-title">处理流程结果</h2>
            <div class="result-list">
              ${aftersale.timeline.map(item => `
                <div class="timeline-card">
                  <strong>${item.title}</strong>
                  <p>${item.content}</p>
                </div>
              `).join("")}
            </div>
          </section>
        </section>
        <div class="footer">${getAftersaleButtons(aftersale)}</div>
      `;
    }

    function renderDialog() {
      if (!appState.dialog) return "";
      const order = getCurrentOrder();
      if (appState.dialog === "non-logistics-confirm") {
        return `
          <div class="dialog">
            <div class="dialog-body">
              <strong>退款申请</strong>
              <p>退款申请提交后，将等待商家处理退款，是否确认发出申请？</p>
            </div>
            <div class="dialog-actions">
              <button data-action="close-dialog">取消</button>
              <button data-action="confirm-non-logistics-refund" data-order-id="${order.id}">申请退款</button>
            </div>
          </div>
        `;
      }
      return "";
    }

    function renderCurrentPage() {
      const app = document.getElementById("app");
      if (appState.currentPage === "order-list") {
        app.innerHTML = renderOrderList();
      } else if (appState.currentPage === "order-detail") {
        app.innerHTML = renderOrderDetail(getCurrentOrder());
      } else if (appState.currentPage === "aftersale-type") {
        app.innerHTML = renderAftersaleType(getCurrentOrder());
      } else if (appState.currentPage === "refund-form") {
        app.innerHTML = renderRefundForm(getCurrentOrder(), appState.form, appState.form.kind === "pendingShip" ? "仅退款" : "仅退款（未收货仅退款）", appState.form.estimate.shippingHint);
      } else if (appState.currentPage === "return-form") {
        app.innerHTML = renderRefundForm(getCurrentOrder(), appState.form, "退货退款（已收到货）", appState.form.estimate.shippingHint);
      } else if (appState.currentPage === "return-logistics") {
        app.innerHTML = renderReturnLogistics(getCurrentAftersale());
      } else if (appState.currentPage === "aftersale-detail") {
        app.innerHTML = renderAftersaleDetail(getCurrentAftersale());
      }
    }

    function renderOverlay() {
      const overlay = document.getElementById("overlay");
      overlay.innerHTML = renderDialog();
      overlay.classList.toggle("show", Boolean(appState.dialog));
    }

    function render() {
      renderNav();
      renderCurrentPage();
      renderOverlay();
    }

    function updateFormEstimate() {
      const order = getCurrentOrder();
      appState.form.estimate = computeEstimate(order, appState.form.items, appState.form.kind);
      appState.form.amount = appState.form.estimate.maxRefundAmount.toFixed(2);
    }

    document.body.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;
      if (action === "back") {
        goBack();
      }
      if (action === "set-tab") {
        appState.listTab = target.dataset.tab;
        render();
      }
      if (action === "open-order") {
        navigate({ currentPage: "order-detail", currentOrderId: target.dataset.orderId, currentAftersaleId: null, selectedType: "", form: null, dialog: null });
      }
      if (action === "open-aftersale") {
        navigate({ currentPage: "aftersale-detail", currentOrderId: null, currentAftersaleId: target.dataset.aftersaleId, selectedType: "", form: null, dialog: null });
      }
      if (action === "open-aftersale-type") {
        navigate({ currentPage: "aftersale-type", currentOrderId: target.dataset.orderId, currentAftersaleId: null, selectedType: "", form: null, dialog: null });
      }
      if (action === "start-pending-refund") {
        const order = orderMap[target.dataset.orderId];
        navigate({ currentPage: "refund-form", currentOrderId: order.id, currentAftersaleId: null, selectedType: "pendingShip", form: createForm(order, "pendingShip"), dialog: null });
      }
      if (action === "start-shipped-refund") {
        const order = orderMap[target.dataset.orderId];
        navigate({ currentPage: "refund-form", currentOrderId: order.id, currentAftersaleId: null, selectedType: "shippedRefund", form: createForm(order, "shippedRefund"), dialog: null });
      }
      if (action === "start-return-refund") {
        const order = orderMap[target.dataset.orderId];
        navigate({ currentPage: "return-form", currentOrderId: order.id, currentAftersaleId: null, selectedType: "returnRefund", form: createForm(order, "returnRefund"), dialog: null });
      }
      if (action === "non-logistics-confirm") {
        appState.currentOrderId = target.dataset.orderId;
        appState.dialog = "non-logistics-confirm";
        renderOverlay();
      }
      if (action === "close-dialog") {
        appState.dialog = null;
        renderOverlay();
      }
      if (action === "confirm-non-logistics-refund") {
        const order = orderMap[target.dataset.orderId];
        const aftersaleId = createAftersaleFromNonLogistics(order);
        appState.dialog = null;
        navigate({ currentPage: "aftersale-detail", currentOrderId: null, currentAftersaleId: aftersaleId, selectedType: "", form: null, dialog: null });
      }
      if (action === "toggle-item") {
        const item = appState.form.items.find(entry => entry.id === target.dataset.itemId);
        if (!item) return;
        item.checked = target.checked;
        updateFormEstimate();
        renderCurrentPage();
      }
      if (action === "decrease-qty" || action === "increase-qty") {
        const item = appState.form.items.find(entry => entry.id === target.dataset.itemId);
        if (!item || !item.checked) return;
        if (action === "decrease-qty") item.qty = Math.max(1, item.qty - 1);
        if (action === "increase-qty") item.qty = Math.min(item.maxQty, item.qty + 1);
        updateFormEstimate();
        renderCurrentPage();
      }
      if (action === "submit-form") {
        const order = getCurrentOrder();
        const aftersaleId = createAftersaleFromForm(order, appState.form);
        navigate({ currentPage: "aftersale-detail", currentOrderId: null, currentAftersaleId: aftersaleId, selectedType: "", form: null, dialog: null });
      }
      if (action === "fill-return-logistics") {
        navigate({ currentPage: "return-logistics", currentOrderId: null, currentAftersaleId: appState.currentAftersaleId, selectedType: "", form: null, dialog: null });
      }
      if (action === "submit-return-logistics") {
        const record = getCurrentAftersale();
        record.aftersaleStatus = "待收货";
        record.title = "待收货";
        record.desc = "商品已寄出，等待商家确认收货";
        record.returnLogistics = { company: "韵达快递", no: "12412412", time: "2026.06.06 14:20" };
        record.timeline.push({ title: "退货寄回结果", content: "买家已填写退货物流：韵达快递 12412412。" });
        navigate({ currentPage: "aftersale-detail", currentOrderId: null, currentAftersaleId: record.id, selectedType: "", form: null, dialog: null });
      }
      if (action === "cancel-aftersale") {
        const record = getCurrentAftersale();
        record.aftersaleStatus = "已关闭";
        record.title = "已关闭";
        record.desc = "您已撤销售后申请";
        record.closeType = "已撤销";
        record.closeInfo = { type: "已撤销", time: "2026.06.07 10:50", reason: "消费者主动撤销", desc: "仍在售后期内，可重新申请" };
        record.timeline.push({ title: "关闭结果", content: "消费者主动撤销售后申请。" });
        render();
      }
      if (action === "jump-aftersale-statuses") {
        navigate({ currentPage: "aftersale-detail", currentOrderId: null, currentAftersaleId: "AF-2002", selectedType: "", form: null, dialog: null });
      }
    });

    document.body.addEventListener("change", (event) => {
      const target = event.target;
      if (target.matches("[data-action='update-form-reason']")) {
        appState.form.reason = target.value;
      }
    });

    document.body.addEventListener("input", (event) => {
      const target = event.target;
      if (target.matches("[data-action='update-form-note']")) {
        appState.form.note = target.value;
      }
      if (target.matches("[data-action='update-form-phone']")) {
        appState.form.contactPhone = target.value;
      }
      if (target.matches("[data-action='update-form-amount']")) {
        const value = Number(target.value || 0);
        appState.form.amount = Math.min(value, appState.form.estimate.maxRefundAmount).toFixed(2);
        if (value > appState.form.estimate.maxRefundAmount) {
          target.value = appState.form.amount;
        }
      }
    });

    render();
  </script>
</body>
</html>
