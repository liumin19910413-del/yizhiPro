<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商户后台 - 售后管理</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --line: #e5e6eb;
      --line-soft: #f0f1f4;
      --head: #f7f8fa;
      --text: #1f1f1f;
      --text-2: #4b5563;
      --text-3: #8b93a1;
      --blue: #2f7dff;
      --blue-soft: #edf4ff;
      --red: #ff4d4f;
      --green: #16a34a;
      --green-soft: #eaf8ee;
      --red-soft: #fff1f0;
      --gray-soft: #f2f3f5;
      --shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    }

    body { min-width: 1500px; }
    button, input, select { font: inherit; }

    .shell {
      display: grid;
      grid-template-columns: 76px 136px minmax(1200px, 1fr);
      grid-template-rows: 56px minmax(0, 1fr);
      min-height: 100vh;
    }

    .primary-nav, .secondary-nav, .topbar { background: var(--bg); }

    .primary-nav {
      grid-column: 1;
      grid-row: 1 / 3;
      border-right: 1px solid var(--line);
      padding: 18px 12px;
    }

    .brand {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      margin: 0 auto 24px;
      border-radius: 12px;
      background: linear-gradient(160deg, #3f8cff 0%, #2256d8 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .nav-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      margin: 0 auto;
      border-radius: 12px;
      color: #8b93a1;
      font-size: 12px;
      text-align: center;
      line-height: 1.2;
    }

    .nav-icon.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 10px 24px rgba(47, 125, 255, 0.22);
    }

    .topbar {
      grid-column: 2 / 4;
      grid-row: 1;
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
    }

    .topbar-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 100%;
    }

    .topbar-tab {
      position: relative;
      display: inline-flex;
      align-items: center;
      height: 100%;
      padding: 0 18px;
      color: var(--text-2);
      font-size: 14px;
      font-weight: 500;
    }

    .topbar-tab.active {
      color: var(--text);
      font-weight: 600;
    }

    .topbar-tab.active::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 0;
      height: 3px;
      border-radius: 999px 999px 0 0;
      background: var(--blue);
    }

    .secondary-nav {
      grid-column: 2;
      grid-row: 2;
      border-right: 1px solid var(--line);
      padding: 20px 0;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 10px;
      padding: 10px;
      border-radius: 8px;
      color: #667085;
      font-size: 14px;
    }

    .menu-item.active {
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 600;
    }

    .content {
      grid-column: 3;
      grid-row: 2;
      padding: 16px 20px 24px;
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }

    .filters {
      display: grid;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    .filters-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .filters-left,
    .filters-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .field select,
    .search-group input,
    .btn {
      height: 40px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
    }

    .field select {
      min-width: 138px;
      padding: 0 12px;
      color: var(--text);
    }

    .date-icon, .status-icon, .search-prefix { color: #6b7280; }
    .dash { color: var(--text-3); }

    .search-group {
      display: flex;
      align-items: center;
      overflow: hidden;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #d9d9d9;
      height: 40px;
    }

    .search-prefix {
      display: grid;
      place-items: center;
      width: 40px;
      flex: 0 0 auto;
    }

    .search-group input {
      width: 320px;
      padding: 0 12px;
      border: 0;
      border-left: 1px solid #eceef2;
      border-radius: 0;
      color: var(--text);
      outline: none;
      height: 100%;
    }

    .btn {
      padding: 0 20px;
      color: var(--text-2);
      cursor: pointer;
    }

    .btn-primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .status-tabs {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: nowrap;
      min-height: 48px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: #c7cfdb transparent;
    }

    .status-tabs::-webkit-scrollbar {
      height: 6px;
    }

    .status-tabs::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: #c7cfdb;
    }

    .status-tab {
      flex: 0 0 auto;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 48px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text-2);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .status-icon {
      font-size: 12px;
    }

    .status-tab.active {
      color: var(--blue);
      font-weight: 600;
    }

    .status-tab.active::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--blue);
    }

    .status-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: #f2f3f5;
      color: #8b93a1;
      font-size: 11px;
      line-height: 20px;
    }

    .status-tab.active .status-count {
      background: var(--blue);
      color: #fff;
    }

    .status-count.alert {
      background: var(--red);
      color: #fff;
    }

    /* =============================================
       表格：中间列横向滚动，首列+末2列固定
    ============================================= */
    .table-outer {
      position: relative;
      display: flex;
      overflow: hidden;
    }

    /* 固定左侧区域 */
    .table-fixed-left {
      flex: 0 0 auto;
      overflow: hidden;
      border-right: 2px solid var(--line);
      z-index: 2;
      background: #fff;
    }

    /* 固定右侧区域 */
    .table-fixed-right {
      flex: 0 0 auto;
      overflow: hidden;
      border-left: 2px solid var(--line);
      z-index: 2;
      background: #fff;
    }

    /* 中间滚动区域 */
    .table-scroll-middle {
      flex: 1 1 auto;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: #c7cfdb transparent;
    }

    .table-scroll-middle::-webkit-scrollbar {
      height: 6px;
    }
    .table-scroll-middle::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: #c7cfdb;
    }

    table {
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }

    /* 固定左侧表格 */
    .table-fixed-left table {
      width: 200px;
    }

    /* 固定右侧表格 */
    .table-fixed-right table {
      width: 224px;
    }

    /* 中间滚动表格 */
    .table-scroll-middle table {
      width: 100%;
      min-width: 860px;
    }

    thead th {
      padding: 14px 16px;
      background: var(--head);
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      color: #444;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    thead th:last-child,
    tbody td:last-child { border-right: 0; }

    tbody td {
      padding: 16px;
      border-bottom: 1px solid var(--line-soft);
      border-right: 1px solid var(--line-soft);
      vertical-align: top;
      color: #555;
      background: #fff;
      overflow: hidden;
    }

    tbody tr:hover td { background: #eef4ff; }

    /* 行高同步 */
    .table-fixed-left tbody tr,
    .table-fixed-right tbody tr,
    .table-scroll-middle tbody tr {
      height: 1px; /* will be overridden by JS sync */
    }

    .link {
      color: var(--blue);
      text-decoration: none;
      cursor: pointer;
    }

    .muted { color: var(--text-3); }
    .money { color: var(--red); font-weight: 600; }

    .row-stack, .goods-stack, .ops {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ops-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* 列宽定义 */
    .col-id      { width: 200px; }
    .col-type    { width: 80px; }
    .col-order-type { width: 100px; }
    .col-goods   { width: 240px; }
    .col-user    { width: 120px; }
    .col-reason  { width: 160px; }
    .col-amount  { width: 168px; }
    .col-duty    { width: 148px; }
    .col-logistics { width: 130px; }
    .col-store   { width: 120px; }
    .col-status  { width: 120px; }
    .col-actions { width: 104px; }

    .cell-type {
      color: var(--text-2);
      font-weight: 500;
    }

    .status-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      line-height: 1.4;
    }

    .status-main {
      color: var(--text);
      font-weight: 500;
    }

    .status-sub {
      color: var(--text-3);
      font-size: 12px;
    }

    .cell-id-content .link,
    .cell-id-content .muted {
      display: block;
      line-height: 1.45;
      word-break: break-all;
    }

    .cell-id-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .apply-time {
      font-size: 12px;
      color: var(--text-3);
    }

    .duty-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
      line-height: 1.45;
      font-size: 12px;
    }

    .duty-cell span {
      display: block;
      word-break: break-all;
    }

    .logistics-stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
      line-height: 1.45;
      font-size: 12px;
    }

    .logistics-label {
      color: var(--text-3);
    }

    .logistics-company {
      color: var(--text-2);
    }

    .logistics-code {
      color: #555;
      word-break: break-all;
    }

    .goods-item {
      display: flex;
      align-items: flex-start;
      min-width: 0;
    }

    .goods-name-qty {
      word-break: break-all;
      line-height: 1.5;
    }

    .amount-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      line-height: 1.5;
    }

    .amount-label {
      color: var(--text-3);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      height: 28px;
      padding: 0 12px;
      border-radius: 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill-blue { background: var(--blue-soft); color: var(--blue); }
    .pill-green { background: var(--green-soft); color: var(--green); }
    .pill-red { background: var(--red-soft); color: var(--red); }
    .pill-gray { background: var(--gray-soft); color: #737b87; }

    .cell-actions .ops {
      display: flex;
      flex-direction: column;
      gap: 6px;
      white-space: nowrap;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 18px;
      color: var(--text-2);
      font-size: 13px;
      background: #fff;
    }

    .pager {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .page {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text-2);
    }

    .page.active {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .drawer-mask, .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.44);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .drawer-mask.show, .modal-mask.show {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 820px;
      max-width: calc(100vw - 120px);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      box-shadow: var(--shadow);
      transform: translateX(100%);
      transition: transform 180ms ease;
      z-index: 20;
    }

    .drawer.show { transform: translateX(0); }

    .drawer-header, .drawer-footer {
      padding: 16px 20px;
      background: #fff;
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .drawer-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
    }

    .drawer-body {
      flex: 1;
      overflow: auto;
      padding: 18px 20px 96px;
    }

    .drawer-section {
      margin-bottom: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .drawer-section h3 {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #f6f7f9;
      font-size: 15px;
    }

    .section-body { padding: 16px; }

    .notice {
      padding: 12px 14px;
      border: 1px solid #cfe2ff;
      border-radius: 8px;
      background: #f1f7ff;
      color: var(--blue);
      font-size: 13px;
      line-height: 1.7;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 18px;
    }

    .kv {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px dashed #eceef2;
      font-size: 13px;
    }

    .kv:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .kv span:first-child { color: var(--text-3); }

    .drawer-footer {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid var(--line);
    }

    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 480px;
      max-width: calc(100vw - 40px);
      overflow: hidden;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.16);
      transform: translate(-50%, -48%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 30;
    }

    .modal.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%);
    }

    .modal-header, .modal-footer {
      padding: 16px 18px;
      background: #fff;
    }

    .modal-header {
      border-bottom: 1px solid var(--line);
      font-size: 18px;
      font-weight: 600;
    }

    .modal-body {
      padding: 18px;
      color: var(--text-2);
      font-size: 14px;
      line-height: 1.7;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid var(--line);
    }

    .textarea {
      width: 100%;
      min-height: 110px;
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      resize: vertical;
      font: inherit;
    }

    /* ============================================================
       抽屉升级：详情面板样式
    ============================================================ */

    /* 步骤条 */
    .steps-wrap { background:#fff; border-radius:10px; border:1px solid var(--line); padding:20px 24px 16px; margin-bottom:14px; }
    .steps-bar { display:flex; align-items:flex-start; }
    .step { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; }
    .step::before { content:''; position:absolute; top:15px; left:calc(50% + 18px); right:calc(-50% + 18px); height:2px; background:#e5e6eb; }
    .step:last-child::before { display:none; }
    .step.done::before { background:var(--blue); }
    .step-circle { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; background:#e5e6eb; color:#9ca3af; position:relative; z-index:1; }
    .step-circle.done { background:var(--blue); color:#fff; }
    .step-circle.active { background:var(--blue); color:#fff; box-shadow:0 0 0 5px rgba(47,125,255,0.15); }
    .step-label { margin-top:7px; font-size:11px; color:#9ca3af; text-align:center; white-space:nowrap; line-height:1.4; }
    .step-label.active { color:var(--blue); font-weight:600; }
    .step-label.done { color:#6b7280; }

    /* 提示条 */
    .status-notice { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; margin-bottom:14px; border-radius:8px; background:#eff6ff; color:#1d4ed8; font-size:13px; line-height:1.6; border:1px solid #bfdbfe; }
    .status-notice-icon { font-size:16px; flex-shrink:0; margin-top:1px; }

    /* 摘要双栏卡 */
    .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
    .summary-card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; }
    .user-row { display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; }
    .user-avatar { width:40px; height:40px; border-radius:50%; background:#dbeafe; color:#2563eb; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; flex-shrink:0; }
    .user-name { font-size:14px; font-weight:600; color:#111827; }
    .user-store { font-size:12px; color:#6b7280; }
    .user-phone { font-size:12px; color:#6b7280; margin-top:2px; }
    .summary-amount-row { margin:10px 0 6px; font-size:13px; color:#6b7280; }
    .summary-amount-row .money { font-size:18px; }
    .summary-order-row { font-size:12px; color:#6b7280; margin-bottom:4px; }
    .summary-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
    .dtag { display:inline-flex; align-items:center; height:20px; padding:0 8px; border-radius:4px; font-size:11px; background:#f0f1f4; color:#4b5563; }
    .dtag-blue { background:#dbeafe; color:#1d4ed8; }
    .dtag-orange { background:#fef3c7; color:#92400e; }

    .goods-label { font-size:12px; color:#9ca3af; margin-bottom:10px; font-weight:500; letter-spacing:0.02em; }
    .goods-detail-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px dashed #f0f1f4; }
    .goods-detail-row:last-child { border-bottom:0; padding-bottom:0; }
    .goods-thumb { width:42px; height:42px; border-radius:6px; background:linear-gradient(135deg,#fde68a 0%,#fca5a5 100%); flex-shrink:0; }
    .goods-info { flex:1; min-width:0; }
    .goods-title { font-size:13px; font-weight:500; color:#1f1f1f; line-height:1.4; }
    .goods-price { font-size:11px; color:#9ca3af; margin-top:2px; }
    .goods-qty { font-size:12px; color:#4b5563; white-space:nowrap; }
    .goods-total { font-size:13px; font-weight:700; color:#ef4444; white-space:nowrap; }

    /* 通用卡片 */
    .detail-card { background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:12px; }
    .detail-card-head { display:flex; align-items:center; justify-content:space-between; padding:11px 16px; background:#f7f8fa; border-bottom:1px solid var(--line); }
    .detail-card-title { font-size:14px; font-weight:600; color:#111827; }
    .detail-card-time { font-size:12px; color:#9ca3af; }
    .detail-card-body { padding:14px 16px; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px 24px; }

    .detail-full { grid-column:1/-1; }
    .detail-link { color:var(--blue); font-size:12px; cursor:pointer; text-decoration:none; }

    .refund-sheet { background:#fafbfc; border-radius:8px; padding:12px 14px; }
    .refund-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; font-size:13px; }

    .refund-total-row .val { color:#ef4444; font-size:16px; }
    .pay-breakdown { margin-top:8px; padding-top:8px; border-top:1px dashed #e5e6eb; }
    .pay-item { display:flex; justify-content:space-between; font-size:12px; color:#6b7280; padding:2px 0; }

    /* 质检表格 */
    .qc-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:10px; }
    .qc-table th { padding:7px 10px; background:#f7f8fa; border:1px solid var(--line); color:#6b7280; font-weight:500; text-align:center; white-space:nowrap; }
    .qc-table td { padding:7px 10px; border:1px solid #f0f1f4; color:#374151; text-align:center; }
    .qc-table tr:last-child td { border-bottom:1px solid #f0f1f4; }

    /* 操作日志 */
    .log-section { background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:12px; }
    .log-toggle { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; cursor:pointer; font-size:14px; font-weight:600; color:#111827; user-select:none; }
    .log-toggle:hover { background:#f9fafb; }
    .log-arrow { font-size:12px; color:#9ca3af; transition:transform 160ms; }
    .log-arrow.open { transform:rotate(180deg); }
    .log-body { padding:4px 16px 14px; border-top:1px solid var(--line); }
    .log-item { display:flex; align-items:flex-start; gap:8px; padding:6px 0; font-size:12px; color:#6b7280; border-bottom:1px dashed #f0f1f4; }
    .log-item:last-child { border-bottom:0; }
    .log-dot { width:6px; height:6px; border-radius:50%; background:var(--blue); margin-top:4px; flex-shrink:0; }

    .form-group { margin-bottom:14px; }
    .form-label { display:block; font-size:13px; color:#374151; margin-bottom:5px; font-weight:500; }
    .form-input, .form-select, .form-textarea { width:100%; padding:8px 12px; border:1px solid #d9d9d9; border-radius:6px; font:inherit; font-size:13px; color:#1f1f1f; background:#fff; outline:none; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(47,125,255,0.1); }

    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* 退回物流：只显示快递公司名 + 物流单号，无数据显示 - */
    function formatReturnLogistics(data) {
      if (!data) return "<span class='muted'>-</span>";
      const { customerReturn, merchantReship } = data;
      // 优先取客户寄回，其次取商家补寄
      const entry = (customerReturn && (customerReturn.company || customerReturn.trackNo))
        ? customerReturn
        : (merchantReship && (merchantReship.company || merchantReship.trackNo))
          ? merchantReship
          : null;
      if (!entry) return "<span class='muted'>-</span>";
      return `
        <div class="logistics-stack">
          <span class="logistics-company">${entry.company || ""}</span>
          ${entry.trackNo ? `<span class="logistics-code">${entry.trackNo}</span>` : ""}
        </div>
      `;
    }

    /* 责任人：退货责任 + 退回运费责任，仅退款单（无需退货）显示 - */

      return `

          <span><span class="amount-label">申请金额：</span><strong class="money">${row.applyAmount}</strong>${applyFreightStr}</span>

    /* 三段表格行高同步 */
    function syncRowHeights() {
      const leftRows   = bodyLeft.querySelectorAll("tr");
      const middleRows = bodyMiddle.querySelectorAll("tr");
      const rightRows  = bodyRight.querySelectorAll("tr");
      const count = Math.max(leftRows.length, middleRows.length, rightRows.length);

      // reset heights first
      [leftRows, middleRows, rightRows].forEach((trList) => {
        trList.forEach((tr) => { tr.style.height = "auto"; });
      });

      for (let i = 0; i < count; i++) {
        const trs = [leftRows[i], middleRows[i], rightRows[i]].filter(Boolean);
        const maxH = Math.max(...trs.map((tr) => tr.getBoundingClientRect().height));
        trs.forEach((tr) => { tr.style.height = maxH + "px"; });
      }
    }

    /* ─── 步骤条配置 ─── */
    function getSteps(row) {
      const isReship = row.statusKey === "pending_reship" || row.statusKey === "pending_buyer_receive"
        || (row.statusKey === "completed" && row.requestInfo.applyType.includes("补寄"))
        || (row.category === "仅退款" && row.actions && row.actions.length === 0 && row.returnLogisticsData && row.returnLogisticsData.merchantReship);
      const isNonLogistics = ["商品自提订单","套餐订单","开充值订单","预定金订单"].includes(row.orderType);
      const isReturnRefund = row.category === "退货退款";

      if (isNonLogistics) {
        return [
          { label:"(1)买家申请", key:"apply" },
          { label:"(2)待退款", key:"refund" },
          { label:"(3)售后完成", key:"done" }
        ];
      }
      if (isReship) {
        return [
          { label:"(1)买家申请", key:"apply" },
          { label:"(2)商家审核", key:"review" },
          { label:"(3)待补寄出库", key:"reship_out" },
          { label:"(4)待买家收货", key:"buyer_recv" },
          { label:"(5)补寄完成", key:"done" }
        ];
      }
      if (isReturnRefund) {
        return [
          { label:"(1)买家申请", key:"apply" },
          { label:"(2)商家审核", key:"review" },
          { label:"(3)退货中", key:"returning" },
          { label:"(4)已收货", key:"received" },
          { label:"(5)售后完成", key:"done" }
        ];
      }
      return [
        { label:"(1)买家申请", key:"apply" },
        { label:"(2)商家审核", key:"review" },
        { label:"(3)待退款", key:"refund" },
        { label:"(4)售后完成", key:"done" }
      ];
    }

    function getActiveStepKey(row) {
      const m = {
        pending_review: "review",
        pending_return: "review",
        pending_receive: "returning",
        pending_refund: "refund",
        refunding: "refund",
        refund_failed: "refund",
        pending_reship: "reship_out",
        pending_buyer_receive: "buyer_recv",
        completed: "done",
        closed: "done"
      };
      if (["商品自提订单","套餐订单","开充值订单","预定金订单"].includes(row.orderType)) {
        if (row.statusKey === "pending_refund" || row.statusKey === "refunding" || row.statusKey === "refund_failed") return "refund";
        if (row.statusKey === "completed") return "done";
        return "apply";
      }
      return m[row.statusKey] || "apply";
    }

    function renderSteps(row) {
      const steps = getSteps(row);
      const activeKey = getActiveStepKey(row);
      let activeFound = false;
      const html = steps.map((step, i) => {
        let cls = "";
        if (step.key === activeKey) { cls = "active"; activeFound = true; }
        else if (!activeFound) cls = "done";
        const connectorDone = !activeFound || (cls === "done");
        return `<div class="step ${connectorDone && i < steps.length - 1 ? "done" : ""}">
          <div class="step-circle ${cls}">${cls === "done" ? "✓" : i + 1}</div>
          <div class="step-label ${cls}">${step.label}</div>
        </div>`;
      });
      return `<div class="steps-wrap"><div class="steps-bar">${html.join("")}</div></div>`;
    }

              <div class="detail-kv"><span class="k">寄回邮费补贴</span><span class="v">${row.applyFreight || "¥0.00"}</span></div>
              ${isReturnPath ? `<div class="detail-kv"><span class="k">退货地址</span><span class="v">番禺大道人仓库 · 天安总部中心15号楼202</span></div>
              <div class="detail-kv"><span class="k">寄回截止时间</span><span class="v">2026-06-13</span></div>` : ""}
            </div>
          </div>
        </div>`);
      }

      // 3. 买家退货物流卡（pending_receive / pending_refund退货路径 / completed退货路径）
      const showReturnLogistics = isReturnPath && ["pending_receive","pending_refund","refunding","refund_failed","completed"].includes(sk);
      const retLog = row.returnLogisticsData && row.returnLogisticsData.customerReturn;
      if (showReturnLogistics && retLog) {
        const returnTime = row.operatorTrail.find(t => t.includes("寄回")) || "";
        cards.push(`<div class="detail-card">
          <div class="detail-card-head">
            <span class="detail-card-title">退货寄回结果</span>
            <span class="detail-card-time">${returnTime}</span>
          </div>
          <div class="detail-card-body">
            <div class="detail-grid">
              <div class="detail-kv"><span class="k">处理结论</span><span class="v">买家已填写退货物流</span></div>
              <div class="detail-kv"><span class="k">快递公司</span><span class="v">${retLog.company}</span></div>
              <div class="detail-kv"><span class="k">快递单号</span><span class="v">${retLog.trackNo}</span></div>
              <div class="detail-kv detail-full"><span class="k" style="display:inline"></span><a class="detail-link">查看退货物流 →</a></div>
            </div>
          </div>
        </div>`);
      }

      // 4. 质检结果卡（退货路径 pending_refund / refunding / completed）
      const showQC = isReturnPath && ["pending_refund","refunding","refund_failed","completed"].includes(sk);
      if (showQC) {
        const qcTime = row.operatorTrail.find(t => t.includes("质检") || t.includes("收货")) || "";
        const qcRows = row.goods.map(g => `<tr>
          <td style="text-align:left;">${g.name}</td>
          <td>${g.qty}</td>
          <td>${g.qty}</td>
          <td>${sk === "completed" ? g.qty : g.qty}</td>
          <td>0</td>
          <td>0</td>
          <td>—</td>
        </tr>`).join("");
        cards.push(`<div class="detail-card">
          <div class="detail-card-head">
            <span class="detail-card-title">仓库质检结果</span>
            <span class="detail-card-time">${qcTime}</span>
          </div>
          <div class="detail-card-body">
            <div class="detail-grid" style="margin-bottom:10px;">
              <div class="detail-kv"><span class="k">处理结论</span><span class="v">全部完好，可入库</span></div>
              <div class="detail-kv"><span class="k">质检人</span><span class="v">仓库王敏</span></div>
            </div>
            <table class="qc-table">
              <thead><tr><th style="text-align:left;">商品/SKU</th><th>应退数</th><th>签收数</th><th>完好入库</th><th>破损数</th><th>缺失数</th><th>异常类型</th></tr></thead>
              <tbody>${qcRows}</tbody>
            </table>
          </div>
        </div>`);
      }

      // 5. 退款清分账单（pending_refund / refunding / refund_failed / completed，非补寄）
      const showRefundSheet = !isReship && ["pending_refund","refunding","refund_failed","completed"].includes(sk);
      if (showRefundSheet) {
        const refundTime = row.operatorTrail.find(t => t.includes("退款")) || "";
        const totalAmt = row.applyAmount;
        const freightAmt = row.refundFreight || "¥0.00";
        cards.push(`<div class="detail-card">
          <div class="detail-card-head">
            <span class="detail-card-title">退款清分账单</span>
            <span class="detail-card-time">${refundTime}</span>
          </div>
          <div class="detail-card-body">
            <div class="refund-sheet">
              <div class="refund-row"><span class="lbl">申请退款金额</span><span class="val">${row.applyAmount}</span></div>
              <div class="refund-row"><span class="lbl">审批退款金额</span><span class="val">${row.applyAmount}</span></div>
              <hr class="refund-hr">
              <div class="refund-row"><span class="lbl">商品退款</span><span class="val">${row.applyAmount}</span></div>
              <div class="refund-row"><span class="lbl">原单运费退款</span><span class="val">¥0.00</span></div>
              <div class="refund-row"><span class="lbl">寄回邮费补贴</span><span class="val">${row.applyFreight || "¥0.00"}</span></div>
              <hr class="refund-hr">
              <div class="refund-total-row"><span class="lbl">实际退款金额</span><span class="val">${totalAmt}</span></div>
              <div class="pay-breakdown">
                <div class="pay-item"><span>微信支付</span><span>${totalAmt}</span></div>
                <div class="pay-item"><span>优惠券</span><span>暂不退回</span></div>
              </div>
              <div class="refund-row" style="margin-top:8px;padding-top:8px;border-top:1px dashed #e5e6eb;">
                <span class="lbl">分账状态</span>
                <span class="val">${sk === "completed" ? "分账冲正成功" : "待分账冲正"}</span>
              </div>
            </div>
          </div>
        </div>`);
      }

      // 6. 退款发起/完成/失败结果卡
      if (sk === "refunding") {
        const rTime = row.operatorTrail.find(t => t.includes("退款")) || "";
        cards.push(`<div class="detail-card">
          <div class="detail-card-head"><span class="detail-card-title">退款结果</span><span class="detail-card-time">${rTime}</span></div>
          <div class="detail-card-body">
            <div class="detail-grid">
              <div class="detail-kv"><span class="k">处理结论</span><span class="v" style="color:#d97706;">退款处理中</span></div>
              <div class="detail-kv"><span class="k">退款单号</span><span class="v">TK${Date.now().toString().slice(-10)}</span></div>
              <div class="detail-kv"><span class="k">退款金额</span><span class="v money">${row.applyAmount}</span></div>
              <div class="detail-kv"><span class="k">渠道状态</span><span class="v">处理中，等待回执</span></div>
            </div>
          </div>
        </div>`);
      }
      if (sk === "refund_failed") {
        const fTime = row.operatorTrail.find(t => t.includes("失败")) || "";
        cards.push(`<div class="detail-card">
          <div class="detail-card-head"><span class="detail-card-title">退款失败结果</span><span class="detail-card-time">${fTime}</span></div>
          <div class="detail-card-body">
            <div class="detail-grid">
              <div class="detail-kv"><span class="k">处理结论</span><span class="v" style="color:#ef4444;">退款调用失败</span></div>
              <div class="detail-kv"><span class="k">失败原因</span><span class="v">商家账户余额不足</span></div>
              <div class="detail-kv"><span class="k">渠道返回码</span><span class="v">BALANCE_NOT_ENOUGH</span></div>
              <div class="detail-kv"><span class="k">失败时间</span><span class="v">${fTime}</span></div>
            </div>
          </div>
        </div>`);
      }
      if (sk === "completed" && !isReship) {
        const doneTime = row.operatorTrail[row.operatorTrail.length - 1] || "";
        cards.push(`<div class="detail-card">
          <div class="detail-card-head"><span class="detail-card-title">退款结果</span><span class="detail-card-time">${doneTime}</span></div>
          <div class="detail-card-body">
            <div class="detail-grid">
              <div class="detail-kv"><span class="k">处理结论</span><span class="v" style="color:#16a34a;">✓ 退款成功，已原路退回</span></div>
              <div class="detail-kv"><span class="k">退款金额</span><span class="v money">${row.refundAmount || row.applyAmount}</span></div>
              <div class="detail-kv"><span class="k">退款单号</span><span class="v">TK${row.id.slice(-8)}</span></div>
              <div class="detail-kv"><span class="k">退款时间</span><span class="v">${doneTime}</span></div>
            </div>
          </div>
        </div>`);
      }

      // 7. 补寄处理结果卡
      if (isReship && ["pending_reship","pending_buyer_receive","completed"].includes(sk)) {
        const reshTime = row.operatorTrail.find(t => t.includes("补寄")) || "";
        cards.push(`<div class="detail-card">
          <div class="detail-card-head"><span class="detail-card-title">补寄处理结果</span><span class="detail-card-time">${reshTime}</span></div>
          <div class="detail-card-body">
            <div class="detail-grid">
              <div class="detail-kv"><span class="k">处理结论</span><span class="v">已转补寄处理</span></div>
              <div class="detail-kv"><span class="k">补寄原因</span><span class="v">${row.reason}</span></div>
              <div class="detail-kv"><span class="k">补寄责任方</span><span class="v">${row.returnDuty || "商家责任"}</span></div>
              ${row.goods.map(g=>`<div class="detail-kv detail-full"><span class="k">补寄商品</span><span class="v">${g.name} ×${g.qty}</span></div>`).join("")}
              <div class="detail-kv"><span class="k">出库状态</span><span class="v">${sk === "pending_reship" ? "未创建出库申请" : "已推送云仓，等待发货"}</span></div>
            </div>
          </div>
        </div>`);
      }

      // 8. 补寄物流卡
      const reshLog = row.returnLogisticsData && row.returnLogisticsData.merchantReship;
      if (reshLog && ["pending_buyer_receive","completed"].includes(sk)) {
        const shipTime = row.operatorTrail.find(t => t.includes("云仓") || t.includes("发货")) || "";
        cards.push(`<div class="detail-card">
          <div class="detail-card-head"><span class="detail-card-title">补寄物流结果</span><span class="detail-card-time">${shipTime}</span></div>
          <div class="detail-card-body">
            <div class="detail-grid">
              <div class="detail-kv"><span class="k">处理结论</span><span class="v">仓库已发出补寄商品</span></div>
              <div class="detail-kv"><span class="k">快递公司</span><span class="v">${reshLog.company}</span></div>
              <div class="detail-kv"><span class="k">快递单号</span><span class="v">${reshLog.trackNo}</span></div>
              <div class="detail-kv detail-full"><a class="detail-link">查看补寄物流 →</a></div>
            </div>
          </div>
        </div>`);
      }

      // 9. 关闭结果卡
      if (sk === "closed") {
        const closeTime = row.operatorTrail[row.operatorTrail.length - 1] || "";
        const closeReasonMap = {
          "已拒绝": `<div class="detail-kv"><span class="k">拒绝原因</span><span class="v">不符合退款条件</span></div>
            <div class="detail-kv"><span class="k">拒绝说明</span><span class="v">商品已核销或已使用</span></div>`,
          "已撤销": `<div class="detail-kv"><span class="k">关闭来源</span><span class="v">消费者主动撤销</span></div>`,
          "超时关闭": `<div class="detail-kv detail-full"><span class="k">关闭原因</span><span class="v">超过寄回截止时间未填写物流，系统自动关闭</span></div>`,
          "人工关闭": `<div class="detail-kv"><span class="k">关闭原因</span><span class="v">财务/管理员人工关闭</span></div>`
        };
        cards.push(`<div class="detail-card">
          <div class="detail-card-head"><span class="detail-card-title">关闭结果</span><span class="detail-card-time">${closeTime}</span></div>
          <div class="detail-card-body">
            <div class="detail-grid">
              <div class="detail-kv"><span class="k">处理结论</span><span class="v" style="color:#ef4444;">售后已关闭</span></div>
              <div class="detail-kv"><span class="k">关闭类型</span><span class="v">${row.closeType || "已关闭"}</span></div>
              ${closeReasonMap[row.closeType] || ""}
              <div class="detail-kv"><span class="k">关闭时间</span><span class="v">${closeTime}</span></div>
            </div>
          </div>
        </div>`);
      }

      return `<div style="margin-bottom:12px;">${cards.join("")}</div>`;
    }

    /* ─── 操作日志 ─── */
    function renderLog(row) {
      const items = row.operatorTrail.map(t => `<div class="log-item"><div class="log-dot"></div><span>${t}</span></div>`).join("");
      return `<div class="log-section">
        <div class="log-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.log-arrow').classList.toggle('open')">
          <span>操作日志</span><span class="log-arrow">▼</span>
        </div>
        <div class="log-body" style="display:none;">${items}</div>
      </div>`;
    }

    /* ─── 主 renderDrawer ─── */
    function renderDrawer() {
      const row = rows.find((item) => item.id === state.activeRowId);
      if (!row) return;

      drawerStatusPill.className = `pill ${getStatusClass(row.statusKey)}`;
      drawerStatusPill.textContent = row.status;
      document.getElementById("drawerIdTag").textContent = row.id;

      const noticeText = noticeMap[row.statusKey] || "";

      drawerBody.innerHTML =
        renderSteps(row) +
        `<div class="status-notice"><span class="status-notice-icon">📦</span><span>${noticeText}</span></div>` +
        renderSummary(row) +
        renderBaseInfo(row) +
        renderResultCards(row) +
        renderLog(row);

      // 底部按钮
      const id = row.id;
      const btns = [];
      if (row.actions.includes("拒绝申请"))       btns.push(`<button class="btn" data-action="reject" data-id="${id}">拒绝申请</button>`);
      if (row.actions.includes("转补寄处理"))      btns.push(`<button class="btn" data-action="reship" data-id="${id}">转补寄处理</button>`);
      if (row.actions.includes("同意申请"))        btns.push(`<button class="btn btn-primary" data-action="approve" data-id="${id}">同意申请</button>`);
      if (row.actions.includes("签收质检"))        btns.push(`<button class="btn btn-primary" data-action="receive" data-id="${id}">签收质检</button>`);
      if (row.actions.includes("操作退款"))        btns.push(`<button class="btn btn-primary" data-action="refund" data-id="${id}">操作退款</button>`);
      if (row.actions.includes("重新操作退款"))    btns.push(`<button class="btn btn-primary" data-action="retry-refund" data-id="${id}">重新操作退款</button>`);
      if (row.statusKey === "pending_reship")      btns.push(`<button class="btn btn-primary" data-action="create-reship" data-id="${id}">创建补寄出库申请</button>`);

      drawerFooter.innerHTML = btns.length
        ? btns.join("")
        : `<span class="muted" style="padding:0 4px;font-size:13px;">当前状态无可执行主操作</span>`;
    }

    function closeDrawer() {
      drawer.classList.remove("show");
      drawerMask.classList.remove("show");
    }

    function closeModal() {
      modal.classList.remove("show");
      modalMask.classList.remove("show");
    }

    function setModal(config) {
      modalTitle.textContent = config.title;
      modalBody.innerHTML = config.body;
      // 宽度控制
      if (config.wide) {
        modal.classList.add("modal-wide");
      } else {
        modal.classList.remove("modal-wide");
      }
      document.getElementById("modalConfirmBtn").textContent = config.confirmText || "确认";
      document.getElementById("modalConfirmBtn").onclick = () => {
        if (config.onConfirm) config.onConfirm();
        closeModal();
      };
      modal.classList.add("show");
      modalMask.classList.add("show");
    }

    function mutateRow(id, patch) {
      const row = rows.find((item) => item.id === id);
      if (!row) return;
      Object.assign(row, patch);
      renderAll();
      if (drawer.classList.contains("show")) openDrawer(id);
    }

    function handleAction(action, id) {
      const row = rows.find((item) => item.id === id);
      if (!row) return;

      if (action === "approve") {
        const goodsList = row.goods.map(g => `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;"><span>${g.name}</span><span class="muted">×${g.qty}</span></div>`).join("");
        setModal({
          title: "同意申请",
          wide: true,
          body: `
            <div class="form-group">
              <label class="form-label">处理结果</label>
              <div class="radio-group">
                <label class="radio-item"><input type="radio" name="approveType" value="refund_only" ${row.category === "仅退款" ? "checked" : ""}> 同意仅退款</label>
                <label class="radio-item"><input type="radio" name="approveType" value="return_refund" ${row.category === "退货退款" ? "checked" : ""}> 同意退货退款</label>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">审批退款金额</label>
                <input class="form-input" type="text" value="${(row.applyAmount||"").replace("¥","")}" placeholder="请输入金额">
              </div>
              <div class="form-group">
                <label class="form-label">原单运费退款金额</label>
                <input class="form-input" type="text" value="0.00" placeholder="0.00">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">寄回邮费补贴</label>
                <input class="form-input" type="text" value="0.00" placeholder="0.00">
              </div>
              <div class="form-group">
                <label class="form-label">退货责任方</label>
                <select class="form-select">
                  <option>商家责任</option><option>消费者责任</option><option>物流责任</option><option>云仓责任</option><option>其他责任</option><option>线下协商</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">寄回邮费责任方</label>
                <select class="form-select">
                  <option>商家承担</option><option>消费者承担</option><option>物流承担</option><option>云仓承担</option><option>线下协商</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">退货地址</label>
                <select class="form-select">
                  <option>番禺大道人仓库 · 天安总部中心15号楼202</option><option>天河仓 · 体育西路100号</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">寄回截止时间</label>
                <input class="form-input" type="date" value="2026-06-13">
              </div>
              <div></div>
            </div>
            <div class="form-group">
              <label class="form-label">审核备注</label>
              <textarea class="form-textarea" placeholder="请输入备注说明（可选）"></textarea>
            </div>
          `,
          confirmText: "确认同意",
          onConfirm: () => {
            const isReturn = row.category === "退货退款";
            mutateRow(id, {
              status: isReturn ? "待寄回" : "待退款",
              statusKey: isReturn ? "pending_return" : "pending_refund",
              subStatus: isReturn ? "待买家填写物流" : "待财务操作退款",
              returnDuty: "商家",
              freightDuty: "商家",
              actions: isReturn ? [] : ["操作退款"],
              requestInfo: { ...row.requestInfo, desc: isReturn ? "商家已同意退货退款，请买家寄回商品。" : "商家已审核通过，等待财务操作退款。" },
              operatorTrail: [...row.operatorTrail, "审核通过：2026-06-06 18:20"]
            });
          }
        });
      }

      if (action === "reject") {
        setModal({
          title: "拒绝申请",
          body: `
            <div class="form-group">
              <label class="form-label">拒绝原因</label>
              <select class="form-select">
                <option>商品已使用</option><option>超过售后期</option><option>不符合退款条件</option><option>凭证不充分</option><option>其他</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">拒绝说明</label>
              <textarea class="form-textarea" placeholder="请输入拒绝说明，此内容对C端消费者可见"></textarea>
              <div class="form-hint">注：拒绝说明会展示给消费者</div>
            </div>
          `,
          confirmText: "确认拒绝",
          onConfirm: () => mutateRow(id, {
            status: "已关闭", statusKey: "closed", closeType: "已拒绝",
            subStatus: "已拒绝", actions: [],
            requestInfo: { ...row.requestInfo, desc: "商家已拒绝申请，售后已关闭。" },
            operatorTrail: [...row.operatorTrail, "驳回：2026-06-06 18:20"]
          })
        });
      }

      if (action === "reship") {
        const goodsForm = row.goods.map(g => `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #f0f1f4;font-size:13px;">
          <span>${g.name}</span>
          <span>数量：<input class="qc-num-input" type="number" value="${g.qty}" min="1"></span>
        </div>`).join("");
        setModal({
          title: "转补寄处理",
          wide: true,
          body: `
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">补寄原因</label>
                <select class="form-select">
                  <option>少件/漏发</option><option>错发</option><option>商品破损</option><option>其他</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">补寄责任方</label>
                <select class="form-select">
                  <option>商家责任</option><option>物流责任</option><option>云仓责任</option><option>其他责任</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">补寄商品</label>
              ${goodsForm}
            </div>
            <div class="form-group">
              <label class="form-label">补寄说明</label>
              <textarea class="form-textarea" placeholder="请输入给仓库/用户的补寄说明"></textarea>
            </div>
          `,
          confirmText: "确认转补寄",
          onConfirm: () => mutateRow(id, {
            status: "待补寄出库", statusKey: "pending_reship",
            subStatus: "等待创建出库申请", returnDuty: "商家", freightDuty: "商家",
            actions: [],
            requestInfo: { ...row.requestInfo, applyType: row.requestInfo.applyType + "（转补寄）", desc: "已转补寄处理，等待创建补寄出库申请。" },
            operatorTrail: [...row.operatorTrail, "转补寄：2026-06-06 18:20"]
          })
        });
      }

      if (action === "receive") {
        const qcRows = row.goods.map(g => `<tr>
          <td style="text-align:left;">${g.name}</td>
          <td>${g.qty}</td>
          <td><input class="qc-num-input" type="number" value="${g.qty}" min="0" max="${g.qty}"></td>
          <td><input class="qc-num-input" type="number" value="${g.qty}" min="0" max="${g.qty}"></td>
          <td><input class="qc-num-input" type="number" value="0" min="0"></td>
          <td><input class="qc-num-input" type="number" value="0" min="0"></td>
        </tr>`).join("");
        setModal({
          title: "签收并录入质检",
          wide: true,
          body: `
            <div class="form-group">
              <label class="form-label">整体判断</label>
              <div class="radio-group">
                <label class="radio-item"><input type="radio" name="qcResult" value="good" checked> 商品完好，附件齐全</label>
                <label class="radio-item"><input type="radio" name="qcResult" value="bad"> 有破损/短缺/使用痕迹</label>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">退回商品验收列表</label>
              <table class="qc-form-table">
                <thead><tr><th style="text-align:left;">商品/SKU</th><th>申请数</th><th>本次签收</th><th>完好入库</th><th>破损数</th><th>缺失数</th></tr></thead>
                <tbody>${qcRows}</tbody>
              </table>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">污染/影响二销数量</label>
                <input class="form-input" type="number" value="0" min="0">
              </div>
              <div class="form-group">
                <label class="form-label">异常类型</label>
                <select class="form-select">
                  <option>无异常</option><option>破损</option><option>缺失</option><option>严重污染</option><option>影响二次销售</option><option>空包</option><option>错件</option><option>其他异常</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">异常说明</label>
              <textarea class="form-textarea" placeholder="填写具体破损内容或异常说明（无异常可不填）"></textarea>
            </div>
          `,
          confirmText: "确认提交",
          onConfirm: () => mutateRow(id, {
            status: "待退款", statusKey: "pending_refund",
            subStatus: "待财务操作退款", actions: ["操作退款"],
            requestInfo: { ...row.requestInfo, desc: "仓库验收完成，等待财务操作退款。" },
            operatorTrail: [...row.operatorTrail, "签收质检：2026-06-06 18:20"]
          })
        });
      }

      if (action === "refund") {
        const freightLine = row.applyFreight ? `<div class="rcs-row"><span class="lbl">寄回邮费补贴</span><span class="val">${row.applyFreight}</span></div>` : "";
        setModal({
          title: "操作退款",
          body: `
            <div class="refund-confirm-sheet">
              <div class="rcs-row"><span class="lbl">申请退款金额</span><span class="val">${row.applyAmount}</span></div>
              <div class="rcs-row"><span class="lbl">商品退款</span><span class="val">${row.applyAmount}</span></div>
              <div class="rcs-row"><span class="lbl">原单运费退款</span><span class="val">¥0.00</span></div>
              ${freightLine}
              <div class="rcs-total"><span class="lbl">实际退款金额</span><span class="val">${row.applyAmount}</span></div>
            </div>
            <div style="margin-bottom:12px;font-size:12px;color:#6b7280;">
              退回方式：微信支付 ${row.applyAmount}
            </div>
            <div class="form-group">
              <label class="form-label">退款说明</label>
              <textarea class="form-textarea" placeholder="请输入退款说明（可选）"></textarea>
            </div>
          `,
          confirmText: "确认退款",
          onConfirm: () => mutateRow(id, {
            status: "已完成", statusKey: "completed",
            subStatus: "退款完成", actions: [],
            requestInfo: { ...row.requestInfo, desc: "已成功操作退款，售后流程完成。" },
            operatorTrail: [...row.operatorTrail, "退款成功：2026-06-06 18:20"]
          })
        });
      }

      if (action === "retry-refund") {
        setModal({
          title: "重新操作退款",
          body: `
            <div style="margin-bottom:14px;padding:10px 12px;background:#fff1f0;border:1px solid #fecdd3;border-radius:6px;font-size:13px;color:#be123c;">
              <strong>上次失败原因：</strong>商家账户余额不足（BALANCE_NOT_ENOUGH）
            </div>
            <div class="refund-confirm-sheet">
              <div class="rcs-row"><span class="lbl">退款金额</span><span class="val money">${row.applyAmount}</span></div>
              <div class="rcs-row"><span class="lbl">退款方式</span><span class="val">微信支付 ${row.applyAmount}</span></div>
            </div>
            <div class="form-group">
              <label class="form-label">重试说明</label>
              <textarea class="form-textarea" placeholder="例如：商家账户已充值，重新发起退款"></textarea>
            </div>
          `,
          confirmText: "确认重新退款",
          onConfirm: () => mutateRow(id, {
            status: "退款中", statusKey: "refunding",
            subStatus: "退款处理中", actions: [],
            requestInfo: { ...row.requestInfo, desc: "已重新发起退款，等待退款结果回传。" },
            operatorTrail: [...row.operatorTrail, "重新退款：2026-06-06 18:20"]
          })
        });
      }

      if (action === "create-reship") {
        const goodsList = row.goods.map(g => `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #f0f1f4;font-size:13px;">
          <span>${g.name}</span><span>数量：${g.qty}</span>
        </div>`).join("");
        setModal({
          title: "创建补寄出库申请",
          wide: true,
          body: `
            <div class="form-group">
              <label class="form-label">出库仓/云仓</label>
              <select class="form-select">
                <option>番禺云仓</option><option>天河仓</option><option>珠江新城仓</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">补寄商品</label>
              ${goodsList}
            </div>
            <div class="form-group">
              <label class="form-label">补寄运费承担方</label>
              <select class="form-select">
                <option>商家承担</option><option>物流承担</option><option>云仓承担</option><option>线下协商</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">给云仓说明</label>
              <textarea class="form-textarea" placeholder="请优先发出，补齐少件"></textarea>
              <div class="form-hint">注：快递公司和物流单号由云仓发货后回传，此处无需填写</div>
            </div>
          `,
          confirmText: "确认创建并推送云仓",
          onConfirm: () => mutateRow(id, {
            status: "待补寄出库", statusKey: "pending_reship",
            subStatus: "已推送云仓，等待发货", actions: [],
            requestInfo: { ...row.requestInfo, desc: "补寄出库申请已创建并推送云仓，等待云仓发货。" },
            operatorTrail: [...row.operatorTrail, "创建出库申请：2026-06-06 18:20", "已推送番禺云仓"]
          })
        });
      }
    }

    function bindInteractions() {
      // 整行点击打开抽屉
      document.querySelectorAll("tr.table-row").forEach((tr) => {
        tr.addEventListener("click", () => openDrawer(tr.getAttribute("data-row-id")));
      });
      // 绑定抽屉/页面中的操作按钮
      bindActionButtons();
    }

    function bindActionButtons() {
      document.querySelectorAll("[data-action]").forEach((node) => {
        // 避免重复绑定
        if (node._bound) return;
        node._bound = true;
        node.addEventListener("click", (e) => {
          e.stopPropagation();
          handleAction(node.getAttribute("data-action"), node.getAttribute("data-id"));
        });
      });
    }

    function openDrawer(id) {
      state.activeRowId = id;
      renderDrawer();
      drawer.classList.add("show");
      drawerMask.classList.add("show");
      // 重新绑定抽屉内的操作按钮
      bindActionButtons();
    }

    function renderAll() {
      const list = getFilteredRows();
      renderStatusTabs();
      renderTable(list);
      renderDrawer();
      bindInteractions();
    }

    document.getElementById("searchBtn").addEventListener("click", () => {
      state.keyword = keywordInput.value.trim();
      renderAll();
    });
    document.getElementById("closeDrawerBtn").addEventListener("click", closeDrawer);
    drawerMask.addEventListener("click", closeDrawer);
    modalMask.addEventListener("click", closeModal);
    document.getElementById("modalCancelBtn").addEventListener("click", closeModal);

    // 窗口 resize 时重新同步行高
    window.addEventListener("resize", syncRowHeights);

    renderAll();
  </script>
</body>
</html>
