<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家自营售后 Demo - C端订单列表预览</title>
  <style>
    :root {
      --bg: #f3f4f8;
      --surface: #ffffff;
      --surface-soft: #f8f8fb;
      --text: #1f1f1f;
      --muted: #7a7a86;
      --line: #ececf1;
      --accent: #ff4d3d;
      --accent-2: #ff7a45;
      --shadow: 0 18px 48px rgba(31, 35, 41, 0.12);
      --radius: 28px;
      --font: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 118, 74, 0.14), transparent 32%),
        radial-gradient(circle at top right, rgba(47, 125, 255, 0.08), transparent 28%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .shell {
      width: min(1220px, 100%);
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px);
      border-radius: 36px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .desc {
      margin: 0;
      max-width: 680px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 13px;
      color: #555967;
    }

    .frames {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 22px;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(228, 230, 236, 0.92);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(28, 31, 38, 0.06);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .card h2 {
      margin: 0;
      font-size: 18px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
    }

    iframe {
      width: 100%;
      height: 860px;
      border: 0;
      border-radius: 24px;
      background: #eef0f4;
    }

    @media (max-width: 980px) {
      .frames { grid-template-columns: 1fr; }
      .header { flex-direction: column; }
      iframe { height: 760px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="header">
      <div>
        <h1 class="title">C 端订单列表首轮原型</h1>
        <p class="desc">这轮只验证“全部订单视角”的状态分布和从列表进入详情的交互承接。列表里同时覆盖待发货退款、已发货售后、售后进行中三种典型入口，详情页先承接到一个真实消费者订单详情屏。</p>
      </div>
      <div class="badge">iOS 高保真 · 先看列表到详情</div>
    </div>

    <section class="frames">
      <article class="card">
        <div class="card-head">
          <h2>订单列表</h2>
          <span class="meta">consumer-order-list.html</span>
        </div>
        <iframe src="./consumer-order-list.html" title="订单列表"></iframe>
      </article>

      <article class="card">
        <div class="card-head">
          <h2>订单详情承接屏</h2>
          <span class="meta">consumer-order-detail.html</span>
        </div>
        <iframe src="./consumer-order-detail.html" title="订单详情"></iframe>
      </article>
    </section>
  </main>
</body>
</html>
