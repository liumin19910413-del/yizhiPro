<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家自营售后管理工作台 Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f3f5f9;
            --card: #ffffff;
            --line: #e6ebf2;
            --text: #1f2a37;
            --muted: #667085;
            --primary: #1677ff;
            --primary-soft: #edf5ff;
            --success: #16a34a;
            --success-soft: #edfdf3;
            --warning: #d97706;
            --warning-soft: #fff7ed;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
            --purple: #7c3aed;
            --purple-soft: #f5f3ff;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f6f8;
            color: var(--text);
            margin: 0;
            min-width: 1300px;
        }
        .page-shell {
            min-height: auto;
            padding: 16px;
            min-width: auto;
        }
        .top-bar {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 0;
        }
        .page-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        .platform-switcher {
            display: inline-flex;
            gap: 6px;
            padding: 4px;
            background: #f3f6fb;
            border: 1px solid var(--line);
            border-radius: 10px;
        }
        .platform-tab {
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--muted);
            background: transparent;
            transition: 0.18s ease;
        }
        .platform-tab.active {
            background: var(--primary);
            color: #fff;
            font-weight: 700;
        }
        .module-shell {
            display: none;
        }
        .module-shell.active {
            display: block;
        }
        .placeholder-panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 22px 20px;
            box-shadow: var(--shadow);
        }
        .placeholder-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .placeholder-desc {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.8;
        }
        .workspace-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 12px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: var(--shadow);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.primary { background: var(--primary-soft); color: var(--primary); }
        .badge.success { background: var(--success-soft); color: var(--success); }
        .badge.warning { background: var(--warning-soft); color: var(--warning); }
        .badge.purple { background: var(--purple-soft); color: var(--purple); }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .account-switch-block {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 4px 4px 4px 10px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #f8fbff;
        }
        .account-switch-label {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
        }
        .account-switch-tabs {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            border-radius: 10px;
            background: #eef4ff;
        }
        .account-switch-tab {
            border: none;
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: #667085;
            background: transparent;
            white-space: nowrap;
            transition: 0.18s ease;
        }
        .account-switch-tab.active {
            background: var(--primary);
            color: #fff;
        }
        .filter-card {
            padding: 14px 16px 14px;
        }
        .filter-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .filter-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }
        .filter-desc {
            font-size: 12px;
            color: var(--muted);
        }
        .filter-grid {
            display: grid;
            grid-template-columns:
                minmax(140px, 0.9fr)
                minmax(220px, 1.35fr)
                minmax(128px, 0.8fr)
                minmax(128px, 0.8fr)
                minmax(150px, 0.95fr)
                minmax(150px, 0.95fr)
                auto;
            align-items: end;
            gap: 12px;
        }
        .field {
            min-width: 0;
        }
        .field.search-field {
            min-width: 0;
        }
        .field.action-field {
            min-width: auto;
        }
        .field label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .field input,
        .field select {
            width: 100%;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: #fff;
            padding: 0 12px;
            font-size: 13px;
            color: var(--text);
            outline: none;
        }
        .field input:focus,
        .field select:focus {
            border-color: #8bb8ff;
            box-shadow: 0 0 0 3px rgba(22,119,255,0.08);
        }
        .field input:disabled,
        .field input[readonly],
        .field select:disabled,
        .field textarea:disabled,
        .field textarea[readonly] {
            border-color: #e5e7eb;
            background: #f5f7fa;
            color: #667085;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            white-space: nowrap;
        }
        .field.hidden {
            display: none;
        }
        .btn {
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--line);
            padding: 0 14px;
            font-size: 13px;
            cursor: pointer;
            background: #fff;
            color: var(--text);
        }
        .btn.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn.ghost {
            background: #f8fbff;
            color: var(--primary);
            border-color: #d7e7ff;
        }
        .status-tabs {
            display: flex;
            gap: 0;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 0 16px 10px;
            border-top: 1px solid #eef2f7;
        }
        .status-tabs::-webkit-scrollbar { display: none; }
        .status-tab {
            border: none;
            border-right: 1px solid #e8edf5;
            background: transparent;
            min-width: auto;
            padding: 12px 18px 10px 14px;
            cursor: pointer;
            transition: 0.18s ease;
            text-align: left;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .status-tab.active {
            background: transparent;
            box-shadow: none;
        }
        .status-tab .tab-name {
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
        }
        .status-tab .tab-count {
            min-width: 24px;
            height: 20px;
            padding: 0 7px;
            border-radius: 999px;
            background: #eef2f7;
            color: #6b7280;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .status-tab .tab-icon {
            font-size: 14px;
            color: #9aa4b2;
        }
        .status-tab.active .tab-name,
        .status-tab.active .tab-icon {
            color: var(--primary);
        }
        .status-tab.active .tab-count {
            background: var(--primary);
            color: #fff;
        }
        .status-tab.active::after {
            content: "";
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 999px;
        }
        .status-tab:last-child {
            border-right: none;
        }
        .table-card {
            overflow: hidden;
        }
        .table-shell {
            overflow-x: auto;
        }
        .table-shell::-webkit-scrollbar {
            height: 8px;
        }
        .table-shell::-webkit-scrollbar-thumb {
            background: #d7dfeb;
            border-radius: 999px;
        }
        .table-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-top: 1px solid var(--line);
            background: #fff;
        }
        .table-summary {
            font-size: 12px;
            color: var(--muted);
        }
        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pagination-info {
            font-size: 12px;
            color: var(--muted);
            margin-right: 4px;
        }
        .page-btn {
            min-width: 32px;
            height: 32px;
            border: 1px solid var(--line);
            background: #fff;
            color: #475467;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            padding: 0 10px;
        }
        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .page-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .data-table {
            min-width: 100%;
        }
        .table-header,
        .table-row {
            display: grid;
            gap: 12px;
            padding: 0 16px;
        }
        /* 固定左列 */
        .table-fixed-left .table-header,
        .table-fixed-left .table-row {
            grid-template-columns: minmax(180px, 1fr);
            min-width: 200px;
        }
        /* 中间滚动列 */
        .table-scroll-middle .table-header,
        .table-scroll-middle .table-row {
            grid-template-columns:
                minmax(108px, 0.66fr)
                minmax(100px, 0.62fr)
                minmax(220px, 1.42fr)
                minmax(140px, 0.88fr)
                minmax(120px, 0.76fr)
                minmax(118px, 0.78fr)
                minmax(140px, 0.88fr)
                minmax(160px, 1fr)
                minmax(155px, 0.94fr)
                minmax(160px, 0.96fr);
            min-width: 1420px;
        }
        /* 固定右列 */
        .table-fixed-right .table-header,
        .table-fixed-right .table-row {
            grid-template-columns: minmax(110px, 1fr) minmax(110px, 1fr);
            min-width: 240px;
        }
        /* 三段式容器 */
        .table-outer {
            display: flex;
            overflow: hidden;
        }
        .table-fixed-left {
            flex: 0 0 auto;
            overflow: hidden;
            border-right: 2px solid var(--line);
            z-index: 2;
            background: #fff;
        }
        .table-fixed-right {
            flex: 0 0 auto;
            overflow: hidden;
            border-left: 2px solid var(--line);
            z-index: 2;
            background: #fff;
        }
        .table-scroll-middle {
            flex: 1 1 auto;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
            scrollbar-color: #d7dfeb transparent;
        }
        .table-scroll-middle::-webkit-scrollbar {
            height: 8px;
        }
        .table-scroll-middle::-webkit-scrollbar-thumb {
            background: #d7dfeb;
            border-radius: 999px;
        }
        .table-header {
            height: 50px;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
            color: #475467;
            border-bottom: 1px solid var(--line);
            background: #fbfcfe;
        }
        .table-body .table-row {
            padding-top: 16px;
            padding-bottom: 16px;
            align-items: start;
            font-size: 12px;
            border-bottom: 1px solid #eef2f7;
            cursor: pointer;
        }
        .table-body .table-row:hover {
            background: #fafcff;
        }
        .cell-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
            line-height: 1.45;
            word-break: break-word;
        }
        .cell-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 3px;
        }
        .order-sub-id {
            font-size: 12px;
            color: #667085;
            line-height: 1.6;
        }
        .cell-sub {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.7;
            word-break: break-word;
        }
        .cell-sub-line {
            display: block;
        }
        .cell-stack {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .product-info {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .product-thumb {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, #f5d2a6 0%, #c68a52 100%);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .product-meta {
            min-width: 0;
        }
        .product-price-line {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
        }
        .mini-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .mini-tag {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            background: #f4f6f8;
            color: #475467;
            font-weight: 600;
        }
        .mini-tag.primary { background: var(--primary-soft); color: var(--primary); }
        .mini-tag.warning { background: var(--warning-soft); color: var(--warning); }
        .mini-tag.success { background: var(--success-soft); color: var(--success); }
        .mini-tag.purple { background: var(--purple-soft); color: var(--purple); }
        .amount-highlight {
            font-size: 13px;
            font-weight: 700;
            color: var(--danger);
            margin-bottom: 4px;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }
        .status-pill.audit { background: var(--warning-soft); color: var(--warning); }
        .status-pill.progress { background: var(--primary-soft); color: var(--primary); }
        .status-pill.success { background: var(--success-soft); color: var(--success); }
        .status-pill.closed { background: #f3f4f6; color: #6b7280; }
        .status-pill.exception { background: var(--danger-soft); color: var(--danger); }
        .time-track {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .time-track-line {
            font-size: 11px;
            color: #667085;
            line-height: 1.5;
            white-space: nowrap;
        }
        .table-action {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
            min-width: 0;
        }
        .action-btn {
            border: 1px solid #bfd5ff;
            color: var(--primary);
            background: #f8fbff;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .status-subtext {
            margin-top: 6px;
            font-size: 11px;
            color: #667085;
            line-height: 1.5;
        }
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.42);
            opacity: 0;
            pointer-events: none;
            transition: 0.2s ease;
            z-index: 50;
        }
        .drawer-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 720px;
            height: 100vh;
            background: #f8fbff;
            box-shadow: -24px 0 60px rgba(15, 23, 42, 0.22);
            transform: translateX(100%);
            transition: 0.24s ease;
            z-index: 60;
            display: flex;
            flex-direction: column;
        }
        .drawer.show {
            transform: translateX(0);
        }
        .drawer-header {
            padding: 0;
            border-bottom: 1px solid #e7edf6;
            background:
                radial-gradient(circle at top right, rgba(129, 178, 255, 0.14), transparent 24%),
                linear-gradient(180deg, #f8fbff 0%, #f2f6fb 100%);
        }
        .drawer-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 22px 14px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
        }
        .drawer-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 0;
            letter-spacing: 0.01em;
        }
        .drawer-title-main {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .case-pill {
            display: inline-flex;
            align-items: center;
            height: 34px;
            padding: 0 14px;
            border-radius: 10px;
            border: 1px solid #c7ddff;
            background: linear-gradient(180deg, #f6fbff 0%, #ebf4ff 100%);
            color: #4f96f6;
            font-size: 15px;
            font-weight: 700;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
        }
        .status-pill-large {
            display: inline-flex;
            align-items: center;
            height: 34px;
            padding: 0 14px;
            border-radius: 18px;
            background: linear-gradient(180deg, #fff8ec 0%, #fff1d8 100%);
            color: #ed9c1d;
            font-size: 15px;
            font-weight: 700;
            border: 1px solid rgba(244, 183, 71, 0.18);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(244, 183, 71, 0.12);
        }
        .status-pill-large.progress {
            background: linear-gradient(180deg, #f4f9ff 0%, #e7f1ff 100%);
            color: #4a97ff;
            border-color: rgba(90, 151, 255, 0.16);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(74, 151, 255, 0.12);
        }
        .status-pill-large.success {
            background: linear-gradient(180deg, #f2fcf6 0%, #e5f8ec 100%);
            color: #16a34a;
            border-color: rgba(22, 163, 74, 0.14);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(22, 163, 74, 0.12);
        }
        .status-pill-large.closed {
            background: linear-gradient(180deg, #f8f9fb 0%, #eef2f6 100%);
            color: #667085;
            border-color: rgba(102, 112, 133, 0.12);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(102, 112, 133, 0.08);
        }
        .status-pill-large.closed-substatus {
            background: linear-gradient(180deg, #fffaf0 0%, #fff4e0 100%);
            color: #b45309;
            border-color: rgba(245, 158, 11, 0.22);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(245, 158, 11, 0.08);
        }
        .status-pill-large.exception {
            background: linear-gradient(180deg, #fff6f6 0%, #feecec 100%);
            color: #dc2626;
            border-color: rgba(220, 38, 38, 0.14);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 18px rgba(220, 38, 38, 0.1);
        }
        .drawer-close {
            border: none;
            background: rgba(246, 248, 252, 0.92);
            color: #8f95a3;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
            transition: 0.18s ease;
        }
        .drawer-close:hover {
            background: #eef3f8;
            color: #5b6474;
        }
        .status-stage-card {
            margin: 10px 22px 16px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(252,253,255,0.98) 100%);
            border: 1px solid rgba(228, 235, 245, 0.96);
            border-radius: 18px;
            overflow: hidden;
            box-shadow:
                0 18px 44px rgba(31, 42, 55, 0.06),
                inset 0 1px 0 rgba(255,255,255,0.9);
        }
        .stepper {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 0;
            padding: 18px 18px 14px;
            position: relative;
        }
        .stepper::before {
            content: "";
            position: absolute;
            left: 11%;
            right: 11%;
            top: 34px;
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(90deg, #e9edf5 0%, #edf1f6 100%);
        }
        .step {
            position: relative;
            text-align: center;
            padding-top: 40px;
            font-size: 12px;
            font-weight: 700;
            color: #c0c6d2;
            z-index: 1;
        }
        .step::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 34px;
            height: 34px;
            margin-left: -17px;
            border-radius: 999px;
            background: linear-gradient(180deg, #f8f9fc 0%, #eef1f5 100%);
            border: 1px solid #edf1f5;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
            z-index: 2;
        }

            const records = [];

                for (let i = 0; i < 5; i += 1) {
                    records.push(buildOneRecord(statusKey, statusIndex, i, serial));

            return records;

        function chooseOrderType(statusKey, serial) {

        }

        function chooseOrderScene(orderType, statusKey, serial) {
            if (statusKey === "rejected" && serial % 4 === 0) return "发货订单";
            if (statusKey === "cancelled" && serial % 3 === 0) return "发货订单";
            if (orderType === "开充值订单") return "储值卡资产";
            if (["sendback", "returning", "received", "reship_pending", "buyer_receipt"].includes(statusKey)) return "发货订单";
            return ["发货订单", "自提订单", "直接到资产"][(serial - 1) % 3];
        }

        function chooseFlowMode(statusKey, serial, orderScene) {
            if (["sendback", "returning", "received"].includes(statusKey)) return "refund_return";
            if (["reship_pending", "buyer_receipt"].includes(statusKey)) return "reship";
            if (orderScene !== "发货订单") return "refund_only";
            if (statusKey === "completed") {
                if (serial % 5 === 0) return "reship";
                if (serial % 2 === 0) return "refund_only";
                return "refund_return";
            }
            if (statusKey === "refunding" || statusKey === "refund_failed") {
                return serial % 2 === 0 ? "refund_return" : "refund_only";
            }
            if (statusKey === "audit") {
                return serial % 3 === 0 ? "refund_return" : "refund_only";
            }
            if (statusKey === "rejected" || statusKey === "cancelled") {
                if (orderScene === "发货订单" && serial % 3 === 0) return "refund_return";
                return "refund_only";
            }

        function buildQualityDecision(statusKey, serial) {

                    proofImages: []

            const result = serial % 4 === 0

                    ? "商品短缺"
                    : serial % 6 === 0
                        ? "有使用痕迹"
                        : "商品完好";
            if (result === "商品完好") {
                return {
                    result,
                    note: "",
                    proofImages: []
                };

            const noteMap = {
                "商品破损": "外包装与商品主体均有明显破损，已拍照留存，建议财务确认是否部分退款或拒绝退款。",
                "商品短缺": "退回包裹中缺少 1 件商品及配件，已登记短缺明细，请结合买家申请范围确认退款处理。",

                note: noteMap[result],
                proofImages: buildAbnormalProofImages(serial, result)

        function money(value) {
            return `¥${Number(value).toFixed(2)}`;
        }

        function getFilteredRecords() {
            const records = mockRecords.filter((record) => {
                if (state.currentTab !== "all") {
                    if (state.currentTab === "rejected") {
                        if (!["rejected", "cancelled"].includes(record.statusKey)) return false;
                    } else if (record.statusKey !== state.currentTab) {
                        return false;
                    }
                }
                const scopeStore = state.filters.scope === "store" ? state.currentAccountStore : "";
                if (scopeStore && record.store !== scopeStore) return false;
                if (state.filters.store && record.store !== state.filters.store) return false;
                const keyword = state.filters.keyword.trim();
                if (keyword) {
                    const haystack = [
                        record.id,
                        record.orderNo,
                        record.orderType,
                        record.phone,
                        record.customer,
                        record.store,
                        record.brand,
                        record.logistics.backNo,
                        record.logistics.reshipNo
                    ].join(" ");
                    if (!haystack.includes(keyword)) return false;
                }
                if (state.filters.type && record.afterSaleType !== state.filters.type) return false;
                if (state.filters.orderType && record.orderType !== state.filters.orderType) return false;
                if (state.filters.responsibility && record.currentResponsibility !== state.filters.responsibility) return false;
                if (state.filters.freight && record.currentFreightBearer !== state.filters.freight) return false;
                return true;
            });
            if (state.currentTab === "audit") {
                records.sort((a, b) => {
                    const aNonLogistics = !isShippingScene(a.orderScene);
                    const bNonLogistics = !isShippingScene(b.orderScene);
                    if (aNonLogistics !== bNonLogistics) return aNonLogistics ? -1 : 1;
                    return a.id.localeCompare(b.id);
                });
            }
            if (state.currentTab === "rejected") {
                const rejectedRecords = records.filter((record) => record.statusKey === "rejected");
                const cancelledRecords = records.filter((record) => record.statusKey === "cancelled");
                const mixedRecords = [];
                const maxLength = Math.max(rejectedRecords.length, cancelledRecords.length);
                for (let i = 0; i < maxLength; i += 1) {
                    if (rejectedRecords[i]) mixedRecords.push(rejectedRecords[i]);
                    if (cancelledRecords[i]) mixedRecords.push(cancelledRecords[i]);
                }
                return mixedRecords.sort((a, b) => {
                    const aNonLogistics = !isShippingScene(a.orderScene);
                    const bNonLogistics = !isShippingScene(b.orderScene);
                    if (aNonLogistics !== bNonLogistics) return aNonLogistics ? -1 : 1;
                    return a.id.localeCompare(b.id);
                });
            }
            return records;
        }

        function renderStatusTabs() {
            const counts = getTabCounts();
            const order = ["audit", "sendback", "returning", "received", "refunding", "refund_failed", "reship_pending", "buyer_receipt", "completed", "rejected", "all"];
            const html = order.map((key) => {
                const config = statusConfigs[key];
                return `
                    <button class="status-tab ${state.currentTab === key ? "active" : ""}" data-status-tab="${key}">
                        <span class="tab-icon">${config.icon || "•"}</span>
                        <div class="tab-name">${config.label}</div>
                        <div class="tab-count">${counts[key]}</div>
                    </button>
                `;
            }).join("");
            document.getElementById("status-tabs").innerHTML = html;
        }

        function getTabCounts() {
            const counts = {};
            Object.keys(statusConfigs).forEach((key) => {
                if (key === "all") {
                    counts[key] = mockRecords.length;
                } else if (key === "rejected") {
                    counts[key] = mockRecords.filter(item => item.statusKey === "rejected" || item.statusKey === "cancelled").length;
                } else {
                    counts[key] = mockRecords.filter(item => item.statusKey === key).length;
                }
            });
            return counts;
        }

        function renderTable() {
            const tableBodyLeft = document.getElementById("table-body-left");
            const tableBodyMiddle = document.getElementById("table-body-middle");
            const tableBodyRight = document.getElementById("table-body-right");
            const records = getFilteredRecords();
            const total = records.length;
            const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
            if (state.currentPage > totalPages) state.currentPage = totalPages;
            const startIndex = (state.currentPage - 1) * state.pageSize;
            const pagedRecords = records.slice(startIndex, startIndex + state.pageSize);
            document.getElementById("table-summary").textContent = `共 ${total} 条`;
            renderPagination(total, totalPages);
            if (!pagedRecords.length) {
                tableBodyLeft.innerHTML = `<div class="empty-list">无数据</div>`;
                tableBodyMiddle.innerHTML = `<div class="empty-list">当前筛选条件下没有案例，可清空筛选后继续演示。</div>`;
                tableBodyRight.innerHTML = ``;
                return;
            }

            const leftRows = [];
            const middleRows = [];
            const rightRows = [];

            pagedRecords.forEach((record) => {
                const statusTone = mapTone(record.statusKey);
                const logisticsText = getListLogisticsText(record);
                const displayType = getDisplayType(record.afterSaleType);
                const mainItem = record.items[0];
                const extraCount = Math.max(0, record.items.length - 1);
                const timeTrack = buildTimeTrack(record);
                const productSubs = `<div class="cell-sub">${record.appliedRange}</div>`;
                const userSubs = `<div class="cell-sub">${record.phone}</div>`;
                const closedSubStatus = record.statusKey === "rejected"
                    ? "已拒绝"
                    : record.statusKey === "cancelled"
                        ? "已撤销"
                        : "";
                const orderTypeSubs = `
                    <div class="mini-tags">
                        <span class="mini-tag ${getOrderSceneTagTone(record.orderScene)}">${getOrderSceneDisplay(record.orderScene)}</span>
                    </div>
                `;
                const responsibilitySubs = !isShippingScene(record.orderScene) ? `` : `
                    <div class="cell-sub">
                        <span class="cell-sub-line">退款退货责任方：${record.currentResponsibility}</span>
                        <span class="cell-sub-line">退货运费责任方：${record.currentFreightBearer || "不涉及"}</span>
                    </div>
                `;
                const isCompleted = record.statusKey === "completed";
                const amountMain = isCompleted
                    ? `申 ${money(record.amounts.applied)} / 审 ${money(record.amounts.approved)}`
                    : `申 ${money(record.amounts.applied)}`;
                const amountSubs = isCompleted
                    ? `<div class="cell-sub">实退 ${money(record.amounts.actual)} · 原单运费 ${money(record.amounts.freightRefund)}</div>`
                    : ``;
                const logisticsEmpty = logisticsText.title === "-" && !logisticsText.detail;

                leftRows.push(`
                    <div class="table-row" data-open-id="${record.id}">

                            <div class="order-sub-id">订单: ${record.childOrderNo}</div>
                        </div>
                    </div>
                `);

                middleRows.push(`
                    <div class="table-row" data-open-id="${record.id}">
                        <div class="cell-stack">
                            <div class="cell-title">${record.orderType}</div>
                            ${orderTypeSubs}
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${displayType}</div>
                        </div>
                        <div class="cell-stack">
                            <div class="product-info">
                                <div class="product-thumb">${getProductEmoji(mainItem.name)}</div>
                                <div class="product-meta">
                                    <div class="cell-title">${mainItem.name}</div>
                                    <div class="product-price-line">${money(mainItem.unitPrice)} × ${mainItem.qty}</div>
                                    ${extraCount > 0 ? `<div class="cell-sub">等 ${record.items.length} 件商品</div>` : ``}
                                    ${productSubs}
                                </div>
                            </div>
                        </div>
                        <div class="cell-stack">
                            <div class="amount-highlight">${amountMain}</div>
                            ${amountSubs}

                        </div>

                            <div class="cell-title">${record.store}</div>
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${record.reason}</div>
                        </div>
                        <div class="cell-stack">
                            ${responsibilitySubs || `<div class="cell-title">-</div>`}
                        </div>
                        <div class="cell-stack">
                            <div class="cell-title">${logisticsText.title}</div>
                            ${logisticsEmpty ? `` : `<div class="cell-sub">${logisticsText.detail}</div>`}
                        </div>
                        <div class="time-track">
                            ${timeTrack.map((item) => `<div class="time-track-line">${item}</div>`).join("")}
                        </div>
                    </div>
                `);

                rightRows.push(`
                    <div class="table-row" data-open-id="${record.id}">
                        <div class="cell-stack">
                            <div><span class="status-pill ${statusTone}">${record.label}</span></div>
                            ${record.statusKey === "reship_pending" && record.reshipSubStatus ? `<div class="status-subtext">${record.reshipSubStatus}</div>` : ""}
                            ${closedSubStatus ? `<div class="status-subtext">${closedSubStatus}</div>` : ""}
                        </div>
                        <div class="table-action">
                            <button class="action-btn" data-open-id="${record.id}">${getPrimaryActionLabel(record)}</button>
                        </div>
                    </div>
                `);
            });

            tableBodyLeft.innerHTML = leftRows.join("");
            tableBodyMiddle.innerHTML = middleRows.join("");
            tableBodyRight.innerHTML = rightRows.join("");

        function syncRowHeights() {
            const leftRows = document.querySelectorAll("#table-body-left .table-row");
            const middleRows = document.querySelectorAll("#table-body-middle .table-row");
            const rightRows = document.querySelectorAll("#table-body-right .table-row");
            const count = Math.max(leftRows.length, middleRows.length, rightRows.length);
            for (let i = 0; i < count; i++) {
                const heights = [];
                if (leftRows[i]) { leftRows[i].style.height = "auto"; heights.push(leftRows[i].offsetHeight); }
                if (middleRows[i]) { middleRows[i].style.height = "auto"; heights.push(middleRows[i].offsetHeight); }
                if (rightRows[i]) { rightRows[i].style.height = "auto"; heights.push(rightRows[i].offsetHeight); }
                const maxH = Math.max(...heights) + "px";
                if (leftRows[i]) leftRows[i].style.height = maxH;
                if (middleRows[i]) middleRows[i].style.height = maxH;
                if (rightRows[i]) rightRows[i].style.height = maxH;
            }
        }

        function buildTimeTrack(record) {
            const lines = [`申请: ${record.createdAt}`];
            switch (record.statusKey) {
                case "audit":
                    break;
                case "sendback":
                    lines.push(`审核: ${record.auditAt}`);
                    break;
                case "returning":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`寄回: ${record.sendbackAt}`);
                    break;
                case "received":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`寄回: ${record.sendbackAt}`);
                    lines.push(`签收: ${record.receiveAt}`);
                    break;
                case "refunding":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`退款中: ${record.completeAt}`);
                    break;
                case "refund_failed":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`失败: ${record.completeAt}`);
                    break;
                case "reship_pending":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`转补寄: ${record.auditAt}`);
                    break;
                case "buyer_receipt":
                    lines.push(`审核: ${record.auditAt}`);
                    lines.push(`补寄发货: ${record.sendbackAt}`);
                    break;
                case "completed":
                    if (record.afterSaleType === "补寄") {
                        lines.push(`审核: ${record.auditAt}`);
                        lines.push(`完成: ${record.completeAt}`);
                    } else if (record.receiveAt) {
                        lines.push(`审核: ${record.auditAt}`);
                        lines.push(`完成: ${record.completeAt}`);
                    } else {
                        lines.push(`审核: ${record.auditAt}`);
                        lines.push(`完成: ${record.completeAt}`);
                    }
                    break;
                case "rejected":
                    lines.push(`关闭: ${record.completeAt}`);
                    break;
                case "cancelled":
                    if (record.auditAt) lines.push(`审核: ${record.auditAt}`);
                    lines.push(`关闭: ${record.completeAt}`);
                    break;
                default:
                    if (record.auditAt) lines.push(`审核: ${record.auditAt}`);
                    break;
            }
            return lines.slice(0, 3);
        }

        function renderPagination(total, totalPages) {
            const pagination = document.getElementById("pagination");
            if (!total) {
                pagination.innerHTML = "";
                return;
            }
            const buttons = [];
            buttons.push(`<span class="pagination-info">第 ${state.currentPage} / ${totalPages} 页</span>`);
            buttons.push(`<button class="page-btn" data-page-action="prev" ${state.currentPage === 1 ? "disabled" : ""}>上一页</button>`);
            for (let page = 1; page <= totalPages; page += 1) {
                buttons.push(`<button class="page-btn ${page === state.currentPage ? "active" : ""}" data-page="${page}">${page}</button>`);
            }
            buttons.push(`<button class="page-btn" data-page-action="next" ${state.currentPage === totalPages ? "disabled" : ""}>下一页</button>`);
            pagination.innerHTML = buttons.join("");
        }

        function getListLogisticsText(record) {
            if (record.flowMode === "refund_only") {
                if (record.orderScene === "发货订单") return { title: "无需寄回", detail: "仅退款场景不进入退货物流" };
                if (record.orderScene !== "发货订单") return { title: "-", detail: "" };
            }
            if (record.statusKey === "returning" || record.statusKey === "received" || record.statusKey === "refunding" || record.statusKey === "refund_failed") {
                if (record.flowMode === "refund_return") {
                    return { title: record.logistics.backCompany, detail: `单号：${record.logistics.backNo}` };
                }
            }
            if (record.statusKey === "buyer_receipt") {
                return { title: record.logistics.reshipCompany, detail: `单号：${record.logistics.reshipNo}` };
            }
            if (record.statusKey === "completed") {
                if (record.afterSaleType === "补寄") {
                    return { title: record.logistics.reshipCompany, detail: `单号：${record.logistics.reshipNo}` };
                }
                if (record.afterSaleType === "退款退货") {
                    return { title: record.logistics.backCompany, detail: `单号：${record.logistics.backNo}` };
                }
            }
            return { title: "-", detail: "" };
        }

        function getPrimaryActionLabel(record) {
            if (record.statusKey === "audit" && !isShippingScene(record.orderScene)) return "填写原因并退款";
            if (record.statusKey === "returning") return "签收质检";
            if (record.statusKey === "reship_pending") return record.reshipOrderCreated ? "编辑补寄出库单" : "创建补寄出库单";
            if (record.statusKey === "received") return "操作退款";
            return statusConfigs[record.statusKey].primaryAction;
        }

        function mapTone(statusKey) {
            if (statusKey === "audit") return "audit";
            if (["completed"].includes(statusKey)) return "success";
            if (["rejected", "cancelled"].includes(statusKey)) return "closed";
            if (["refund_failed"].includes(statusKey)) return "exception";
            return "progress";
        }

        function renderDrawer(record) {
            state.activeRecord = record;
            state.activeAction = "";
            drawerOverlay.classList.add("show");
            drawer.classList.add("show");
            renderDrawerHeader(record);
            renderDrawerBody(record);
            renderDrawerFooter(record);
        }

        function getHeaderTone(record) {
            if (record.statusKey === "audit") return "audit";
            if (["completed"].includes(record.statusKey)) return "success";
            if (["rejected", "cancelled"].includes(record.statusKey)) return "closed";
            if (["refund_failed"].includes(record.statusKey)) return "exception";
            return "progress";
        }

        function getHeaderFlow(record) {
            const profile = getFlowProfile(record);
            if (record.statusKey === "rejected" || record.statusKey === "cancelled") {
                const steps = profile.steps.map((step, index) => (
                    index === profile.steps.length - 1 ? "处理结果" : step
                ));
                return {
                    steps,
                    activeIndex: steps.length - 1
                };
            }
            return {
                steps: profile.steps,
                activeIndex: profile.activeMap[record.statusKey] ?? 0
            };
        }

        function getClosedSubStatus(record) {
            if (!record || !["rejected", "cancelled"].includes(record.statusKey)) return "";
            if (record.closureSubStatus) return record.closureSubStatus;
            if (record.statusKey === "rejected") return record.rejectReason && record.rejectReason.includes("财务") ? "商家拒绝退款" : "商家拒绝申请";
            return record.cancelReason && record.cancelReason.includes("系统自动关闭") ? "超时自动撤销" : "客户自主撤销";
        }

        function getHeaderHint(record) {
            const profile = getFlowProfile(record);
            if (record.statusKey === "completed") return getCompletedHeaderHint(record);
            if (record.statusKey === "rejected" || record.statusKey === "cancelled") return "当前售后已关闭，结果已确定；请直接查看关闭子状态、关闭原因及同步说明。";
            if (profile.kind === "reship") {
                const hints = {
                    audit: getAuditHeaderHint(record),
                    reship_pending: record.reshipOrderCreated
                        ? "当前待补寄出库，请重点关注仓库是否已完成发货；待仓库回传发货结果后，这单才会进入待买家收货。"
                        : "当前已转补寄处理，请先核实补寄原因、责任方和补寄商品，并尽快创建补寄出库单发往仓库。",
                    buyer_receipt: "当前待买家收货，请重点关注补寄物流和签收进度；详情中可直接查看物流单号和轨迹。"
                };
                return hints[record.statusKey] || "";
            }
            if (profile.kind === "refund_return") {
                const hints = {
                    audit: getAuditHeaderHint(record),
                    sendback: `当前已审核通过，请重点关注买家是否按时寄回商品；审批信息和收货地址已下发给买家，剩余处理时间 ${record.countdown.replace("后超时关闭", "")}，超时将自动关闭本次售后。`,
                    returning: "当前处于退货途中，请重点关注退回物流进展和仓库签收情况；仓库签收后会进入质检处理。",
                    received: "当前待退款，请重点核实质检结果和最终退款金额；确认无误后即可操作退款。",
                    refunding: "当前退款处理中，请重点关注渠道回执和退款结果；如渠道返回异常，再进入后续人工处理。",
                    refund_failed: "当前退款未成功，请先核实失败原因和本次退款明细，再判断是否重新操作退款。"
                };
                return hints[record.statusKey] || "";
            }
            if (record.statusKey === "audit") return getAuditHeaderHint(record);
            if (record.statusKey === "refunding") return "当前退款处理中，请重点关注渠道回执和退款结果回写；当前链路不涉及退货、仓库签收或补寄。";
            if (record.statusKey === "refund_failed") return "当前退款未成功，请先核实失败原因和退款明细，再判断是否重新操作退款。";
            if (profile.kind === "package_refund") return "当前为套餐次卡退款链路，请重点关注资产核销校验和退款结果回写；这单不进入退货寄回、仓库验收或补寄流程。";
            if (profile.kind === "stored_value_refund") return "当前为会员储值卡退款链路，请重点关注余额回退与水单冲正结果；这单不进入退货寄回、仓库验收或补寄流程。";
            if (record.orderScene === "自提订单") return "当前为商品到店自提退款链路，请重点关注审核与退款结果；这单不进入退货物流、仓库验收或补寄流程。";
            return "";
        }

        function getAuditHeaderHint(record) {
            const refundMode = getAuditRefundMode(record);
            const countdownText = getAuditCountdownText(record.countdown);
            if (record.countdown === "已超时") {
                return `当前待审核，请优先处理这单${refundMode}申请；这单已超出商家处理时效，如继续未处理，系统将自动按默认规则流转。`;
            }
            if (record.orderScene === "自提订单") {
                return `当前待审核，请重点核实商品到店自提订单是否已核销、退款金额是否合理；剩余处理时间 ${countdownText}，超时系统将自动同意。`;
            }
            if (record.orderScene === "直接到资产") {
                return `当前待审核，请先校验套餐次卡是否已核销及可退范围，再决定是否同意退款；剩余处理时间 ${countdownText}，超时系统将自动同意。`;
            }
            if (record.orderScene === "储值卡资产") {
                return `当前待审核，请先校验会员储值卡余额是否可回退，并确认退款金额；剩余处理时间 ${countdownText}，超时系统将自动同意。`;
            }
            if (record.afterSaleType === "仅退款") {
                return `当前待审核，请重点核实退款原因、退款金额是否合理，再判断是否同意退款；剩余处理时间 ${countdownText}，超时系统将自动同意。`;
            }
            if (record.afterSaleType === "补寄") {
                return `当前待审核，请重点确认补寄原因、责任归属及补寄商品，确认无误后进入补寄处理；剩余处理时间 ${countdownText}，超时系统将自动按默认规则流转。`;
            }
            return `当前待审核，请先核实售后原因、退款金额及责任归属，再判断同意退款、拒绝申请，或转补寄处理；剩余处理时间 ${countdownText}，超时系统将自动同意。`;
        }

        function getAuditCountdownText(countdown) {
            return countdown.replace("后自动同意", "");
        }

        function getCompletedHeaderHint(record) {
            if (record.completedSource === "reship_only") {
                return "当前售后已完成，请直接查看补寄结果和签收结果；这单补寄流程已经闭环。";
            }
            if (record.completedSource === "refund_only") {
                return "当前售后已完成，请直接查看退款金额、退款明细和退款操作人；这单仅退款流程已结束。";
            }
            if (record.completedSource === "refund_return") {
                return "当前售后已完成，请直接查看质检结果、退款明细和退款操作人；这单退款退货流程已全部结束。";
            }
            return "当前售后已完成，请直接查看补寄结果和退款结果；本次售后处理已经全部结束。";
        }

        function getHintIcon(record) {
            const icons = {
                audit: "⚠",
                sendback: "⏳",
                returning: "🚚",
                received: "✅",
                refunding: "💸",
                refund_failed: "⚠",
                reship_pending: "📦",
                buyer_receipt: "📮",
                completed: "✅",
                rejected: "ℹ",
                cancelled: "ℹ"
            };
            return icons[record.statusKey] || "ℹ";
        }

        function renderDrawerHeader(record) {
            const tone = getHeaderTone(record);
            const flow = getHeaderFlow(record);
            document.getElementById("drawer-header").innerHTML = `
                <div class="drawer-title-row">
                    <div class="drawer-title-main">
                        <div class="drawer-title">售后服务单</div>
                        <span class="case-pill">${record.id}</span>
                        <span class="status-pill-large ${tone}">${statusConfigs[record.statusKey].label}</span>
                        ${getClosedSubStatus(record) ? `<span class="status-pill-large closed-substatus">${getClosedSubStatus(record)}</span>` : ""}
                    </div>
                    <button class="drawer-close" id="drawer-close-btn">×</button>
                </div>
                <div class="status-stage-card">
                    <div class="stepper" style="grid-template-columns: repeat(${flow.steps.length}, minmax(0, 1fr));">
                        ${flow.steps.map((step, index) => {
                            const stepState = index < flow.activeIndex ? "completed" : index === flow.activeIndex ? "active" : "idle";
                            return `
                                <div class="step ${stepState}">
                                    <span class="step-index">${index + 1}</span>
                                    <div class="step-label">(${index + 1})${step}</div>
                                </div>
                            `;
                        }).join("")}
                    </div>
                    <div class="hint-bar ${tone}">
                        <span class="hint-icon">${getHintIcon(record)}</span>${getHeaderHint(record)}
                    </div>
                </div>
            `;
            document.getElementById("drawer-close-btn").addEventListener("click", closeDrawer);
        }

        function renderDrawerBody(record) {
            if (record.statusKey === "audit") {
                document.getElementById("drawer-body").innerHTML = renderAuditDetailBody(record);
                return;
            }
            document.getElementById("drawer-body").innerHTML = renderPostAuditDetailBody(record);
        }

        function renderAuditDetailBody(record) {
            return `
                ${renderAuditHeroCard(record)}
                ${renderAuditBaseInfoCard(record)}
            `;
        }

        function renderSendbackDetailBody(record) {
            return `
                ${renderAuditHeroCard(record)}
                ${renderSendbackBaseInfoCard(record)}
                ${renderApprovalInfoCard(record)}
            `;
        }

        function renderPostAuditDetailBody(record) {
            if (record.statusKey === "sendback") {
                return renderSendbackDetailBody(record);
            }
            if (record.statusKey === "returning") {
                return `
                    ${renderAuditHeroCard(record)}
                    ${renderPostSaleBaseInfoCard(record)}
                    ${renderApprovalInfoCard(record)}
                    ${renderBuyerReturnLogisticsCard(record)}
                `;
            }
            if (record.statusKey === "received") {
                if (record.flowMode === "refund_only") {
                    return `
                        ${renderAuditHeroCard(record)}
                        ${renderPostSaleBaseInfoCard(record)}
                        ${renderApprovalInfoCard(record)}
                    `;
                }
                return `
                    ${renderAuditHeroCard(record)}
                    ${renderPostSaleBaseInfoCard(record)}
                    ${renderApprovalInfoCard(record)}
                    ${renderBuyerReturnLogisticsCard(record)}
                    ${renderQualityDecisionCard(record)}
                `;
            }
            if (record.statusKey === "refunding") {
                if (!isShippingScene(record.orderScene) || record.flowMode === "refund_only") {
                    return `
                        ${renderAuditHeroCard(record)}
                        ${renderPostSaleBaseInfoCard(record)}
                        ${renderApprovalInfoCard(record)}
                    `;
                }
                return `
                    ${renderAuditHeroCard(record)}
                    ${renderPostSaleBaseInfoCard(record)}
                    ${renderApprovalInfoCard(record)}
                    ${renderBuyerReturnLogisticsCard(record)}
                    ${renderQualityDecisionCard(record)}
                `;
            }
            if (record.statusKey === "refund_failed") {

                    return `
                        ${renderAuditHeroCard(record)}
                        ${renderPostSaleBaseInfoCard(record)}
                        ${renderApprovalInfoCard(record)}
                        ${renderResultReasonCard(record)}
                    `;
                }
                return `
                    ${renderAuditHeroCard(record)}
                    ${renderPostSaleBaseInfoCard(record)}
                    ${renderApprovalInfoCard(record)}
                    ${renderBuyerReturnLogisticsCard(record)}
                    ${renderQualityDecisionCard(record)}
                `;

                return renderCompletedDetailBody(record);

            if (record.statusKey === "reship_pending") {
                return `
                    ${renderAuditHeroCard(record)}
                    ${renderPostSaleBaseInfoCard(record)}
                    ${renderReshipTransferCard(record)}
                `;

            if (record.statusKey === "buyer_receipt") {
                return `
                    ${renderAuditHeroCard(record)}
                    ${renderPostSaleBaseInfoCard(record)}
                    ${renderReshipTransferCard(record)}
                    ${renderReshipLogisticsCard(record)}
                `;
            }
            if (record.statusKey === "rejected" || record.statusKey === "cancelled") {
                return renderClosedModernDetailBody(record);
            }
            return `
                ${renderAuditHeroCard(record)}
                ${renderFlowBaseInfoCard(record)}
                ${renderFlowStatusCard(record)}
            `;
        }

        function renderModernDetailBody(record) {
            if (record.statusKey === "rejected" || record.statusKey === "cancelled") {
                return renderClosedModernDetailBody(record);
            }
            const blocks = [
                renderClosedOrderModule(record),
                renderClosedApplyModule(record)
            ];
            if (record.statusKey === "audit") {
                return `<div class="audit-workbench">${blocks.join("")}</div>`;
            }
            if (["sendback", "returning", "received", "refunding", "refund_failed", "completed"].includes(record.statusKey)) {
                blocks.push(renderClosedApprovalModule(record, "03"));
            }
            if (["sendback"].includes(record.statusKey) && record.flowMode === "refund_return") {
                blocks.push(renderModernPendingReturnModule(record, "04"));
            }
            if (["returning", "received", "refunding", "refund_failed", "completed"].includes(record.statusKey) && record.flowMode === "refund_return") {
                blocks.push(renderModernBuyerReturnModule(record, "04"));
            }
            if (["received", "refunding", "refund_failed", "completed"].includes(record.statusKey) && record.flowMode === "refund_return") {
                blocks.push(renderModernQualityModule(record, "05"));
            }
            if (record.statusKey === "refunding") {
                blocks.push(renderModernRefundingModule(record, getModernNextIndex(blocks)));
            }
            if (record.statusKey === "refund_failed") {
                blocks.push(renderModernRefundFailedModule(record, getModernNextIndex(blocks)));
            }
            if (record.statusKey === "completed") {
                blocks.push(renderModernCompletedResultModule(record, getModernNextIndex(blocks)));
            }
            if (record.statusKey === "reship_pending" || record.statusKey === "buyer_receipt") {
                blocks.push(renderModernReshipModule(record, "03"));
            }
            if (record.statusKey === "buyer_receipt") {
                blocks.push(renderModernReshipLogisticsModule(record, "04"));
            }
            return `<div class="audit-workbench">${blocks.join("")}</div>`;
        }

        function getModernNextIndex(blocks) {
            return String(blocks.length + 1).padStart(2, "0");
        }

        function renderModernPendingReturnModule(record, index) {
            return `
                <section class="manual-section logistics-theme">
                    <div class="manual-section-title">
                        <div class="manual-section-heading">
                            <span class="manual-section-index">${index}</span>
                            <span class="manual-section-name">待客户寄回信息</span>
                        </div>
                    </div>
                    <div class="manual-section-body">
                        <div class="approval-record-panel">
                            <div class="approval-record-head">
                                <div class="approval-record-title">寄回要求</div>
                                <div class="approval-record-time">${record.auditAt}</div>
                            </div>
                            <div class="approval-record-grid">
                                <div class="approval-record-item"><span class="approval-record-label">退货联系人</span><span class="approval-record-value">${record.logistics.receiver} / ${record.logistics.receiverPhone}</span></div>
                                <div class="approval-record-item"><span class="approval-record-label">买家寄回状态</span><span class="approval-record-value amount-danger">${record.logistics.buyerState || "待填写物流单号"}</span></div>

                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderModernBuyerReturnModule(record, index) {
            return `
                <section class="manual-section logistics-theme">
                    <div class="manual-section-title">
                        <div class="manual-section-heading">
                            <span class="manual-section-index">${index}</span>
                            <span class="manual-section-name">客户寄回物流</span>
                        </div>
                    </div>
                    <div class="manual-section-body">
                        <div class="approval-record-panel">
                            <div class="approval-record-head">

        function renderModernQualityModule(record, index) {

                            <span class="manual-section-name">商家收货验收</span>

                                <div class="approval-record-item"><span class="approval-record-label">责任信息</span><span class="approval-record-value">${record.currentResponsibility} / ${record.currentFreightBearer}</span></div>

        function renderModernRefundingModule(record, index) {
            return `
                <section class="manual-section adjust-theme">
                    <div class="manual-section-title">

        function renderQualityDecisionCard(record) {
            const isNormal = record.qualityResult === "商品完好" || record.qualityResult === "全部完好";

            let suggestedRows = "";
            let suggestedTotal = 0;
            if (hasDetailRows && !isNormal) {
                suggestedRows = record.qualityItemRows.map(row => {
                    const suggestedAmount = row.goodQty * row.unitPrice;
                    suggestedTotal += suggestedAmount;
                    return `
                        <tr>
                            <td style="text-align:left;">
                                <div style="font-size:12px;font-weight:600;">${row.name}</div>
                                <div style="font-size:11px;color:#667085;">${row.sku}</div>
                            </td>
                            <td>${row.applyQty}</td>
                            <td>${row.receivedQty}</td>
                            <td style="color:#16a34a;font-weight:700;">${row.goodQty}</td>
                            <td style="color:${row.damagedQty > 0 ? '#dc2626' : '#667085'};font-weight:${row.damagedQty > 0 ? '700' : '400'};">${row.damagedQty}</td>

                            <td style="color:${row.pollutedQty > 0 ? '#7c3aed' : '#667085'};font-weight:${row.pollutedQty > 0 ? '700' : '400'};">${row.pollutedQty}</td>

            return `
                <section class="detail-card audit-base-card">
                    <div class="audit-base-header">质检判断说明</div>
                    <div class="audit-base-body">

                                <span class="warehouse-info-label">判断结果：</span>
                                ${isNormal
                                    ? `<div class="quality-result"><span class="icon">✓</span><span>${record.qualityResult}</span></div>`
                                    : `<span class="value">${record.qualityResult}</span>`}
                            </div>
                            ${hasDetailRows && !isNormal ? `
                                <div style="margin-top:14px;">
                                    <div style="font-size:12px;font-weight:700;color:#1f2a37;margin-bottom:8px;">退回商品验收明细</div>
                                    <div style="overflow-x:auto;">
                                        <table class="quality-inspection-table">
                                            <thead>
                                                <tr>
                                                    <th style="min-width:120px;text-align:left;">商品/SKU</th>
                                                    <th>申请数</th>
                                                    <th>签收数</th>
                                                    <th>完好入库</th>
                                                    <th>破损</th>
                                                    <th>缺失</th>
                                                    <th>污染/影响二销</th>
                                                    <th style="min-width:90px;">建议退款</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${suggestedRows}
                                            </tbody>
                                            <tfoot>
                                                <tr style="background:#f8fafc;font-weight:700;">
                                                    <td style="text-align:left;">合计</td>
                                                    <td>${summary.totalGood + summary.totalAbnormal}</td>
                                                    <td>--</td>
                                                    <td style="color:#16a34a;">${summary.totalGood}</td>
                                                    <td style="color:${summary.totalDamaged > 0 ? '#dc2626' : '#667085'};">${summary.totalDamaged}</td>
                                                    <td style="color:${summary.totalMissing > 0 ? '#d97706' : '#667085'};">${summary.totalMissing}</td>
                                                    <td style="color:${summary.totalPolluted > 0 ? '#7c3aed' : '#667085'};">${summary.totalPolluted}</td>
                                                    <td style="color:#dc2626;font-size:13px;">￥${suggestedTotal.toFixed(2)}</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                    <div style="margin-top:10px;padding:10px 12px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;font-size:12px;color:#92400e;">
                                        <strong>建议退款说明：</strong>按完好入库件数 × 商品单价计算建议退款金额 <strong>￥${suggestedTotal.toFixed(2)}</strong>，异常件数不参与退款计算。实际退款金额以财务最终确认为准。
                                    </div>
                                </div>
                                ${record.qualityAbnormalType ? `
                                    <div style="margin-top:12px;">
                                        <span class="warehouse-info-label">异常类型：</span><span class="value" style="color:#dc2626;">${record.qualityAbnormalType}</span>
                                    </div>

                            ` : ""}

                                    <span class="warehouse-info-label">异常说明：</span>${record.qualityNote}
                                </div>
                                <div class="quality-proof-wrap">
                                    <div class="quality-proof-title">异常图片凭证</div>
                                    ${renderAuditImageGallery(record.qualityProofImages)}
                                </div>
                            `}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderCompletedDetailBody(record) {
            if (record.completedSource === "reship_only") {
                return `
                    ${renderAuditHeroCard(record)}
                    ${renderPostSaleBaseInfoCard(record)}
                    ${renderReshipTransferCard(record)}
                    ${renderReshipLogisticsCard(record)}
                `;
            }
            if (record.completedSource === "reship_with_refund") {
                return `
                    ${renderAuditHeroCard(record)}
                    ${renderPostSaleBaseInfoCard(record)}
                    ${renderReshipTransferCard(record)}
                    ${renderReshipLogisticsCard(record)}
                    ${renderRefundSettlementCard(record)}
                `;
            }
            if (!isShippingScene(record.orderScene) || record.completedSource === "refund_only") {
                return `
                    ${renderAuditHeroCard(record)}
                    ${renderPostSaleBaseInfoCard(record)}
                    ${renderRefundSettlementCard(record)}
                `;
            }
            return `
                ${renderAuditHeroCard(record)}
                ${renderPostSaleBaseInfoCard(record)}
                ${renderApprovalInfoCard(record)}
                ${renderBuyerReturnLogisticsCard(record)}
                ${renderQualityDecisionCard(record)}
                ${renderRefundSettlementCard(record)}
            `;
        }

        function renderClosedModernDetailBody(record) {
            const subStatus = getClosedSubStatus(record);
            const blocks = [
                renderClosedOrderModule(record),
                renderClosedApplyModule(record)
            ];
            if (subStatus === "超时自动撤销") {
                blocks.push(renderClosedApprovalModule(record, "03"));
                blocks.push(renderClosedPendingReturnModule(record, "04"));
                blocks.push(renderClosedResultModule(record, "05"));
            } else if (subStatus === "商家拒绝退款") {
                blocks.push(renderClosedApprovalModule(record, "03"));
                blocks.push(renderClosedFinanceRejectModule(record, "04"));
            } else {
                blocks.push(renderClosedResultModule(record, "03"));
            }
            return `<div class="audit-workbench">${blocks.join("")}</div>`;
        }

            const sourceText = record.statusKey === "rejected"

        function renderClosedResultModule(record, index) {
            const subStatus = getClosedSubStatus(record);
            const isRejected = record.statusKey === "rejected";
            const reason = isRejected ? record.rejectReason : record.cancelReason;
            const timeLabel = isRejected ? "审批时间" : (subStatus === "客户自主撤销" ? "撤销时间" : "关闭时间");
            const timeValue = isRejected ? record.auditAt : record.completeAt;
