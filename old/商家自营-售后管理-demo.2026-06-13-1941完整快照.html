        function renderDrawerFooter(record) {
            const actions = record.availableActions;
            const footer = document.getElementById("drawer-footer");
            const drawerBody = document.getElementById("drawer-body");
            if (!actions.length) {
                footer.classList.add("hidden");
                footer.innerHTML = "";
                drawerBody.classList.remove("dimmed");
                return;
            }

            footer.classList.remove("hidden");
            if (record.statusKey === "audit") {
                footer.innerHTML = renderAuditFooter(record);
                drawerBody.classList.remove("dimmed");
                bindDrawerFooterEvents(record);
                return;
            }
            footer.innerHTML = `
                <div class="action-switcher">
                    ${actions.map((actionKey) => `
                        <button data-action-switch="${actionKey}">${actionLabel(actionKey, record)}</button>
                    `).join("")}
                </div>
            `;

            drawerBody.classList.remove("dimmed");
            bindDrawerFooterEvents(record);
        }

        function bindDrawerFooterEvents(record) {
            document.querySelectorAll("[data-action-switch]").forEach((button) => {
                button.addEventListener("click", () => {
                    const actionKey = button.dataset.actionSwitch;
                    openCenterModal(actionKey, record);
                });
            });
            document.querySelectorAll("[data-proof-src]").forEach((button) => {
                button.addEventListener("click", () => openImagePreview(button.dataset.proofSrc));
            });
            document.querySelectorAll("[data-toggle-back-timeline]").forEach((button) => {
                button.addEventListener("click", () => {
                    const id = button.dataset.toggleBackTimeline;
                    state.expandedLogistics[id] = !state.expandedLogistics[id];
                    if (state.activeRecord && state.activeRecord.id === id) {
                        renderDrawerBody(state.activeRecord);
                        renderDrawerFooter(state.activeRecord);
                    }
                });
            });
            document.querySelectorAll("[data-adjust-toggle]").forEach((toggle) => {
                const panel = document.querySelector("[data-adjust-panel]");
                const syncPanel = () => panel && panel.classList.toggle("show", toggle.checked);
                toggle.addEventListener("change", syncPanel);
                syncPanel();
            });
            document.querySelectorAll("[data-subsidy-toggle]").forEach((toggle) => {
                const panel = document.querySelector("[data-subsidy-panel]");
                const syncPanel = () => panel && panel.classList.toggle("show", toggle.checked);
                toggle.addEventListener("change", syncPanel);
                syncPanel();
            });
        }

        function openCenterModal(actionKey, record) {
            if (actionKey === "quality_check") {
                openQualityCheckModal(record);
                return;
            }
            if (actionKey === "create_reship") {
                openReshipModal(record);
                return;
            }
            if (actionKey === "execute_refund" || actionKey === "retry_refund") {
                openRefundModal(record, actionKey);
                return;
            }
            openActionCenterModal(actionKey, record);
        }

        function applyReshipTransition(record) {
            record.statusKey = "reship_pending";
            record.label = statusConfigs.reship_pending.label;
            record.mainStatus = statusConfigs.reship_pending.mainStatus;
            record.afterSaleType = "补寄";
            record.finalResult = statusConfigs.reship_pending.mainStatus;
            record.countdown = chooseCountdown("reship_pending", 1);
            record.availableActions = resolveAvailableActions(record);
            record.note = "商家已将本次售后改判为补寄处理，等待创建补寄出库单并发送仓库。";
            record.reshipOrderCreated = false;
            record.reshipSubStatus = "待创建出库单";
            record.reshipForm = {
                reason: "少件漏发",
                responsibility: record.currentResponsibility,
                itemsSummary: record.items.map(item => `${item.name} x${item.qty}`).join(" / "),
                freightBearer: record.currentFreightBearer,
                warehouseNote: "请按补寄明细创建出库单并尽快发货，出库后同步物流信息",
                transferReason: "少件漏发，优先补寄处理，不回收原商品。"
            };
            record.logs.unshift({
                time: "2026-05-28 18:20",
                text: "商家客服确认转补寄，已记录改判结论并流转至待补寄出库。"
            });
            state.activeAction = "";
            renderStatusTabs();
            renderTable();
            renderDrawer(record);
            showToast("已确认转补寄，售后单已流转到待补寄出库等待建单");
        }

        function applyRejectApplicationTransition(record) {
            const reasonInput = actionModalOverlay.querySelector("[data-reject-application-reason]");
            const reason = reasonInput && reasonInput.value.trim()
                ? reasonInput.value.trim()
                : "凭证不足，当前暂不支持直接退款";
            record.statusKey = "rejected";
            record.label = statusConfigs.rejected.label;
            record.mainStatus = statusConfigs.rejected.mainStatus;
            record.finalResult = statusConfigs.rejected.mainStatus;
            record.closureSubStatus = "商家拒绝申请";
            record.rejectReason = reason;
            record.availableActions = resolveAvailableActions(record);
            record.countdown = "已结束";
            record.logs.unshift({
                time: "2026-05-29 10:12",
                text: `商家客服拒绝售后申请，拒绝原因：${reason}`
            });
            state.activeAction = "";
            renderStatusTabs();
            renderTable();
            renderDrawer(record);
            showToast("已拒绝售后申请，售后单已流转到已关闭");
        }

        function applyApproveApplicationTransition(record) {
            if (record.afterSaleType === "补寄") {
                applyReshipTransition(record);
                return;
            }
            if (!isShippingScene(record.orderScene)) {
                const approveReasonInput = actionModalOverlay.querySelector("[data-approve-non-logistics-reason]");
                const approveReason = approveReasonInput && approveReasonInput.value.trim()
                    ? approveReasonInput.value.trim()
                    : "审核通过，确认退款";
                record.statusKey = "completed";
                record.label = statusConfigs.completed.label;
                record.mainStatus = statusConfigs.completed.mainStatus;
                record.finalResult = "退款成功";
                record.countdown = "已完成";
                record.availableActions = resolveAvailableActions(record);
                record.note = "商家已同意申请，系统已自动退款成功，无需进入寄回、签收、质检链路。";
                record.auditRemark = `审核通过：${approveReason}`;
                record.completeAt = "2026-05-29 10:15";
                record.refundOperator = "系统自动退款";
                record.completedSource = "refund_only";
                record.amounts.actual = record.amounts.approved;
                record.logs.unshift({
                    time: "2026-05-29 10:15",
                    text: `商家客服同意非物流订单退款申请，处理原因：${approveReason}；系统已自动退款成功，售后单直接进入已完成。`
                });
                state.activeAction = "";
                renderStatusTabs();
                renderTable();
                renderDrawer(record);
                showToast("已同意申请，非物流售后单已自动退款成功并进入已完成");
                return;
            }
            const isRefundOnly = record.afterSaleType === "仅退款";

        function applyQualityCheck(record) {
            const draft = state.qualityModalDraft || { mode: "good", note: "", images: [], abnormalType: "破损", itemRows: [] };

            // Validate item row quantities
            for (let i = 0; i < draft.itemRows.length; i++) {
                const row = draft.itemRows[i];
                const totalAssigned = row.goodQty + row.damagedQty + row.missingQty + row.pollutedQty;
                if (totalAssigned > row.applyQty) {
                    showToast(`${row.name}：完好+破损+缺失+污染数量(${totalAssigned})不能超过申请退货数量(${row.applyQty})`);
                    return;
                }
                if (row.goodQty > row.receivedQty) {
                    showToast(`${row.name}：完好入库数量(${row.goodQty})不能超过本次签收数量(${row.receivedQty})`);
                    return;
                }
            }

            if (draft.mode === "issue") {
                if (!draft.note.trim()) {
                    showToast("请填写异常说明");
                    return;
                }
                if (!draft.images.length) {
                    showToast("请上传异常图片凭证");
                    return;
                }
            }

            // Calculate totals
            const totalGood = draft.itemRows.reduce((s, r) => s + r.goodQty, 0);
            const totalDamaged = draft.itemRows.reduce((s, r) => s + r.damagedQty, 0);
            const totalMissing = draft.itemRows.reduce((s, r) => s + r.missingQty, 0);
            const totalPolluted = draft.itemRows.reduce((s, r) => s + r.pollutedQty, 0);
            const totalAbnormal = totalDamaged + totalMissing + totalPolluted;

            record.statusKey = "received";
            record.label = statusConfigs.received.label;
            record.mainStatus = statusConfigs.received.mainStatus;
            record.finalResult = statusConfigs.received.mainStatus;
            record.countdown = chooseCountdown("received", 1);

            // Store detailed quality inspection results
            record.qualityResult = draft.mode === "good" ? "全部完好" : (totalGood > 0 ? "部分异常" : "全部异常");
            record.qualityNote = draft.mode === "good" ? "" : draft.note.trim();
            record.qualityProofImages = draft.mode === "good" ? [] : draft.images.slice(0, 3);
            record.qualityAbnormalType = draft.mode === "good" ? "" : draft.abnormalType;
            record.qualityItemRows = draft.itemRows.map(r => ({...r}));
            record.qualitySummary = {
                totalGood,
                totalDamaged,
                totalMissing,
                totalPolluted,
                totalAbnormal,
                result: draft.mode === "good" ? "退货入库" : (totalGood > 0 ? "部分退货入库" : "只记录异常不入库")
            };

            record.availableActions = resolveAvailableActions(record);

            // Build log text
            let logText = "";
            if (draft.mode === "good") {
                logText = `仓库已完成签收质检：全部完好(${totalGood}件)，已生成退货入库记录并回补可售库存，售后单流转至待退款。`;
            } else {
                logText = `仓库已完成签收质检：完好入库${totalGood}件`;
                if (totalDamaged > 0) logText += `、破损${totalDamaged}件`;
                if (totalMissing > 0) logText += `、缺失${totalMissing}件`;
                if (totalPolluted > 0) logText += `、污染/影响二销${totalPolluted}件`;
                logText += `。异常类型：${draft.abnormalType}。${totalGood > 0 ? "完好部分已退货入库，" : ""}异常部分仅记录不入库，售后单流转至待退款。`;
            }

            record.logs.unshift({
                time: "2026-05-29 14:36",
                text: logText
            });
            closeQualityCheckModal();
            renderStatusTabs();
            renderTable();
            renderDrawer(record);
            showToast("已完成签收质检，售后单已流转到待退款");
        }

        function openRefundModal(record, actionKey) {
            const isRetry = actionKey === "retry_refund";
            const freightRefund = record.amounts.freightRefund || 0;
            const items = record.items || [];
            const maxRefund = record.amounts.maxRefund;
            const breakdown = record.amounts.breakdown || { wechat: 0, card: 0, points: 0 };
            const breakdownTotal = breakdown.wechat + breakdown.card + breakdown.points;

            // Build item rows with quality inspection info + suggested refund
            const qcRows = record.qualityItemRows || [];
            const itemRowsHtml = items.map((item, idx) => {
                const defaultAmount = item.qty * item.unitPrice;
                const qcRow = qcRows[idx];
                let qcInfo = "";
                let suggestedAmount = defaultAmount;
                if (qcRow) {
                    suggestedAmount = qcRow.goodQty * item.unitPrice;
                    const isGood = qcRow.damagedQty === 0 && qcRow.missingQty === 0 && qcRow.pollutedQty === 0;
                    if (isGood) {
                        qcInfo = `<span style="color:#16a34a;">✓ 完好${qcRow.goodQty}件</span>　<span style="color:#1f2a37;font-weight:600;">建议退款 ￥${suggestedAmount.toFixed(2)}</span>`;
                    } else {
                        const parts = [];

                        parts.push(`<span style="color:#1f2a37;font-weight:600;">建议退款 ￥${suggestedAmount.toFixed(2)}</span>`);

        function bindRefundModalEvents(record) {
            refundModalOverlay.querySelectorAll("[data-close-refund-modal]").forEach((button) => {
                button.addEventListener("click", closeRefundModal);
            });

            const items = record.items || [];
            const freightRefund = record.amounts.freightRefund || 0;
            const breakdown = record.amounts.breakdown || { wechat: 0, card: 0, points: 0 };
            const breakdownTotal = breakdown.wechat + breakdown.card + breakdown.points;
            const totalDisplay = refundModalOverlay.querySelector("[data-refund-total-display]");
            const breakdownContent = refundModalOverlay.querySelector("[data-refund-breakdown-content]");

            function recalcTotal() {
                let sum = 0;
                items.forEach((item, idx) => {
                    const inp = refundModalOverlay.querySelector(`[data-refund-item-amount="${idx}"]`);
                    if (inp) sum += Math.max(0, Number(inp.value) || 0);
                });
                if (freightRefund > 0) {
                    const freightInp = refundModalOverlay.querySelector("[data-refund-freight-amount]");
                    if (freightInp) sum += Math.max(0, Number(freightInp.value) || 0);
                }
                if (totalDisplay) totalDisplay.textContent = `￥${sum.toFixed(2)}`;

                // Auto-distribute breakdown proportionally
                if (breakdownContent && breakdownTotal > 0) {
                    const ratio = sum / breakdownTotal;
                    const wechatPart = Math.min(breakdown.wechat, (breakdown.wechat * ratio)).toFixed(2);
                    const cardPart = Math.min(breakdown.card, (breakdown.card * ratio)).toFixed(2);
                    const pointsPart = Math.round(Math.min(breakdown.points, breakdown.points * ratio));
                    const parts = [];
                    if (breakdown.wechat > 0) parts.push(`微信退 <strong>￥${wechatPart}</strong>`);
                    if (breakdown.card > 0) parts.push(`卡金退 <strong>￥${cardPart}</strong>`);
                    if (breakdown.points > 0) parts.push(`积分退 <strong>${pointsPart}</strong>`);
                    breakdownContent.innerHTML = parts.join("　｜　");
                }

                return sum;
            }

            // Bind input events for live recalculation
            items.forEach((item, idx) => {
                const inp = refundModalOverlay.querySelector(`[data-refund-item-amount="${idx}"]`);
                if (inp) inp.addEventListener("input", recalcTotal);
            });
            if (freightRefund > 0) {
                const freightInp = refundModalOverlay.querySelector("[data-refund-freight-amount]");
                if (freightInp) freightInp.addEventListener("input", recalcTotal);
            }

            // Initial calculation
            recalcTotal();

            const confirmButton = refundModalOverlay.querySelector("[data-confirm-refund-modal]");
            if (confirmButton) {
                confirmButton.addEventListener("click", () => {
                    const amount = recalcTotal();
                    if (amount > record.amounts.maxRefund) {
                        showToast(`调整后总退款金额 ￥${amount.toFixed(2)} 超过最大可退 ￥${money(record.amounts.maxRefund)}，请调整`);
                        return;
                    }
                    const isRetry = confirmButton.dataset.confirmRefundModal === "retry_refund";
                    closeRefundModal();
                    applyRefundProcessingTransition(record, amount, isRetry);
                });
            }
        }

        function bindActionModalEvents(actionKey, record) {
            actionModalOverlay.querySelectorAll("[data-close-action-modal]").forEach((button) => {
                button.addEventListener("click", closeActionModal);
            });
            actionModalOverlay.querySelectorAll("[data-action-toast]").forEach((button) => {
                button.addEventListener("click", () => {
                    const message = button.dataset.actionToast;
                    closeActionModal();
                    showToast(message);
                });
            });
            const reshipButton = actionModalOverlay.querySelector("[data-confirm-action-reship]");
            if (reshipButton) {
                reshipButton.addEventListener("click", () => {
                    closeActionModal();
                    applyReshipTransition(record);
                });
            }
            const rejectButton = actionModalOverlay.querySelector("[data-confirm-action-reject]");
            if (rejectButton) {
                rejectButton.addEventListener("click", () => {
                    applyRejectApplicationTransition(record);
                    closeActionModal();
                });
            }
            const approveButton = actionModalOverlay.querySelector("[data-confirm-action-approve]");
            if (approveButton) {
                approveButton.addEventListener("click", () => {
                    if (!isShippingScene(record.orderScene)) {
                        const approveReasonInput = actionModalOverlay.querySelector("[data-approve-non-logistics-reason]");
                        if (!approveReasonInput || !approveReasonInput.value.trim()) {
                            showToast("请先填写同意申请原因");
                            return;
                        }
                    }
                    applyApproveApplicationTransition(record);
                    closeActionModal();
                });
            }
            actionModalOverlay.querySelectorAll("[data-approve-adjust-toggle]").forEach((toggle) => {
                const panel = actionModalOverlay.querySelector("[data-approve-adjust-panel]");
                const syncPanel = () => panel && panel.classList.toggle("show", toggle.checked);
                toggle.addEventListener("change", syncPanel);
                syncPanel();
            });
            actionModalOverlay.querySelectorAll("[data-approve-subsidy-toggle]").forEach((toggle) => {
                const panel = actionModalOverlay.querySelector("[data-approve-subsidy-panel]");
                const syncPanel = () => panel && panel.classList.toggle("show", toggle.checked);
                toggle.addEventListener("change", syncPanel);
                syncPanel();
            });
        }

        function closeActionModal() {
            actionModalOverlay.classList.remove("show");
            actionModalOverlay.innerHTML = "";
        }

                            <div class="field full multiline"><label>给仓库出库说明</label><input value="请按补寄明细创建出库单并尽快发货，出库后同步物流信息"></div>
                        </div>
                        <div class="btn-group" style="margin-top:12px;"><button class="btn primary" data-demo-submit="已展示“创建补寄出库单并发送仓库”抽屉">确认创建并发送</button></div>
                    </div>
                `,
                
            };
            const panel = actionPanels[actionKey] || "";
            return panel.replace('<div class="action-panel">', '<div class="action-panel"><button class="action-panel-close" data-close-action-panel>×</button>');
        }

        function closeDrawer() {
            drawerOverlay.classList.remove("show");
            drawer.classList.remove("show");
            state.activeRecord = null;
            state.activeAction = "";
        }

        function openImagePreview(src) {
            imagePreviewImg.src = src;
            imagePreviewOverlay.classList.add("show");
        }

        function closeImagePreview() {
            imagePreviewOverlay.classList.remove("show");
            imagePreviewImg.src = "";
        }

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 1800);
        }

        function renderStoreFilterOptions() {
            const select = document.getElementById("store-filter");
            const options = ['<option value="">全部门店</option>']
                .concat(storeCatalog.map(item => `<option value="${item.store}">${item.store}</option>`));
            select.innerHTML = options.join("");
        }

        function syncScopeFilterUI() {
            const scopeInput = document.getElementById("scope-filter");
            const storeFilter = document.getElementById("store-filter");
            const storeFilterField = document.getElementById("store-filter-field");
            const filterScopeDesc = document.getElementById("filter-scope-desc");
            scopeInput.value = state.filters.scope;
            document.querySelectorAll("[data-scope-tab]").forEach((button) => {
                const isActive = button.dataset.scopeTab === state.filters.scope;
                button.classList.toggle("active", isActive);
                button.setAttribute("aria-selected", isActive ? "true" : "false");
            });
            if (state.filters.scope === "store") {
                storeFilter.value = state.currentAccountStore;
                storeFilter.disabled = true;
                storeFilterField.classList.add("hidden");
                if (filterScopeDesc) filterScopeDesc.textContent = `分店账号锁定当前门店：${state.currentAccountStore}，筛选区不再显示交易门店条件`;
            } else {
                storeFilterField.classList.remove("hidden");
                storeFilter.disabled = false;
                storeFilter.value = state.filters.store;
                if (filterScopeDesc) filterScopeDesc.textContent = "总部账号可查看全部交易门店，并按门店筛选";
            }
        }

        function bindEvents() {
            document.getElementById("status-tabs").addEventListener("click", (event) => {
                const button = event.target.closest("[data-status-tab]");
                if (!button) return;
                state.currentTab = button.dataset.statusTab;
                state.currentPage = 1;
                renderStatusTabs();
                renderTable();
            });

            const tableClickHandler = (event) => {
                const target = event.target.closest("[data-open-id]");
                if (!target) return;
                const record = mockRecords.find(item => item.id === target.dataset.openId);
                if (record) renderDrawer(record);
            };
            document.getElementById("table-body-left").addEventListener("click", tableClickHandler);
            document.getElementById("table-body-middle").addEventListener("click", tableClickHandler);
            document.getElementById("table-body-right").addEventListener("click", tableClickHandler);

            drawerOverlay.addEventListener("click", closeDrawer);
            reshipModalOverlay.addEventListener("click", (event) => {
                if (event.target === reshipModalOverlay) closeReshipModal();
            });
            qualityModalOverlay.addEventListener("click", (event) => {
                if (event.target === qualityModalOverlay) closeQualityCheckModal();
            });
            refundModalOverlay.addEventListener("click", (event) => {
                if (event.target === refundModalOverlay) closeRefundModal();
            });
            actionModalOverlay.addEventListener("click", (event) => {
                if (event.target === actionModalOverlay) closeActionModal();
            });
            imagePreviewOverlay.addEventListener("click", (event) => {
                if (event.target === imagePreviewOverlay || event.target.id === "image-preview-close") {
                    closeImagePreview();
                }
            });

            document.getElementById("search-btn").addEventListener("click", applyFilters);
            document.getElementById("reset-btn").addEventListener("click", resetFilters);
            document.querySelectorAll("[data-scope-tab]").forEach((button) => {
                button.addEventListener("click", () => {
                    state.filters.scope = button.dataset.scopeTab;
                    document.getElementById("scope-filter").value = state.filters.scope;
                    applyFilters();
                });
            });
            ["store-filter", "search-input"].forEach((id) => {
                document.getElementById(id).addEventListener(id === "search-input" ? "input" : "change", applyFilters);
            });
            document.getElementById("pagination").addEventListener("click", (event) => {
                const pageButton = event.target.closest("[data-page]");
                const actionButton = event.target.closest("[data-page-action]");
                if (pageButton) {
                    state.currentPage = Number(pageButton.dataset.page);
                    renderTable();
                    return;
                }
                if (actionButton) {
                    if (actionButton.dataset.pageAction === "prev" && state.currentPage > 1) state.currentPage -= 1;
                    if (actionButton.dataset.pageAction === "next") state.currentPage += 1;
                    renderTable();
                }
            });
        }

        function applyFilters() {
            state.filters.scope = document.getElementById("scope-filter").value;
            state.filters.store = state.filters.scope === "store" ? state.currentAccountStore : document.getElementById("store-filter").value;
            state.filters.keyword = document.getElementById("search-input").value;
            state.filters.type = "";
            state.filters.orderType = "";
            state.filters.responsibility = "";
            state.filters.freight = "";
            syncScopeFilterUI();
            state.currentPage = 1;
            renderTable();
        }

        function resetFilters() {
            state.filters = {
                scope: "hq",
                store: "",
                keyword: "",
                type: "",
                orderType: "",
                responsibility: "",
                freight: ""
            };
            document.getElementById("scope-filter").value = state.filters.scope;
            document.getElementById("store-filter").value = "";
            document.getElementById("search-input").value = "";
            syncScopeFilterUI();
            state.currentPage = 1;
            renderTable();
        }

        function init() {
            renderStoreFilterOptions();
            syncScopeFilterUI();
            renderStatusTabs();
            renderTable();
            bindEvents();
        }

        init();
    </script>
</body>
</html>
