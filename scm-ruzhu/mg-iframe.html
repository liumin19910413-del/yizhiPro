<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG管理后台 - 店商供应链平台</title>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        .sidebar { background: linear-gradient(180deg, #2d3436 0%, #1e272e 100%); }
        .nav-item.active { border-left-color: #6c5ce7; }
        .btn-primary { background: #6c5ce7; }
        .btn-primary:hover { background: #5b4cdb; }
        
        /* 审批卡片 */
        .audit-card { background: #f9f9f9; border-radius: 8px; padding: 20px; margin-bottom: 15px; border: 1px solid #e8e8e8; }
        .audit-card .merchant-info { display: flex; gap: 20px; margin-bottom: 15px; }
        .audit-card .license-img { width: 200px; height: 130px; object-fit: cover; border-radius: 4px; border: 1px solid #e8e8e8; }
        .audit-card .info-list { flex: 1; }
        .audit-card .info-item { margin-bottom: 8px; font-size: 14px; }
        .audit-card .info-item .label { color: #666; display: inline-block; width: 100px; }
        
        /* AI检测结果 */
        .ai-result { padding: 15px; border-radius: 8px; margin: 15px 0; }
        .ai-result.pass { background: #f6ffed; border: 1px solid #b7eb8f; }
        .ai-result.fail { background: #fff2f0; border: 1px solid #ffccc7; }
        .ai-result .title { font-weight: 600; margin-bottom: 10px; }
        .ai-result .item { font-size: 13px; margin: 5px 0; }
        .ai-result .item.pass { color: #52c41a; }
        .ai-result .item.fail { color: #ff4d4f; }
        
        /* 分润设置 */
        .ratio-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .ratio-group .label { width: 150px; font-size: 14px; }
        .ratio-group input { width: 80px; }
        .ratio-group .unit { color: #666; }
        
        /* 商品详情tabs */
        .goods-detail-tabs { display: flex; border-bottom: 1px solid #e8e8e8; margin-bottom: 20px; }
        .goods-detail-tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; }
        .goods-detail-tab.active { border-bottom-color: #6c5ce7; color: #6c5ce7; }
        
        /* 库存标签 */
        .stock-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .stock-badge.low { background: #fff2f0; color: #ff4d4f; }
        .stock-badge.normal { background: #f6ffed; color: #52c41a; }
        
        /* 子菜单 */
        .nav-submenu { padding-left: 30px; display: none; }
        .nav-item.has-submenu.expanded + .nav-submenu { display: block; }
        .nav-submenu .nav-item { font-size: 13px; padding: 10px 20px; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>MG管理后台</h1>
                <div class="subtitle">供应链平台管理</div>
            </div>
            <nav class="nav-menu">
                <div class="nav-group-title">业务管理</div>
                <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span><span>数据概览</span></div>
                <div class="nav-item has-submenu" data-page="merchants"><span class="icon">🏪</span><span>商户入驻</span></div>
                <div class="nav-submenu">
                    <div class="nav-item" data-page="merchants-audit"><span>入驻审批</span></div>
                    <div class="nav-item" data-page="merchants-profit"><span>分润管理</span></div>
                </div>
                
                <div class="nav-group-title">商品管理</div>
                <div class="nav-item" data-page="products"><span class="icon">📦</span><span>产品维护</span></div>
                <div class="nav-item" data-page="goods"><span class="icon">🛍️</span><span>商品组合</span></div>
                <div class="nav-item" data-page="mall-goods"><span class="icon">🏬</span><span>商城商品</span></div>
                <div class="nav-item" data-page="shipping"><span class="icon">🚚</span><span>邮费管理</span></div>
                <div class="nav-item" data-page="categories"><span class="icon">📁</span><span>分类管理</span></div>
                <div class="nav-item" data-page="exclude-areas"><span class="icon">🚫</span><span>不可下单地区</span></div>
                <div class="nav-item" data-page="after-sale"><span class="icon">🔄</span><span>售后规则</span></div>
                
                <div class="nav-group-title">财务管理</div>
                <div class="nav-item" data-page="deposits"><span class="icon">💰</span><span>预收款管理</span></div>
                <div class="nav-item" data-page="orders"><span class="icon">📋</span><span>订单管理</span></div>
                <div class="nav-item" data-page="finance"><span class="icon">📈</span><span>财务对账</span></div>
            </nav>
        </aside>
        <main class="main-content">
            <div id="page-content"></div>
        </main>
    </div>
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">弹窗标题</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="shared/data.js"></script>
    <script src="mg/app.js"></script>
</body>
</html>
