<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>调试页面</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { background: #e6ffe6; }
        .error { background: #ffe6e6; }
        iframe { width: 100%; height: 400px; border: 2px solid #333; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>资源加载测试</h1>
    
    <div class="test" id="test1">
        <h3>测试1: 加载 shared/styles.css</h3>
        <div id="result1">测试中...</div>
    </div>
    
    <div class="test" id="test2">
        <h3>测试2: 加载 shared/data.js</h3>
        <div id="result2">测试中...</div>
    </div>
    
    <div class="test" id="test3">
        <h3>测试3: 加载 mg/app.js</h3>
        <div id="result3">测试中...</div>
    </div>
    
    <div class="test">
        <h3>测试4: iframe加载 mg-iframe.html</h3>
        <iframe src="mg-iframe.html" id="mgIframe"></iframe>
        <div id="result4">加载中...</div>
    </div>
    
    <script>
        // 测试CSS
        fetch('shared/styles.css')
            .then(r => {
                document.getElementById('test1').className = 'test success';
                document.getElementById('result1').textContent = '✓ CSS文件加载成功';
            })
            .catch(e => {
                document.getElementById('test1').className = 'test error';
                document.getElementById('result1').textContent = '✗ CSS文件加载失败: ' + e.message;
            });
        
        // 测试data.js
        fetch('shared/data.js')
            .then(r => {
                document.getElementById('test2').className = 'test success';
                document.getElementById('result2').textContent = '✓ data.js文件加载成功';
            })
            .catch(e => {
                document.getElementById('test2').className = 'test error';
                document.getElementById('result2').textContent = '✗ data.js文件加载失败: ' + e.message;
            });
        
        // 测试app.js
        fetch('mg/app.js')
            .then(r => {
                document.getElementById('test3').className = 'test success';
                document.getElementById('result3').textContent = '✓ mg/app.js文件加载成功';
            })
            .catch(e => {
                document.getElementById('test3').className = 'test error';
                document.getElementById('result3').textContent = '✗ mg/app.js文件加载失败: ' + e.message;
            });
        
        // 测试iframe
        document.getElementById('mgIframe').onload = function() {
            document.getElementById('result4').textContent = '✓ iframe加载完成';
            try {
                const doc = this.contentDocument || this.contentWindow.document;
                document.getElementById('result4').textContent += ' - 文档标题: ' + doc.title;
            } catch(e) {
                document.getElementById('result4').textContent += ' - 无法访问文档: ' + e.message;
            }
        };
        
        document.getElementById('mgIframe').onerror = function() {
            document.getElementById('result4').textContent = '✗ iframe加载失败';
        };
    </script>
</body>
</html>
