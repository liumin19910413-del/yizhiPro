<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite商户后台 - 店商供应链</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .sidebar { background: linear-gradient(180deg, #0f4c75 0%, #1b262c 100%); }
        .nav-item.active { border-left-color: #3282b8; }
        .btn-primary { background: #3282b8; }
        .btn-primary:hover { background: #2a6f9e; }
        
        /* 申请流程步骤 */
        .apply-steps { display: flex; justify-content: center; margin-bottom: 30px; padding: 20px; background: #fff; border-radius: 8px; }
        .step { display: flex; align-items: center; gap: 10px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; background: #e8e8e8; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
        .step.active .step-num { background: #3282b8; color: #fff; }
        .step.done .step-num { background: #52c41a; color: #fff; }
        .step-text { font-size: 14px; color: #666; }
        .step.active .step-text, .step.done .step-text { color: #333; font-weight: 500; }
        .step-line { width: 60px; height: 2px; background: #e8e8e8; margin: 0 15px; }
        .step.done + .step-line { background: #52c41a; }
        
        /* 协议签署 */
        .contract-list { display: grid; gap: 15px; }
        .contract-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #f9f9f9; border-radius: 8px; border: 1px solid #e8e8e8; }
        .contract-item.signed { border-color: #52c41a; background: #f6ffed; }
        .contract-info h4 { font-size: 15px; margin-bottom: 6px; }
        .contract-info p { font-size: 13px; color: #666; }
        
        /* 商品卡片 - 只读展示 */
        .goods-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .goods-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .goods-card img { width: 100%; height: 200px; object-fit: cover; }
        .goods-card .info { padding: 15px; }
        .goods-card .spu-id { font-size: 12px; color: #999; margin-bottom: 5px; }
        .goods-card .name { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .goods-card .price { color: #ff4d4f; font-size: 20px; font-weight: 600; }
        .goods-card .profit-box { margin-top: 12px; padding: 12px; background: #f6ffed; border-radius: 6px; border: 1px solid #b7eb8f; }
        .goods-card .profit-label { font-size: 12px; color: #52c41a; margin-bottom: 4px; }
        .goods-card .profit-value { font-size: 18px; font-weight: 600; color: #52c41a; }
        .goods-card .update-time { font-size: 12px; color: #999; margin-top: 10px; }
        
        /* 保证金概览 */
        .deposit-overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .deposit-item { text-align: center; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .deposit-item .amount { font-size: 24px; font-weight: 600; color: #1a1a2e; }
        .deposit-item .label { font-size: 13px; color: #666; margin-top: 5px; }
        .deposit-item.available .amount { color: #52c41a; }
        .deposit-item.frozen .amount { color: #faad14; }
        .deposit-item.settled .amount { color: #3282b8; }
        .deposit-item.need-withdraw .amount { color: #ff4d4f; }
        
        /* 充值方式选择 */
        .pay-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 15px 0; }
        .pay-method { padding: 15px; border: 2px solid #e8e8e8; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .pay-method:hover { border-color: #3282b8; }
        .pay-method.selected { border-color: #3282b8; background: #e6f7ff; }
        .pay-method.disabled { opacity: 0.5; cursor: not-allowed; }
        .pay-method .icon { font-size: 24px; margin-bottom: 8px; }
        .pay-method .name { font-size: 14px; }
        
        /* 订单状态标记 */
        .order-status-tip { padding: 10px 15px; border-radius: 6px; font-size: 13px; margin-bottom: 15px; }
        .order-status-tip.warning { background: #fff7e6; border: 1px solid #ffd591; color: #d46b08; }
        .order-status-tip.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #389e0d; }
        
        /* 营销应用卡片 */
        .app-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .app-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .app-card:hover { transform: translateY(-4px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); border-color: #3282b8; }
        .app-card-icon { font-size: 48px; margin-bottom: 16px; }
        .app-card-title { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
        .app-card-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 16px; }
        .app-card-status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .app-card-status.active { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .app-card-status.inactive { background: #f5f5f5; color: #999; border: 1px solid #d9d9d9; }
        .app-card-status.pending { background: #fff7e6; color: #d46b08; border: 1px solid #ffd591; }
        
        /* 开关按钮 */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3282b8; }
        input:checked + .slider:before { transform: translateX(20px); }
        
        /* 子菜单 */
        .nav-submenu { padding-left: 20px; display: none; background: rgba(0,0,0,0.1); }
        .nav-item.has-submenu.expanded + .nav-submenu { display: block; }
        .nav-submenu .nav-item { font-size: 13px; padding: 10px 20px; }
        .nav-item.has-submenu { position: relative; }
        .nav-item.has-submenu::after { content: '▼'; position: absolute; right: 20px; font-size: 10px; transition: transform 0.3s; }
        .nav-item.has-submenu.expanded::after { transform: rotate(180deg); }
        
        /* 产品文档面板 */
        .doc-panel { position: fixed; right: 0; top: 0; width: 480px; height: 100vh; background: #fff; box-shadow: -2px 0 10px rgba(0,0,0,0.1); z-index: 100; display: flex; flex-direction: column; transition: transform 0.3s; }
        .doc-panel.collapsed { transform: translateX(440px); }
        .doc-panel-toggle { position: absolute; left: -40px; top: 50%; transform: translateY(-50%); width: 40px; height: 80px; background: #3282b8; color: #fff; border: none; border-radius: 8px 0 0 8px; cursor: pointer; font-size: 12px; writing-mode: vertical-rl; display: flex; align-items: center; justify-content: center; box-shadow: -2px 0 8px rgba(0,0,0,0.15); }
        .doc-panel-toggle:hover { background: #2a6f9e; }
        .doc-panel-header { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #e8e8e8; }
        .doc-panel-header h3 { font-size: 14px; color: #333; margin: 0; display: flex; align-items: center; gap: 8px; }
        .doc-panel-page { font-size: 12px; color: #666; margin-top: 5px; padding: 4px 8px; background: #e6f7ff; border-radius: 4px; display: inline-block; }
        .doc-panel-body { flex: 1; overflow-y: auto; padding: 15px; }
        .doc-panel-body .doc-content { font-size: 13px; line-height: 1.8; color: #555; }
        .doc-panel-body .doc-content h4 { font-size: 14px; color: #333; margin: 15px 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        .doc-panel-body .doc-content h4:first-child { margin-top: 0; }
        .doc-panel-body .doc-content ul { padding-left: 20px; margin: 10px 0; }
        .doc-panel-body .doc-content li { margin: 5px 0; }
        .doc-panel-body .doc-content .tip { padding: 10px; background: #fff7e6; border-left: 3px solid #faad14; margin: 10px 0; font-size: 12px; }
        .doc-panel-body .doc-content .note { padding: 10px; background: #e6f7ff; border-left: 3px solid #1890ff; margin: 10px 0; font-size: 12px; }
        .doc-panel-body .doc-placeholder { text-align: center; color: #999; padding: 40px 20px; }
        .doc-panel-body .doc-placeholder .icon { font-size: 48px; margin-bottom: 15px; }
        .doc-panel-body .doc-content .doc-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
        .doc-panel-body .doc-content .doc-table th, .doc-panel-body .doc-content .doc-table td { border: 1px solid #e8e8e8; padding: 6px 8px; text-align: left; }
        .doc-panel-body .doc-content .doc-table th { background: #f5f5f5; font-weight: 600; }
        .doc-panel-body .doc-content .doc-table tr:nth-child(even) { background: #fafafa; }
        
        /* 调整主内容区域，为文档面板留出空间 */
        .app-container { margin-right: 480px; transition: margin-right 0.3s; }
        .app-container.doc-collapsed { margin-right: 40px; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Lite商户后台</h1>
                <div class="subtitle" id="sidebar-subtitle">营销应用</div>
                <button onclick="window.location.href='../index-switch.html'" style="margin-top: 15px; width: 100%; padding: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; cursor: pointer; font-size: 13px;">← 返回系统选择</button>
                <button onclick="if(confirm('确定要重置测试数据吗？\\n\\n重置后店商供应链将变为【未开通】状态，\\n可以测试完整的入驻流程。')){sessionStorage.setItem('reset_to_fresh_mode','true');localStorage.clear();location.reload();}" style="margin-top: 10px; width: 100%; padding: 8px; background: rgba(255,100,100,0.2); color: #ffaaaa; border: 1px solid rgba(255,100,100,0.3); border-radius: 6px; cursor: pointer; font-size: 12px;">🔄 重置测试数据</button>
            </div>
            <nav class="nav-menu" id="nav-menu">
                <!-- 导航菜单由JS动态生成 -->
            </nav>
        </aside>
        <main class="main-content">
            <div id="page-content"></div>
        </main>
    </div>
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">弹窗标题</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    
    <!-- 产品文档面板 -->
    <div class="doc-panel" id="doc-panel">
        <button class="doc-panel-toggle" onclick="toggleDocPanel()">📄 文档</button>
        <div class="doc-panel-header">
            <h3>📋 产品说明文档</h3>
            <div class="doc-panel-page" id="doc-page-name">当前页面</div>
        </div>
        <div class="doc-panel-body">
            <div id="doc-content"></div>
        </div>
    </div>
    
    <script src="../shared/data.js"></script>
    <script src="../shared/docs.js"></script>
    <script src="app.js"></script>
</body>
</html>
