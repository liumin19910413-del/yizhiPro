<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店商供应链 - 双系统Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: #fff;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        .cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 320px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        .card .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .card p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .card.lite { border-top: 4px solid #3282b8; }
        .card.mg { border-top: 4px solid #6c5ce7; }
        .card .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .card.lite .btn {
            background: #3282b8;
            color: #fff;
        }
        .card.mg .btn {
            background: #6c5ce7;
            color: #fff;
        }
        .card .btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 店商供应链系统</h1>
        <p class="subtitle">Lite商户端 + MG管理端 双系统联动Demo</p>
        
        <div class="cards">
            <a href="lite/index.html" target="_blank" class="card lite">
                <div class="icon">🏪</div>
                <h2>Lite 商户后台</h2>
                <p>商家入驻申请、商品浏览、订单管理、保证金充值、财务对账等功能</p>
                <span class="btn">进入商户后台 →</span>
            </a>
            
            <a href="mg/index.html" target="_blank" class="card mg">
                <div class="icon">🏢</div>
                <h2>MG 管理后台</h2>
                <p>商户审核、分润管理、产品维护、商品组合、预收款管理、订单处理等功能</p>
                <span class="btn">进入管理后台 →</span>
            </a>
        </div>
    </div>
</body>
</html>
