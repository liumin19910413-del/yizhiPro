<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伊智精选 - 系统导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            font-size: 64px;
            margin-bottom: 20px;
            text-align: center;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 20px;
        }

        .card-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .badge-new {
            background: #52c41a;
            color: white;
        }

        .badge-old {
            background: #fa8c16;
            color: white;
        }

        .card-features {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .card-features ul {
            list-style: none;
            padding: 0;
        }

        .card-features li {
            padding: 6px 0;
            font-size: 13px;
            color: #666;
        }

        .card-features li::before {
            content: '✓';
            color: #52c41a;
            font-weight: bold;
            margin-right: 8px;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🏪 伊智精选平台</h1>
            <p>S2B2C供应链管理系统</p>
        </div>

        <div class="cards">
            <!-- 原系统 -->
            <a href="admin/index.html" class="card">
                <div class="card-icon">🏢</div>
                <div class="card-title">平台管理后台</div>
                <div class="card-desc">
                    原有的管理系统
                    <br>
                    <span class="card-badge badge-old">⚠️ 旧版本</span>
                </div>
                <div class="card-features">
                    <ul>
                        <li>订单管理</li>
                        <li>商品管理</li>
                        <li>门店管理</li>
                        <li>财务对账（旧版）</li>
                        <li>售后管理</li>
                    </ul>
                </div>
            </a>


            <!-- 商城端 -->
            <a href="mall/index.html" class="card">
                <div class="card-icon">🛒</div>
                <div class="card-title">商城端</div>
                <div class="card-desc">
                    门店下单界面
                </div>
                <div class="card-features">
                    <ul>
                        <li>商品浏览</li>
                        <li>购物车</li>
                        <li>下单支付</li>
                        <li>订单查询</li>
                    </ul>
                </div>
            </a>

            <!-- 商户后台（新版） -->
            <a href="merchant-vue/dist/index.html" target="_blank" class="card" style="border: 2px solid #f093fb;">
                <div class="card-icon">✨</div>
                <div class="card-title" style="color: #f093fb;">商户后台 <span
                        style="font-size: 12px; background: #f093fb; color: white; padding: 2px 8px; border-radius: 8px; margin-left: 8px;">新版</span>
                </div>
                <div class="card-desc">
                    Vue3重构新版商户后台
                </div>
                <div class="card-features">
                    <ul>
                        <li>保证金管理</li>
                        <li>分店配置</li>
                        <li>变动明细</li>
                        <li>门店/总部视角</li>
                    </ul>
                </div>
                <div class="card-badge badge-new">推荐</div>
            </a>
        </div>

        <div class="footer">
            <p style="margin-top: 10px; font-size: 14px;">服务器地址: http://localhost:8000</p>
        </div>
    </div>
</body>

</html>
