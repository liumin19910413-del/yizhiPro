                            <div style="font-size: 12px; color: #999; margin-bottom: 6px;">${item.spec}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="color: #ff4757; font-weight: 500;">¥${item.price.toFixed(2)}</span>
                                <span style="color: #999; font-size: 12px;">x${item.qty}</span>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
            
            <!-- 支付信息 -->
            <div style="background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px;">
                <div style="font-weight: 600; margin-bottom: 12px;">💰 支付信息</div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 13px; color: #666;">商品总额</span>
                    <span style="font-size: 13px;">¥${subTotal.toFixed(2)}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 13px; color: #666;">运费${subOrder.freightSnapshot && subOrder.freightSnapshot.isFreeShipping ? '（免运费）' : ''}</span>
                    <span style="font-size: 13px; ${subFreight === 0 ? 'color: #11998e;' : ''}">${subFreight > 0 ? '+¥' + subFreight.toFixed(2) : '¥0.00'}</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid #f0f0f0;">
                    <span style="font-size: 14px; font-weight: 600;">应付金额</span>
                    <span style="font-size: 18px; font-weight: bold; color: #ff4757;">¥${actualPay.toFixed(2)}</span>
                </div>
                
                <!-- 支付明细 -->
                <div style="margin-top: 12px; padding-top: 12px; border-top: 1px dashed #eee;">
                    <div style="font-size: 12px; color: #666; margin-bottom: 8px;">支付明细：</div>
                    ${subCouponPaid > 0 ? `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                        <span style="font-size: 13px; color: #333;">🎫 优惠券抵扣</span>
                        <span style="font-size: 13px; color: #11998e;">¥${subCouponPaid.toFixed(2)}</span>
                    </div>
                    ` : ''}
                    ${subPointsPaid > 0 ? `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                        <span style="font-size: 13px; color: #333;">🎁 积分抵扣</span>
                        <span style="font-size: 13px; color: #11998e;">¥${subPointsPaid.toFixed(2)}</span>
                    </div>
                    ` : ''}
                    ${subCardUsed > 0 ? `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                        <span style="font-size: 13px; color: #333;">💳 卡金支付</span>
                        <span style="font-size: 13px; color: #11998e;">¥${subCardUsed.toFixed(2)}</span>
                    </div>
                    ` : ''}
                    ${subCashAmount > 0 ? `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                        <span style="font-size: 13px; color: #333;">${cashPayMethod === 'wechat' ? '💚 微信支付' : cashPayMethod === 'alipay' ? '💙 支付宝支付' : '💚 微信支付'}</span>
                        <span style="font-size: 13px; color: #11998e;">¥${subCashAmount.toFixed(2)}</span>
                    </div>
                    ` : ''}
                    ${subCouponPaid === 0 && subPointsPaid === 0 && subCardUsed === 0 && subCashAmount === 0 ? `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                        <span style="font-size: 13px; color: #333;">💚 微信支付</span>
                        <span style="font-size: 13px; color: #11998e;">¥${actualPay.toFixed(2)}</span>
                    </div>
                    ` : ''}
                </div>
            </div>
            
            <!-- 订单信息 -->
            <div style="background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px;">
                <div style="font-weight: 600; margin-bottom: 12px;">📋 订单信息</div>
                <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5;">
                    <span style="font-size: 13px; color: #666;">订单编号</span>
                    <div style="display: flex; align-items: center;">
                        <span style="font-size: 13px;">${subOrder.id}</span>
                        <span onclick="copyOrderId('${subOrder.id}')" style="font-size: 11px; color: #1890ff; margin-left: 8px; cursor: pointer;">复制</span>
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5;">
                    <span style="font-size: 13px; color: #666;">下单时间</span>
                    <span style="font-size: 13px;">${formatTime(order.createTime)}</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                    <span style="font-size: 13px; color: #666;">支付时间</span>
                    <span style="font-size: 13px;">${order.payTime ? formatTime(order.payTime) : formatTime(order.createTime)}</span>
                </div>
                ${order.remark ? `
                <div style="display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid #f5f5f5;">
                    <span style="font-size: 13px; color: #666;">订单备注</span>
                    <span style="font-size: 13px; color: #333;">${order.remark}</span>
                </div>
                ` : ''}
            </div>
            
            <!-- 联系卖家 -->
            <div style="text-align: center; padding: 15px 0;">
                <span style="font-size: 13px; color: #666;">📞 联系卖家</span>
            </div>
        </div>
        
        <!-- 底部操作栏 -->
        <div class="bottom-bar" style="justify-content: flex-end; gap: 10px;">
            ${subOrder.status === 'shipped' && !hasExchangeAS ? `
                <button onclick="currentSubOrderId='${subOrder.id}'; goTo('logistics', {subOrderId: '${subOrder.id}'})" class="btn btn-default" style="padding: 10px 15px; font-size: 13px;">查看物流</button>
                <button onclick="confirmReceive('${subOrder.id}')" class="btn btn-primary" style="padding: 10px 15px; font-size: 13px;">确认收货</button>
            ` : subOrder.status === 'shipped' && hasExchangeAS ? `
                <button onclick="currentSubOrderId='${subOrder.id}'; goTo('logistics', {subOrderId: '${subOrder.id}'})" class="btn btn-default" style="padding: 10px 15px; font-size: 13px;">查看物流</button>
                <button onclick="goTo('afterSaleDetail', {afterSaleId: '${orderAfterSales.find(as => as.type === 'exchange' && as.status !== 'completed' && as.status !== 'rejected')?.id}'})" class="btn" style="padding: 10px 15px; font-size: 13px; border: 1px solid #fa8c16; color: #fa8c16; background: #fff;">查看换货进度</button>
            ` : ''}
            ${isPendingShip && !hasActiveAS ? `
                <button onclick="remindShipping('${subOrder.id}')" class="btn btn-default" style="padding: 10px 15px; font-size: 13px;">提醒发货</button>
                <button onclick="showInstantRefundConfirm('${subOrder.id}')" class="btn" style="padding: 10px 15px; font-size: 13px; border: 1px solid #ff4757; color: #ff4757; background: #fff;">申请退款</button>
            ` : ''}
            ${isPendingShip && hasActiveAS ? `
                <button onclick="goTo('afterSaleDetail', {afterSaleId: '${orderAfterSales.find(as => as.status !== 'completed' && as.status !== 'rejected')?.id}'})" class="btn" style="padding: 10px 15px; font-size: 13px; border: 1px solid #fa8c16; color: #fa8c16; background: #fff;">查看售后进度</button>
            ` : ''}
            ${(subOrder.status === 'shipped' || subOrder.status === 'partial_shipped') && !hasActiveAS ? `
                <button onclick="goTo('selectAfterSaleType', {subOrderId: '${subOrder.id}'})" class="btn" style="padding: 10px 15px; font-size: 13px; border: 1px solid #ff4757; color: #ff4757; background: #fff;">申请售后</button>
            ` : ''}
            ${(subOrder.status === 'shipped' || subOrder.status === 'partial_shipped') && hasActiveAS ? `
                <button onclick="goTo('afterSaleDetail', {afterSaleId: '${orderAfterSales.find(as => as.status !== 'completed' && as.status !== 'rejected')?.id}'})" class="btn" style="padding: 10px 15px; font-size: 13px; border: 1px solid #fa8c16; color: #fa8c16; background: #fff;">查看售后进度</button>
            ` : ''}
            ${subOrder.status === 'delivered' && !hasActiveAS ? `
                ${canApplyAfterSale(subOrder, order).canApply ? `
                <button onclick="goTo('selectAfterSaleType', {subOrderId: '${subOrder.id}'})" class="btn btn-default" style="padding: 10px 15px; font-size: 13px;">申请售后</button>
                ` : ''}
            ` : ''}
            ${subOrder.status === 'delivered' && hasActiveAS ? `
                <button onclick="goTo('afterSaleDetail', {afterSaleId: '${orderAfterSales.find(as => as.status !== 'completed' && as.status !== 'rejected')?.id}'})" class="btn" style="padding: 10px 15px; font-size: 13px; border: 1px solid #fa8c16; color: #fa8c16; background: #fff;">查看售后进度</button>
            ` : ''}
        </div>
    `;
}

// 渲染父订单概览（多子订单情况，现在基本不会用到）
function renderParentOrderDetail(el, order, subOrders) {
    const hasMultiSub = subOrders.length > 1;
    
    // 检查是否有售后
    const orderAfterSales = DB.afterSales.filter(as => as.orderId === order.id);
    
    // 检查父订单是否可以整单退款（待发货状态且所有子订单都是待发货，没有进行中的售后）
    const allPendingShip = subOrders.every(so => so.status === 'pending_ship');
    const canFullOrderRefund = order.status === 'paid' && 
        allPendingShip &&
        !orderAfterSales.some(as => as.status !== 'completed' && as.status !== 'rejected');
    
    // 单供应商时获取唯一子订单的信息
    const singleSub = !hasMultiSub ? subOrders[0] : null;
    const singleSubAfterSales = singleSub ? orderAfterSales.filter(as => as.subOrderId === singleSub.id) : [];
    const singleSubHasActiveAS = singleSubAfterSales.some(as => as.status !== 'completed' && as.status !== 'rejected');
    
    // 判断是否需要底部操作栏
    const needBottomBar = !hasMultiSub || allPendingShip;
    
    el.innerHTML = `
        <div class="nav-bar">
            <div class="back" onclick="currentSubOrderId = null; goTo('orders')">←</div>
            <div class="title">订单详情</div>
        </div>
        <div class="content" style="padding-bottom: ${needBottomBar ? '70px' : '15px'};">
            <!-- 订单状态卡片 -->
            <div style="background: linear-gradient(135deg, #11998e, #38ef7d); border-radius: 12px; padding: 20px; color: #fff; margin-bottom: 10px;">
                <div style="font-size: 18px; font-weight: 600; margin-bottom: 5px;">${getOrderStatusText(order.status)}</div>
                <div style="font-size: 12px; opacity: 0.9;">订单号: ${order.id}</div>
                ${hasMultiSub ? `<div style="font-size: 11px; opacity: 0.8; margin-top: 5px;">本订单包含 ${subOrders.length} 个子订单</div>` : ''}
            </div>
            
            <!-- 收货地址 -->
            <div onclick="${allPendingShip ? `showModifyAddressModal('${order.id}')` : ''}" style="background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px; ${allPendingShip ? 'cursor: pointer;' : ''}">
                <div style="display: flex; align-items: flex-start;">
                    <span style="font-size: 20px; margin-right: 10px;">📍</span>
                    <div style="flex: 1;">
                        <div style="font-weight: 500;">${order.address.name} ${order.address.phone}</div>
                        <div style="font-size: 13px; color: #666; margin-top: 5px;">${order.address.province}${order.address.city}${order.address.district}${order.address.detail}</div>
                    </div>
                    ${allPendingShip ? `<span style="color: #999; font-size: 12px;">修改 ></span>` : ''}
                </div>
            </div>
            
            <!-- 子订单列表 -->
            ${subOrders.map((so, idx) => {
                const soAfterSales = orderAfterSales.filter(as => as.subOrderId === so.id);
                const hasActiveAS = soAfterSales.some(as => as.status !== 'completed' && as.status !== 'rejected');
                const subTotal = so.amount || so.totalAmount || so.items.reduce((sum, item) => sum + item.price * item.qty, 0);
                const subFreight = so.freight || 0;
                const subTotalWithFreight = subTotal + subFreight;
                
                return `
                <div style="background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px;">
                    <!-- 子订单头部 -->
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0;">
                        <div>
                            <span style="font-size: 13px; color: #11998e; font-weight: 500;">📦 ${getWarehouseName(so, subOrders)}</span>
                            ${hasMultiSub ? `<div style="font-size: 11px; color: #999; margin-top: 3px;">子订单: ${so.id}</div>` : ''}
                        </div>
                        <span style="font-size: 12px; padding: 3px 8px; border-radius: 4px; background: ${so.status === 'delivered' ? '#f6ffed' : so.status === 'shipped' ? '#e6f7ff' : '#fff7e6'}; color: ${so.status === 'delivered' ? '#52c41a' : so.status === 'shipped' ? '#1890ff' : '#fa8c16'};">${getSubOrderStatusText(so.status)}</span>
                    </div>
                    
                    <!-- 商品列表 -->
                    ${so.items.map(item => `
                        <div style="display: flex; padding: 10px 0; border-bottom: 1px solid #f5f5f5;">
                            <div style="width: 60px; height: 60px; background: #f9f9f9; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-right: 10px;">${item.img}</div>
                            <div style="flex: 1;">
                                <div style="font-size: 14px;">${item.name}</div>
                                <div style="font-size: 12px; color: #999;">${item.spec}</div>
                                <div style="font-size: 12px; color: #666; margin-top: 5px;">¥${item.price} x${item.qty}</div>
                            </div>
                        </div>
                    `).join('')}
                    
                    ${!hasMultiSub && subFreight > 0 ? `
                    <!-- 单供应商时：显示运费信息 -->
                    <div style="margin-top: 10px; padding: 10px; background: #fafafa; border-radius: 8px;">
                        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666;">
                            <span>🚚 运费${so.freightSnapshot && so.freightSnapshot.isFreeShipping ? '（已享包邮）' : (getFreightReasonText(so.freightSnapshot) ? '（' + getFreightReasonText(so.freightSnapshot) + '）' : '')}</span>
                            <span style="color: #ff4757;">¥${subFreight.toFixed(2)}</span>
                        </div>
                    </div>
                    ` : ''}
                    ${hasMultiSub ? `
                    <!-- 多供应商时：显示供应商小计、优惠和支付明细 -->
                    <div style="margin-top: 10px; padding: 10px; background: #fafafa; border-radius: 8px;">
                        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 5px;">
                            <span>商品小计</span><span>¥${subTotal.toFixed(2)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 5px;">
                            <span>运费${so.freightSnapshot && so.freightSnapshot.isFreeShipping ? '（已享包邮）' : (getFreightReasonText(so.freightSnapshot) ? '（' + getFreightReasonText(so.freightSnapshot) + '）' : '')}</span>
                            <span>${subFreight > 0 ? '¥' + subFreight.toFixed(2) : '免运费'}</span>
                        </div>
                        ${(so.couponDeduct || 0) > 0 ? `
                        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #ff4757; margin-bottom: 5px;">
                            <span>🎁 优惠券</span><span>-¥${so.couponDeduct.toFixed(2)}</span>
                        </div>` : ''}
                        <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; padding-top: 5px; border-top: 1px dashed #ddd;">
                            <span>应付金额</span><span>¥${(subTotal + subFreight - (so.couponDeduct || 0)).toFixed(2)}</span>
                        </div>
                        <div style="font-size: 11px; color: #888; margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee;">付款明细：</div>
                        ${(so.pointsDeduct || 0) > 0 ? `
                        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 4px;">
                            <span>⭐ 积分抵扣</span><span style="color: #fa8c16;">¥${so.pointsDeduct.toFixed(2)}</span>
                        </div>` : ''}
                        ${(so.cardDeduct || 0) > 0 ? `
                        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 4px;">
                            <span>🎫 卡金支付</span><span style="color: #1890ff;">¥${so.cardDeduct.toFixed(2)}</span>
                        </div>` : ''}
                        ${(so.cashPaid || 0) > 0 ? `
                        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 4px;">
                            <span>💳 ${order.paymentLabel || '在线支付'}</span><span style="color: #52c41a;">¥${so.cashPaid.toFixed(2)}</span>
                        </div>` : ''}
                        ${((so.pointsDeduct || 0) + (so.cardDeduct || 0) + (so.cashPaid || 0)) <= 0 ? `
                        <div style="font-size: 12px; color: #999; margin-top: 4px;">全额优惠，无需支付</div>` : ''}
                        <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #ff4757; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ddd;">
                            <span>实付金额</span><span>¥${((so.pointsDeduct || 0) + (so.cardDeduct || 0) + (so.cashPaid || 0)).toFixed(2)}</span>
                        </div>
                    </div>
                    ` : ''}
                    
                    <!-- 物流信息 - 支持多包裹 -->
                    ${(so.status === 'shipped' || so.status === 'delivered' || so.status === 'partial_shipped') && (so.packages || []).length > 0 ? `
                        <div style="margin-top: 10px;">
                            <div style="font-size: 12px; color: #666; margin-bottom: 8px;">📦 包裹信息 (${so.packages.length}个包裹)</div>
                            ${so.packages.map((pkg, pkgIdx) => `
                                <div style="margin-bottom: 8px; padding: 12px; background: ${pkg.status === 'delivered' ? '#f6ffed' : '#f9f9f9'}; border-radius: 8px; border-left: 3px solid ${pkg.status === 'delivered' ? '#52c41a' : '#1890ff'};">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                        <div style="font-size: 13px; font-weight: 500; color: ${pkg.status === 'delivered' ? '#52c41a' : '#1890ff'};">
                                            包裹${pkgIdx + 1} ${pkg.status === 'delivered' ? '✓已签收' : '运输中'}
                                        </div>
                                        ${pkg.status !== 'delivered' ? `
                                        <button onclick="confirmReceivePackage('${so.id}', '${pkg.id}')" style="padding: 4px 10px; border: none; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; border-radius: 12px; font-size: 11px; cursor: pointer;">确认收货</button>
                                        ` : ''}
                                    </div>
                                    <div onclick="goTo('logistics', {subOrderId: '${so.id}', packageId: '${pkg.id}'})" style="cursor: pointer;">

                                        <div style="font-size: 11px; color: #999; margin-top: 5px;">
                                            ${(pkg.items || []).map(i => i.name + ' x' + i.qty).join('、')}
                                        </div>
                                        <div style="font-size: 11px; color: #999; margin-top: 3px;">发货时间: ${formatTime(pkg.shipTime)}</div>
                                    </div>
                                </div>

                    ` : (so.status === 'shipped' || so.status === 'delivered') && so.trackingNo ? `

                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <div style="font-size: 12px; color: #666;">🚚 ${so.expressCompany}: ${so.trackingNo}</div>
                                    <div style="font-size: 11px; color: #999; margin-top: 3px;">${so.status === 'delivered' ? '已签收' : '运输中'} - 点击查看物流详情</div>
                                </div>
                                <span style="color: #999;">></span>
                            </div>
                        </div>
                    ` : ''}
                    
                    ${hasMultiSub ? `
                    <!-- 多供应商时：操作按钮在子订单内 -->
                    <div style="display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; justify-content: flex-end;">
                        ${so.status === 'pending_ship' ? `
                            <button onclick="remindShipping('${so.id}')" style="padding: 5px 12px; border: 1px solid #1890ff; background: #fff; color: #1890ff; border-radius: 14px; font-size: 11px; cursor: pointer;">提醒发货</button>
                            ${!hasActiveAS ? `
                            <button onclick="applyFullRefund('${so.id}')" style="padding: 5px 12px; border: 1px solid #ff4757; background: #fff; color: #ff4757; border-radius: 14px; font-size: 11px; cursor: pointer;">申请退款</button>
                            ` : `
                            <span style="padding: 5px 12px; background: #fff7e6; color: #fa8c16; border-radius: 14px; font-size: 11px;">售后处理中</span>
                            `}
                        ` : ''}

// 确认极速退款 - 自动通过并取消交易
function confirmQuickRefund(subOrderId) {
    const subOrder = DB.subOrders.find(so => so.id === subOrderId);
    if (!subOrder) return;
    
    // 计算退款金额 = 实际支付的金额（积分+卡金+现金），不含优惠券
    const refundAmount = (subOrder.pointsDeduct || 0) + (subOrder.cardDeduct || 0) + (subOrder.cashPaid || 0);
    
    const items = subOrder.items.map(item => ({ productId: item.productId, qty: item.qty }));
    const result = applyAfterSale(subOrderId, 'refund_only', items, '不想要了', '待发货申请全额退款');
    if (result.success) {
        // 极速退款：自动通过售后申请并完成退款
        const afterSale = DB.afterSales.find(as => as.id === result.afterSaleId);
        if (afterSale) {
            afterSale.status = 'completed';
            afterSale.reviewTime = new Date().toISOString();
            afterSale.updateTime = new Date().toISOString();
            // 执行退款
            processRefund(afterSale);
        }
        // 取消子订单
        subOrder.status = 'cancelled';
        subOrder.updateTime = new Date().toISOString();
        
        // 检查是否所有子订单都已取消，如果是则取消父订单
        const parentOrder = DB.orders.find(o => o.id === subOrder.parentOrderId);
        const siblingOrders = DB.subOrders.filter(so => so.parentOrderId === subOrder.parentOrderId);
        const allCancelled = siblingOrders.every(so => so.status === 'cancelled');
        if (allCancelled && parentOrder) {
            parentOrder.status = 'cancelled';
            parentOrder.updateTime = new Date().toISOString();
        }
        
        saveData();
        closeModal();
        
        // 显示成功弹窗
        showRefundSuccessModal(refundAmount);
    } else {
        showToast(result.error);
    }
}

// 确认整单极速退款 - 自动通过并取消交易
function confirmQuickRefundAll(orderId) {
    const order = DB.orders.find(o => o.id === orderId);
    if (!order) return;
    
    const subOrders = DB.subOrders.filter(so => so.parentOrderId === orderId && so.status === 'pending_ship');
    let totalRefund = 0;
    
    subOrders.forEach(so => {
        const items = so.items.map(item => ({ productId: item.productId, qty: item.qty }));
        const result = applyAfterSale(so.id, 'refund_only', items, '不想要了', '整单退款');
        if (result.success) {
            // 极速退款：自动通过售后申请并完成退款
            const afterSale = DB.afterSales.find(as => as.id === result.afterSaleId);
            if (afterSale) {
                afterSale.status = 'completed';
                afterSale.reviewTime = new Date().toISOString();
                afterSale.updateTime = new Date().toISOString();
                // 执行退款
                processRefund(afterSale);
            }
            // 取消子订单
            so.status = 'cancelled';
            so.updateTime = new Date().toISOString();
            // 计算退款金额 = 实际支付的金额（积分+卡金+现金），不含优惠券
            totalRefund += (so.cashPaid || 0) + (so.cardDeduct || 0) + (so.pointsDeduct || 0);
        }
    });
    
    // 取消父订单
    order.status = 'cancelled';
    order.updateTime = new Date().toISOString();
    
    saveData();
    closeModal();
    
    // 显示成功弹窗
    showRefundSuccessModal(totalRefund);
}

// 智能解析地址文本
function parseAddressText(text) {
    const result = { name: '', phone: '', province: '', detail: '' };
    if (!text) return result;
    
    // 清理文本，统一分隔符
    let cleanText = text.replace(/[,，;；\n\r\t]+/g, ' ').trim();
    
    // 提取手机号 (1开头的11位数字)
    const phoneMatch = cleanText.match(/1[3-9]\d{9}/);
    if (phoneMatch) {
        result.phone = phoneMatch[0];
        cleanText = cleanText.replace(phoneMatch[0], ' ');
    }
    
    // 省份列表
    const provinces = [
        '北京市', '上海市', '天津市', '重庆市',
        '广东省', '浙江省', '江苏省', '山东省', '河南省', '河北省', '湖北省', '湖南省',
        '四川省', '福建省', '安徽省', '江西省', '陕西省', '山西省', '辽宁省', '吉林省',
        '黑龙江省', '云南省', '贵州省', '甘肃省', '海南省', '青海省', '台湾省',
        '新疆维吾尔自治区', '西藏自治区', '内蒙古自治区', '广西壮族自治区', '宁夏回族自治区',
        '香港特别行政区', '澳门特别行政区',
        '北京', '上海', '天津', '重庆', '广东', '浙江', '江苏', '山东', '河南', '河北',
        '湖北', '湖南', '四川', '福建', '安徽', '江西', '陕西', '山西', '辽宁', '吉林',
        '黑龙江', '云南', '贵州', '甘肃', '海南', '青海', '台湾', '新疆', '西藏', '内蒙古', '广西', '宁夏'
    ];
    
    // 提取省份
    for (const prov of provinces) {
        if (cleanText.includes(prov)) {
            // 标准化省份名称
            if (prov === '北京' || prov === '北京市') result.province = '北京市';
            else if (prov === '上海' || prov === '上海市') result.province = '上海市';
            else if (prov === '广东' || prov === '广东省') result.province = '广东省';
            else if (prov === '浙江' || prov === '浙江省') result.province = '浙江省';
            else if (prov === '江苏' || prov === '江苏省') result.province = '江苏省';
            else if (prov === '新疆' || prov.includes('新疆')) result.province = '新疆维吾尔自治区';
            else if (prov === '西藏' || prov.includes('西藏')) result.province = '西藏自治区';
            else if (prov === '内蒙古' || prov.includes('内蒙古')) result.province = '内蒙古自治区';
            else result.province = prov;
            break;
        }
    }
    
    // 提取姓名 (通常是2-4个汉字，在手机号前面或开头)
    const parts = cleanText.split(/\s+/).filter(p => p.trim());
    for (const part of parts) {
        // 检查是否是2-4个汉字的姓名
        if (/^[\u4e00-\u9fa5]{2,4}$/.test(part) && !provinces.some(p => part.includes(p.replace(/省|市|自治区|特别行政区/g, '')))) {
            result.name = part;
            break;
        }
    }
    
    // 剩余部分作为详细地址
    let detailText = cleanText;
    if (result.name) detailText = detailText.replace(result.name, '');
    if (result.phone) detailText = detailText.replace(result.phone, '');
    result.detail = detailText.replace(/\s+/g, ' ').trim();
    
    return result;
}

// 执行智能识别
function smartParseAddress(orderId) {
    const pasteText = document.getElementById('addrPasteArea').value;
    if (!pasteText.trim()) {
        showToast('请先粘贴地址信息');
        return;
    }
    
    const parsed = parseAddressText(pasteText);
    
    if (parsed.name) document.getElementById('addrName').value = parsed.name;
    if (parsed.phone) document.getElementById('addrPhone').value = parsed.phone;
    if (parsed.province) document.getElementById('addrProvince').value = parsed.province;
    if (parsed.detail) document.getElementById('addrDetail').value = parsed.detail;
    
    showToast('识别完成，请检查并补充信息');
}

// 保存编辑的地址
function saveEditAddress(addressId, orderId) {
    const addr = DB.user.addresses.find(a => a.id === addressId);
    if (!addr) return;
    
    const name = document.getElementById('editAddrName').value.trim();
    const phone = document.getElementById('editAddrPhone').value.trim();
    const province = document.getElementById('editAddrProvince').value;
    const detail = document.getElementById('editAddrDetail').value.trim();
    
    if (!name || !phone || !province || !detail) {
        showToast('请填写完整地址信息');
        return;
    }
    
    addr.name = name;
    addr.phone = phone;
    addr.province = province;
    addr.city = province;
    addr.detail = detail;
    
    // 如果当前订单使用的是这个地址，也要更新订单地址
    const order = DB.orders.find(o => o.id === orderId);
    if (order && order.address.id === addressId) {
        order.address = { ...addr };
        order.updateTime = new Date().toISOString();
    }
    
    saveData();
    showToast('地址保存成功');
    showModifyAddressModal(orderId);
}

// 更新订单地址
function updateOrderAddress(orderId, addressId) {
    const order = DB.orders.find(o => o.id === orderId);
    const address = DB.user.addresses.find(a => a.id === addressId);
    if (!order || !address) return;
    
    // 待支付订单可以直接修改地址
    if (order.status === 'pending_payment') {
        order.address = { ...address };
        order.updateTime = new Date().toISOString();
        saveData();
        closeModal();
        showToast('地址修改成功');
        render();
        return;
    }
    
    // 检查是否所有子订单都是待发货状态
    const subOrders = DB.subOrders.filter(so => so.parentOrderId === orderId);
    const allPendingShip = subOrders.every(so => so.status === 'pending_ship');
    if (!allPendingShip) {
        showToast('订单已发货，无法修改地址');
        closeModal();
        return;
    }
    
    // 待发货状态修改地址时，需要验证运费和不发货地区
    const originalAddress = order.address;
    const newAddress = address;
    
    // 检查每个子订单的运费和不发货地区
    let hasFreightIssue = false;
    let hasNoDeliveryIssue = false;
    let issueMessages = [];
    
    for (const subOrder of subOrders) {
        for (const item of subOrder.items) {
            const product = DB.products.find(p => p.id === item.productId);
            if (!product) continue;
            
            // 检查不发货地区
            if (product.noDeliveryTemplateId) {
                const noDeliveryTemplate = DB.noDeliveryTemplates.find(t => t.id === product.noDeliveryTemplateId);
                if (noDeliveryTemplate) {
                    const isNoDelivery = checkNoDeliveryArea(newAddress, noDeliveryTemplate);
                    if (isNoDelivery) {
                        hasNoDeliveryIssue = true;
                        issueMessages.push(`商品"${product.name}"不支持配送到${newAddress.province}${newAddress.city}${newAddress.district}`);
                        break;
                    }
                }
            }
            
            // 检查运费变化
            if (product.freightTemplateId) {
                const freightTemplate = DB.freightTemplates.find(t => t.id === product.freightTemplateId);
                if (freightTemplate) {
                    const originalFreight = calculateFreight(originalAddress, freightTemplate);
                    const newFreight = calculateFreight(newAddress, freightTemplate);
                    
                    // 如果新地址运费更高，不允许修改
                    if (newFreight > originalFreight) {
                        hasFreightIssue = true;
                        const diff = newFreight - originalFreight;
                        issueMessages.push(`商品"${product.name}"运费将增加¥${diff.toFixed(2)}（原运费¥${originalFreight.toFixed(2)} → 新运费¥${newFreight.toFixed(2)}）`);
                        break;
                    }
                }
            }
        }
        
        if (hasNoDeliveryIssue || hasFreightIssue) break;
    }
    
    // 如果有问题，显示提示并阻止修改
    if (hasNoDeliveryIssue || hasFreightIssue) {
        const modal = document.getElementById('modal');
        modal.innerHTML = `
            <div class="modal-content" style="padding: 20px; max-width: 90%;">
                <div style="text-align: center; margin-bottom: 15px;">
                    <div style="font-size: 48px; margin-bottom: 10px;">⚠️</div>
                    <div style="font-weight: 600; font-size: 16px; margin-bottom: 10px;">无法修改地址</div>
                </div>
                <div style="background: #fff5f5; border-left: 3px solid #ff4757; padding: 12px; border-radius: 4px; margin-bottom: 15px;">
                    ${issueMessages.map(msg => `<div style="font-size: 13px; color: #666; margin-bottom: 8px;">• ${msg}</div>`).join('')}
                </div>
                <div style="font-size: 12px; color: #999; margin-bottom: 15px; padding: 10px; background: #f9f9f9; border-radius: 8px;">
                    💡 提示：待发货状态只能修改为运费相同或更低的地区，且不能修改为不发货地区
                </div>
                <button onclick="closeModal(); showModifyAddressModal('${orderId}')" class="btn btn-primary" style="width: 100%; padding: 12px;">我知道了</button>
            </div>
        `;
        return;
    }
    
    // 验证通过，更新地址
    order.address = { ...address };
    order.updateTime = new Date().toISOString();
    saveData();
    closeModal();
    showToast('地址修改成功');
    render();
}

        if (currentPage !== 'orderDetail' || currentOrderId !== orderId) {
            clearInterval(pendingOrderDetailTimer);
            pendingOrderDetailTimer = null;
            return;
        }
        
        const order = DB.orders.find(o => o.id === orderId);
        if (!order || order.status !== 'pending_pay') {
            clearInterval(pendingOrderDetailTimer);
            pendingOrderDetailTimer = null;
            return;
        }
        
        const remaining = getOrderRemainingTime(order);
        if (remaining <= 0) {
            checkAndCancelTimeoutOrders();
            goTo('orders');
            showToast('订单已超时关闭');
            return;
        }
        
        render();
    }, 1000);
}

// 复制订单号
function copyOrderId(orderId) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(orderId).then(() => {
            showToast('订单号已复制');
        });
    } else {
        showToast('订单号: ' + orderId);
    }
}
</script>

function selectASType(type) {
    // 类型到label id的映射
    const typeToLabelId = {
        'refund_only': 'refundOnlyLabel',
        'return_refund': 'returnRefundLabel',
        'exchange': 'exchangeLabel'
    };
    
    const labels = ['refundOnlyLabel', 'returnRefundLabel', 'exchangeLabel'];
    const selectedLabelId = typeToLabelId[type];
    
    labels.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            if (id === selectedLabelId) {
                el.style.border = '2px solid #11998e';
                el.style.background = '#f0fff4';
            } else {
                el.style.border = '2px solid #eee';
                el.style.background = '#fff';
            }
        }
    });
    
    // 更新radio
    const radio = document.querySelector(`input[value="${type}"]`);
    if (radio) radio.checked = true;
    
    // 更新退款金额显示（换货不显示退款金额）
    const refundSection = document.getElementById('refundAmountSection');
    if (type === 'exchange') {
        refundSection.style.display = 'none';
    } else {
        refundSection.style.display = 'block';
    }
    
    // 更新提示
    const tips = document.getElementById('asTips');
    const subOrder = DB.subOrders.find(so => so.id === currentSubOrderId);
    const isPendingShip = subOrder && subOrder.status === 'pending_ship';
    
    if (type === 'refund_only') {
        if (isPendingShip) {
            tips.innerHTML = '⚠️ 待发货订单申请退款后将自动审核通过，退款将原路退回';
        } else {
            tips.innerHTML = '⚠️ 已发货/已完成订单的仅退款必须全额退款，审核通过后退款将原路退回';
        }
    } else if (type === 'return_refund') {
        if (isPendingShip) {
            tips.innerHTML = '⚠️ 待发货订单不支持退货退款，请选择仅退款';
        } else {
            tips.innerHTML = '⚠️ 退货退款必须全额退款，审核通过后请在7天内将商品寄回指定地址，确认收货后退款';
        }
    } else {
        tips.innerHTML = '⚠️ 换货支持部分换货，审核通过后请在7天内将商品寄回指定地址，确认收货后重新发货';
    }
    
    // 根据类型和订单状态更新商品选择状态
    updateItemSelectionState(currentSubOrderId, type);
    
    // 更新退款金额
    updateRefundAmount(currentSubOrderId);
}

// 新增函数：根据订单状态和售后类型控制商品选择
function updateItemSelectionState(subOrderId, asType) {
    const subOrder = DB.subOrders.find(so => so.id === subOrderId);
    if (!subOrder) return;
    
    const isPendingShip = subOrder.status === 'pending_ship';
    const isShippedOrDelivered = ['shipped', 'delivered'].includes(subOrder.status);
    
    // 已发货/已完成状态下，仅退款和退货退款必须全额退款（不能选择商品和数量）
    const shouldDisableSelection = isShippedOrDelivered && (asType === 'refund_only' || asType === 'return_refund');
    
    // 控制复选框
    const checkboxes = document.querySelectorAll('.as-item-checkbox');
    checkboxes.forEach(checkbox => {
        if (shouldDisableSelection) {
            checkbox.disabled = true;
            checkbox.checked = true;
            checkbox.style.opacity = '0.5';
            checkbox.style.cursor = 'not-allowed';
        } else {
            checkbox.disabled = false;
            checkbox.style.opacity = '1';
            checkbox.style.cursor = 'pointer';
        }
    });
    
    // 控制数量调整按钮
    const qtyButtons = document.querySelectorAll('.as-qty-btn');
    qtyButtons.forEach(btn => {
        if (shouldDisableSelection) {
            btn.disabled = true;
            btn.style.opacity = '0.3';
            btn.style.cursor = 'not-allowed';
        } else {
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        }
    });
    
    // 如果需要禁用选择，强制选中所有商品并设置为最大数量
    if (shouldDisableSelection) {
        subOrder.items.forEach(item => {
            const sel = selectedASItems[item.productId];
            if (sel) {
                sel.selected = true;
                sel.qty = sel.maxQty;
                const qtyEl = document.getElementById(`qty_${item.productId}`);
                if (qtyEl) qtyEl.textContent = sel.maxQty;
            }
        });
    }
}

function toggleASItem(productId) {
    const checkbox = document.getElementById(`as_${productId}`);
    
    // 检查是否被禁用
    if (checkbox.disabled) {
        return;
    }
    
    selectedASItems[productId].selected = checkbox.checked;
    updateRefundAmount(currentSubOrderId);
}

function changeASQty(productId, delta) {
    // 检查按钮是否被禁用
    const subOrder = DB.subOrders.find(so => so.id === currentSubOrderId);
    if (!subOrder) return;
    
    const typeRadio = document.querySelector('input[name="asType"]:checked');
    const asType = typeRadio ? typeRadio.value : 'refund_only';
    const isShippedOrDelivered = ['shipped', 'delivered'].includes(subOrder.status);
    const shouldDisable = isShippedOrDelivered && (asType === 'refund_only' || asType === 'return_refund');
    
    if (shouldDisable) {
        return; // 禁用状态下不允许修改数量
    }
    
    const item = selectedASItems[productId];
    const newQty = item.qty + delta;
    if (newQty >= 1 && newQty <= item.maxQty) {
        item.qty = newQty;
        document.getElementById(`qty_${productId}`).textContent = newQty;
        updateRefundAmount(currentSubOrderId);
    }
}

function updateRefundAmount(subOrderId) {
    const subOrder = DB.subOrders.find(so => so.id === subOrderId);
    if (!subOrder) return;
    
    // 判断是否为待发货状态（待发货状态退邮费）
    const isPendingShip = subOrder.status === 'pending_ship';
    
    // 获取当前选择的售后类型
    const typeRadio = document.querySelector('input[name="asType"]:checked');
    const asType = typeRadio ? typeRadio.value : 'refund_only';
    
    // 计算选中商品金额
    let itemsAmount = 0;
    subOrder.items.forEach(item => {
        const sel = selectedASItems[item.productId];
        if (sel && sel.selected) {
            itemsAmount += item.price * sel.qty;
        }
    });
    
    // 计算比例
    const subOrderTotal = subOrder.amount || subOrder.items.reduce((sum, item) => sum + item.price * item.qty, 0);
    const ratio = subOrderTotal > 0 ? itemsAmount / subOrderTotal : 1;
    
    // 待发货状态按比例退邮费（换货不退邮费）
    let freightRefund = 0;
    if (isPendingShip && asType !== 'exchange') {
        freightRefund = Math.round((subOrder.freight || 0) * ratio * 100) / 100;
    }
    
    // 计算总可退金额（商品+邮费）
    const totalRefundable = itemsAmount + freightRefund;
    const paymentTotal = (subOrder.pointsDeduct || 0) + (subOrder.cardDeduct || 0) + (subOrder.cashPaid || 0) + (subOrder.freight || 0);
    const paymentRatio = paymentTotal > 0 ? totalRefundable / paymentTotal : ratio;
    
    // 按比例计算各支付方式的退款金额
    const refundPointsAmount = asType === 'exchange' ? 0 : Math.round((subOrder.pointsDeduct || 0) * paymentRatio * 100) / 100;
    const refundCardAmount = asType === 'exchange' ? 0 : Math.round((subOrder.cardDeduct || 0) * paymentRatio * 100) / 100;
    const refundCashAmount = asType === 'exchange' ? 0 : Math.round((subOrder.cashPaid || 0) * paymentRatio * 100) / 100;
    const refundAmount = refundPointsAmount + refundCardAmount + refundCashAmount;
    
    // 计算优惠分摊
    const totalDiscount = (subOrder.couponDeduct || 0);
    const discountAmount = Math.round(totalDiscount * ratio * 100) / 100;
    
    const detailEl = document.getElementById('refundAmountDetail');
    detailEl.innerHTML = `
        <div style="background: #f9f9f9; border-radius: 8px; padding: 12px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;">
                <span style="color: #666;">商品金额</span>
                <span>¥${itemsAmount.toFixed(2)}</span>
            </div>
            ${freightRefund > 0 ? `
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;">
                <span style="color: #666;">邮费退款 <span style="font-size: 11px; color: #52c41a;">(待发货)</span></span>
                <span style="color: #52c41a;">+¥${freightRefund.toFixed(2)}</span>
            </div>
            ` : ''}
            ${discountAmount > 0 ? `
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;">
                <span style="color: #666;">优惠分摊</span>
                <span style="color: #ff4757;">-¥${discountAmount.toFixed(2)}</span>
            </div>
            ` : ''}
            <div style="border-top: 1px dashed #ddd; padding-top: 8px; margin-top: 8px;">
                <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 600;">
                    <span>应退金额</span>
                    <span style="color: #ff4757;">¥${refundAmount.toFixed(2)}</span>
                </div>
            </div>
            ${!isPendingShip && (subOrder.freight || 0) > 0 ? `
            <div style="margin-top: 8px; padding: 8px; background: #fff7e6; border-radius: 4px; font-size: 11px; color: #d48806;">
                💡 已发货订单不退邮费（物流成本已产生）
            </div>
            ` : ''}
        </div>
        
        ${asType !== 'exchange' ? `
        <div style="margin-top: 12px; font-size: 12px; color: #666;">
            <div style="font-weight: 600; margin-bottom: 8px;">退款方式（原路退回）:</div>
            ${refundPointsAmount > 0 ? `
            <div style="display: flex; justify-content: space-between; padding: 4px 0;">
                <span>🎁 积分退回</span>
                <span style="color: #fa8c16;">¥${refundPointsAmount.toFixed(2)} (${Math.round(refundPointsAmount * 100)}积分)</span>
            </div>
            ` : ''}
            ${refundCardAmount > 0 ? `
            <div style="display: flex; justify-content: space-between; padding: 4px 0;">
                <span>💳 卡金退回</span>
                <span style="color: #722ed1;">¥${refundCardAmount.toFixed(2)}</span>
            </div>
            ` : ''}
            ${refundCashAmount > 0 ? `
            <div style="display: flex; justify-content: space-between; padding: 4px 0;">
                <span>💰 现金退回</span>
                <span style="color: #52c41a;">¥${refundCashAmount.toFixed(2)}</span>
            </div>
            ` : ''}
        </div>
        ` : `
        <div style="margin-top: 12px; padding: 12px; background: #e6f7ff; border-radius: 6px; font-size: 12px; color: #1890ff;">
            💡 换货不涉及退款，用户寄回商品后重新发货同款商品
        </div>
        `}
    `;
}

function submitAfterSale(subOrderId) {
    const subOrder = DB.subOrders.find(so => so.id === subOrderId);
    if (!subOrder) return;
    
    const typeRadio = document.querySelector('input[name="asType"]:checked');
    const type = typeRadio ? typeRadio.value : 'refund_only';
    const reason = document.getElementById('asReason').value;
    const description = document.getElementById('asDesc').value;
    
    // 收集选中的商品
    const items = [];
    subOrder.items.forEach(item => {
        const sel = selectedASItems[item.productId];
        if (sel && sel.selected) {
            items.push({ productId: item.productId, qty: sel.qty });
        }
    });
    
    if (items.length === 0) {
        showToast('请选择售后商品');
        return;
    }
    
    // 计算退款信息（与 updateRefundAmount 保持一致）
    const isPendingShip = subOrder.status === 'pending_ship';
    let itemsAmount = 0;
    subOrder.items.forEach(item => {
        const sel = selectedASItems[item.productId];
        if (sel && sel.selected) {
            itemsAmount += item.price * sel.qty;
        }
    });
    
    const subOrderTotal = subOrder.amount || subOrder.items.reduce((sum, item) => sum + item.price * item.qty, 0);
    const ratio = subOrderTotal > 0 ? itemsAmount / subOrderTotal : 1;
    
    // 待发货状态按比例退邮费（换货不退邮费）
    let freightRefund = 0;
    if (isPendingShip && type !== 'exchange') {
        freightRefund = Math.round((subOrder.freight || 0) * ratio * 100) / 100;
    }
    
    // 计算总可退金额（商品+邮费）
    const totalRefundable = itemsAmount + freightRefund;
    const paymentTotal = (subOrder.pointsDeduct || 0) + (subOrder.cardDeduct || 0) + (subOrder.cashPaid || 0) + (subOrder.freight || 0);
    const paymentRatio = paymentTotal > 0 ? totalRefundable / paymentTotal : ratio;
    
    // 按比例计算各支付方式的退款金额
    const refundPointsAmount = type === 'exchange' ? 0 : Math.round((subOrder.pointsDeduct || 0) * paymentRatio * 100) / 100;
    const refundCardAmount = type === 'exchange' ? 0 : Math.round((subOrder.cardDeduct || 0) * paymentRatio * 100) / 100;
    const refundCashAmount = type === 'exchange' ? 0 : Math.round((subOrder.cashPaid || 0) * paymentRatio * 100) / 100;
    const refundAmount = refundPointsAmount + refundCardAmount + refundCashAmount;
    
    // 计算优惠分摊
    const totalDiscount = (subOrder.couponDeduct || 0);
    const discountAmount = Math.round(totalDiscount * ratio * 100) / 100;
    
    // 构建退款信息
    const refundInfo = {
        itemsAmount: itemsAmount,
        freightRefund: freightRefund,
        discountAmount: discountAmount,
        refundAmount: refundAmount,
        refundPointsAmount: refundPointsAmount,
        refundCardAmount: refundCardAmount,
        refundCashAmount: refundCashAmount
    };
    
    const result = applyAfterSale(subOrderId, type, items, reason, description, refundInfo);
    if (result.success) {
        showToast('售后申请已提交');
        goTo('afterSaleDetail', { afterSaleId: result.afterSaleId });
    } else {
        showToast(result.error);
    }
}
</script>

function renderApplyAfterSale(el) {
    console.log('renderApplyAfterSale called, current type:', applyAfterSaleState.type);
    
    const subOrder = DB.subOrders.find(so => so.id === currentSubOrderId);
    if (!subOrder) { goTo('orders'); return; }
    
    const parentOrder = DB.orders.find(o => o.id === subOrder.parentOrderId);
    
    // 获取可退款商品
    const refundableItems = getRefundableItems(currentSubOrderId);
    
    // 初始化状态
    if (applyAfterSaleState.selectedItems.length === 0 && refundableItems.length > 0) {
        // 默认选中所有可退商品
        applyAfterSaleState.selectedItems = refundableItems.map(item => ({
            productId: item.productId,
            qty: item.remainingQty
        }));
    }
    
    // 如果有预设类型（如待发货订单只能申请退款）
    if (currentApplyAfterSaleType) {
        applyAfterSaleState.type = currentApplyAfterSaleType;
    }
    
    // 根据订单状态设置默认售后类型
    if (subOrder.status === 'pending_ship') {
        applyAfterSaleState.type = 'refund_only'; // 待发货只能申请退款
    } else if (subOrder.status === 'shipped' || subOrder.status === 'delivered') {
        // 已发货/已签收状态，默认选择仅退款，但用户可以选择其他类型
        if (!currentApplyAfterSaleType) {

    // 计算退款金额
    const refundInfo = calculateFullRefundInfo(subOrder, applyAfterSaleState.selectedItems);
    
    // 如果用户自定义了退款金额，需要等比折算退款明细
    let displayRefundInfo = refundInfo;
    if (applyAfterSaleState.customRefundAmount && applyAfterSaleState.customRefundAmount !== refundInfo.refundAmount) {
        const customAmount = applyAfterSaleState.customRefundAmount;
        const ratio = customAmount / refundInfo.refundAmount;
        
        // 等比折算各支付方式的退款金额
        displayRefundInfo = {

            refundAmount: customAmount,

            refundCashAmount: Math.round(refundInfo.refundCashAmount * ratio * 100) / 100,
            refundPoints: Math.round(refundInfo.refundPointsAmount * ratio * 100)
        };
        
        // 处理精度误差

// V2.0: 渲染 SKU 清分退款明细
function renderSkuClearingRefundDetail(subOrder, selectedItems) {
    if (!subOrder || !selectedItems || selectedItems.length === 0) return '';
    
    // 检查是否有清分数据
    const hasClearing = subOrder.items.some(item => item.clearing);
    if (!hasClearing) return '';
    
    // 计算各方退款金额
    let totalPlatformRefund = 0;
    let totalOperationRefund = 0;
    let totalHeadquarterRefund = 0;
    let totalStoreProfitRefund = 0;
    let totalDirectCommissionRefund = 0;
    let totalIndirectCommissionRefund = 0;
    
    selectedItems.forEach(refundItem => {
        const orderItem = subOrder.items.find(oi => oi.productId === refundItem.productId);
        if (!orderItem || !orderItem.clearing) return;
        
        const qtyRatio = orderItem.qty > 0 ? refundItem.qty / orderItem.qty : 0;
        totalPlatformRefund += (orderItem.clearing.platformAmount || 0) * qtyRatio;
        totalOperationRefund += (orderItem.clearing.operationAmount || 0) * qtyRatio;
        totalHeadquarterRefund += (orderItem.clearing.headquarterAmount || 0) * qtyRatio;
        totalStoreProfitRefund += (orderItem.clearing.storeProfit || 0) * qtyRatio;
        totalDirectCommissionRefund += (orderItem.clearing.directCommission || 0) * qtyRatio;
        totalIndirectCommissionRefund += (orderItem.clearing.indirectCommission || 0) * qtyRatio;
    });
    
    // 四舍五入
    totalPlatformRefund = Math.round(totalPlatformRefund * 100) / 100;
    totalOperationRefund = Math.round(totalOperationRefund * 100) / 100;
    totalHeadquarterRefund = Math.round(totalHeadquarterRefund * 100) / 100;
    totalStoreProfitRefund = Math.round(totalStoreProfitRefund * 100) / 100;
    totalDirectCommissionRefund = Math.round(totalDirectCommissionRefund * 100) / 100;
    totalIndirectCommissionRefund = Math.round(totalIndirectCommissionRefund * 100) / 100;
    
    const totalPromoterRefund = totalDirectCommissionRefund + totalIndirectCommissionRefund;
    
    // 获取清分状态
    const clearingStatus = subOrder.clearing ? subOrder.clearing.status : 'frozen';
    const statusText = clearingStatus === 'settled' ? '已结算' : '冻结中';
    const statusColor = clearingStatus === 'settled' ? '#52c41a' : '#fa8c16';
    
    return `
    <div style="background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span style="font-weight: 600;">清分退款明细</span>
            <span style="font-size: 11px; padding: 2px 8px; border-radius: 10px; background: ${statusColor}20; color: ${statusColor};">${statusText}</span>
        </div>
        <div style="background: #f9f9f9; border-radius: 8px; padding: 12px; font-size: 12px; color: #666;">
            <div style="display: flex; justify-content: space-between; padding: 4px 0;">
                <span>平台货款退回</span>
                <span style="color: #1890ff;">¥${totalPlatformRefund.toFixed(2)}</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 4px 0;">
                <span>代运营费退回</span>
                <span style="color: #fa8c16;">¥${totalOperationRefund.toFixed(2)}</span>
            </div>
            ${totalHeadquarterRefund > 0 ? `
            <div style="display: flex; justify-content: space-between; padding: 4px 0;">
                <span>总部分成退回</span>
                <span style="color: #722ed1;">¥${totalHeadquarterRefund.toFixed(2)}</span>
            </div>
            ` : ''}
            ${totalPromoterRefund > 0 ? `
            <div style="display: flex; justify-content: space-between; padding: 4px 0;">
                <span>推广员佣金退回</span>
                <span style="color: #d46b08;">¥${totalPromoterRefund.toFixed(2)}</span>
            </div>
            ` : ''}
            <div style="border-top: 1px dashed #ddd; margin-top: 8px; padding-top: 8px; display: flex; justify-content: space-between;">
                <span>门店毛利退回</span>
                <span style="color: #52c41a; font-weight: 600;">¥${totalStoreProfitRefund.toFixed(2)}</span>
            </div>
        </div>
        <div style="margin-top: 8px; font-size: 11px; color: #999;">
            * 退款将按原结算方式原路退回各方
        </div>
    </div>
    `;
}

// 选择售后类型
function selectAfterSaleType(type) {
    console.log('selectAfterSaleType called with type:', type);
    
    // 待发货状态只能选择仅退款
    const subOrder = DB.subOrders.find(so => so.id === currentSubOrderId);
    if (subOrder && subOrder.status === 'pending_ship' && type !== 'refund_only') {
        showToast('商品未发货，仅支持申请退款');
        return;
    }
    
    applyAfterSaleState.type = type;
    
    // 对于仅退款和退货退款，自动选择所有商品
    if (type === 'refund_only' || type === 'return_refund') {
        const refundableItems = getRefundableItems(currentSubOrderId);
        applyAfterSaleState.selectedItems = refundableItems.map(item => ({
            productId: item.productId,
            qty: item.remainingQty
        }));
    }
    
    console.log('applyAfterSaleState updated:', applyAfterSaleState);
    render();
}

// 切换商品选中状态
function toggleAfterSaleItem(productId) {
    const index = applyAfterSaleState.selectedItems.findIndex(si => si.productId === productId);
    if (index >= 0) {
        applyAfterSaleState.selectedItems.splice(index, 1);
    } else {
        const refundableItems = getRefundableItems(currentSubOrderId);
        const item = refundableItems.find(i => i.productId === productId);
        if (item) {
            applyAfterSaleState.selectedItems.push({
                productId: productId,
                qty: item.remainingQty
            });
        }
    }
    render();
}

// 修改商品数量
function changeAfterSaleItemQty(productId, delta) {
    const item = applyAfterSaleState.selectedItems.find(si => si.productId === productId);
    if (!item) return;
    
    const refundableItems = getRefundableItems(currentSubOrderId);
    const refundableItem = refundableItems.find(i => i.productId === productId);
    if (!refundableItem) return;
    
    const newQty = item.qty + delta;
    if (newQty < 1) {
        // 数量为0时取消选中
        const index = applyAfterSaleState.selectedItems.findIndex(si => si.productId === productId);
        applyAfterSaleState.selectedItems.splice(index, 1);
    } else if (newQty <= refundableItem.remainingQty) {
        item.qty = newQty;
    }
    render();
}

// 添加售后图片
function addAfterSaleImage() {
    if (applyAfterSaleState.images.length >= 3) {
        showToast('最多只能上传3张图片');
        return;
    }
    
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        // 检查文件大小（限制5MB）
        if (file.size > 5 * 1024 * 1024) {
            showToast('图片大小不能超过5MB');
            return;
        }
        
        // 转换为base64
        const reader = new FileReader();
        reader.onload = function(e) {
            applyAfterSaleState.images.push(e.target.result);
            render();
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

// 删除售后图片
function removeAfterSaleImage(index) {
    applyAfterSaleState.images.splice(index, 1);
    render();
}

// 更新自定义退款金额
function updateCustomRefundAmount(value) {
    const amount = parseFloat(value);
    if (isNaN(amount) || amount < 0) {
        applyAfterSaleState.customRefundAmount = null;
        render();
        return;
    }
    
    // 获取最大可退金额（商品金额，不含运费）
    const subOrder = DB.subOrders.find(so => so.id === currentSubOrderId);
    if (!subOrder) return;
    
    const refundInfo = calculateFullRefundInfo(subOrder, applyAfterSaleState.selectedItems);
    const maxRefundAmount = refundInfo.refundAmount; // 已发货订单不退运费
    
    if (amount > maxRefundAmount) {
        showToast(`退款金额不能超过 ¥${maxRefundAmount.toFixed(2)}（不含运费）`);
        document.getElementById('customRefundAmount').value = maxRefundAmount.toFixed(2);
        applyAfterSaleState.customRefundAmount = maxRefundAmount;
    } else {
        applyAfterSaleState.customRefundAmount = amount;
    }
    
    // 重新渲染页面以更新退款明细
    render();
}

// 提交售后申请
function submitAfterSaleApplication() {
    const subOrder = DB.subOrders.find(so => so.id === currentSubOrderId);
    if (!subOrder) {
        showToast('订单不存在');
        return;
    }
    
    // 验证
    if (applyAfterSaleState.selectedItems.length === 0) {
        showToast('请选择退款商品');
        return;
    }
    
    if (!applyAfterSaleState.reason) {
        showToast('请选择售后原因');
        return;
    }
    
    // 已发货/已签收状态需要上传图片
    if (subOrder.status !== 'pending_ship' && applyAfterSaleState.images.length === 0) {
        showToast('请上传售后凭证图片');
        return;
    }
    
    // 对于仅退款和退货退款，必须是全额退款（选择所有商品）
    if ((applyAfterSaleState.type === 'refund_only' || applyAfterSaleState.type === 'return_refund') && subOrder.status !== 'pending_ship') {
        const refundableItems = getRefundableItems(currentSubOrderId);
        const totalRefundableQty = refundableItems.reduce((sum, item) => sum + item.remainingQty, 0);
        const selectedQty = applyAfterSaleState.selectedItems.reduce((sum, item) => sum + item.qty, 0);
        
        if (selectedQty < totalRefundableQty) {
            showToast('仅退款和退货退款必须选择全部商品，不支持部分退款');
            return;
        }
    }
    
    // 根据订单状态计算退款信息
    let refundInfo;
    let customAmount = null;
    
    if (subOrder.status === 'pending_ship') {
        // 待发货：使用包含运费的完整退款计算
        refundInfo = calculateFullRefundInfoWithFreight(subOrder, applyAfterSaleState.selectedItems);
    } else {
        // 已发货：使用用户自定义金额或默认商品金额
        refundInfo = calculateFullRefundInfo(subOrder, applyAfterSaleState.selectedItems);
        
        // 如果用户输入了自定义金额，使用自定义金额
        if (applyAfterSaleState.customRefundAmount !== null) {
            customAmount = applyAfterSaleState.customRefundAmount;
            // 更新退款信息中的总金额
            refundInfo.totalRefundAmount = customAmount;
            refundInfo.customRefundAmount = customAmount;
            refundInfo.needsApproval = true; // 标记需要客服审核
        }
    }
    
    // 创建售后单
    const result = applyAfterSale(
        currentSubOrderId,
        applyAfterSaleState.type,
        applyAfterSaleState.selectedItems,
        applyAfterSaleState.reason,
        applyAfterSaleState.description,
        refundInfo,
        applyAfterSaleState.images // 添加图片参数
    );
    
    if (result.success) {
        // 重置状态
        applyAfterSaleState = {
            type: 'refund_only',
            selectedItems: [],
            reason: '',
            description: '',
            images: [],
            customRefundAmount: null
        };
        currentApplyAfterSaleType = null;
        
        showToast('申请已提交');
        goTo('afterSaleDetail', { afterSaleId: result.afterSaleId });
    } else {
        showToast(result.error || '提交失败');
    }
}
</script>
