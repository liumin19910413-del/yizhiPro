<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消费者商城 - S2B2C供应链</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f5f5f5; display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1400px; }
        .phone-frame { width: 375px; height: 812px; background: #fff; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; position: relative; border: 12px solid #1a1a1a; flex-shrink: 0; }
        .notch { width: 150px; height: 30px; background: #1a1a1a; border-radius: 0 0 20px 20px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 100; }
        .status-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 14px; font-weight: 600; }
        .screen { height: calc(100% - 44px); overflow: hidden; background: #f5f5f5; display: flex; flex-direction: column; }
        .nav-bar { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; padding: 15px; display: flex; align-items: center; flex-shrink: 0; }
        .nav-bar .back { font-size: 20px; margin-right: 10px; cursor: pointer; }
        .nav-bar .title { font-size: 18px; font-weight: 600; flex: 1; }
        .nav-bar .action { font-size: 14px; cursor: pointer; }
        .tab-bar { display: flex; background: #fff; border-top: 1px solid #eee; padding-bottom: 20px; flex-shrink: 0; }
        .tab-item { flex: 1; text-align: center; padding: 10px 0; font-size: 10px; color: #999; cursor: pointer; position: relative; }
        .tab-item.active { color: #11998e; }
        .tab-item .icon { font-size: 22px; margin-bottom: 2px; }
        .tab-item .badge { position: absolute; top: 5px; right: 50%; transform: translateX(15px); background: #ff4757; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; min-width: 16px; }
        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .btn { padding: 12px 24px; border-radius: 25px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
        .btn-default { background: #fff; border: 1px solid #ddd; color: #333; }
        .btn-danger { background: #ff4757; color: #fff; }
        .modal { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-height: 70%; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes badgePop { 0% { transform: scale(0); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; padding: 15px 30px; border-radius: 10px; z-index: 300; display: none; }
        .bottom-bar { background: #fff; padding: 12px 15px; display: flex; align-items: center; border-top: 1px solid #eee; flex-shrink: 0; }
        
        /* 需求说明面板 */
        .spec-panel { width: 320px; height: 812px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; flex-shrink: 0; }
        .spec-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 15px; font-weight: 600; font-size: 14px; }
        .spec-content { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; line-height: 1.6; color: #333; }
        .spec-section { margin-bottom: 20px; }
        .spec-section-title { font-weight: 600; font-size: 14px; color: #667eea; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .spec-section-title::before { content: '▸'; font-size: 12px; }
        .spec-list { padding-left: 0; list-style: none; }
        .spec-list li { padding: 4px 0 4px 16px; position: relative; color: #666; }
        .spec-list li::before { content: '•'; position: absolute; left: 4px; color: #667eea; }
        .spec-rule { background: #f8f9ff; border-left: 3px solid #667eea; padding: 8px 12px; margin: 8px 0; border-radius: 4px; font-size: 12px; color: #555; }
        .spec-highlight { color: #667eea; font-weight: 600; }
        .spec-tag { display: inline-block; background: #e8eaff; color: #667eea; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin: 2px 4px 2px 0; }
    </style>
</head>

<div class="spec-panel" id="specPanel">

<script src="../shared/data.js?v=2"></script>
<script>
// 切换端口菜单
function togglePortalSwitch() {
    const menu = document.getElementById('portalSwitchMenu');
    if (menu) {
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }
    // 关闭其他菜单
    const dataMenu = document.getElementById('dataMenu');
    if (dataMenu) dataMenu.style.display = 'none';
}

// 显示数据菜单
function showDataMenu() {
    const menu = document.getElementById('dataMenu');
    if (menu) {
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }
    // 关闭其他菜单
    const portalMenu = document.getElementById('portalSwitchMenu');
    if (portalMenu) portalMenu.style.display = 'none';
}

// 点击其他地方关闭菜单
document.addEventListener('click', function(e) {
    const portalMenu = document.getElementById('portalSwitchMenu');
    const dataMenu = document.getElementById('dataMenu');
    
    if (portalMenu && !e.target.closest('#portalSwitchMenu') && !e.target.closest('.action')) {
        portalMenu.style.display = 'none';
    }
    
    if (dataMenu && !e.target.closest('#dataMenu') && !e.target.closest('.action')) {
        dataMenu.style.display = 'none';
    }
});

let currentOrderId = null;
let currentSubOrderId = null;

let currentAfterSaleId = null;
let currentProductId = null;
let currentApplyAfterSaleType = null; // 售后申请类型: refund_only, return_refund, exchange

let selectedPaymentPlan = null;

let orderFilterTab = 'all'; // 订单筛选标签: all, pending_pay, pending_group, pending_ship, pending_receive, pending_pickup, pending_review, refund

// 获取供应商名称（隐藏真实供应商信息）
function getWarehouseName(subOrder, allSubOrders) {
    if (!subOrder.supplierId) return '自营仓库';
    // 获取同一订单下的所有供应商ID
    const supplierIds = [...new Set(allSubOrders.filter(so => so.supplierId).map(so => so.supplierId))];
    const idx = supplierIds.indexOf(subOrder.supplierId);
    return `购买清单`;
}

// 获取运费原因文本
function getFreightReasonText(freightSnapshot) {
    if (!freightSnapshot) return '';
    if (freightSnapshot.isFreeShipping) return '';
    // 显示偏远地区运费原因
    return freightSnapshot.reason || '';
}

function showToast(msg, duration = 2000) {
    const toast = document.getElementById('toast');
    // 支持多行文本显示
    toast.innerHTML = msg.replace(/\n/g, '<br>');
    toast.style.display = 'block';
    toast.style.whiteSpace = 'pre-line';
    toast.style.textAlign = 'center';
    setTimeout(() => toast.style.display = 'none', duration);
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

function render() {
    const app = document.getElementById('app');
    switch(currentPage) {
        case 'home': renderHome(app); break;
        case 'product': renderProduct(app); break;
        case 'cart': renderCart(app); break;
        case 'checkout': renderCheckout(app); break;
        case 'orderSuccess': renderOrderSuccess(app); break;
        case 'orders': renderOrders(app); break;
        case 'orderDetail': renderOrderDetail(app); break;
        case 'logistics': renderLogistics(app); break;
        case 'afterSale': renderAfterSale(app); break;
        case 'afterSaleList': renderAfterSaleList(app); break;
        case 'afterSaleDetail': renderAfterSaleDetail(app); break;
        case 'selectAfterSaleType': renderSelectAfterSaleType(app); break;
        case 'applyAfterSale': renderApplyAfterSale(app); break;
        case 'profile': renderProfile(app); break;
    }
    updateSpecPanel();
}

// 更新需求说明面板
function updateSpecPanel() {
    const specContent = document.getElementById('specContent');
    const specs = getPageSpec(currentPage);
    
    specContent.innerHTML = `
        <div class="spec-section">
            <div class="spec-section-title">页面功能</div>
            <div style="color: #333; font-weight: 600; margin-bottom: 8px;">${specs.title}</div>
            <div style="color: #666; font-size: 12px;">${specs.description}</div>
        </div>
        
        ${specs.features ? `
        <div class="spec-section">
            <div class="spec-section-title">核心功能</div>
            <ul class="spec-list">
                ${specs.features.map(f => `<li>${f}</li>`).join('')}
            </ul>
        </div>
        ` : ''}
        
        ${specs.interactions ? `
        <div class="spec-section">
            <div class="spec-section-title">交互操作</div>
            <ul class="spec-list">
                ${specs.interactions.map(i => `<li>${i}</li>`).join('')}
            </ul>
        </div>
        ` : ''}
        
        ${specs.rules ? `
        <div class="spec-section">
            <div class="spec-section-title">业务规则</div>
            ${specs.rules.map(r => `<div class="spec-rule">${r}</div>`).join('')}
        </div>
        ` : ''}
        
        ${specs.states ? `
        <div class="spec-section">
            <div class="spec-section-title">状态说明</div>
            <div style="margin-top: 8px;">
                ${specs.states.map(s => `<span class="spec-tag">${s}</span>`).join('')}
            </div>
        </div>
        ` : ''}
    `;
}

// 快速加入购物车（带动效）
function quickAddToCart(productId, event) {
    const product = DB.products.find(p => p.id === productId);
    if (!product) return;
    
    if (product.stock <= 0) {
        showToast('商品已售罄');
        return;
    }
    
    // 获取点击按钮的位置
    const btn = event.target;
    const btnRect = btn.getBoundingClientRect();
    
    // 获取购物车图标的位置
    const cartTab = document.querySelector('.tab-bar .tab-item:nth-child(2)');
    const cartRect = cartTab.getBoundingClientRect();
    
    // 创建飞入动画元素
    const flyEl = document.createElement('div');
    flyEl.innerHTML = product.img;
    flyEl.style.cssText = `
        position: fixed;
        left: ${btnRect.left}px;
        top: ${btnRect.top}px;
        width: 30px;
        height: 30px;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        z-index: 9999;
        transition: all 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        pointer-events: none;
    `;
    document.body.appendChild(flyEl);
    
    // 按钮点击效果
    btn.style.transform = 'scale(0.8)';
    setTimeout(() => btn.style.transform = 'scale(1)', 100);
    
    // 触发飞入动画
    requestAnimationFrame(() => {
        flyEl.style.left = `${cartRect.left + cartRect.width / 2 - 15}px`;
        flyEl.style.top = `${cartRect.top}px`;
        flyEl.style.transform = 'scale(0.3)';
        flyEl.style.opacity = '0.5';
    });
    
    // 动画结束后移除元素并更新购物车
    setTimeout(() => {
        flyEl.remove();
        addToCart(productId, 1);
        
        // 更新购物车角标（不刷新整个页面）
        updateCartBadge();
        
        // 购物车图标弹跳效果
        cartTab.style.transform = 'scale(1.2)';
        setTimeout(() => cartTab.style.transform = 'scale(1)', 150);
        
        showToast('已加入购物车');
    }, 500);
}

// 更新购物车角标
function updateCartBadge() {
    const cartCount = DB.cart.reduce((sum, item) => sum + item.qty, 0);
    const cartTab = document.querySelector('.tab-bar .tab-item:nth-child(2)');
    if (!cartTab) return;
    
    // 移除旧角标
    const oldBadge = cartTab.querySelector('.badge');
    if (oldBadge) oldBadge.remove();
    
    // 添加新角标
    if (cartCount > 0) {
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = cartCount;
        badge.style.animation = 'badgePop 0.3s ease';
        cartTab.appendChild(badge);
    }
}

<script>
// 购物车页面
function renderCart(el) {
    const cartItems = getCartItems();
    const supplyItems = cartItems.filter(i => i.product?.type === 'supply');
    const selfItems = cartItems.filter(i => i.product?.type === 'self');
    
    const selectedSupply = supplyItems.filter(i => i.selected && i.product?.stock > 0);
    const selectedSelf = selfItems.filter(i => i.selected && i.product?.stock > 0);
    
    const supplyTotal = selectedSupply.reduce((sum, i) => sum + i.product.price * i.qty, 0);
    const selfTotal = selectedSelf.reduce((sum, i) => sum + i.product.price * i.qty, 0);
    
    const hasSupplySelected = selectedSupply.length > 0;
    const hasSelfSelected = selectedSelf.length > 0;
    
    // 确定当前已选类型，用于互斥判断
    const selectedType = hasSupplySelected ? 'supply' : (hasSelfSelected ? 'self' : null);
    
    // 计算全选状态（需要考虑互斥：如果选了另一类，当前类全选应为false）
    const selfAvailable = selfItems.filter(i => i.product?.stock > 0);
    const supplyAvailable = supplyItems.filter(i => i.product?.stock > 0);
    // 如果选了非自营，自营全选为false；否则检查是否全部选中
    const selfAllSelected = !hasSupplySelected && selfAvailable.length > 0 && selfAvailable.every(i => i.selected);
    // 如果选了自营，非自营全选为false；否则检查是否全部选中
    const supplyAllSelected = !hasSelfSelected && supplyAvailable.length > 0 && supplyAvailable.every(i => i.selected);
    
    // 计算选中商品数量和总价
    const selectedItems = hasSupplySelected ? selectedSupply : (hasSelfSelected ? selectedSelf : []);
    const selectedCount = selectedItems.reduce((sum, i) => sum + i.qty, 0);
    const selectedTotal = hasSupplySelected ? supplyTotal : (hasSelfSelected ? selfTotal : 0);
    
    // 计算自营商品可用优惠券（仅自营可用）
    let couponDiscount = 0;
    let bestCoupon = null;
    if (hasSelfSelected && !hasSupplySelected) {
        const availableCoupons = (DB.user.coupons || []).filter(c => !c.used && selfTotal >= c.minAmount);
        if (availableCoupons.length > 0) {
            bestCoupon = availableCoupons.reduce((best, c) => c.amount > best.amount ? c : best, availableCoupons[0]);
            couponDiscount = bestCoupon.amount;
        }
    }
    
    el.innerHTML = `
        <div class="nav-bar">
            <div class="back" onclick="goTo('home')">←</div>
            <div class="title">购物车</div>

                <div style="text-align: center; padding: 60px 20px; color: #999;">
                    <div style="font-size: 60px; margin-bottom: 15px;">🛒</div>
                    <div>购物车是空的</div>
                    <button onclick="goTo('home')" style="margin-top: 20px; padding: 10px 30px; border: none; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; border-radius: 20px; cursor: pointer;">去逛逛</button>
                </div>
            ` : `
                <!-- 自营商品分区 -->
                ${selfItems.length > 0 ? `
                <div style="background: #fff; border-radius: 12px; margin-bottom: 10px;">
                    <div style="padding: 12px 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between;">
                        <div style="display: flex; align-items: center;">
                            <input type="checkbox" ${selfAllSelected ? 'checked' : ''} 
                                onchange="toggleSelectAll('self')" style="width: 18px; height: 18px; margin-right: 8px; cursor: pointer;">
                            <span style="font-weight: 600;">🏪 自营 (${selfItems.length})</span>
                        </div>
                        <span onclick="clearCartByType('self')" style="font-size: 12px; color: #999; cursor: pointer;">清空</span>
                    </div>
                    ${selfItems.map(item => renderCartItem(item, selectedType)).join('')}
                </div>
                ` : ''}
                
                <!-- 供应链精选商品分区 -->
                ${supplyItems.length > 0 ? `
                <div style="background: #fff; border-radius: 12px; margin-bottom: 10px;">
                    <div style="padding: 12px 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between;">
                        <div style="display: flex; align-items: center;">
                            <input type="checkbox" ${supplyAllSelected ? 'checked' : ''} 
                                onchange="toggleSelectAll('supply')" style="width: 18px; height: 18px; margin-right: 8px; cursor: pointer;">
                            <span style="font-weight: 600;">📦 供应链精选 (${supplyItems.length})</span>
                        </div>
                        <span onclick="clearCartByType('supply')" style="font-size: 12px; color: #999; cursor: pointer;">清空</span>
                    </div>
                    ${supplyItems.map(item => renderCartItem(item, selectedType)).join('')}
                </div>
                ` : ''}
            `}
        </div>
        
        ${cartItems.length > 0 ? `
        <div class="bottom-bar" style="border-top: 1px solid #eee;">
            <div style="flex: 1;">
                ${selectedCount > 0 ? `
                    <div style="font-size: 13px; color: #333;">
                        共<span style="color: #ff4757; font-weight: bold;">${selectedCount}</span>件，
                        合计<span style="color: #ff4757; font-weight: bold; font-size: 16px;">¥${selectedTotal.toFixed(2)}</span>
                    </div>
                    ${couponDiscount > 0 ? `<div style="font-size: 11px; color: #ff4757;">已优惠 ¥${couponDiscount.toFixed(2)}</div>` : ''}
                ` : `
                    <div style="font-size: 13px; color: #999;">请选择商品</div>
                `}
            </div>
            ${hasSupplySelected && !hasSelfSelected ? `
                <button onclick="goToCheckout('supply')" class="btn btn-primary" style="padding: 10px 20px;">结算</button>
            ` : ''}
            ${hasSelfSelected && !hasSupplySelected ? `
                <button onclick="goToCheckout('self')" class="btn btn-primary" style="padding: 10px 20px;">结算</button>
            ` : ''}
            ${!hasSupplySelected && !hasSelfSelected ? `
                <button disabled class="btn btn-primary" style="opacity: 0.5; padding: 10px 20px;">结算</button>
            ` : ''}
        </div>
        ` : ''}
        ${renderTabBar('cart')}
    `;
}

// 全选/取消全选
function toggleSelectAll(type) {
    const cartItems = getCartItems();
    const typeItems = cartItems.filter(i => i.product?.type === type && i.product?.stock > 0);
    const otherTypeItems = cartItems.filter(i => i.product?.type !== type && i.product?.stock > 0);
    const allSelected = typeItems.every(i => i.selected);
    
    // 如果要全选当前类型，先取消其他类型的选中
    if (!allSelected) {
        otherTypeItems.forEach(item => {
            const cartItem = DB.cart.find(c => c.productId === item.productId);
            if (cartItem) cartItem.selected = false;
        });
    }
    
    // 切换当前类型的全选状态
    typeItems.forEach(item => {
        const cartItem = DB.cart.find(c => c.productId === item.productId);
        if (cartItem) {
            cartItem.selected = !allSelected;
        }
    });
    saveData();
    render();
}

// 清空某类型购物车
function clearCartByType(type) {
    if (confirm(`确定要清空${type === 'self' ? '自营' : '供应链精选'}商品吗？`)) {
        DB.cart = DB.cart.filter(item => {
            const product = DB.products.find(p => p.id === item.productId);
            return product && product.type !== type;
        });
        saveData();
        render();
    }
}

function renderCartItem(item, selectedType) {
    const p = item.product;
    const isOutOfStock = p.stock === 0;
    const itemType = p.type;
    // 互斥判断：如果已选了其他类型，当前类型显示为未勾选（不是禁用）
    const isOtherType = selectedType && selectedType !== itemType;
    // 只有售罄才禁用
    const isDisabled = isOutOfStock;
    // 显示勾选状态：如果是其他类型，强制显示为未勾选
    const showChecked = item.selected && !isOutOfStock && !isOtherType;
    
    return `
        <div style="padding: 15px; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; ${isOutOfStock ? 'opacity: 0.5;' : ''}">
            <input type="checkbox" ${showChecked ? 'checked' : ''} ${isDisabled ? 'disabled' : ''} 
                onchange="toggleCartItemWithCheck('${item.productId}', '${itemType}')" style="width: 20px; height: 20px; margin-right: 10px; cursor: ${isDisabled ? 'not-allowed' : 'pointer'};">
            <div onclick="goTo('product', {productId: '${item.productId}'})" style="width: 70px; height: 70px; background: #f9f9f9; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 35px; margin-right: 10px; cursor: pointer;">${p.img}</div>
            <div style="flex: 1;">
                <div style="font-size: 14px; font-weight: 500; margin-bottom: 3px;">
                    ${p.name} ${isOutOfStock ? '<span style="color: #ff4757; font-size: 11px;">[已售罄]</span>' : ''}
                </div>
                <div onclick="showCartSpecModal('${item.productId}')" style="font-size: 12px; color: #999; margin-bottom: 5px; cursor: pointer; display: inline-flex; align-items: center; background: #f5f5f5; padding: 2px 8px; border-radius: 4px;">
                    ${p.spec} <span style="margin-left: 4px;">▼</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: #ff4757; font-weight: bold;">¥${p.price}</span>
                    <div style="display: flex; align-items: center; border: 1px solid #ddd; border-radius: 4px;">
                        <button onclick="changeCartQty('${item.productId}', -1)" style="width: 28px; height: 28px; border: none; background: none; font-size: 16px; cursor: pointer;">-</button>
                        <span style="width: 30px; text-align: center;">${item.qty}</span>
                        <button onclick="changeCartQty('${item.productId}', 1)" style="width: 28px; height: 28px; border: none; background: none; font-size: 16px; cursor: pointer;">+</button>
                    </div>
                </div>
            </div>
            <div onclick="removeCartItem('${item.productId}')" style="padding: 10px; color: #999; cursor: pointer;">🗑️</div>
        </div>
    `;
}

// 带互斥检查的切换选中
function toggleCartItemWithCheck(productId, itemType) {
    const cartItems = getCartItems();
    const item = cartItems.find(i => i.productId === productId);
    if (!item) return;
    
    // 获取当前选中的商品
    const selectedItems = cartItems.filter(i => i.selected && i.product?.stock > 0);
    const hasOtherTypeSelected = selectedItems.some(i => i.product?.type !== itemType);
    
    // 如果要选中当前商品，且已有其他类型被选中，先取消其他类型的选中
    if (!item.selected && hasOtherTypeSelected) {
        // 取消所有其他类型的选中
        cartItems.forEach(i => {
            if (i.product?.type !== itemType && i.selected) {
                const cartItem = DB.cart.find(c => c.productId === i.productId);
                if (cartItem) cartItem.selected = false;
            }
        });
        saveData();
    }
    
    // 切换当前商品的选中状态
    toggleCartSelect(productId);
    render();
}

function showCartSpecModal(productId) {
    const product = DB.products.find(p => p.id === productId);
    const cartItem = DB.cart.find(i => i.productId === productId);
    if (!product || !cartItem) return;
    
    const modal = document.getElementById('modal');
    modal.classList.add('show');
    modal.innerHTML = `
        <div class="modal-content" style="padding: 20px; position: absolute; bottom: 0; left: 0; right: 0;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
                <div style="display: flex;">
                    <div style="width: 80px; height: 80px; background: #f9f9f9; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-right: 12px;">${product.img}</div>
                    <div>
                        <div style="color: #ff4757; font-size: 20px; font-weight: bold;">¥${product.price}</div>
                        <div style="font-size: 12px; color: #999; margin-top: 5px;">库存: ${product.stock}</div>
                    </div>
                </div>
                <span onclick="closeModal()" style="font-size: 24px; cursor: pointer; color: #999;">×</span>
            </div>
            <div style="margin-bottom: 20px;">
                <div style="font-size: 14px; font-weight: 600; margin-bottom: 10px;">规格</div>
                <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                    <span style="padding: 8px 16px; background: #f0fff4; border: 1px solid #11998e; color: #11998e; border-radius: 20px; font-size: 13px;">${product.spec}</span>
                </div>
                <div style="font-size: 11px; color: #999; margin-top: 8px;">* 当前商品仅有此规格</div>
            </div>
            <div style="margin-bottom: 20px;">
                <div style="font-size: 14px; font-weight: 600; margin-bottom: 10px;">数量</div>
                <div style="display: flex; align-items: center;">
                    <button onclick="changeCartSpecQty('${productId}', -1)" style="width: 36px; height: 36px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-size: 18px; cursor: pointer;">-</button>
                    <input type="text" id="cartSpecQty" value="${cartItem.qty}" readonly style="width: 60px; height: 36px; border: 1px solid #ddd; border-left: none; border-right: none; text-align: center; font-size: 16px;">
                    <button onclick="changeCartSpecQty('${productId}', 1)" style="width: 36px; height: 36px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-size: 18px; cursor: pointer;">+</button>
                </div>
            </div>
            <button onclick="updateCartFromSpec('${productId}')" style="width: 100%; padding: 14px; border: none; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer;">确定</button>
        </div>
    `;
}

function changeCartSpecQty(productId, delta) {
    const input = document.getElementById('cartSpecQty');
    let qty = parseInt(input.value) + delta;
    if (qty < 1) qty = 1;
    const product = DB.products.find(p => p.id === productId);
    if (product && qty > product.stock) qty = product.stock;
    input.value = qty;
}

function updateCartFromSpec(productId) {
    const qty = parseInt(document.getElementById('cartSpecQty').value);
    updateCartQty(productId, qty);
    closeModal();
    render();
}

function toggleCartItem(productId) { toggleCartSelect(productId); render(); }
function changeCartQty(productId, delta) {
    const item = DB.cart.find(i => i.productId === productId);
    if (item) { updateCartQty(productId, item.qty + delta); render(); }
}
function removeCartItem(productId) { removeFromCart(productId); render(); }
function goToCheckout(type) { 
    console.log('goToCheckout called with type:', type);
    try {
        checkoutType = type; 
        selectedPaymentPlan = null; 
        selectedMemberCardId = null;  // 重置会员卡选择，让系统自动选最优
        usePointsSwitch = false;
        selectedCouponId = null;
        selectedPayMethod = 'wechat';
        orderRemark = '';
        previousFreight = null;  // 重置运费记录，进入结算页时重新计算
        goTo('checkout');
    } catch (e) {
        console.error('Error in goToCheckout:', e);
        alert('Error: ' + e.message);
    }
}
</script>

<script>
// 结算页面状态
let selectedMemberCardId = null;  // 选中的会员卡ID
let usePointsSwitch = false;      // 积分抵扣开关
let selectedCouponId = null;      // 选中的优惠券ID
let selectedPayMethod = 'wechat'; // 支付方式: wechat/card/askpay
let orderRemark = '';             // 订单备注
let previousFreight = null;       // 上一次的运费（用于地址切换时显示变化提示）

// 结算页面
function renderCheckout(el) {
    try {
    const cartItems = getCartItems().filter(i => i.selected && i.product?.type === checkoutType && i.product?.stock > 0);
    const totalAmount = cartItems.reduce((sum, i) => sum + i.product.price * i.qty, 0);
    
    const address = DB.user.addresses.find(a => a.id === selectedAddressId);
    
    // 计算运费（仅供应链商品需要计算运费）
    let freightResult = { totalFreight: 0, productFreights: [], supplierFreights: [], canDeliver: true, deliveryErrors: [] };
    if (checkoutType === 'supply' && address) {
        freightResult = calculateOrderFreightV2(address.province, cartItems);
        
        // 初始化运费记录（用于地址切换时显示变化提示）
        if (previousFreight === null) {
            previousFreight = freightResult.totalFreight;
        }
    }
    const freight = freightResult.totalFreight;
    
    // 按供应商分组
    const supplierGroups = {};
    if (checkoutType === 'supply') {
        cartItems.forEach(item => {
            const supplierId = item.product.supplierId || 'unknown';
            const supplier = DB.suppliers.find(s => s.id === supplierId);
            if (!supplierGroups[supplierId]) {
                supplierGroups[supplierId] = { name: supplier?.name || '未知供应商', items: [] };
            }
            supplierGroups[supplierId].items.push(item);
        });
    }
    
    // 会员卡逻辑 - 仅用于卡金支付，不再提供折扣
    const memberCards = DB.user.memberCards || [];
    let autoSelectedCard = null;
    
    if (memberCards.length > 0) {
        // 如果没有手动选择，自动选择余额最多的卡（用于卡金支付）
        if (selectedMemberCardId === null) {
            const bestCard = memberCards.reduce((best, curr) => curr.balance > best.balance ? curr : best, memberCards[0]);
            selectedMemberCardId = bestCard.id;
        }
        
        autoSelectedCard = memberCards.find(c => c.id === selectedMemberCardId);
    }
    
    // 优惠券和积分互斥逻辑
    // 仅自营商品可用优惠券
    const canUseCoupon = checkoutType === 'self';
    const coupons = canUseCoupon ? (DB.user.coupons || []).filter(c => !c.used && totalAmount >= c.minAmount) : [];
    
    // 如果使用了优惠券，积分不可用；如果使用了积分，优惠券不可用
    const selectedCoupon = coupons.find(c => c.id === selectedCouponId);
    const couponDeduct = selectedCoupon ? selectedCoupon.amount : 0;
    
    // 积分抵扣（如果选了优惠券则不能用积分）
    const maxPointsDeduct = Math.min(DB.user.points / 100, totalAmount);
    const canUsePoints = !selectedCouponId; // 选了优惠券就不能用积分
    const pointsDeduct = (usePointsSwitch && canUsePoints) ? maxPointsDeduct : 0;
    
    // 如果使用了积分，清除优惠券选择
    if (usePointsSwitch && selectedCouponId) {
        selectedCouponId = null;
    }
    
    // 计算还需支付金额
    const needToPay = Math.max(0, totalAmount + freight - pointsDeduct - couponDeduct);
    
    // 支付方式逻辑：
    // 1. 如果有会员卡且余额够付，默认选会员卡支付
    // 2. 如果会员卡余额不够，默认微信支付
    // 3. 如果没有会员卡，不显示会员卡支付选项
    const hasCard = memberCards.length > 0;
    const cardCanPay = autoSelectedCard && autoSelectedCard.balance >= needToPay;
    
    // 自动设置支付方式
    if (selectedPayMethod === 'card' && (!hasCard || !cardCanPay)) {
        selectedPayMethod = 'wechat';
    }
    if (hasCard && cardCanPay && selectedPayMethod === 'wechat') {
        // 首次进入时，如果卡金够付，默认选卡金
        if (!selectedPaymentPlan) {
            selectedPayMethod = 'card';
        }
    }
    
    // 保存支付方案供提交订单使用
    selectedPaymentPlan = {
        totalAmount,
        freight,
        freightResult,  // 保存完整运费计算结果
        pointsUsed: (usePointsSwitch && canUsePoints) ? Math.min(DB.user.points, maxPointsDeduct * 100) : 0,
        pointsDeduct,
        couponId: selectedCouponId,
        couponDeduct,
        needToPay,
        payMethod: selectedPayMethod,
        memberCardId: selectedMemberCardId,
        remark: orderRemark
    };

function renderCheckoutItem(item, deliveryError = null) {
    const hasError = !!deliveryError;

            <div style="width: 50px; height: 50px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 25px; margin-right: 10px; ${hasError ? 'opacity: 0.6;' : ''}">${item.product.img}</div>
            <div style="flex: 1;">
                <div style="font-size: 13px; ${hasError ? 'color: #999;' : ''}">${item.product.name}</div>
                <div style="font-size: 11px; color: #999;">${item.product.spec}</div>
                ${hasError ? `<div style="font-size: 11px; color: #ff4757; margin-top: 4px;">⚠️ ${deliveryError}</div>` : ''}
            </div>
            <div style="text-align: right; font-size: 12px;">
                <div style="${hasError ? 'color: #999;' : ''}">¥${item.product.price} x${item.qty}</div>
                <div style="color: ${hasError ? '#999' : '#666'};">¥${(item.product.price * item.qty).toFixed(2)}</div>
            </div>
        </div>
    `;
}

// 保存地址
function saveAddressInCheckout(editId) {
    const name = document.getElementById('addrName').value.trim();
    const phone = document.getElementById('addrPhone').value.trim();
    const province = document.getElementById('addrProvince').value;
    const city = document.getElementById('addrCity').value.trim();
    const district = document.getElementById('addrDistrict').value.trim();
    const detail = document.getElementById('addrDetail').value.trim();
    const isDefault = document.getElementById('addrDefault').checked;
    
    if (!name || !phone || !province || !city || !detail) {
        showToast('请填写完整地址信息');
        return;
    }
    
    if (!/^1\d{10}$/.test(phone)) {
        showToast('请输入正确的手机号码');
        return;
    }
    
    if (editId) {
        // 编辑地址
        const addr = DB.user.addresses.find(a => a.id === editId);
        if (addr) {
            addr.name = name;
            addr.phone = phone;
            addr.province = province;
            addr.city = city;
            addr.district = district;
            addr.detail = detail;
            if (isDefault) {
                DB.user.addresses.forEach(a => a.isDefault = false);
                addr.isDefault = true;
            }
        }
    } else {
        // 新增地址
        const newId = 'A' + Date.now();
        if (isDefault) {
            DB.user.addresses.forEach(a => a.isDefault = false);
        }
        DB.user.addresses.push({
            id: newId,
            name, phone, province, city, district, detail,
            isDefault: isDefault || DB.user.addresses.length === 0
        });
        // 自动选择新地址
        selectedAddressId = newId;
    }
    
    saveData();
    showToast(editId ? '地址已更新' : '地址已添加');
    showAddressModal();
}

// 编辑地址
function editAddressInCheckout(addrId) {
    const addr = DB.user.addresses.find(a => a.id === addrId);
    if (addr) {
        showAddAddressModal(addr);
    }
}

// 删除地址
function deleteAddressInCheckout(addrId) {
    if (!confirm('确定要删除这个地址吗？')) return;
    
    const idx = DB.user.addresses.findIndex(a => a.id === addrId);
    if (idx > -1) {
        DB.user.addresses.splice(idx, 1);
        // 如果删除的是当前选中的地址，切换到默认地址
        if (selectedAddressId === addrId) {
            const defaultAddr = DB.user.addresses.find(a => a.isDefault);
            selectedAddressId = defaultAddr ? defaultAddr.id : (DB.user.addresses[0]?.id || null);
        }
        saveData();
        showToast('地址已删除');
        showAddressModal();
    }
}

// 设为默认地址
function setDefaultAddressInCheckout(addrId) {
    DB.user.addresses.forEach(a => a.isDefault = (a.id === addrId));
    saveData();
    showToast('已设为默认地址');
    showAddressModal();
}

// 智能解析地址文本（结账页面专用）
function smartParseAddressForCheckout() {
    const pasteText = document.getElementById('addrPasteArea').value;
    if (!pasteText.trim()) {
        showToast('请先粘贴地址信息');
        return;
    }
    
    const parsed = parseAddressText(pasteText);
    
    if (parsed.name) document.getElementById('addrName').value = parsed.name;
    if (parsed.phone) document.getElementById('addrPhone').value = parsed.phone;
    if (parsed.province) document.getElementById('addrProvince').value = parsed.province;
    if (parsed.detail) document.getElementById('addrDetail').value = parsed.detail;
    
    showToast('识别完成，请检查并补充信息');
}

function selectAddress(addrId) {
    // 保存切换前的运费（用于显示变化提示）
    const oldFreight = previousFreight;
    
    selectedAddressId = addrId;
    closeModal();
    
    // 计算新地址的运费
    const cartItems = getCartItems().filter(i => i.selected && i.product?.type === checkoutType && i.product?.stock > 0);
    const newAddress = DB.user.addresses.find(a => a.id === addrId);
    
    if (checkoutType === 'supply' && newAddress && cartItems.length > 0) {
        const newFreightResult = calculateOrderFreightV2(newAddress.province, cartItems);
        const newFreight = newFreightResult.totalFreight;
        
        // 检查是否有不可配送的情况 - 优先显示此提示
        if (!newFreightResult.canDeliver) {
            showToast(`🚫 ${newAddress.province}暂不支持配送，请更换地址`);
            previousFreight = newFreight;
            renderCheckoutKeepScroll();
            return;
        }
        
        // 如果有旧运费记录，显示运费变化提示
        if (oldFreight !== null && oldFreight !== newFreight) {
            const diff = newFreight - oldFreight;
            if (diff > 0) {
                showToast(`运费已更新：+¥${diff.toFixed(2)}（${newAddress.province}）`);
            } else if (diff < 0) {
                showToast(`运费已更新：-¥${Math.abs(diff).toFixed(2)}（${newAddress.province}）`);
            }
        } else if (oldFreight === null && newFreight > 0) {
            // 首次选择地址且有运费
            showToast(`运费：¥${newFreight.toFixed(2)}（${newAddress.province}）`);
        }
        
        // 更新运费记录
        previousFreight = newFreight;
    }
    
    renderCheckoutKeepScroll();
}

// 新的提交订单函数
function submitOrderNew() {
    if (!selectedAddressId) {
        showToast('请选择收货地址');
        return;
    }
    
    // 检查不发货地区 - 阻止下单 (Requirements 4.5)
    if (checkoutType === 'supply' && selectedPaymentPlan && selectedPaymentPlan.freightResult) {
        const freightResult = selectedPaymentPlan.freightResult;
        if (!freightResult.canDeliver) {
            const errorMessages = freightResult.deliveryErrors.map(err => err.message).join('；');
            showToast('⚠️ 无法下单：' + errorMessages);
            return;
        }
    }
    
    // 获取选中的会员卡
    const memberCards = DB.user.memberCards || [];
    const selectedCard = memberCards.find(c => c.id === selectedMemberCardId);
    
    // 检查卡金支付余额是否足够

        if (!selectedCard || selectedCard.balance < selectedPaymentPlan.needToPay) {
            showToast('会员卡余额不足，请选择其他支付方式');

        }
    }
    
    // 显示模拟支付弹窗

// 处理支付成功
function handlePaymentSuccess() {
    closeModal();
    
    // 获取选中的会员卡
    const memberCards = DB.user.memberCards || [];
    const selectedCard = memberCards.find(c => c.id === selectedMemberCardId);
    
    // 构建支付方案
    const paymentPlan = {
        type: 'custom',
        label: getPayMethodLabel(selectedPayMethod),
        pointsUsed: selectedPaymentPlan.pointsUsed,
        pointsDeduct: selectedPaymentPlan.pointsDeduct,
        cardUsed: selectedPayMethod === 'card' ? selectedPaymentPlan.needToPay : 0,
        cashAmount: selectedPayMethod === 'card' ? 0 : selectedPaymentPlan.needToPay,
        cashPayMethod: selectedPayMethod,
        couponDeduct: selectedPaymentPlan.couponDeduct,
        memberCardId: selectedMemberCardId,
        remark: orderRemark,
        freightResult: selectedPaymentPlan.freightResult
    };
    
    // 如果使用会员卡支付，扣除会员卡余额
    if (selectedPayMethod === 'card' && selectedCard) {
        selectedCard.balance -= selectedPaymentPlan.needToPay;
    }
    
    // 如果使用了优惠券，标记为已使用
    if (selectedPaymentPlan.couponId) {
        const coupon = DB.user.coupons.find(c => c.id === selectedPaymentPlan.couponId);
        if (coupon) {
            coupon.used = true;
        }
    }
    
    const result = createOrder(selectedAddressId, paymentPlan, checkoutType, true); // true = 已支付
    if (result.success) {
        const order = DB.orders.find(o => o.id === result.orderId);
        if (order) {
            order.remark = orderRemark;
        }
        
        currentOrderId = result.orderId;
        resetCheckoutState();
        saveData();
        
        // 跳转到订单列表
        orderFilterTab = 'all';
        goTo('orders');
        showToast('🎉 支付成功！');
    } else {
        showToast(result.error);
    }
}

// 处理暂不支付
function handlePaymentLater() {
    closeModal();
    
    // 构建支付方案（待支付状态）
    const paymentPlan = {
        type: 'custom',
        label: getPayMethodLabel(selectedPayMethod),
        pointsUsed: 0,  // 暂不扣除积分
        pointsDeduct: selectedPaymentPlan.pointsDeduct,
        cardUsed: 0,    // 暂不扣除卡金
        cashAmount: selectedPaymentPlan.needToPay,
        cashPayMethod: selectedPayMethod,
        couponDeduct: selectedPaymentPlan.couponDeduct,
        memberCardId: selectedMemberCardId,
        remark: orderRemark,
        freightResult: selectedPaymentPlan.freightResult,
        // 保存待支付时需要的信息
        pendingPointsUsed: selectedPaymentPlan.pointsUsed,
        pendingCardUsed: selectedPayMethod === 'card' ? selectedPaymentPlan.needToPay : 0
    };
    
    const result = createOrder(selectedAddressId, paymentPlan, checkoutType, false); // false = 待支付
    if (result.success) {
        const order = DB.orders.find(o => o.id === result.orderId);
        if (order) {
            order.remark = orderRemark;
            // 保存待支付需要的额外信息
            order.pendingPaymentInfo = {
                pointsUsed: selectedPaymentPlan.pointsUsed,
                pointsDeduct: selectedPaymentPlan.pointsDeduct,
                cardUsed: selectedPayMethod === 'card' ? selectedPaymentPlan.needToPay : 0,
                couponId: selectedPaymentPlan.couponId,
                memberCardId: selectedMemberCardId,
                payMethod: selectedPayMethod
            };
        }
        
        currentOrderId = result.orderId;
        resetCheckoutState();
        saveData();
        
        // 跳转到订单列表的待支付tab
        orderFilterTab = 'pending_pay';
        goTo('orders');
        showToast('订单已创建，请在15分钟内完成支付');

// 确认支付订单
function confirmPayOrder(orderId) {
    closeModal();
    
    const order = DB.orders.find(o => o.id === orderId);
    if (!order || order.status !== 'pending_pay') {
        showToast('订单状态异常');
        return;
    }
    
    const payInfo = order.pendingPaymentInfo || {};
    
    // 扣除积分
    if (payInfo.pointsUsed > 0) {
        DB.user.points -= payInfo.pointsUsed;
    }
    
    // 扣除会员卡余额
    if (payInfo.cardUsed > 0 && payInfo.memberCardId) {
        const memberCards = DB.user.memberCards || [];
        const card = memberCards.find(c => c.id === payInfo.memberCardId);
        if (card) {
            card.balance -= payInfo.cardUsed;
        }
    }
    
    // 标记优惠券已使用
    if (payInfo.couponId) {
        const coupon = DB.user.coupons.find(c => c.id === payInfo.couponId);
        if (coupon) {
            coupon.used = true;
        }
    }
    
    // 更新订单状态
    order.status = 'paid';
    order.payTime = new Date().toISOString();
    order.pointsDeduct = payInfo.pointsDeduct || 0;
    order.cardDeduct = payInfo.cardUsed || 0;
    
    // 更新支付方案信息
    order.paymentPlan = {
        cashPayMethod: payInfo.payMethod || 'wechat',
        cardUsed: payInfo.cardUsed || 0,
        cashAmount: order.cashPaid || 0,
        pointsDeduct: payInfo.pointsDeduct || 0,
        pointsUsed: payInfo.pointsUsed || 0
    };
    
    // 创建子订单（拆单）
    createSubOrdersForOrder(order);
    
    saveData();
    showToast('🎉 支付成功！');
    render();
}

// 为已支付订单创建子订单
function createSubOrdersForOrder(order) {
    const now = new Date();
    const freightResult = order.freightResult || { totalFreight: 0, supplierFreights: [] };
    
    if (order.type === 'supply') {
        // 按供应商分组
        const supplierGroups = {};
        order.items.forEach(item => {
            const supplierId = item.supplierId;
            if (!supplierGroups[supplierId]) {
                supplierGroups[supplierId] = [];
            }
            supplierGroups[supplierId].push(item);
        });
        
        const totalProductAmount = order.items.reduce((sum, item) => sum + item.price * item.qty, 0);
        const supplierIds = Object.keys(supplierGroups);
        
        supplierIds.forEach((supplierId, index) => {
            const items = supplierGroups[supplierId];
            const supplier = DB.suppliers.find(s => s.id === supplierId);
            const subOrderId = generateSubOrderId(order.id);
            
            const subAmount = items.reduce((sum, item) => sum + item.price * item.qty, 0);
            const supplyAmount = items.reduce((sum, item) => {
                const product = DB.products.find(p => p.id === item.productId);
                return sum + (product ? product.supplyPrice : item.price) * item.qty;
            }, 0);
            
            // 从supplierFreights中获取该供应商的运费
            const supplierFreightInfo = (freightResult.supplierFreights || []).find(sf => sf.supplierId === supplierId);
            const subFreight = supplierFreightInfo ? supplierFreightInfo.freight : 0;
            
            const ratio = totalProductAmount > 0 ? subAmount / totalProductAmount : (1 / supplierIds.length);
            const isLast = index === supplierIds.length - 1;
            
            let subPointsDeduct, subCardDeduct, subCashPaid, subCouponDeduct;
            if (isLast) {
                const prevSubOrders = DB.subOrders.filter(so => so.parentOrderId === order.id);
                const usedPoints = prevSubOrders.reduce((sum, so) => sum + (so.pointsDeduct || 0), 0);
                const usedCard = prevSubOrders.reduce((sum, so) => sum + (so.cardDeduct || 0), 0);
                const usedCash = prevSubOrders.reduce((sum, so) => sum + (so.cashPaid || 0), 0);
                const usedCoupon = prevSubOrders.reduce((sum, so) => sum + (so.couponDeduct || 0), 0);
                subPointsDeduct = (order.pointsDeduct || 0) - usedPoints;
                subCardDeduct = (order.cardDeduct || 0) - usedCard;
                subCashPaid = (order.cashPaid || 0) - usedCash;
                subCouponDeduct = (order.couponDeduct || 0) - usedCoupon;
            } else {
                subPointsDeduct = Math.round((order.pointsDeduct || 0) * ratio * 100) / 100;
                subCardDeduct = Math.round((order.cardDeduct || 0) * ratio * 100) / 100;
                subCashPaid = Math.round((order.cashPaid || 0) * ratio * 100) / 100;
                subCouponDeduct = Math.round((order.couponDeduct || 0) * ratio * 100) / 100;
            }
            
            const subOrder = {
                id: subOrderId,
                parentOrderId: order.id,
                supplierId: supplierId,
                supplierName: supplier ? supplier.name : '未知供应商',
                status: 'pending_ship',
                items: items.map(item => ({
                    productId: item.productId,
                    name: item.name,
                    spec: item.spec,
                    price: item.price,
                    supplyPrice: item.supplyPrice || item.price,
                    qty: item.qty,
                    img: item.img
                })),
                amount: subAmount,
                supplyAmount: supplyAmount,
                freight: subFreight,
                pointsDeduct: subPointsDeduct,
                cardDeduct: subCardDeduct,
                cashPaid: subCashPaid,
                couponDeduct: subCouponDeduct,
                packages: [],
                expressCompany: '',
                trackingNo: '',
                createTime: now.toISOString(),
                shipTime: null,
                deliverTime: null
            };
            
            // 生成清分数据（V2.0: 传入storeId用于获取品牌配置）
            generateSubOrderClearingData(subOrder, order.storeId);
            
            DB.subOrders.push(subOrder);
            order.subOrderIds.push(subOrderId);
        });
    } else {
        // 自营商品只创建一个子订单
        const subOrderId = generateSubOrderId(order.id);
        const subOrder = {
            id: subOrderId,
            parentOrderId: order.id,
            supplierId: null,
            supplierName: '自营仓库',
            status: 'pending_ship',
            items: order.items,
            amount: order.totalAmount,
            supplyAmount: 0,
            freight: 0,
            pointsDeduct: order.pointsDeduct || 0,
            cardDeduct: order.cardDeduct || 0,
            cashPaid: order.cashPaid || 0,
            couponDeduct: order.couponDeduct || 0,
            packages: [],
            expressCompany: '',
            trackingNo: '',
            createTime: now.toISOString(),
            shipTime: null,
            deliverTime: null
        };
        
        // 生成清分数据（V2.0: 传入storeId用于获取品牌配置）
        generateSubOrderClearingData(subOrder, order.storeId);
        
        DB.subOrders.push(subOrder);
        order.subOrderIds.push(subOrderId);
    }
}

// 取消待支付订单
function cancelPendingOrder(orderId) {
    const order = DB.orders.find(o => o.id === orderId);
    if (!order || order.status !== 'pending_pay') {
        showToast('订单状态异常');
        return;
    }
    
    if (confirm('确定要取消该订单吗？')) {
        // 恢复库存
        order.items.forEach(item => {
            const product = DB.products.find(p => p.id === item.productId);
            if (product) {
                product.stock += item.qty;
                product.sales -= item.qty;
            }
        });
        
        order.status = 'cancelled';
        order.cancelTime = new Date().toISOString();
        order.cancelReason = '用户取消';
        
        saveData();
        showToast('订单已取消');
        render();
    }
}

// 获取订单剩余支付时间（秒）
function getOrderRemainingTime(order) {
    if (order.status !== 'pending_pay') return 0;
    const createTime = new Date(order.createTime).getTime();
    const now = Date.now();
    const timeoutMs = 15 * 60 * 1000; // 15分钟
    const remaining = Math.max(0, timeoutMs - (now - createTime));
    return Math.floor(remaining / 1000);
}

// 格式化剩余时间
function formatRemainingTime(seconds) {
    if (seconds <= 0) return '已超时';
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${minutes}分${secs.toString().padStart(2, '0')}秒`;
}

// 检查并自动取消超时订单
function checkAndCancelTimeoutOrders() {
    const pendingOrders = DB.orders.filter(o => o.status === 'pending_pay');
    pendingOrders.forEach(order => {
        if (getOrderRemainingTime(order) <= 0) {
            // 恢复库存
            order.items.forEach(item => {
                const product = DB.products.find(p => p.id === item.productId);
                if (product) {
                    product.stock += item.qty;
                    product.sales -= item.qty;
                }
            });
            
            order.status = 'cancelled';
            order.cancelTime = new Date().toISOString();
            order.cancelReason = '支付超时自动取消';
        }
    });
    saveData();
}

// 订单列表 - 显示父订单/子订单概念

// 订单倒计时定时器
let orderCountdownTimer = null;

function startOrderCountdownTimer() {
    // 清除之前的定时器
    if (orderCountdownTimer) {
        clearInterval(orderCountdownTimer);
    }
    
    // 每秒刷新一次倒计时显示
    orderCountdownTimer = setInterval(() => {
        // 检查是否还在订单列表页面
        if (currentPage !== 'orders') {
            clearInterval(orderCountdownTimer);
            orderCountdownTimer = null;
            return;
        }
        
        // 检查是否有待支付订单
        const pendingOrders = DB.orders.filter(o => o.status === 'pending_pay');
        if (pendingOrders.length === 0) {
            clearInterval(orderCountdownTimer);
            orderCountdownTimer = null;
            return;
        }
        
        // 更新倒计时显示（不重新渲染整个页面，只更新倒计时文本）
        pendingOrders.forEach(order => {
            const remaining = getOrderRemainingTime(order);
            if (remaining <= 0) {
                // 订单超时，重新渲染页面
                checkAndCancelTimeoutOrders();
                render();
                return;
            }
        });
        
        // 简单刷新页面以更新倒计时
        render();
    }, 1000);
}

// 渲染订单列表
function renderOrderList(orders) {
    // 检查并取消超时订单
    checkAndCancelTimeoutOrders();
    
    if (orders.length === 0) {
        return `
            <div style="text-align: center; padding: 80px 20px; color: #999;">
                <div style="width: 80px; height: 80px; margin: 0 auto 15px; background: #f5f5f5; border-radius: 50%; display: flex; align-items: center; justify-content: center;">

                </div>
                <div style="font-size: 14px;">没有找到相关订单</div>
            </div>
        `;
    }
    
    // 构建显示列表：待支付/取消订单显示父订单，已支付订单按子订单显示
    let displayItems = [];
    orders.forEach(order => {
        if (order.status === 'pending_pay' || order.status === 'cancelled') {
            // 待支付和取消订单显示父订单
            displayItems.push({ type: 'order', data: order });
        } else {
            // 已支付订单按子订单显示，根据当前 tab 筛选子订单
            const subOrders = (order.subOrderIds || []).map(id => DB.subOrders.find(so => so.id === id)).filter(Boolean);
            subOrders.forEach(so => {
                // 根据当前 tab 筛选子订单
                let shouldShow = false;
                switch(orderFilterTab) {
                    case 'pending_ship':
                        // 待发货：子订单状态为 pending_ship
                        shouldShow = so.status === 'pending_ship';
                        break;
                    case 'pending_receive':
                        // 待收货：子订单状态为 shipped 或 partial_shipped
                        shouldShow = so.status === 'shipped' || so.status === 'partial_shipped';
                        break;
                    case 'pending_review':
                        // 待评价：子订单状态为 delivered
                        shouldShow = so.status === 'delivered';
                        break;
                    default:
                        // 全部 tab 显示所有子订单
                        shouldShow = true;
                }
                if (shouldShow) {
                    displayItems.push({ type: 'subOrder', data: so, parentOrder: order });
                }
            });
        }
    });
    
    return displayItems.map(item => {

// 提醒发货
function remindShip(subOrderId) {
    alert('已提醒商家尽快发货，请耐心等待');
}

// 查看物流
function viewLogistics(subOrderId) {
    const subOrder = DB.subOrders.find(so => so.id === subOrderId);
    if (!subOrder) {
        alert('订单不存在');
        return;
    }
    
    // 检查是否有包裹
    if (subOrder.packages && subOrder.packages.length > 0) {
        const pkg = subOrder.packages[0];
        alert(`物流信息\n\n快递公司: ${pkg.expressCompany || '未知'}\n快递单号: ${pkg.trackingNo || '暂无'}\n发货时间: ${pkg.shipTime ? formatTime(pkg.shipTime) : '暂无'}`);
    } else if (subOrder.trackingNo) {
        alert(`物流信息\n\n快递公司: ${subOrder.expressCompany || '未知'}\n快递单号: ${subOrder.trackingNo || '暂无'}\n发货时间: ${subOrder.shipTime ? formatTime(subOrder.shipTime) : '暂无'}`);
    } else {
        alert('暂无物流信息');
    }
}

// 确认收货
function confirmReceive(subOrderId) {
    if (!confirm('确认已收到商品吗？')) return;
    
    const subOrder = DB.subOrders.find(so => so.id === subOrderId);
    if (!subOrder) {
        alert('订单不存在');
        return;
    }
    
    // 更新子订单状态
    subOrder.status = 'delivered';
    subOrder.deliverTime = new Date().toISOString();
    
    // 更新所有包裹状态
    if (subOrder.packages) {
        subOrder.packages.forEach(pkg => {
            pkg.status = 'delivered';
        });
    }
    
    // V2.0: 更新 SKU 级别清分状态为已结算
    if (subOrder.items) {
        subOrder.items.forEach(item => {
            if (item.clearing) {
                item.clearing.status = 'settled';
                item.clearing.settleTime = new Date().toISOString();
            }
        });
    }
    // 更新子订单汇总清分状态
    if (subOrder.clearing) {
        subOrder.clearing.status = 'settled';
        subOrder.clearing.settleTime = new Date().toISOString();
    }
    
    // 更新父订单状态
    updateParentOrderStatus(subOrder.parentOrderId);
    
    saveData();
    alert('确认收货成功！');
    render();
}

<script>
// 订单详情 - 显示子订单状态、物流信息、售后操作
function renderOrderDetail(el) {
    const order = DB.orders.find(o => o.id === currentOrderId);
    if (!order) { goTo('orders'); return; }
    
    // 待支付订单特殊处理
    const isPendingPay = order.status === 'pending_pay';
    if (isPendingPay) {
        renderPendingPayOrderDetail(el, order);
        return;
    }
    
    // 交易取消订单特殊处理
    const isCancelled = order.status === 'cancelled';
    if (isCancelled) {
        renderCancelledOrderDetail(el, order);
        return;
    }
    
    // 如果有指定子订单ID，显示单个子订单详情
    if (currentSubOrderId) {
        const subOrder = DB.subOrders.find(so => so.id === currentSubOrderId);
        if (subOrder) {
            renderSubOrderDetail(el, order, subOrder);
            return;
        }
    }
    
    // 否则显示父订单下所有子订单（兼容旧逻辑）
    const subOrders = DB.subOrders.filter(so => so.parentOrderId === order.id);
    // 如果只有一个子订单，直接显示子订单详情
    if (subOrders.length === 1) {
        renderSubOrderDetail(el, order, subOrders[0]);
        return;
    }
    
    // 多个子订单时显示父订单概览（这种情况现在不太会出现，因为列表已经按子订单显示）
    renderParentOrderDetail(el, order, subOrders);
}

// 渲染单个子订单详情
function renderSubOrderDetail(el, order, subOrder) {
    const allSubOrders = DB.subOrders.filter(so => so.parentOrderId === order.id);
    const orderAfterSales = DB.afterSales.filter(as => as.subOrderId === subOrder.id);
    const hasActiveAS = orderAfterSales.some(as => as.status !== 'completed' && as.status !== 'rejected');
    // 检查是否有换货售后（换货中不应该显示确认收货按钮）
    const hasExchangeAS = orderAfterSales.some(as => as.type === 'exchange' && (as.status === 'pending' || as.status === 'approved' || as.status === 'waiting_return' || as.status === 'returning' || as.status === 'received' || as.status === 'reshipping'));
    const isPendingShip = subOrder.status === 'pending_ship';
    
    // 多包裹支持
    const packages = subOrder.packages || [];
    const hasPackages = packages.length > 0;
    const deliveredCount = packages.filter(p => p.status === 'delivered').length;
    const isPartialDelivered = hasPackages && deliveredCount > 0 && deliveredCount < packages.length;
    
    const subTotal = subOrder.amount || subOrder.items.reduce((sum, item) => sum + item.price * item.qty, 0);
    const subFreight = subOrder.freight || 0;
    
    // 应付金额 = 商品总额 + 运费
    const actualPay = subTotal + subFreight;
    
    // 获取父订单的支付方式信息
    const paymentPlan = order.paymentPlan || {};
    const cashPayMethod = paymentPlan.cashPayMethod || 'wechat';
    
    // 从子订单获取各支付方式的原始金额
    const rawCouponPaid = subOrder.couponDeduct || 0;
    const rawPointsPaid = subOrder.pointsDeduct || 0;
    const rawCardUsed = subOrder.cardDeduct || 0;
    const rawCashAmount = subOrder.cashPaid || 0;
    const rawTotal = rawCouponPaid + rawPointsPaid + rawCardUsed + rawCashAmount;
    
    // 按比例调整支付明细，确保总和等于应付金额
    let subCouponPaid = 0, subPointsPaid = 0, subCardUsed = 0, subCashAmount = 0;
    if (rawTotal > 0) {
        const ratio = actualPay / rawTotal;
        subCouponPaid = Math.round(rawCouponPaid * ratio * 100) / 100;
        subPointsPaid = Math.round(rawPointsPaid * ratio * 100) / 100;
        subCardUsed = Math.round(rawCardUsed * ratio * 100) / 100;
        // 最后一项用减法，避免精度问题
        subCashAmount = Math.round((actualPay - subCouponPaid - subPointsPaid - subCardUsed) * 100) / 100;
        if (subCashAmount < 0) subCashAmount = 0;
    } else {
        // 如果没有支付记录，全部用现金支付
        subCashAmount = actualPay;
    }
    
    // 状态显示逻辑
    let statusText = getSubOrderStatusText(subOrder.status);
    let statusColor = subOrder.status === 'delivered' ? '#52c41a, #73d13d' : subOrder.status === 'shipped' ? '#1890ff, #40a9ff' : '#11998e, #38ef7d';
    let statusSubText = '';
    
    if (hasPackages) {
        if (isPartialDelivered) {
            statusText = '部分签收';
            statusColor = '#fa8c16, #ffc53d';
            statusSubText = `已签收 ${deliveredCount}/${packages.length} 个包裹`;
        } else if (deliveredCount === packages.length) {
            statusText = '已签收';
            statusColor = '#52c41a, #73d13d';
            statusSubText = `共 ${packages.length} 个包裹`;
        } else if (subOrder.status === 'shipped') {
            statusSubText = `共 ${packages.length} 个包裹`;
        }
    }
    
    el.innerHTML = `
        <div class="nav-bar">
            <div class="back" onclick="currentSubOrderId = null; goTo('orders')">←</div>
            <div class="title">订单详情</div>
        </div>
        <div class="content" style="padding-bottom: 80px;">
            <!-- 订单状态卡片 -->
            <div style="background: linear-gradient(135deg, ${statusColor}); border-radius: 12px; padding: 20px; color: #fff; margin-bottom: 10px;">
                <div style="font-size: 18px; font-weight: 600; margin-bottom: 5px;">${statusText}</div>
                <div style="font-size: 12px; opacity: 0.9;">订单号: ${subOrder.id}</div>
                ${statusSubText ? `<div style="font-size: 11px; opacity: 0.8; margin-top: 5px;">${statusSubText}</div>` : ''}
            </div>
            
            <!-- 收货地址 -->
            <div onclick="${isPendingShip ? `showModifyAddressModal('${order.id}')` : ''}" style="background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px; ${isPendingShip ? 'cursor: pointer;' : ''}">
                <div style="display: flex; align-items: flex-start;">
                    <span style="font-size: 20px; margin-right: 10px;">📍</span>
                    <div style="flex: 1;">
                        <div style="font-weight: 500;">${order.address.name} ${order.address.phone}</div>
                        <div style="font-size: 13px; color: #666; margin-top: 5px;">${order.address.province}${order.address.city}${order.address.district}${order.address.detail}</div>
                    </div>
                    ${isPendingShip ? `<span style="color: #999; font-size: 12px;">修改 ></span>` : ''}
                </div>
            </div>
            
            <!-- 物流信息（已发货/已签收状态显示） -->
            ${(subOrder.status === 'shipped' || subOrder.status === 'delivered') ? `
            <div style="background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <div style="font-weight: 600;">🚚 物流信息</div>
                    <div onclick="currentSubOrderId='${subOrder.id}'; goTo('logistics', {subOrderId: '${subOrder.id}'})" style="font-size: 13px; color: #11998e; cursor: pointer;">查看物流 ></div>
                </div>
                <div style="background: #f9f9f9; border-radius: 8px; padding: 12px;">
                    ${(() => {
                        const packages = subOrder.packages || [];
                        if (packages.length > 0) {
                            const pkg = packages[0];
                            return `
                                <div style="font-size: 13px; color: #666; margin-bottom: 5px;">
                                    <span style="font-weight: 600; color: #333;">顺丰快递</span>
                                    ${packages.length > 1 ? `<span style="margin-left: 8px; font-size: 11px; background: #e6f7ff; color: #1890ff; padding: 2px 6px; border-radius: 4px;">共${packages.length}个包裹</span>` : ''}
                                </div>
                                <div style="font-size: 13px; color: #666;">
                                    单号: ${pkg.trackingNo}
                                </div>
                            `;
                        } else {
                            const expressCompany = subOrder.expressCompany || '顺丰快递';
                            const trackingNo = subOrder.trackingNo || 'SF' + Date.now();
                            return `
                                <div style="font-size: 13px; color: #666; margin-bottom: 5px;">
                                    <span style="font-weight: 600; color: #333;">${expressCompany}</span>
                                </div>
                                <div style="font-size: 13px; color: #666;">
                                    单号: ${trackingNo}
                                </div>
                            `;
                        }
                    })()}
                </div>
                ${subOrder.status === 'shipped' ? `

                    <span style="font-size: 16px; margin-right: 8px;">📦</span>
                    <span style="font-weight: 600;">${getWarehouseName(subOrder, allSubOrders)}</span>
                </div>
                ${subOrder.items.map(item => `
                    <div style="display: flex; padding: 10px 0; border-bottom: 1px solid #f5f5f5;">
                        <div style="width: 70px; height: 70px; background: #f9f9f9; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 35px; margin-right: 12px;">${item.img}</div>
                        <div style="flex: 1;">
