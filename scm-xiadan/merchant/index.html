                <input type="date" style="padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px;">
                <span style="color: #999;">至</span>
                <input type="date" style="padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px;">
                ${isHQ ? `<button class="btn btn-primary">+ 新增门店</button>` : ''}
                <div style="margin-left: auto; font-size: 13px; color: #666;">
                    共 <span style="color: #1890ff; font-weight: 600;">${records.length}</span> 家门店
                </div>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>门店信息</th>
                        <th>品牌</th>
                        <th>联系人</th>
                        <th>入驻时间</th>
                        <th>保证金余额</th>
                        <th>订单数</th>
                        <th>交易额</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${records.map(r => {
                        const statusText = r.status === 'active' ? '正常营业' : '暂停营业';
                        const statusColor = r.status === 'active' ? '#52c41a' : '#fa8c16';
                        
                        return `
                        <tr>
                            <td>
                                <div>
                                    <div style="font-weight: 500; font-size: 14px;">${r.storeName}</div>
                                    <div style="font-size: 11px; color: #999;">ID: ${r.id}</div>
                                </div>
                            </td>
                            <td>
                                <span style="padding: 4px 10px; background: #1890ff20; color: #1890ff; border-radius: 4px; font-size: 12px;">${r.brandName}</span>
                            </td>
                            <td>
                                <div style="font-size: 13px;">${r.contactPerson}</div>
                                <div style="font-size: 11px; color: #999;">${r.contactPhone}</div>
                            </td>
                            <td style="font-size: 13px;">${r.joinDate}</td>
                            <td style="color: #1890ff; font-weight: 500;">¥${r.marginBalance.toLocaleString()}</td>
                            <td style="color: #666;">${r.orderCount}</td>
                            <td style="color: #52c41a; font-weight: 500;">¥${r.totalAmount.toLocaleString()}</td>
                            <td><span class="status-tag" style="background: ${statusColor}20; color: ${statusColor};">${statusText}</span></td>
                            <td>
                                <button class="btn btn-default btn-sm" onclick="viewStoreDetail('${r.id}')">查看</button>
                                ${isHQ ? `<button class="btn btn-default btn-sm" onclick="editStore('${r.id}')">编辑</button>` : ''}
                            </td>
                        </tr>
                    `}).join('')}
                </tbody>
            </table>
        </div>
    `;
}

// 商品详情查看
function viewProductDetail(productId) {
    showToast('查看商品详情: ' + productId);
}

// 编辑商品
function editProduct(productId) {
    showToast('编辑商品: ' + productId);
}

// 门店详情查看
function viewStoreDetail(storeId) {
    showToast('查看门店详情: ' + storeId);
}

// 编辑门店
function editStore(storeId) {
    showToast('编辑门店: ' + storeId);
}

// ==================== 需求说明面板 ====================
let currentMerchantPage = 'dashboard';

// 切换需求说明面板
function toggleSpecPanel() {
    const overlay = document.getElementById('specOverlay');
    const panel = document.getElementById('specPanel');
    
    if (overlay.classList.contains('show')) {
        overlay.classList.remove('show');
        panel.classList.remove('show');
    } else {
        overlay.classList.add('show');
        panel.classList.add('show');
        updateMerchantSpecPanel();
    }
}

// 关闭需求说明面板
function closeSpecPanel() {
    document.getElementById('specOverlay').classList.remove('show');
    document.getElementById('specPanel').classList.remove('show');
}

// 更新需求说明面板内容
function updateMerchantSpecPanel() {
    const specContent = document.getElementById('specContent');
    const specs = getMerchantPageSpec(currentMerchantPage);
    
    specContent.innerHTML = `
        <div class="spec-section">
            <div class="spec-section-title">页面功能</div>
            <div style="color: #333; font-weight: 600; margin-bottom: 8px;">${specs.title}</div>
            <div style="color: #666; font-size: 12px;">${specs.description}</div>
        </div>
        
        ${specs.features ? `
        <div class="spec-section">
            <div class="spec-section-title">核心功能</div>
            <ul class="spec-list">
                ${specs.features.map(f => `<li>${f}</li>`).join('')}
            </ul>
        </div>
        ` : ''}
        
        ${specs.dataItems ? `
        <div class="spec-section">
            <div class="spec-section-title">数据项</div>
            <ul class="spec-list">
                ${specs.dataItems.map(d => `<li>${d}</li>`).join('')}
            </ul>
        </div>
        ` : ''}
        
        ${specs.operations ? `
        <div class="spec-section">
            <div class="spec-section-title">操作功能</div>
            <ul class="spec-list">
                ${specs.operations.map(o => `<li>${o}</li>`).join('')}
            </ul>
        </div>
        ` : ''}
        
        ${specs.rules ? `
        <div class="spec-section">
            <div class="spec-section-title">业务规则</div>
            ${specs.rules.map(r => `<div class="spec-rule">${r}</div>`).join('')}
        </div>
        ` : ''}
        
        ${specs.states ? `
        <div class="spec-section">
            <div class="spec-section-title">状态说明</div>
            <div style="margin-top: 8px;">
                ${specs.states.map(s => `<span class="spec-tag">${s}</span>`).join('')}
            </div>
        </div>
        ` : ''}
    `;
}
