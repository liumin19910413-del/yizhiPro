<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店商供应链系统 - 测试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
            color: white;
        }
        
        .logo { font-size: 20px; font-weight: bold; }
        
        .tabs {
            display: flex;
            gap: 10px;
        }
        
        .tab-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .tab-btn.active {
            background: white;
            color: #667eea;
        }
        
        .content {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f5f5f5;
        }
        
        .welcome {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .welcome-box {
            text-align: center;
        }
        
        .welcome h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .cards {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }
        
        .card {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 12px;
            cursor: pointer;
            width: 250px;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        
        iframe.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🏪 店商供应链系统</div>
        <div class="tabs">
            <button class="tab-btn" onclick="switchTo('mg')">🖥️ MG管理后台</button>
            <button class="tab-btn" onclick="switchTo('lite')">📱 Lite商户后台</button>
        </div>
        <div>
            <button class="tab-btn" onclick="location.reload()">🔄 刷新</button>
        </div>
    </div>
    
    <div class="content">
        <div class="welcome" id="welcome">
            <div class="welcome-box">
                <h1>🏪 欢迎使用</h1>
                <p>请选择要访问的系统</p>
                <div class="cards">
                    <div class="card" onclick="switchTo('mg')">
                        <div class="card-icon">🖥️</div>
                        <div class="card-title">MG管理后台</div>
                        <div>供应链平台管理端</div>
                    </div>
                    <div class="card" onclick="switchTo('lite')">
                        <div class="card-icon">📱</div>
                        <div class="card-title">Lite商户后台</div>
                        <div>商户管理端</div>
                    </div>
                </div>
            </div>
        </div>
        
        <iframe id="mgFrame" src=""></iframe>
        <iframe id="liteFrame" src=""></iframe>
    </div>
    
    <script>
        let current = null;
        
        function switchTo(system) {
            console.log('切换到:', system);
            
            // 隐藏欢迎页面
            document.getElementById('welcome').style.display = 'none';
            
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 找到触发事件的按钮并激活
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => {
                if (btn.textContent.includes(system === 'mg' ? 'MG' : 'Lite')) {
                    btn.classList.add('active');
                }
            });
            
            // 隐藏所有iframe
            document.getElementById('mgFrame').classList.remove('active');
            document.getElementById('liteFrame').classList.remove('active');
            
            // 显示目标iframe
            const frame = document.getElementById(system + 'Frame');
            if (!frame.src) {
                frame.src = system + '-iframe.html';
                console.log('加载:', frame.src);
                frame.onload = function() {
                    console.log('iframe加载完成');
                };
                frame.onerror = function() {
                    console.error('iframe加载失败');
                };
            }
            frame.classList.add('active');
            
            current = system;
        }
        
        console.log('页面加载完成');
    </script>
</body>
</html>
